<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeynep Kaya Apps</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root{
      --bg:#eee8dc;
      --paper:#fffaf0;
      --paper-2:#f7efe2;
      --paper-3:#eadfce;
      --ink:#27231f;
      --muted:#766d61;
      --line:#d8cbbb;
      --teal:#2e8f83;
      --deep:#0f625b;
      --orange:#ed8516;
      --coral:#eaa08f;
      --mustard:#d7ad4c;
      --mint:#a9d8cb;
      --blue:#6e9dae;
      --shadow:0 28px 55px -34px rgba(32,28,21,.55),0 4px 12px rgba(32,28,21,.06);
      --soft:cubic-bezier(.2,.9,.25,1);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(800px 480px at 86% 5%, rgba(234,160,143,.38), transparent 62%),
        radial-gradient(740px 520px at 10% 20%, rgba(169,216,203,.34), transparent 60%),
        linear-gradient(180deg,#f8f3ea 0%, var(--bg) 45%, #e6ddce 100%);
      overflow-x:hidden;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.42;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.08'/%3E%3C/svg%3E");
    }

    a{color:inherit;text-decoration:none}
    .page{max-width:1180px;margin:0 auto;padding:24px 20px 60px;position:relative}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      position:sticky;
      top:14px;
      z-index:20;
      background:rgba(255,250,240,.68);
      border:1px solid rgba(216,203,187,.7);
      border-radius:28px;
      padding:10px 12px 10px 18px;
      backdrop-filter:blur(18px);
      box-shadow:0 12px 34px -28px rgba(32,28,21,.55);
    }

    .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.03em}
    .brand-mark{
      width:34px;
      height:34px;
      border-radius:14px;
      background:linear-gradient(145deg,var(--deep),var(--teal));
      box-shadow:inset 0 1px 1px rgba(255,255,255,.35),0 10px 20px -12px rgba(15,98,91,.9);
      position:relative;
    }
    .brand-mark:after{
      content:"";
      position:absolute;
      width:13px;
      height:13px;
      border-radius:50%;
      background:var(--orange);
      right:-2px;
      bottom:3px;
      box-shadow:0 8px 12px -8px rgba(237,133,22,.9);
    }

    nav{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    nav a{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      padding:10px 13px;
      border-radius:999px;
      transition:.25s var(--soft);
    }
    nav a:hover{
      background:#fff;
      color:var(--ink);
      box-shadow:0 12px 20px -18px rgba(32,28,21,.7);
    }

    .hero{
      display:grid;
      grid-template-columns:1.02fr .98fr;
      gap:36px;
      align-items:center;
      padding:76px 0 54px;
      min-height:640px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:rgba(255,250,240,.72);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:800;
      color:var(--deep);
      box-shadow:0 12px 22px -20px rgba(32,28,21,.5);
    }
    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--orange);
      box-shadow:0 0 0 6px rgba(237,133,22,.12);
    }

    h1{
      font-size:clamp(44px,7vw,86px);
      line-height:.92;
      letter-spacing:-.08em;
      margin:20px 0 18px;
      max-width:760px;
    }
    .lead{
      font-size:clamp(17px,2vw,22px);
      line-height:1.55;
      color:var(--muted);
      max-width:600px;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:30px;
    }
    .pill-btn{
      border:none;
      cursor:pointer;
      border-radius:24px;
      padding:15px 20px;
      font-weight:800;
      background:var(--ink);
      color:var(--paper);
      box-shadow:0 18px 35px -22px rgba(0,0,0,.65),inset 0 1px 1px rgba(255,255,255,.2);
      transition:transform .28s var(--soft),box-shadow .28s var(--soft);
    }
    .pill-btn.secondary{
      background:var(--paper);
      color:var(--ink);
      border:1px solid var(--line);
    }
    .pill-btn:hover{
      transform:translateY(-3px);
      box-shadow:0 24px 42px -24px rgba(0,0,0,.7),inset 0 1px 1px rgba(255,255,255,.24);
    }
    .pill-btn:active{transform:translateY(1px) scale(.985)}

    .road-visual{
      position:relative;
      min-height:560px;
      border-radius:46px;
      background:linear-gradient(145deg,rgba(255,250,240,.78),rgba(232,222,205,.82));
      border:1px solid rgba(216,203,187,.75);
      box-shadow:var(--shadow);
      overflow:hidden;
      padding:28px;
    }
    .road-visual:before{
      content:"";
      position:absolute;
      inset:-80px -40px;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.8), transparent 26%),
        radial-gradient(circle at 90% 72%, rgba(169,216,203,.35), transparent 32%);
      pointer-events:none;
    }

    .track{
      position:absolute;
      left:50%;
      top:-30px;
      bottom:-30px;
      width:154px;
      transform:translateX(-50%);
      opacity:.95;
    }
    .track path{
      fill:none;
      stroke-linecap:round;
      filter:drop-shadow(0 9px 4px rgba(32,28,21,.11));
    }
    .track .t1{stroke:var(--deep);stroke-width:18}
    .track .t2{stroke:var(--teal);stroke-width:18;transform:translateX(30px)}
    .track .t3{stroke:var(--orange);stroke-width:18;transform:translateX(-30px)}

    .stop{
      position:relative;
      display:grid;
      grid-template-columns:68px 1fr;
      gap:14px;
      align-items:center;
      background:rgba(255,250,240,.9);
      border:1px solid rgba(216,203,187,.8);
      border-radius:28px;
      padding:16px 18px;
      margin:30px 0;
      box-shadow:0 24px 44px -34px rgba(32,28,21,.75),inset 0 1px 1px rgba(255,255,255,.72);
      transition:.35s var(--soft);
    }
    .stop:hover{
      transform:translateY(-5px);
      box-shadow:0 34px 58px -36px rgba(32,28,21,.85),inset 0 1px 1px rgba(255,255,255,.72);
    }
    .stop:nth-child(2){margin-right:70px}
    .stop:nth-child(3){margin-left:64px}
    .stop:nth-child(4){margin-right:42px}
    .stop:nth-child(5){margin-left:72px}

    .num{
      width:52px;
      height:52px;
      border-radius:20px;
      display:grid;
      place-items:center;
      background:var(--accent);
      color:white;
      font-weight:900;
      font-size:18px;
      box-shadow:inset 0 1px 1px rgba(255,255,255,.45),inset 0 -4px 10px rgba(0,0,0,.16),0 12px 22px -15px rgba(0,0,0,.8);
    }
    .stop h3{font-size:18px;letter-spacing:-.04em}
    .stop p{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.4}
    .tag{
      display:inline-flex;
      margin-top:9px;
      font-size:11px;
      font-weight:900;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:color-mix(in srgb,var(--accent) 65%,#17110d);
      background:color-mix(in srgb,var(--accent) 16%,#fffaf0);
      border:1px solid color-mix(in srgb,var(--accent) 22%,#d8cbbb);
      padding:5px 9px;
      border-radius:999px;
    }

    section{padding:54px 0}
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:24px;
      margin-bottom:22px;
    }
    h2{
      font-size:clamp(30px,4vw,52px);
      letter-spacing:-.07em;
      line-height:1;
    }
    .section-head p{
      max-width:440px;
      color:var(--muted);
      line-height:1.55;
      font-size:15px;
    }

    .app-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:18px;
    }

    .app-card{
      position:relative;
      min-height:310px;
      border-radius:34px;
      padding:22px;
      overflow:hidden;
      background:linear-gradient(145deg,var(--paper),var(--paper-2));
      border:1px solid rgba
