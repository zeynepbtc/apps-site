function inKanjiReviewScope(data, key){

function buildKanjiReviewQueue(state, data, now){

    .filter(([id, rec]) =>
      inKanjiReviewScope(data, id) &&

      rec.next <= now)
    .sort(([idA, a], [idB, b]) =>

      ((Number.isFinite(a.mastery) ? a.mastery : 0) -
       (Number.isFinite(b.mastery) ? b.mastery : 0)) ||         // 2) düşük mastery önce

let _voicesReady=false, _jaVoice=null;
function initVoices(){
  if(!("speechSynthesis" in window)) return;
  const pick=()=>{ const vs=speechSynthesis.getVoices(); _jaVoice=vs.find(v=>/ja|JP/i.test(v.lang))||null; _voicesReady=true; };

function speak(text, el, url){
  const mode=state.settings.audioMode||"system";
  if(mode==="off"){ toast("Ses kapalı — Profil'den açabilirsin"); return; }
  const useSpeech=()=>{
    if(!speechSupported()){ toast("Bu cihazda ses desteği sınırlı olabilir"); if(el)el.classList.remove("playing"); return; }
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang="ja-JP"; u.rate=.85; u.pitch=1; if(_jaVoice) u.voice=_jaVoice;
      if(el){ el.classList.add("playing"); u.onend=u.onerror=()=>el.classList.remove("playing"); }
      speechSynthesis.speak(u);
    }catch(e){ if(el)el.classList.remove("playing"); toast("Ses çalınamadı"); }
  };
  if(mode==="premium" && url){
    if(el) el.classList.add("playing");
    try{
      const a=new Audio(url);
      a.onended=a.onerror=null;
      a.addEventListener("ended",()=>{ if(el)el.classList.remove("playing"); });
      a.addEventListener("error",()=>{ if(el)el.classList.remove("playing"); useSpeech(); }); // file missing → fallback
      a.play().catch(()=>{ if(el)el.classList.remove("playing"); useSpeech(); });
    }catch(e){ useSpeech(); }
    return;
  }
  useSpeech();
}

function go(screen, param=null, push=true){
  if(push && state.screen!==screen) state.stack.push({screen:state.screen,param:state.param,scroll:(main?main.scrollTop:0)}); /* geri dönüşte kaldığı yeri koru */
  state.screen=screen; state.param=param;

}

  if(prev){ state.screen=prev.screen; state.param=prev.param; render(); main.scrollTop=(prev.scroll||0); } /* liste kaydırmasını geri yükle */

}

const DEFAULT_LOCALE = "tr";
function currentLocale(){
  const l = (state.settings && state.settings.locale) || DEFAULT_LOCALE;
  return I18N[l] ? l : DEFAULT_LOCALE;                 // desteklenmeyen/bozuk locale → tr
}
/* t() fallback zinciri: istenen locale → tr → okunabilir key adı. Production ÇÖKMEZ. */
function t(key, locale){
  const loc = (locale && I18N[locale]) ? locale : currentLocale();
  const dict = I18N[loc] || {};
  if(Object.prototype.hasOwnProperty.call(dict, key)) return dict[key];
  const tr = I18N[DEFAULT_LOCALE] || {};
  if(Object.prototype.hasOwnProperty.call(tr, key)) return tr[key];   // → tr
  try{ if(typeof console!=="undefined") console.warn("[i18n] eksik anahtar:", key, loc); }catch(e){}
  return key;                                                          // → okunabilir key (boş/exception değil)
}

/* Tek descriptor kaynağı — startKey → rota + ÇEVİRİ ANAHTARLARI (literal metin DEĞİL).
   Aktif (tanıma merdiveni): yazi-mantigi (あ-Hayır) · kanji-ki (木-Hayır) · atlas-map (木-Evet).
   kana-a/kana-home: yalnız geri-uyumluluk (eski completed kullanıcı startKey'leri resolve olsun). */
const START_DESCRIPTORS = {
  "kana-a":       { route:"kanadetail",     param:"あ", labelKey:"home.rec.kana.label",    reasonKey:"home.rec.kana.reason" },
  "kana-home":    { route:"kana",           param:null, labelKey:"home.rec.kana.label",    reasonKey:"home.rec.kana.reason" },
  "kanji-ki":     { route:"detail",         param:"ki", labelKey:"home.rec.kanji.label",   reasonKey:"home.rec.kanji.reason" },
  "atlas-map":    { route:"map",            param:null, labelKey:"home.rec.atlas.label",   reasonKey:"home.rec.atlas.reason" },
  "yazi-mantigi": { route:"writing-system", param:null, labelKey:"home.rec.writing.label", reasonKey:"home.rec.writing.reason" },
};
const VALID_START_KEYS = Object.keys(START_DESCRIPTORS);
function startDescriptorFor(key){ return START_DESCRIPTORS[key] || null; }

/* Onboarding NORMALIZER — schemaVersion DOKUNULMAZ (P0-5). Onboarding alt-nesnesini yeni
   tanıma-merdiveni şekline geriye-uyumlu getirir; sahte rota üretmez. Eski stage'ler
   (competency/writing-intro/final) → welcome güvenli düşüş. */
const OB_STAGES = ["welcome","kana-q","kanji-q"];
function normalizeOnboarding(o){
  const nowIso = ()=>new Date().toISOString();
  const src = isPlainObject(o) ? o : null;
  if(!src){                                            // hiç yok → fresh
    return { status:"in-progress", completed:false, stage:"welcome", startKey:null,
             firstMeaningfulActionAt:null, startedAt:nowIso(), completedAt:null, skippedAt:null };
  }
  if(typeof src.status !== "string"){                  // eski şema (status yok) → migration
    if(src.completed === true){                        // eski completed: startKey TÜRETİLMEZ (sahte öneri yok)
      return { ...src, status:"completed", completed:true, stage:"welcome", startKey:null,
               firstMeaningfulActionAt:src.firstMeaningfulActionAt||null,
               startedAt:src.startedAt||null, completedAt:src.completedAt||null, skippedAt:null };
    }
    return { ...src, status:"in-progress", completed:false, stage:"welcome", startKey:null,
             firstMeaningfulActionAt:src.firstMeaningfulActionAt||null,
             startedAt:src.startedAt||nowIso(), completedAt:null, skippedAt:null };
  }
  // yeni şema → invariant doğrulaması + güvenli düşüş
  let status = (src.status==="completed"||src.status==="skipped"||src.status==="in-progress") ? src.status : "in-progress";
  let stage  = OB_STAGES.indexOf(src.stage)>=0 ? src.stage : "welcome";   // eski stage → welcome RESET
  let startKey = VALID_START_KEYS.indexOf(src.startKey)>=0 ? src.startKey : null;
  if(status==="skipped"){ startKey=null; }
  else if(status==="completed"){ /* startKey geçersizse null (sahte öneri yok); stage completed'da kullanılmaz */ }
  else { startKey=null; }                              // in-progress: tamamlanana kadar startKey yok
  const completed = (status==="completed"||status==="skipped");
  return { ...src, status, completed, stage, startKey,
           firstMeaningfulActionAt:src.firstMeaningfulActionAt||null,
           startedAt:src.startedAt||null,
           completedAt: status==="completed" ? (src.completedAt||null) : null,   // skipped'a sahte completedAt YOK
           skippedAt: status==="skipped" ? (src.skippedAt||null) : null };
}

/* Tamamlandı → completed. explicit startKey (competency yok). userProfile aynası name KORUNARAK güncellenir. */
function completeOnboarding(startKey){
  const o = state.onboarding = normalizeOnboarding(state.onboarding);
  const now = new Date().toISOString();
  const key = (VALID_START_KEYS.indexOf(startKey)>=0) ? startKey : null;
  o.status="completed"; o.completed=true; o.startKey=key;
  o.completedAt=now; o.skippedAt=null; if(!o.startedAt) o.startedAt=now;
  const prev = isPlainObject(state.userProfile) ? state.userProfile : {};
  state.userProfile = { ...prev,
    name: (prev.name!=null ? prev.name : ""),                                  // mevcut ad KORUNUR
    level: prev.level||"beginner",
    showAdvanced: !!prev.showAdvanced,
    createdAt: prev.createdAt || now, updatedAt: now };
  save();
}
/* Erken kaçış → skipped. competency/startKey temizlenir; sahte completedAt YOK. */
function skipOnboarding(){
  const o = state.onboarding = normalizeOnboarding(state.onboarding);
  const now = new Date().toISOString();
  o.status="skipped"; o.completed=true; o.startKey=null;
  o.completedAt=null; o.skippedAt=now; if(!o.startedAt) o.startedAt=now;
  save();
}
/* Anlamlı öğrenme eylemi — KANONİK kalıcı damga (firstMeaningfulActionAt). SRS/mastery/backup DOKUNULMAZ.
   idempotent; save reddedilir/hata verirse damga GERİ ALINIR → öğrenme geri alınmaz, sonraki eylemde YENİDEN denenir. */
function markFirstMeaningfulLearningAction(kind){
  const o = state.onboarding;
  if(!isPlainObject(o) || o.firstMeaningfulActionAt) return;      // idempotent
  o.firstMeaningfulActionAt = new Date().toISOString();
  let okSave = false;
  try{ const r = save(); okSave = !(r && r.ok === false); }catch(e){ okSave = false; }
  if(!okSave) o.firstMeaningfulActionAt = null;                   // kalıcı değilse geri al → sonraki eylemde tekrar denenir
}
/* Merkezi post-success yardımcı — SRS çekirdeğine DOKUNMADAN, başarılı + gerçek başarı sonrası kanonik marker'ı yazar.
   r = srsRecord dönüşü (ok gerekli); correct !== false → gerçek başarı (yanlış cevap sayılmaz). Dönüşü aynen geçirir. */
function markLearn(r, correct, kind){
  if(r && r.ok && correct !== false) markFirstMeaningfulLearningAction(kind);
  return r;
}
/* Home ilk-öneri şeridi kararı — KANONİK kalıcı marker (eski/import progress GİZLEMEZ). Saf/testlenebilir.
   NOT: Türetilmiş "hasMeaningfulLearning" (correct>0) yardımcısı KALDIRILDI — kilitli kararla şerit yalnız
   kalıcı firstMeaningfulActionAt'a bakar; correct>0 hiçbir kararı etkilemiyordu (ölü yardımcı). */
function shouldShowInitialRec(ob){
  return !!(ob && ob.status==="completed" && ob.startKey && !ob.firstMeaningfulActionAt);
}
if(typeof window!=="undefined") window.__ob = { normalizeOnboarding, startDescriptorFor, completeOnboarding, skipOnboarding, markLearn, markFirstMeaningfulLearningAction, shouldShowInitialRec, t, I18N, VALID_START_KEYS };

function WritingSystem(){
  const step = state._wsStep || 0;
  const idx = Math.max(0, Math.min(WS_STEPS.length-1, step));
  const s = WS_STEPS[idx];
  const total = WS_STEPS.length;
  const isLast = idx === total - 1;
  let inner = "";
  if(s.cards){
    inner += s.cards.map(c=>`<div class="ws-card"><div style="display:flex;align-items:center;gap:11px"><span class="jp" style="font-size:28px;color:var(--accent);width:36px;text-align:center">${c[2]}</span><div style="flex:1"><div class="wsc-t">${c[0]}</div><div class="wsc-d">${c[1]}</div></div></div></div>`).join("");
  }
  if(s.example && s.example.tr){
    inner += `<div class="ws-card center" style="text-align:center;padding:18px"><div style="margin-bottom:6px">${s.example.jp}</div><div class="lead" style="font-size:12.5px">${s.example.tr}</div></div>`;
  }
  if(s.pictograms){
    inner += `<div class="ws-card"><div class="wsc-t" style="margin-bottom:6px">Örnekler</div>${s.pictograms.map(p=>`<div class="ws-pair"><span class="wp-l">${p[0]}</span><span class="wp-text">${p[1]}</span></div>`).join("")}</div>`;
  }
  if(s.groups){
    inner += s.groups.map(g=>{
      let items = "";
      if(g.items) items = g.items.map(it=>`<div class="ws-pair"><span class="wp-l">${it[0]}</span><span class="wp-text">${it[1]}</span></div>`).join("");
      if(g.pairs) items = g.pairs.map(p=>`<div style="padding:9px 0;border-bottom:1px solid var(--line)"><div class="jp" style="font-size:18px;color:var(--accent-deep)">${p[0]}</div><div class="lead" style="font-size:12px;margin-top:2px">${p[1]}</div></div>`).join("");
      return `<div class="ws-card"><div class="wsc-t" style="margin-bottom:6px">${g.label}</div>${items}</div>`;
    }).join("");
  }
  if(s.pairs){
    inner += `<div class="ws-card">${s.pairs.map(p=>`<div class="ws-pair"><span class="wp-l">${p[0]}</span><span class="wp-text">${p[1]}</span></div>`).join("")}</div>`;
  }
  if(s.transforms){
    inner += `<div class="ws-card">${s.transforms.map(t=>`<div class="ws-pair"><span class="wp-l">${t[0]}</span><span class="wp-arrow">→</span><span class="wp-r">${t[1]}</span></div>`).join("")}</div>`;
  }
  if(s.readings && !s.example){
    inner += s.readings.map(r=>`<div class="ws-card"><div class="wsc-t">${r[0]}</div><div class="wsc-d">${r[1]}</div></div>`).join("");
  }
  if(s.example && s.example.readings){
    inner += `<div class="ws-card center" style="text-align:center;padding:16px">${s.example.jp}<div style="margin-top:10px">${s.example.readings.map(r=>`<div class="ws-pair" style="justify-content:center"><span class="jp" style="font-size:20px;color:var(--accent-deep);width:auto">${r[0]}</span><span class="wp-text">${r[1]}</span></div>`).join("")}</div></div>`;
  }
  if(s.note){
    inner += `<div class="lead" style="font-size:12.5px;padding:9px 11px;background:var(--accent-tint);border:1px solid var(--accent-soft);border-radius:11px;margin-top:6px"><b>İpucu:</b> ${s.note}</div>`;
  }
  if(s.rules){
    inner += `<div class="ws-card">${s.rules.map(r=>`<div class="ws-pair"><span class="wp-l" style="color:var(--gold);font-size:14px">•</span><span class="wp-text">${r}</span></div>`).join("")}</div>`;
    inner += `<button class="btn ghost full" style="margin-top:8px" data-go="practice">Vuruş pratiğine başla</button>`;
  }
  if(s.cta){
    inner += `<button class="btn ghost full" style="margin-top:8px" data-go="${s.cta.go}">${s.cta.label} ›</button>`;
  }
  if(s.finalActions){
    inner += `<div style="display:flex;flex-direction:column;gap:8px;margin-top:6px">${s.finalActions.map((a,fi)=>`<button class="btn ${fi===0?'':'soft'} full" data-act="ws-finish" data-target="${a[0]}"><span class="jp" style="font-size:18px;margin-right:6px">${a[2]}</span> ${a[1]}</button>`).join("")}</div>`;
  }
  const progBar = `<div class="ws-progress">${WS_STEPS.map((_,i)=>`<i class="${i<idx?'done':i===idx?'on':''}"></i>`).join("")}</div>`;
  const actions = isLast
    ? `<div class="ws-actions"><button class="btn ghost" style="flex:1" data-act="ws-prev">Geri</button><button class="btn" style="flex:1" data-act="ws-finish" data-target="home">Bitir</button></div>`
    : `<div class="ws-actions">${idx>0?`<button class="btn ghost" style="flex:1" data-act="ws-prev">Geri</button>`:`<button class="btn ghost" style="flex:1" data-act="ws-skip">Bunu biliyorum, geç</button>`}<button class="btn" style="flex:1" data-act="ws-next">Devam ›</button></div>`;
  return `<div class="stagger">
    <div style="display:flex;justify-content:space-between;align-items:center;margin:0 2px">
      <span class="chip">Adım ${idx+1} / ${total}</span>
      <button class="link" data-act="ws-skip" style="font-size:12.5px;color:var(--muted)">Bu dersi geç</button>
    </div>
    ${progBar}
    <div class="ws-step">
      <h2>${s.title}</h2>
      <div class="lead">${s.body}</div>
      ${inner}
    </div>
    ${actions}
  </div>`;
}

function qtile(go,glyph,title,sub){

function firstAvailableNode(){
  // prefer an active (unlocked, not learned) node in family order
  const order=Object.keys(FAMILY_NODES);
  for(const id of order){ if(!state.learned[id] && !isLocked(id)) return id; }
  // else a learning item
  const q=reviewQueue(); if(q.length) return q[0];
  return order.find(id=>!state.learned[id])||"akarui";
}

function Kana(){
  const set = state._kanaSet||"hiragana";
  const rows = DATA[set]||[];
  const totalChars = rows.flat().filter(x=>x&&x.character).length;
  const doneInSet = rows.flat().filter(x=>x&&x.character && state.kana[x.character]).length;

  // İlerleme rotasının nerede kaldığını bul: ilk öğrenilmemiş karakteri içeren grup
  let activeGroupIdx = -1;
  for(let gi=0; gi<rows.length; gi++){
    const hasUnlearned = rows[gi].some(x=>x&&x.character && !state.kana[x.character]);
    if(hasUnlearned){ activeGroupIdx = gi; break; }
  }

  const groupsHtml = rows.map((row, gi)=>{
    const groupChars = row.filter(x=>x&&x.character).map(x=>x.character);
    const groupDone = groupChars.filter(c=>kanaLearned(c)).length;
    const groupTotal = groupChars.length;
    const completed = groupDone===groupTotal;
    const isActive = gi===activeGroupIdx;
    const firstUnlearned = groupChars.find(c=>!state.kana[c]) || groupChars[0];
    const g = KANA_GROUPS[gi] || {name:`Grup ${gi+1}`, romaji:""};
    const pct = groupTotal>0 ? Math.round((groupDone/groupTotal)*100) : 0;

    const cells = row.map(cell=>{
      if(!cell || !cell.character) return `<div class="kcell empty"></div>`;
      const dn = state.kana[cell.character]?"done":"";
      return `<div class="kcell ${dn}" data-go="kanadetail" data-param="${cell.character}"><div class="c jp">${cell.character}</div><div class="r">${cell.romaji}</div></div>`;
    }).join("");

    const stateLabel = completed ? "tamam" : (isActive ? "şu an burada" : (groupDone>0 ? "başladın" : ""));
    const stateChip = stateLabel ? `<span class="kana-group-state ${completed?'done':isActive?'active':'started'}">${stateLabel}</span>` : "";

    return `<div class="kana-group ${completed?'done':''} ${isActive?'active':''}">

          <span class="kana-group-count">${groupDone}/${groupTotal}</span>

    </div>`;
  }).join("");

  const DAKUTEN=[["か","が","ga"],["き","ぎ","gi"],["く","ぐ","gu"],["け","げ","ge"],["こ","ご","go"],
    ["さ","ざ","za"],["し","じ","ji"],["す","ず","zu"],["せ","ぜ","ze"],["そ","ぞ","zo"],
    ["た","だ","da"],["ち","ぢ","ji"],["つ","づ","zu"],["て","で","de"],["と","ど","do"],
    ["は","ば","ba"],["ひ","び","bi"],["ふ","ぶ","bu"],["へ","べ","be"],["ほ","ぼ","bo"]];
  const HANDAKUTEN=[["は","ぱ","pa"],["ひ","ぴ","pi"],["ふ","ぷ","pu"],["へ","ぺ","pe"],["ほ","ぽ","po"]];
  const YOON=[
    ["き",["きゃ","kya"],["きゅ","kyu"],["きょ","kyo"]],
    ["し",["しゃ","sha"],["しゅ","shu"],["しょ","sho"]],
    ["ち",["ちゃ","cha"],["ちゅ","chu"],["ちょ","cho"]],
    ["に",["にゃ","nya"],["にゅ","nyu"],["にょ","nyo"]],
    ["ひ",["ひゃ","hya"],["ひゅ","hyu"],["ひょ","hyo"]],
    ["み",["みゃ","mya"],["みゅ","myu"],["みょ","myo"]],
    ["り",["りゃ","rya"],["りゅ","ryu"],["りょ","ryo"]]];
  const YOON_DAKU=[
    ["ぎ",["ぎゃ","gya"],["ぎゅ","gyu"],["ぎょ","gyo"]],
    ["じ",["じゃ","ja"],["じゅ","ju"],["じょ","jo"]],
    ["び",["びゃ","bya"],["びゅ","byu"],["びょ","byo"]],
    ["ぴ",["ぴゃ","pya"],["ぴゅ","pyu"],["ぴょ","pyo"]]];

/* ---------- MAP ---------- */
function MapView(){
  const A=buildAtlas();
  const ALL_LEVS=["N5","N4","N3","N2","N1","Kök"];
  const sel=state._mapLevels||ALL_LEVS.slice();
  const inSel=lv=>sel.includes(lv);
  // edges
  let edges="";
  A.edges.forEach(([p,c])=>{
    const mx=(p.x+c.x)/2;
    edges+=`<path d="M${p.x} ${p.y} C ${mx} ${p.y}, ${mx} ${c.y}, ${c.x} ${c.y}" fill="none" stroke="var(--line)" stroke-width="2" opacity=".55"/>`;
  });
  // family labels
  let labels=A.labels.map(l=>`<text class="fam-label" x="14" y="${l.y+14}">${l.t}</text>`).join("");
  // nodes
  let nodes="";
  A.nodes.forEach(n=>{
    const off=!inSel(n.lv); const isN5=n.lv==="N5"; const learned=n.detailId&&state.learned[n.detailId];
    const fill = learned?"var(--accent)":(n.root?"#fff":"var(--card2)");
    const stroke = learned?"var(--accent)":(n.root?"var(--gold)":(isN5?"var(--accent-soft)":"var(--line)"));
    const txt = learned?"#fff":"var(--ink)";
    const r = n.root?25:(isN5?22:20);
    const tagFill = n.lv==="N5"?"var(--accent-deep)":n.lv==="Kök"?"var(--gold)":"var(--muted)";
    nodes+=`<g class="node" ${off?'':`data-anode="${n.key}"`} opacity="${off?.13:1}" style="${off?'':'cursor:pointer'}">
      ${n.root?`<circle cx="${n.x}" cy="${n.y}" r="${r+4}" fill="none" stroke="var(--gold)" stroke-width="1.3" opacity=".5"/>`:""}
      <circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${n.root?2.6:2.1}"/>
      <text x="${n.x}" y="${n.y+8}" text-anchor="middle" font-family="var(--serif)" font-size="${n.root?25:22}" fill="${txt}">${n.c}</text>
      <text x="${n.x}" y="${n.y+r+13}" text-anchor="middle" font-size="9.5" font-weight="700" fill="${tagFill}">${n.lv}</text>
    </g>`;
  });
  const filterBar=`<div class="map-levels" id="mlevbar">
    ${ALL_LEVS.map(l=>`<button class="${sel.includes(l)?'on':''}" data-mlev="${l}">${l==="Kök"?"Kökler":l}</button>`).join("")}</div>`;
  const rootCta = sel.includes("Kök")
    ? `<div style="display:flex;justify-content:flex-end;margin:6px 4px 2px"><span class="link" data-go="transform">Kökleri öğren →</span></div>`
    : "";
  return `<div class="stagger">
  <div class="lead" style="margin:0 2px 10px">Kanjiler rastgele şekiller değil. Her aile bir kökten (altın halkalı) dallanır; türeyenler sağa akar. Seviyeleri açıp kapatarak filtrele, bir düğüme dokunarak öğren.</div>
  ${filterBar}
  ${rootCta}
  <div class="maphint">
    <span><span class="dot" style="background:#fff;border:2px solid var(--gold)"></span>Kök</span>
    <span><span class="dot" style="background:var(--accent)"></span>Öğrenildi</span>
    <span><span class="dot" style="background:var(--card2);border:1px solid var(--line)"></span>Türev</span>
  </div>
  <div class="mapwrap" id="mapwrap">
    <svg width="${A.W}" height="${A.H}" viewBox="0 0 ${A.W} ${A.H}" style="display:block;min-width:${A.W}px">
      <g>${edges}</g>${labels}<g>${nodes}</g>
    </svg>
  </div>
  <small class="note" style="margin-top:10px">${A.nodes.length} düğüm · ${A.labels.length} bileşen ailesi. İki yöne kaydırarak gez. Etiket JLPT seviyesini gösterir; N5 koyu kırmızı, kökler altın.</small>

// Faz 10-D: bir kanjinin "ailesi" — paylaşılan köke göre üyeler (yeni harita yok, detayda şerit)
function kanjiFamily(c){
  const allKanji=Object.values(DATA.chars).filter(x=>x.type==="kanji");
  const byChar={}; allKanji.forEach(k=>byChar[k.character]=k);
  const derivativesOf=(cc)=>allKanji.filter(k=>(k.parent_components||[]).includes(cc));
  const cands=[...(c.parent_components||[]), c.character];
  let root=null,best=-1;
  cands.forEach(cc=>{ const n=derivativesOf(cc).length+(byChar[cc]?1:0); if(n>best){best=n;root=cc;} });
  if(!root) return null;
  const members=[];
  if(byChar[root]) members.push(byChar[root]);
  derivativesOf(root).forEach(k=>{ if(!members.some(m=>m.character===k.character)) members.push(k); });
  if(members.length<2) return null;
  members.sort((a,b)=>{ if(a.character===root) return -1; if(b.character===root) return 1; return (a.stroke_count||0)-(b.stroke_count||0); });
  return {root, members};
}
function familyStrip(c, id){
  const canon = FR.familyStripData(id);          // KANONIK ONCELIK
  if(canon){ __famStats.canon++; return renderCanonFamily(canon, id); }
  __famStats.fallback++; __famStats.fallbackIds.push(id);   // fallback RAPORLANIR
  try{ return legacyFamilyStrip(c, id); }
  catch(e){ console.warn("[familyStrip] fallback error:", id, e); return ""; }  // kontrollu: cokme yok
}
function relLabel(r){ return REL_LABEL[r] || r; }
function famShort(lbl){ return (lbl||"").replace(/ ailesi$/,""); }
function renderCanonFamily(canon, id){

  const primary = canon.members.map(chip).join("");

  }).join("");
  const lead = sec.length
    ? `Sözlük sınıflandırması: <b>${esc(famShort(canon.label))}</b>`
    : `Bu kanji yalnız değil — aynı yapıdan gelenler. Dokun, ailede gez.`;
  return `<div class="section-t"><h3>${esc(canon.label)}</h3></div>
    <div class="lead" style="margin:-4px 2px 10px">${lead}</div>
    <div class="fam-strip">${primary}</div>

function legacyFamilyStrip(c, id){
  const fam=kanjiFamily(c); if(!fam) return "";
  const rootObj=Object.values(DATA.chars).find(x=>x.character===fam.root);
  const rootMeaning=(rootObj&&rootObj.meaning_tr)||fam.root;
  const chips=fam.members.map(m=>{
    const cur=m.id===id;
    const isRoot=m.character===fam.root;
    const parts=(m.components&&m.components.length)?m.components:(m.parent_components||[]);
    const formula=isRoot?"kök":(parts.length?parts.join(" + "):"");
    const lvl=(m.jlpt_level&&m.jlpt_level!=="N5")?`<span class="flv">${m.jlpt_level}</span>`:"";
    return `<div class="fam-chip ${cur?'cur':''}" ${cur?'':`data-go="detail" data-param="${m.id}" role="button"`}>
      <span class="ff">${formula}</span>
      <span class="fg jp">${m.character}</span>
      <span class="fm">${m.meaning_tr}</span>
      ${lvl}
    </div>`;
  }).join("");
  return `<div class="section-t"><h3>${fam.root} ailesi</h3></div>
    <div class="lead" style="margin:-4px 2px 10px">Bu kanji yalnız değil — aynı kökten (“${esc(rootMeaning)}”) gelenler. Dokun, ailede gez.</div>

}

        <div class="w jp">${w.word_jp}</div><div class="ro">${w.reading_kana}</div><div class="m" style="flex:1">${w.meaning_tr}</div><span style="color:var(--accent)">›</span></div>`;}).join("")}</div>
      <small class="note" style="margin-top:8px">Öğrendiğin kanjiyi gerçek kelimelerde gör — ezber yerine bağ kur.</small>`:''}

      <small class="note" style="margin-top:8px">Bu karakteri öğrenince bu kanjileri daha kolay anlayacaksın.</small>`:'')}
  </div>`;
}

function RadicalDetail(c){

/* ---------- TRANSFORM ---------- */
function Transform(){
  const rads=Object.values(DATA.chars).filter(c=>c.type==="radical");
  const byPos = {sol:[], üst:[], alt:[]};
  rads.forEach(r=>{ if(byPos[r.position]) byPos[r.position].push(r); });
  const posLabel = {sol:"Solda", "üst":"Üstte", alt:"Altta"};
  const posHint  = {sol:"Karakterin sol kanadına yerleşir; genelde daralır.", "üst":"Karakterin tepesine oturur; yatay bir şapka gibi.", alt:"Karakterin tabanına yayılır; sıklıkla dört nokta gibi."};
  // Static family map for radicals (some may not be in DATA — shown as passive/future)
  const FAM = {
    "亻":["人","休","体","何","信"],
    "氵":["水","海","池","泳"],
    "扌":["手","持","打","押"],
    "忄":["心","情","性","快"],
    "言":["言","語","話","読","計"],
    "艹":["花","草","茶"],
    "灬":["火","黒","点","熱"]
  };
  const isLive = c => DATA.chars && Object.values(DATA.chars).some(x=>x.character===c);
  const idOf = c => { const m = Object.values(DATA.chars).find(x=>x.character===c); return m?m.id:""; };
  const famStrip = base => {
    const fam = FAM[base] || [];
    if(!fam.length) return "";
    return `<div class="fam-strip">${fam.map(c=>{
      if(isLive(c)) return `<span class="fc live" data-go="detail" data-param="${idOf(c)}"><span class="jp">${c}</span></span>`;
      return `<span class="fc future" title="Atlas genişlemesinde">${c}</span>`;
    }).join("")}</div>`;
  };
  // Position visual templates (Sol/Sağ/Üst/Alt/Çevreleyen/Sol+üst)
  const tplSVG = (kind) => {
    const W=64, H=64; const stroke="var(--line)"; const hi="var(--accent-soft)"; const hiBg="var(--accent-tint)";
    let zone="";
    if(kind==="sol") zone=`<rect x="6" y="6" width="20" height="52" fill="${hiBg}" stroke="${hi}" stroke-width="1.5" rx="3"/><rect x="30" y="6" width="28" height="52" fill="none" stroke="${stroke}" stroke-width="1" stroke-dasharray="3 3" rx="3"/>`;
    if(kind==="sag") zone=`<rect x="6" y="6" width="28" height="52" fill="none" stroke="${stroke}" stroke-width="1" stroke-dasharray="3 3" rx="3"/><rect x="38" y="6" width="20" height="52" fill="${hiBg}" stroke="${hi}" stroke-width="1.5" rx="3"/>`;
    if(kind==="ust") zone=`<rect x="6" y="6" width="52" height="18" fill="${hiBg}" stroke="${hi}" stroke-width="1.5" rx="3"/><rect x="6" y="28" width="52" height="30" fill="none" stroke="${stroke}" stroke-width="1" stroke-dasharray="3 3" rx="3"/>`;
    if(kind==="alt") zone=`<rect x="6" y="6" width="52" height="30" fill="none" stroke="${stroke}" stroke-width="1" stroke-dasharray="3 3" rx="3"/><rect x="6" y="40" width="52" height="18" fill="${hiBg}" stroke="${hi}" stroke-width="1.5" rx="3"/>`;
    if(kind==="cevre") zone=`<rect x="6" y="6" width="52" height="52" fill="${hiBg}" stroke="${hi}" stroke-width="2" rx="3"/><rect x="20" y="20" width="24" height="24" fill="var(--card)" stroke="${stroke}" stroke-width="1" stroke-dasharray="2 2" rx="2"/>`;
    if(kind==="solust") zone=`<path d="M 6 6 H 38 V 24 H 24 V 58 H 6 Z" fill="${hiBg}" stroke="${hi}" stroke-width="1.5"/><rect x="26" y="26" width="32" height="32" fill="none" stroke="${stroke}" stroke-width="1" stroke-dasharray="3 3" rx="3"/>`;
    return `<svg viewBox="0 0 ${W} ${H}" width="64" height="64">${zone}</svg>`;
  };
  const tpls = [
    ["sol","Sol", "Kök, kanjinin sol kanadına yerleşir."],
    ["sag","Sağ", "Kök, sağ tarafta durur (daha seyrek)."],
    ["ust","Üst", "Kök tepede şapka gibi durur."],
    ["alt","Alt", "Kök tabanda yayılır."],
    ["cevre","Çevreleyen", "Kök, diğer bileşeni çerçeveler."],
    ["solust","Sol+üst (L)", "Sol ve üstü saran L biçimli yapı."]
  ];
  return `<div class="stagger">
  <div class="card" style="background:linear-gradient(135deg,#fff,#FBF4EC);padding:18px 16px">
    <div style="font-weight:800;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--gold);margin-bottom:6px">Mantığı öğren</div>
    <div class="h2" style="font-size:18px;line-height:1.3">Bir kök, konumuna göre şekil değiştirir — anlamı aynı kalır</div>
    <div class="lead" style="margin-top:8px"><span class="jp">人</span> insan demektir. Bir kanjinin solunda durduğunda <span class="jp">亻</span> olur — 休 (dinlenmek), 体 (beden), 仕 (hizmet) gibi onlarca kanjide bu yan biçim hâlâ "insan" anlamını taşır. Bu dönüşümü tanımak, ezberden çok daha hızlıdır.</div>
    <div class="row wrap" style="gap:6px;margin-top:12px">
      <span class="chip"><span class="jp">人</span> → <span class="jp">亻</span> sol</span>
      <span class="chip"><span class="jp">水</span> → <span class="jp">氵</span> sol</span>
      <span class="chip"><span class="jp">火</span> → <span class="jp">灬</span> alt</span>
      <span class="chip"><span class="jp">艸</span> → <span class="jp">艹</span> üst</span>
    </div>
  </div>

  <div class="section-t"><h3>Konum şablonları</h3></div>
  <div class="lead" style="margin:-2px 2px 8px;font-size:12.5px">Bir kanjiyi açarken ana kökün hangi konumda durduğunu sezmek anlamı yarı yarıya çözer.</div>
  <div class="pos-templates">
    ${tpls.map(t=>`<div class="pos-tpl">${tplSVG(t[0])}<div class="pt-name">${t[1]}</div><div class="pt-d">${t[2]}</div></div>`).join("")}
  </div>

  ${["sol","üst","alt"].filter(p=>byPos[p]&&byPos[p].length).map(p=>`
  <div class="section-t"><h3>${posLabel[p]}</h3></div>
  <div class="lead" style="margin:-2px 2px 8px">${posHint[p]}</div>
  ${byPos[p].map(c=>`<div class="card" style="margin-bottom:11px">
    <div class="row between" data-go="detail" data-param="${c.id}" style="cursor:pointer">
      <div class="row" style="gap:12px">
        <span class="jp" style="font-size:30px">${c.base_character}</span>
        <span class="arrow">→</span>
        <span class="jp" style="font-size:30px;color:var(--accent-deep)">${c.character}</span>
      </div>
      <span class="chip ${c.position==='alt'?'gold':'accent'}">${c.position}</span>
    </div>
    <div class="lead" style="margin:8px 0 6px"><b style="color:var(--accent-deep)">${c.character}</b> — ${c.contribution}</div>
    <div class="row wrap" style="gap:6px">${(c.examples||[]).map(e=>`<span class="chip">${e[0]} ${e[2]}</span>`).join("")}</div>
    ${famStrip(c.character) ? `<div style="margin-top:8px"><div style="font-size:10.5px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Aynı kökten</div>${famStrip(c.character)}</div>` : ""}
  </div>`).join("")}`).join("")}

  <small class="note" style="margin-top:14px;display:block;text-align:center">Solda altın çerçeveli karakterler aktif detay sayfalarına bağlıdır. Soluk olanlar Atlas genişlemesinde ayrıntılı işlenecek.</small>
  </div>`;
}

/* ---------- PRACTICE (landing / picker) ---------- */

function drillStage(c, opts){
  opts = opts || {};

  const hideButtons = opts.hideButtons;
  const fbText = opts.fbText || `Vuruş <b>1</b> / ${strokes.length}`;
  const contextSVG = contextStrokes && contextStrokes.length
    ? kanjiSVG(contextStrokes, "kvg kvg-context", "contextSVG")
    : "";
  return `<div class="canvas-stage" id="stage">
      <div class="grid-bg"></div>
      <svg class="cross" viewBox="0 0 100 100"><line x1="50" y1="0" x2="50" y2="100" stroke="var(--line)" stroke-dasharray="3 3"/><line x1="0" y1="50" x2="100" y2="50" stroke="var(--line)" stroke-dasharray="3 3"/></svg>
      ${contextSVG}
      ${kanjiSVG(strokes,guideClass,"guideSVG")}
      <canvas id="pad"></canvas>
      <div id="stageConfirm" class="stage-confirm" aria-hidden="true"></div>
    </div>
    ${hideFb?'<div id="drillFeedback" class="lead center" style="height:20px;margin:12px 0 4px">Şimdi çiz</div>':`<div id="drillFeedback" class="lead center" style="height:20px;margin:12px 0 4px">${fbText}</div>`}
    ${hideButtons?'':`<div class="row" style="gap:9px;justify-content:center">
      <button class="btn ghost sm" data-act="drill-again">↺ Vuruşu tekrar göster</button>
      <button class="btn ghost sm" data-act="drill-reset">Temizle</button>
    </div>`}`;
}

/* ---------- DRILL (focused drawing practice, opened from detail) ---------- */

/* ---------- QUIZ ---------- */
function Quiz(){
  if(!state._quiz || state._quiz.focusId !== state.param) state._quiz = buildQuiz(state.param);
  return QuizCard();
}
const QUIZ_KIND_LABELS = {
  k_to_m:"Kanji → anlam", m_to_k:"Anlam → kanji", reading:"Okunuş",
  comp_to_k:"Bileşenden kanji", k_to_comp:"Kanji → bileşen",
  hint_to_k:"Görsel çağrışım", word_to_k:"Örnek kelime",
  family:"Aile / kök", focus_is_comp:"Bileşen ilişkisi"
};
function buildQuiz(focusId){
  const allKanji = Object.values(DATA.chars).filter(c=>c.type==="kanji"&&c.meaning_tr&&c.character);
  const focus = (focusId && ch(focusId) && ch(focusId).type==="kanji") ? ch(focusId)
              : allKanji[Math.floor(Math.random()*allKanji.length)];
  const pool = allKanji;
  const others = pool.filter(x=>x.character!==focus.character);
  const pickN=(arr,n)=>shuffle(arr).slice(0,n);
  const shuf=a=>shuffle(a);

  const gens = {
    k_to_m_focus: ()=>{
      const c=focus;
      const dist=pickN(others.map(x=>x.meaning_tr).filter(m=>m!==c.meaning_tr),3);
      if(dist.length<3) return null;
      return {kind:"k_to_m", focusUsed:true, type:"Bu kanji ne anlama gelir?", glyph:c.character,
        opts:shuf([...dist, c.meaning_tr]), answer:c.meaning_tr,
        explain:`<span class="jp">${c.character}</span> = ${c.meaning_tr}.`};
    },
    m_to_k_focus: ()=>{
      const c=focus;
      const dist=pickN(others,3);
      if(dist.length<3) return null;
      return {kind:"m_to_k", focusUsed:true, type:`"${c.meaning_tr}" anlamına gelen kanji hangisi?`,
        opts:shuf([...dist.map(x=>x.character), c.character]), isGlyph:true, answer:c.character,
        explain:`<span class="jp">${c.character}</span> = ${c.meaning_tr}.`};
    },
    reading_focus: ()=>{
      const c=focus;
      const hasKun = c.kunyomi && c.kunyomi!=="-";
      const hasOn  = c.onyomi  && c.onyomi!=="-";
      if(!hasKun && !hasOn) return null;
      // Prefer kun when available (more common in beginner study)
      const askKun = hasKun;
      const targetReading = askKun ? c.kunyomi : c.onyomi;
      const otherReading  = askKun ? (hasOn ? c.onyomi : null) : (hasKun ? c.kunyomi : null);
      const yomiPool = others.map(x=>(x.kunyomi&&x.kunyomi!=="-")?x.kunyomi:((x.onyomi&&x.onyomi!=="-")?x.onyomi:null))
                             .filter(r=>r&&r!==targetReading&&r!==otherReading);
      // Include other reading of same kanji as a pedagogical distractor when available
      let dist;
      if(otherReading) dist=[otherReading, ...pickN([...new Set(yomiPool)],2)];
      else dist=pickN([...new Set(yomiPool)],3);
      if(dist.length<3) return null;
      // Find an example word containing this kanji for the hint line
      const fch=c.character;
      const exampleWord=(DATA.words||[]).find(w=>w.contains_kanji&&w.contains_kanji.indexOf(fch)>=0);
      const exampleStr = exampleWord
        ? `Örn. <span class="jp">${exampleWord.word_jp}</span> = ${exampleWord.reading_kana}.`
        : "";
      return {
        kind:"reading", focusUsed:false,
        type: askKun
          ? `Bu kanji <b>tek başına</b> veya hiragana ekiyle kullanıldığında nasıl okunur?`
          : `Bu kanji <b>başka kanjilerle birleşince</b> nasıl okunur?`,
        subtle: askKun
          ? `Aranılan: Japonca kökenli kullanım (kun). ${exampleStr}`
          : `Aranılan: Çin kökenli kullanım (on), genellikle birleşik kelimelerde görülür. ${exampleStr}`,
        glyph:c.character,
        opts: shuf([...dist, targetReading]),
        answer: targetReading,
        readingType: askKun?"kun":"on",
        otherReading: otherReading,
        focusChar: c.character,
        explain: `<span class="jp">${c.character}</span> için ${askKun?"Japonca kökenli (kun)":"Çin kökenli (on)"} okunuş: <b>${targetReading}</b>.`
      };
    },
    comp_to_k_focus: ()=>{
      const c=focus;
      if(!c.components || c.components.length<2) return null;
      if(c.component_meanings && !c.components.every(p=>c.component_meanings[p])) return null;
      const dist=pickN(others,3);
      if(dist.length<3) return null;
      return {kind:"comp_to_k", focusUsed:false,
        type:`<span class="jp">${c.components.join(" + ")}</span> bileşenleri hangi kanjiyi oluşturur?`,
        opts:shuf([...dist.map(x=>x.character), c.character]), isGlyph:true, answer:c.character,
        explain:`<span class="jp">${c.components.join(" + ")}</span> → <span class="jp">${c.character}</span> (${c.meaning_tr}).`};
    },
    k_to_comp_focus: ()=>{
      const c=focus;
      if(!c.components || c.components.length<2) return null;
      const withComp = others.filter(x=>x.components&&x.components.length>=2);
      if(withComp.length<3) return null;
      const dist=pickN(withComp,3).map(x=>x.components.join(" + "));
      const correct=c.components.join(" + ");
      return {kind:"k_to_comp", focusUsed:false, type:`Bu kanji hangi bileşenlerden oluşur?`, glyph:c.character,
        opts:shuf([...dist, correct]), answer:correct,
        explain:`<span class="jp">${c.character}</span> = <span class="jp">${correct}</span>.`};
    },
    focus_is_comp: ()=>{
      const fch=focus.character;
      const containing = pool.filter(x=>x.character!==fch && (x.components||[]).indexOf(fch)>=0);
      if(!containing.length) return null;
      const c = containing[Math.floor(Math.random()*containing.length)];
      const distSrc = pool.filter(x=>x.character!==fch && x.character!==c.character && (x.components||[]).indexOf(fch)<0);
      const dist=pickN(distSrc,3);
      if(dist.length<3) return null;
      return {kind:"focus_is_comp", focusUsed:false,
        type:`<span class="jp">${fch}</span> aşağıdaki hangi kanjinin bileşenidir?`,
        opts:shuf([...dist.map(x=>x.character), c.character]), isGlyph:true, answer:c.character,
        explain:`<span class="jp">${fch}</span>, <span class="jp">${c.character}</span> (${c.meaning_tr}) kanjisinin parçasıdır.`};
    },
    hint_to_k: ()=>{
      const useFocus = focus.memory_hint_tr && focus.memory_hint_tr.length>4 && Math.random()<0.7;
      const c = useFocus ? focus : (()=>{const w=pool.filter(x=>x.memory_hint_tr&&x.memory_hint_tr.length>4); return w[Math.floor(Math.random()*w.length)];})();
      if(!c || !c.memory_hint_tr) return null;
      const dist=pickN(pool.filter(x=>x.character!==c.character),3);
      if(dist.length<3) return null;
      return {kind:"hint_to_k", focusUsed:false,
        type:`"${c.memory_hint_tr}" görsel çağrışımı hangi kanjiye aittir?`,
        opts:shuf([...dist.map(x=>x.character), c.character]), isGlyph:true, answer:c.character,
        explain:`Bu hafıza ipucu <span class="jp">${c.character}</span> (${c.meaning_tr}) için.`};
    },
    word_to_k: ()=>{
      const fch=focus.character;
      const words=(DATA.words||[]).filter(w=>w.contains_kanji&&w.contains_kanji.indexOf(fch)>=0);
      if(!words.length) return null;
      const w = words[Math.floor(Math.random()*words.length)];
      const inWord = new Set(w.contains_kanji);
      const dist=pickN(pool.filter(x=>x.character!==fch && !inWord.has(x.character)),3);
      if(dist.length<3) return null;
      return {kind:"word_to_k", focusUsed:false,
        type:`<span class="jp">${w.word_jp}</span> (${w.meaning_tr}) kelimesinde aşağıdakilerden hangisi geçer?`,
        opts:shuf([...dist.map(x=>x.character), fch]), isGlyph:true, answer:fch,
        explain:`<span class="jp">${w.word_jp}</span> içinde <span class="jp">${fch}</span> geçer.`};
    },
    family: ()=>{
      const c=focus;
      const rel=(c.related_characters||[]).filter(x=>typeof x==="string"&&x.length===1);
      if(!rel.length) return null;
      const correct=rel[Math.floor(Math.random()*rel.length)];
      const relSet=new Set([...rel, c.character]);
      const dist=pickN(pool.filter(x=>!relSet.has(x.character)),3);
      if(dist.length<3) return null;
      return {kind:"family", focusUsed:false,
        type:`<span class="jp">${c.character}</span> ile aynı bileşen ailesinden gelen hangisi?`,
        opts:shuf([...dist.map(x=>x.character), correct]), isGlyph:true, answer:correct,
        explain:`<span class="jp">${c.character}</span> ile <span class="jp">${correct}</span> aynı bileşen ailesindendir.`};
    }
  };

  const order = ["k_to_m_focus","focus_is_comp","comp_to_k_focus","reading_focus","hint_to_k","k_to_comp_focus","word_to_k","family","m_to_k_focus"];
  const qs=[]; const usedKinds=new Set(); let focusTarget=0;
  for(const key of order){
    if(qs.length>=5) break;
    const q = gens[key](); if(!q) continue;
    if(usedKinds.has(q.kind)) continue;
    if(q.focusUsed && focusTarget>=2) continue;
    qs.push(q); usedKinds.add(q.kind);
    if(q.focusUsed) focusTarget++;
  }
  // Fallback fillers (non-focus m_to_k of random kanji) to reach minimum 3
  while(qs.length<3){
    const c=others[Math.floor(Math.random()*others.length)];
    const dist=pickN(others.filter(x=>x.character!==c.character),3);
    if(dist.length<3) break;
    qs.push({kind:"m_to_k_filler_"+qs.length, focusUsed:false,
      type:`"${c.meaning_tr}" anlamına gelen kanji hangisi?`,
      opts:shuf([...dist.map(x=>x.character), c.character]), isGlyph:true, answer:c.character,
      explain:`<span class="jp">${c.character}</span> = ${c.meaning_tr}.`});
  }
  return {qs,i:0,correct:0,answered:false, focusChar:focus.character, focusId:focus.id, wrongKinds:[]};
}

/* ---------- YAZ AKIŞI (Faz 6A — tek aşama kana yazımı) ----------
   Önceki 5-7 aşamalı sistem (izle/trace/half/full/result + shuffle/test) kaldırıldı.
   Yeni yapı: tek ekran — animasyon otomatik oynar, hayalet iz soluk şekilde görünür,
   kullanıcı çizer, tüm vuruşlar tamamlanınca sonuç ekranı.
   Stroke helper decorations (numara, halka, ok, kavis) ve sub-flow yok.
   Validation: kana için "öğretici" gevşek mod (validateStroke içinde) — pozisyon/yön/kavis
   hassasiyeti gevşetildi, stroke sayısı ve genel şekil yeter. */
function kanaCounterpart(char){
  // Find same-romaji character in the OTHER kana set (hiragana ↔ katakana)
  const k = KANA_BY_CHAR[char]; if(!k) return null;
  const otherSet = k._set==="hiragana" ? "katakana" : "hiragana";
  const all = (DATA[otherSet]||[]).flat().filter(x=>x && x.character);
  return all.find(x=>x.romaji===k.romaji) || null;
}

  save(); go("mochi", char, false);
}
function mochiRestart(){

function mochiNextChar(){
  // Faz 6B: group-aware — önce grup içinde sıradaki, sonra sıradaki grubun ilki
  const m = state._mochi; if(!m) return null;
  return kanaNextOverall(m.char);
}

/* ============ Faz 6B — Kana Gruplari ve Utility ============ */
const KANA_GROUPS = [
  {name:"Sesliler", romaji:"a · i · u · e · o"},
  {name:"K sesleri", romaji:"ka · ki · ku · ke · ko"},
  {name:"S sesleri", romaji:"sa · shi · su · se · so"},
  {name:"T sesleri", romaji:"ta · chi · tsu · te · to"},
  {name:"N sesleri", romaji:"na · ni · nu · ne · no"},
  {name:"H sesleri", romaji:"ha · hi · fu · he · ho"},
  {name:"M sesleri", romaji:"ma · mi · mu · me · mo"},
  {name:"Y sesleri", romaji:"ya · yu · yo"},
  {name:"R sesleri", romaji:"ra · ri · ru · re · ro"},
  {name:"W sesleri", romaji:"wa · wo"},
  {name:"N (tekil)", romaji:"n"},
];

function kanaGroupInfo(char){
  for(const set of ["hiragana","katakana"]){
    const rows = DATA[set]||[];
    for(let gi=0; gi<rows.length; gi++){
      const row = rows[gi];
      for(let pi=0; pi<row.length; pi++){
        const cell = row[pi];
        if(cell && cell.character===char){
          const groupChars = row.filter(x=>x&&x.character).map(x=>x.character);
          const groupDone = groupChars.filter(c=>kanaLearned(c)).length;
          const g = KANA_GROUPS[gi] || {name:`Grup ${gi+1}`, romaji:""};
          return {
            set, groupIdx:gi, posInGroup:pi,
            groupName:g.name, groupRomaji:g.romaji,
            groupChars, groupTotal:groupChars.length,
            groupDone, groupCompleted: groupDone===groupChars.length
          };
        }
      }
    }
  }
  return null;
}

function kanaNextInGroup(char){
  // Aynı grup içinde sıradaki non-null karakter (null hücreleri atlar)
  const info = kanaGroupInfo(char); if(!info) return null;
  const row = DATA[info.set][info.groupIdx];
  for(let i=info.posInGroup+1; i<row.length; i++){
    if(row[i] && row[i].character) return row[i].character;
  }
  return null;
}

function kanaPrevInGroup(char){
  const info = kanaGroupInfo(char); if(!info) return null;
  const row = DATA[info.set][info.groupIdx];
  for(let i=info.posInGroup-1; i>=0; i--){
    if(row[i] && row[i].character) return row[i].character;
  }
  return null;
}

function kanaNextGroupFirstChar(set, currentGroupIdx){
  // Sonraki gruplarda öğrenilmemiş ilk karakter; o grup tamamlanmışsa ilk karakteri ver
  const rows = DATA[set]||[];
  for(let gi=currentGroupIdx+1; gi<rows.length; gi++){
    const row = rows[gi];
    const unlearned = row.find(x=>x&&x.character && !state.kana[x.character]);
    if(unlearned) return unlearned.character;
    const firstChar = row.find(x=>x&&x.character);
    if(firstChar) return firstChar.character;
  }
  return null;
}

function kanaNextOverall(char){
  // Group-aware overall next: grup içi → sonraki grubun ilki
  const info = kanaGroupInfo(char); if(!info) return null;
  const nextInGroup = kanaNextInGroup(char);
  if(nextInGroup) return nextInGroup;
  return kanaNextGroupFirstChar(info.set, info.groupIdx);
}

        ? `<button class="btn sm primary" data-act="mochi-next-char" data-target="${next}">${isGroupBoundary?"Yeni gruba geç":"Sonraki"} <span class="jp" style="margin-left:4px">${next}</span> ›</button>`

      + `<button class="btn ghost sm" data-act="mochi-go-detail">Detaya git</button>`

    + `<button class="btn ghost sm" data-act="mochi-clear">⌫ Temizle</button>`
    + `<button class="btn ghost sm" data-act="mochi-exit">Çık</button>`;

  const leadText = m.success
    ? (isGroupBoundary ? `${info.groupName} tamam ✓ — sırada ${nextInfo.groupName}` : "Karakter tamam — istersen tekrar çiz veya sıradakine geç")

  return `<div class="stagger">
    <div class="mk-write-head">
      <div class="row" style="gap:12px;align-items:center">
        <span class="mk-write-glyph jp">${k.character}</span>
        <div class="mk-write-meta">
          <div class="mk-write-romaji">${k.romaji}</div>
          ${ex?`<div class="mk-write-ex"><span class="jp">${ex.word}</span> — ${ex.tr}</div>`:""}
        </div>
        <span class="chip" style="margin-left:auto">${strokes} vuruş</span>
      </div>
      ${peer?`<div class="mk-write-peer" data-go="kanadetail" data-param="${peer.character}" role="link" tabindex="0">${peerLabel}: <span class="jp">${peer.character}</span> · ${peer.romaji} <span class="mk-write-peer-arr">↔</span></div>`:""}
      ${m.success?`<div class="mk-write-success">✓ Öğrenildi</div>`:""}
    </div>
    <div class="card" style="padding:14px;margin-top:10px">
      <div class="lead center mk-write-card-lead" style="margin-bottom:6px;font-size:12.5px">${leadText}</div>
      ${drillStage(k,{guideClass:"kvg guide kvg-faint", hideButtons:true})}
    </div>
    ${groupCompleteBanner}
    <div class="mk-controls">
      <div class="mk-controls-row">${controlsHtml}</div>
    </div>
  </div>`;
}

/* ============================ N5: KANJI / WORDS / PROGRESS ============================ */
const LEVELS=[["N5","N5"],["N4","N4"],["N3","N3"],["N2","N2"],["N1","N1"]];
const N5_KANJI_CATS=["Sayılar","Zaman ve günler","Doğa","İnsan ve beden","Yön ve konum","Yönler","Renkler","Okul ve öğrenme","Fiiller","Günlük yaşam"];
function n5Kanji(){ return Object.values(DATA.chars).filter(c=>c.type==="kanji"&&c.jlpt_level==="N5"); }
function wordById(id){ return (DATA.words||[]).find(w=>w.id===id); }
function kanjiIdByChar(c){ const k=Object.keys(DATA.chars).find(id=>DATA.chars[id].character===c&&DATA.chars[id].type==="kanji"); return k||null; }
function avgMastery(keys){ if(!keys.length) return 0; return Math.round(keys.reduce((s,k)=>s+masteryScore(k),0)/keys.length); }
const WORD_CATS=(()=>{ const seen=[]; (DATA.words||[]).forEach(w=>{ if(!seen.includes(w.category)) seen.push(w.category); }); return seen; })();

/* ---------- N5 KANJI SCREEN ---------- */
function KanjiN5(){
  const lev=state._level||"N5";
  const cat=state._kCat||"Hepsi";
  const all=n5Kanji();
  const pct=avgMastery(all.map(c=>c.id));
  const list = cat==="Hepsi" ? all
            : cat==="__pictograms" ? all.filter(c=>PICTOGRAM_IDS.includes(c.id))
            : all.filter(c=>c.category===cat);
  // group by category when "Hepsi"
  let body="";
  if(cat==="Hepsi"){
    N5_KANJI_CATS.forEach(c=>{
      const items=all.filter(k=>k.category===c); if(!items.length) return;
      body+=`<div class="cat-h">${c} <span class="muted" style="font-weight:400;font-size:12px">· ${avgMastery(items.map(x=>x.id))}%</span></div>
        <div class="inkgrid">${items.map(k=>inkCell(k.character,k.meaning_tr.split(' ')[0],k.id,`data-go="detail" data-param="${k.id}"`)).join("")}</div>`;
    });
  } else {
    const intro = cat==="__pictograms"
      ? `<div class="lead" style="margin:-2px 2px 10px">Resimden doğan en sade kanjiler. Şekli görsellestir, anlamı ezbersiz tut.</div>`
      : "";
    body=intro + `<div class="inkgrid">${list.map(k=>inkCell(k.character,k.meaning_tr.split(' ')[0],k.id,`data-go="detail" data-param="${k.id}"`)).join("")}</div>`;
  }
  return `<div class="stagger">
    <div class="levbar">${LEVELS.map(([id,lab])=>`<button class="${id==="N5"?'on':'lock'}" data-level="${id}">${lab}${id==="N5"?"":" · yakında"}</button>`).join("")}</div>
    <div class="card" style="background:linear-gradient(135deg,#fff,#FBF4EC);display:flex;align-items:center;gap:14px">
      <div class="ring"><svg width="64" height="64"><circle cx="32" cy="32" r="27" fill="none" stroke="var(--card2)" stroke-width="6"/>
        <circle cx="32" cy="32" r="27" fill="none" stroke="var(--ink-green)" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="${2*Math.PI*27}" stroke-dashoffset="${2*Math.PI*27*(1-pct/100)}"/></svg>
        <div class="val" style="font-size:15px">${pct}%</div></div>
      <div style="flex:1"><div style="font-weight:700">N5 Kanji ustalığı</div>
        <div class="lead">${all.length} kanji · ${all.filter(c=>masteryScore(c.id)>=100).length} tamamlandı</div></div>
    </div>
    <div class="catbar" style="margin-top:12px">
      <button class="${cat==="Hepsi"?'on':''}" data-kcat="Hepsi">Hepsi</button>
      <button class="${cat==="__pictograms"?'on':''}" data-kcat="__pictograms">Temel</button>
      ${N5_KANJI_CATS.map(c=>`<button class="${cat===c?'on':''}" data-kcat="${c}">${c}</button>`).join("")}
    </div>
    ${body}
    <div class="divider"></div>
    <button class="btn ghost full" data-go="map">◴ Atlas görünümü — köklerin dallanışı</button>
    <button class="btn ghost full" style="margin-top:9px" data-go="practice">✎ Çizim pratiği</button>
  </div>`;
}

/* ---------- N5 WORDS SCREEN ---------- */
function Words(){
  const cat=state._wCat||"Hepsi";
  const search=(state._wSearch||"").toLowerCase().trim();
  const all=DATA.words||[];
  const pct=avgMastery(all.map(w=>w.id));
  let list=all;
  if(search){
    list=list.filter(w=>
      (w.romaji||"").toLowerCase().includes(search)||(w.meaning_tr||"").toLowerCase().includes(search)||
      (w.word_jp||"").includes(search)||(w.reading_kana||"").includes(search));
  } else if(cat!=="Hepsi"){
    list=list.filter(w=>w.category===cat);
  }
  return `<div class="stagger">
    <div class="card" style="background:linear-gradient(135deg,#fff,#FBF4EC);display:flex;align-items:center;gap:14px">
      <div class="jp" style="font-size:34px;color:var(--accent)">語</div>
      <div style="flex:1"><div style="font-weight:700">N5 Kelime dağarcığı</div>
        <div class="lead">${all.length} kelime · ${pct}% ortalama ustalık</div></div>
    </div>
    <small class="note" style="margin:10px 2px 8px;display:block">Bu uygulama gramer öğretmez; cümleler yalnızca kelimeyi bağlam içinde görmek içindir.</small>

    <div class="catbar">
      <button class="${cat==="Hepsi"?'on':''}" data-wcat="Hepsi">Hepsi</button>
      ${WORD_CATS.map(c=>`<button class="${cat===c?'on':''}" data-wcat="${c}">${c}</button>`).join("")}

function wordCard(w){

  return `<div class="wcard t${t}" style="--fill:${sc}%" data-go="worddetail" data-param="${w.id}">
    <span class="ink"></span>
    <div class="wbody">
      <div class="wjp jp">${w.word_jp}</div>
      <div class="wmid"><div class="wread jp">${w.reading_kana}</div><div class="wmean">${w.meaning_tr}</div>
        <div class="wro">${w.romaji}</div>${kj?`<div class="wkanji">${kj}</div>`:''}</div>
      ${audioBtn(w.word_jp, "word", "sm")}
    </div>
  </div>`;
}

    </div>

}

/* ---------- PROGRESS (İlerleme) ---------- */
function Progress(){
  const tab=state._progTab||"kana";
  const hira=kanaList("hiragana"), kata=kanaList("katakana");
  const kanji=n5Kanji(); const words=DATA.words||[];
  const hp=avgMastery(hira.map(k=>k.character)), kp=avgMastery(kata.map(k=>k.character));
  const jp=avgMastery(kanji.map(c=>c.id)), wp=avgMastery(words.map(w=>w.id));
  const summary=`<div class="progsum">
    <div class="ps"><div class="pv">${Math.round((hp+kp)/2)}%</div><div class="pl">Kana</div><div class="pbar"><i style="width:${(hp+kp)/2}%"></i></div></div>

  const allKanji = Object.values(DATA.chars).filter(c=>c.type!=="radical");

const shuffle=a=>a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);
const sampleN=(arr,n)=>shuffle(arr).slice(0,n);
function uniqOpts(correct, pool, n=4){
  const set=[correct]; const sh=shuffle(pool);
  for(const x of sh){ if(set.length>=n) break; if(!set.includes(x)) set.push(x); }
  return shuffle(set);
}

const STROKE_RULES = [
  "Genellikle yukarıdan aşağı çizilir.",
  "Genellikle soldan sağa ilerlenir.",

function strokeTipFor(c){
  if(!c) return STROKE_RULES[0];
  if(STROKE_TIPS[c.character]) return STROKE_TIPS[c.character];
  const n=(c.stroke_order_steps||[]).length;
  return STROKE_RULES[Math.min(STROKE_RULES.length-1, Math.max(0, n%STROKE_RULES.length))];
}
function strokeLevelRange(level){
  if(level==="orta") return [5,7];
  if(level==="zor") return [8,99];
  return [1,4]; // kolay default
}

function pickStrokeChar(excludeIds, level){
  excludeIds = excludeIds || [];
  const [mn,mx] = strokeLevelRange(level);
  let pool = Object.keys(DATA.chars).filter(id=>{
    const c=DATA.chars[id];
    if(!c || c.type!=="kanji" || !c.stroke_order_steps || !c.stroke_order_steps.length) return false;
    const n=c.stroke_order_steps.length;
    return n>=mn && n<=mx;
  });
  // prefer N5 when possible
  const n5 = pool.filter(id=>DATA.chars[id].jlpt_level==="N5");
  if(n5.length>=3) pool = n5;
  // try with exclude
  let filtered = pool.filter(id=>excludeIds.indexOf(id)<0);
  if(!filtered.length) filtered = pool;
  if(!filtered.length){
    // pool empty for level (shouldn't happen); fall back to any kanji with stroke data
    filtered = Object.keys(DATA.chars).filter(id=>{const c=DATA.chars[id]; return c&&c.type==="kanji"&&c.stroke_order_steps&&c.stroke_order_steps.length;});
  }
  if(!filtered.length) return "ki";
  return filtered[Math.floor(Math.random()*filtered.length)];
}
function rememberStrokeChar(G){
  if(!G) return;
  G.recentCharIds = G.recentCharIds || [];
  if(G.charId && G.recentCharIds[G.recentCharIds.length-1]!==G.charId) G.recentCharIds.push(G.charId);
  if(G.recentCharIds.length>3) G.recentCharIds.shift();
}

/* ---------- round builders (choice + multi) ---------- */
function buildRounds(id, opts){
  const n=GAMES[id].rounds||10; const rounds=[];
  const setOpt = opts.set || "both";
  const kpool = setOpt==="both"? allKana() : kanaList(setOpt);
  const allRomaji=[...new Set(allKana().map(k=>k.romaji))];
  const kanji=n5Kanji();
  const meanings=[...new Set(kanji.map(k=>k.meaning_tr))];

  function kanaRomajiRound(pool){
    const k=pool[Math.floor(Math.random()*pool.length)];
    return {ptype:"glyph",glyph:k.character,label:"Bu karakterin okunuşu?",
      options:uniqOpts(k.romaji, allRomaji).map(r=>({label:r,correct:r===k.romaji})),
      explain:`${k.character} = ${k.romaji}`, speak:k.character};
  }
  // Faz 9: Katakana Şifreleri — yabancı kökenli kelimeleri MIRIKU mantığıyla çöz
  function katakanaCipherRound(usedThisGame){
    // Faz 9-B: KATAKANA_GAIRAIGO veri tabanından, lastSeen + bu oyunda kullanılmamış kelimelerden seç
    const allEntries = (typeof KATAKANA_GAIRAIGO !== "undefined") ? KATAKANA_GAIRAIGO : [];
    if(allEntries.length < 4) return null;
    const lastSeen = (state.lastSeenKatakana && Array.isArray(state.lastSeenKatakana)) ? state.lastSeenKatakana : [];
    const used = usedThisGame || new Set();
    // Önce: lastSeen'de değil VE bu oyunda kullanılmamış
    let pool = allEntries.filter(e => !lastSeen.includes(e.kana) && !used.has(e.kana));
    // Eğer havuz çok küçükse, lastSeen filtresini gevşet (sadece bu oyunda kullanılmamış)
    if(pool.length < 4) pool = allEntries.filter(e => !used.has(e.kana));
    // Hala azsa son çare: tüm havuz
    if(pool.length < 4) pool = allEntries.slice();
    const correct = pool[Math.floor(Math.random()*pool.length)];
    used.add(correct.kana);
    // Çelinti seçimi: ilk kuralı paylaşan vs paylaşmayanlar arasından dengeli ver
    const cRules = correct.rules || [];
    const firstRule = cRules[0] || "__none__";
    const sameRule = allEntries.filter(e => {
      const er = e.rules || [];
      return (er[0] || "__none__") === firstRule && e.tr !== correct.tr;
    });
    const otherRule = allEntries.filter(e => {
      const er = e.rules || [];
      return (er[0] || "__none__") !== firstRule && e.tr !== correct.tr;
    });
    const distract = [...sampleN(sameRule, 1), ...sampleN(otherRule, 6)].map(e => e.tr);
    const uniqDistract = [...new Set(distract)];
    const opts = uniqOpts(correct.tr, uniqDistract).map(m=>({label:m, correct:m===correct.tr}));
    return {
      ptype:"katakana-cipher",
      glyph:correct.kana,
      romaji:correct.romaji,
      source:correct.source,
      tr:correct.tr,
      chain:correct.chain || [correct.source, correct.romaji, correct.kana],
      steps:correct.steps || [],
      rules:cRules,
      label:"Bu kelime ne demek?",
      options:opts,
      explain:`${correct.kana} (${correct.romaji}) = ${correct.tr}`,
      speak:correct.kana
    };
  }
  function kanaFindRound(pool){
    const k=pool[Math.floor(Math.random()*pool.length)];
    const distract=sampleN(pool.filter(x=>x.romaji!==k.romaji),6);
    const opts=uniqOpts(k, distract).map(o=>({label:o.character,glyph:true,correct:o.romaji===k.romaji}));
    return {ptype:"romaji",glyph:k.romaji,label:"Bu sesi hangi karakter verir?",options:opts,
      explain:`${k.romaji} → ${k.character}`, speak:k.character};
  }

  // Faz 9-B: katakana-cipher için round-içi tekrar engelleyici
  const cipherUsed = new Set();
  for(let r=0;r<n;r++){
    if(id==="kana-romaji"){ rounds.push(kanaRomajiRound(kpool)); }
    else if(id==="kana-find"){ rounds.push(kanaFindRound(kpool)); }
    else if(id==="katakana-cipher"){ const round = katakanaCipherRound(cipherUsed); if(round) rounds.push(round); else r--; }
    else if(id==="kana-quick"){ rounds.push(Math.random()<.5? kanaRomajiRound(allKana()) : kanaFindRound(allKana())); }
    else if(id==="confuse"){
      const g=DATA.confusables[Math.floor(Math.random()*DATA.confusables.length)];
      const note=g[g.length-1]; const members=g.slice(0,-1).map(c=>KANA_BY_CHAR[c]).filter(Boolean);
      if(members.length<2){ r--; continue; }
      const t=members[Math.floor(Math.random()*members.length)];
      const opts=shuffle(members.map(m=>({label:m.character,glyph:true,correct:m.character===t.character})));
      rounds.push({ptype:"discriminate", pair:members.map(m=>m.character), note,
        label:`Okunuşu “${t.romaji}” olan hangisi?`, options:opts,
        explain:`<b>${t.character}</b> = ${t.romaji}. ${note}`, speak:t.character});
    }
    else if(id==="kanji-meaning"){
      const k=kanji[Math.floor(Math.random()*kanji.length)];
      rounds.push({ptype:"glyph",glyph:k.character,label:"Bu kanjinin anlamı?",
        options:uniqOpts(k.meaning_tr,meanings).map(m=>({label:m,correct:m===k.meaning_tr})),
        explain:`${k.character} = ${k.meaning_tr}. ${k.memory_hint_tr||""}`, speak:k.kunyomi&&k.kunyomi!=="-"?k.character:k.character});
    }
    else if(id==="kanji-find"){
      const k=kanji[Math.floor(Math.random()*kanji.length)];
      const distract=sampleN(kanji.filter(x=>x.id!==k.id),6);
      const opts=uniqOpts(k,distract).map(o=>({label:o.character,glyph:true,correct:o.id===k.id}));
      rounds.push({ptype:"meaning",glyph:k.meaning_tr,label:"Hangi kanji bu anlama gelir?",options:opts,
        explain:`"${k.meaning_tr}" → ${k.character}`, speak:k.character});
    }
    else if(id==="comp-meaning"){
      const pool=kanji.filter(k=>(k.components||[]).length>=2 && k.component_meanings && k.components.every(c=>k.component_meanings[c]));
      const k=pool[Math.floor(Math.random()*pool.length)];
      rounds.push({ptype:"comps",comps:k.components,
        compMeans:k.components.map(c=>({c, m:(k.component_meanings&&k.component_meanings[c])||""})),
        result:k.character, story:k.memory_hint_tr||"",
        label:"Bu parçalar birleşince hangi anlam doğar?",
        options:uniqOpts(k.meaning_tr,meanings).map(m=>({label:m,correct:m===k.meaning_tr})),
        explain:`${k.components.join(" + ")} → ${k.character} (${k.meaning_tr}).`, speak:k.character});
    }
    else if(id==="structure"){
      const pool=kanji.filter(k=>(k.components||[]).length>=2);
      const k=pool[Math.floor(Math.random()*pool.length)];
      const comps=k.components.slice();
      const hideIdx=Math.floor(Math.random()*comps.length);
      const missing=comps[hideIdx];
      const shown=comps.map((c,i)=>i===hideIdx?"?":c);
      const allComps=[...new Set(kanji.flatMap(x=>x.components||[]).concat(radicalList().map(x=>x.character)))];
      const opts=uniqOpts(missing, allComps.filter(c=>c!==missing)).map(c=>({label:c,glyph:true,correct:c===missing}));
      rounds.push({ptype:"structure",shown,result:k.character,label:"Eksik parça hangisi?",options:opts,
        explain:`${k.components.join(" + ")} = ${k.character} (${k.meaning_tr})`, speak:k.character});
    }
    else if(id==="comp-select"){
      const pool=kanji.filter(k=>(k.components||[]).length>=1);
      const k=pool[Math.floor(Math.random()*pool.length)];
      const correct=[...new Set(k.components)];
      const allComps=[...new Set(kanji.flatMap(x=>x.components||[]).concat(radicalList().map(x=>x.character)))].filter(c=>!correct.includes(c));
      const palette=shuffle([...correct, ...sampleN(allComps, Math.max(3,6-correct.length))]);
      rounds.push({multi:true,prompt:k.character,promptMean:k.meaning_tr,label:"Bu kanjiyi oluşturan parçaları seç",
        palette:palette.map(c=>({c, correct:correct.includes(c), mean:(k.component_meanings&&k.component_meanings[c])|| (DATA.chars[Object.keys(DATA.chars).find(id=>DATA.chars[id].character===c)]||{}).meaning_tr ||"parça"})),
        explain:`${k.character} = ${k.components.join(" + ")}`, speak:k.character});
    }
    else if(id==="word-meaning"){
      const words=DATA.words||[]; const w=words[Math.floor(Math.random()*words.length)];
      const allMean=[...new Set(words.map(x=>x.meaning_tr))];
      rounds.push({ptype:"glyphsm",glyph:w.word_jp,label:"Bu kelimenin anlamı?",
        options:uniqOpts(w.meaning_tr,allMean).map(m=>({label:m,correct:m===w.meaning_tr})),
        explain:`${w.word_jp} (${w.reading_kana}) = ${w.meaning_tr}`, speak:w.word_jp, wkey:w.id, audio:(w.audio&&w.audio.word)});
    }
    else if(id==="word-reading"){
      const words=DATA.words||[]; const w=words[Math.floor(Math.random()*words.length)];
      const distract=sampleN(words.filter(x=>x.id!==w.id),6);
      rounds.push({ptype:"romaji",glyph:w.reading_kana,label:"Bu okunuş hangi kelime?",
        options:uniqOpts(w,distract).map(o=>({label:o.word_jp,glyph:true,correct:o.id===w.id})),
        explain:`${w.reading_kana} → ${w.word_jp} (${w.meaning_tr})`, speak:w.word_jp, wkey:w.id});
    }
    else if(id==="word-cloze"){
      const words=(DATA.words||[]).filter(x=>x.example_sentence_jp&&x.example_sentence_jp.includes(x.word_jp));
      const w=words[Math.floor(Math.random()*words.length)];
      const blanked=w.example_sentence_jp.replace(w.word_jp,"＿＿");
      const distract=sampleN(words.filter(x=>x.id!==w.id),6);
      rounds.push({ptype:"cloze",cloze:blanked,sub:w.example_sentence_tr,label:"Boşluğa hangi kelime gelir?",
        options:uniqOpts(w,distract).map(o=>({label:o.word_jp,glyph:true,correct:o.id===w.id})),
        explain:`${w.example_sentence_jp} — ${w.example_sentence_tr}`, speak:w.example_sentence_jp, wkey:w.id});
    }
    else if(id==="family"){
      const fam=FAMILIES[r%FAMILIES.length];
      const root=ch(fam.root);
      const members=fam.members.slice();
      const others=sampleN(kanjiList().filter(k=>!members.includes(k.id)&&k.id!==fam.root),3).map(k=>k.id);
      const palette=shuffle([...members,...others]);
      rounds.push({multi:true,prompt:root.character,promptMean:"kökünden türeyenler",label:`"${root.character}" (${root.meaning_tr}) kökünden türeyen kanjileri seç`,
        palette:palette.map(id=>({c:ch(id).character,correct:members.includes(id),mean:ch(id).meaning_tr,cid:id})),
        explain:`${root.character} → ${members.map(id=>ch(id).character).join(" ")}`, speak:root.character});
    }
  }
  return rounds;
}

/* ---------- memory match setup ---------- */
function setupMatch(G, opts){
  const kind = opts.mode || GAMES[G.id].kind || "hk";
  const count = 8;
  const hira=kanaList("hiragana"), kata=kanaList("katakana");
  // unique romaji picks (avoid ambiguous duplicate sides)
  const seen={}, pick=[];
  for(const k of shuffle(allKana())){ if(seen[k.romaji])continue; seen[k.romaji]=1; pick.push(k); if(pick.length>=count)break; }
  const pairs=pick.map(k=>{
    let t=kind; if(kind==="mix") t=["hk","hr","rk"][Math.floor(Math.random()*3)];
    const rom=k.romaji;
    const h=hira.find(x=>x.romaji===rom)||k, ka=kata.find(x=>x.romaji===rom)||k;
    // hk: hiragana ↔ katakana
    if(t==="hk") return {key:rom,left:h.character,right:ka.character,leftJp:true,rightJp:true,leftKey:h.character};
    // hr: hiragana ↔ romaji (yeni — hiragana spesifik)
    if(t==="hr") return {key:rom,left:h.character,right:rom,leftJp:true,rightJp:false,leftKey:h.character};
    // rk: romaji ↔ katakana (eski rk'nın katakana spesifik hali)
    if(t==="rk") return {key:rom,left:rom,right:ka.character,leftJp:false,rightJp:true,leftKey:ka.character};
    // fallback: hiragana ↔ romaji
    return {key:rom,left:h.character,right:rom,leftJp:true,rightJp:false,leftKey:h.character};
  });
  G.pairs=pairs; G.count=pairs.length; G.matched={}; G.sel=null; G.moves=0; G._wrong=null; G.start=Date.now(); G.mode=kind;
  G.leftItems=shuffle(pairs.map((p,i)=>({i,label:p.left,jp:p.leftJp})));
  G.rightItems=shuffle(pairs.map((p,i)=>({i,label:p.right,jp:p.rightJp})));
}
function matchView(G){
  const done=Object.keys(G.matched).length;
  if(done>=G.count){
    const secs=Math.round((Date.now()-G.start)/1000); recordGame(G.id,G.count,G.count);
    return `<div class="stagger center" style="padding-top:24px">
      <div class="jp" style="font-size:60px;color:var(--ok)">完</div><div class="h1">Tamamlandı</div>
      <div class="lead" style="margin-bottom:18px">${G.count} eşleşme · ${secs} saniye</div>
      <button class="btn full" data-act="game-replay">Tekrar oyna</button>
      <button class="btn ghost full" style="margin-top:9px" data-act="game-exit">Oyunlara dön</button></div>`;
  }
  const hud=`<div class="ghud"><button class="gh-x" data-act="game-exit">✕</button>
    <div class="gh-bar"><div class="lead">${done}/${G.count} eşleşti</div></div></div>`;
  const col=(items,attr)=>items.map(it=>{
    const m=!!G.matched[it.i]; const sel=G.sel===it.i&&attr==="data-mleft";
    const wrong=G._wrong&&G._wrong.includes(attr+it.i);
    return `<button class="mitem ${m?'matched':''} ${sel?'sel':''} ${wrong?'wrong':''}" ${attr}="${it.i}" ${m?'disabled':''}>
      <span class="${it.jp?'jp':''}">${it.label}</span></button>`;
  }).join("");
  return `<div class="stagger">${hud}
    <div class="matchwrap">
      <div class="mcol">${col(G.leftItems,"data-mleft")}</div>
      <div class="mcol">${col(G.rightItems,"data-mright")}</div>
    </div>
    <small class="note" style="margin-top:12px;text-align:center">Soldan bir karakter seç, sağdaki eşini bul.</small>
  </div>`;
}
function matchTap(rightI){
  const G=state._game; if(!G||G.sel===null||G.sel===undefined){ toast("Önce soldan bir karakter seç"); return; }
  G.moves++;
  if(rightI===G.sel){
    G.matched[rightI]=true; G.sel=null; G._wrong=null;
    const p=G.pairs[rightI]; if(p&&state.settings.audioMode!=="off") playAudio(p.leftKey, _charAudioCat(p.leftKey), null, "dynamic");
    render();
  } else {
    G._wrong=["data-mleft"+G.sel,"data-mright"+rightI]; render();
    setTimeout(()=>{ if(state._game===G){ G._wrong=null; render(); } }, 650);
  }
}
function setupMemory(G, opts){
  const diff=opts.diff||"orta"; const count = diff==="kolay"?6: diff==="zor"?12:9;
  let cards=[];
  if(G.id==="kana-mahjong"){
    // pair hiragana with katakana by romaji
    const hira=kanaList("hiragana"); const pairs=sampleN(hira,count);
    pairs.forEach((h,i)=>{
      const kata=kanaList("katakana").find(k=>k.romaji===h.romaji);
      cards.push({id:"h"+i,key:h.romaji,label:h.character});
      cards.push({id:"k"+i,key:h.romaji,label:kata?kata.character:h.character});
    });
  } else if(G.id==="word-memory"){
    const ws=sampleN(DATA.words||[],count);
    ws.forEach((w,i)=>{
      cards.push({id:"w"+i,key:"wm"+i,label:w.word_jp,kind:"glyph"});
      cards.push({id:"m"+i,key:"wm"+i,label:w.meaning_tr,kind:"mean"});
    });
  } else { // kanji-memory: kanji ↔ meaning
    const ks=sampleN(kanjiList(),count);
    ks.forEach((k,i)=>{
      cards.push({id:"g"+i,key:k.id,label:k.character,kind:"glyph"});
      cards.push({id:"m"+i,key:k.id,label:k.meaning_tr,kind:"mean"});
    });
  }
  G.cards=shuffle(cards); G.flipped=[]; G.matched={}; G.moves=0; G.count=count; G.diff=diff; G.start=Date.now();
}

/* ---------- GAME SCREEN ---------- */
function GameScreen(){
  if(state._gamePick) return gamePickerView();
  const G=state._game; if(!G) return GamesHub();
  if(G.engine==="memory") return memoryView(G);
  if(G.engine==="match") return matchView(G);
  if(G.engine==="stroke") return strokeGameView(G);
  // choice or multi
  const total=G.rounds.length;
  if(G.i>=total) return gameEnd(G, G.correct, total);
  const R=G.rounds[G.i];
  const dots=`<div class="gdots">${G.rounds.map((_,i)=>{
    const res=G.results[i]; const cl=res===true?"ok":res===false?"no":i===G.i?"cur":"";
    return `<i class="${cl}"></i>`;}).join("")}</div>`;
  const hud=`<div class="ghud"><button class="gh-x" data-act="game-exit">✕</button>
    <div class="gh-bar">${dots}</div><div class="gh-score">${G.correct}</div></div>`;

  if(R.multi) return `<div class="stagger">${hud}${multiPrompt(R)}</div>`;

  // choice prompt
  let promptHTML="";

  else if(R.ptype==="comps"){
    const Gg=state._game; const revealed=Gg&&Gg._reveal;
    const parts=(R.compMeans||R.comps.map(c=>({c,m:""}))).map(p=>
      `<div class="cmpart"><span class="cmc jp">${p.c}</span><span class="cmm">${p.m||'parça'}</span></div>`).join('<span class="cmplus">+</span>');
    promptHTML=`<div class="cmparts">${parts}</div><div class="gp-label">${R.label}</div>
      ${revealed?`<div class="cmreveal"><span class="cmk jp">${R.result}</span><div class="cmrnote">Parçalar birleşince bu kanji oluşur. Anlamını sen seç.</div></div>`
        :`<button class="btn ghost" style="margin-top:12px" data-reveal="1">◳ Birleşimini göster</button>`}`;
  }
  else if(R.ptype==="structure") promptHTML=`<div class="jp" style="font-size:44px">${R.shown.map(s=>s==="?"?'<span style="color:var(--accent)">?</span>':s).join(' <span style="color:var(--faint)">+</span> ')} <span style="color:var(--faint)">=</span> ${R.result}</div><div class="gp-label">${R.label}</div>`;
  else if(R.ptype==="discriminate") promptHTML=`<div class="disc-pair">${R.pair.map(c=>`<span class="disc-c jp">${c}</span>`).join('<span class="disc-vs">/</span>')}</div><div class="disc-note">${R.note}</div><div class="gp-label">${R.label}</div>`;
  const glyphOpts=R.options.some(o=>o.glyph);
  const opts=R.options.map((o,i)=>`<button class="gopt" data-gopt="${i}">${o.glyph?`<span class="og jp">${o.label}</span>`:o.label}</button>`).join("");
  return `<div class="stagger">${hud}
    <div class="gprompt">${promptHTML}</div>

}

  const done=Object.keys(G.matched).length;

    recordGame(G.id, G.count, G.count);

/* ---------- game answer handlers ---------- */
function gameChoiceAnswer(idx){
  const G=state._game; if(G.answered) return; G.answered=true;
  const R=G.rounds[G.i]; const correct=!!R.options[idx].correct;
  const btns=[...document.querySelectorAll(".gopt")];
  btns.forEach((b,i)=>{ b.classList.add("dim");
    if(R.options[i].correct){b.classList.remove("dim");b.classList.add("correct");}
    if(i===idx&&!correct){b.classList.remove("dim");b.classList.add("wrong");}
  });
  G.results[G.i]=correct; if(correct)G.correct++; else G.wrong++;
  // record SRS against the involved item (word id for word games, else character)
  if(R.wkey){ markLearn(srsRecord(R.wkey, correct), correct, "game-word"); }
  else { const key=R.speak||R.result; if(key){ const cid=charIdOf(key); markLearn(srsRecord(cid||key, correct), correct, "game-char"); } }
  if(R.speak && (state.settings.audioMode!=="off") && correct) playAudio(R.speak, roundAudioCat(R), null, "dynamic");
  // Faz 9-B v2: katakana-cipher için lastSeen + kural keşif + öğrenilen kelime koleksiyonu
  let justUnlocked = false;
  let justUnlockedRule = null;
  if(R.ptype === "katakana-cipher"){
    // lastSeen (cap 20, FIFO — havuz 36 kelime, ~2.5 tur tekrar yasağı)
    if(!Array.isArray(state.lastSeenKatakana)) state.lastSeenKatakana = [];
    const lsIdx = state.lastSeenKatakana.indexOf(R.glyph);
    if(lsIdx !== -1) state.lastSeenKatakana.splice(lsIdx, 1);
    state.lastSeenKatakana.push(R.glyph);
    while(state.lastSeenKatakana.length > 20) state.lastSeenKatakana.shift();
    // Multi-rule discoveredRules tracking — her uygulanan kural için count++
    const ruleIds = Array.isArray(R.rules) ? R.rules : [];
    if(ruleIds.length){
      if(!state.discoveredRules) state.discoveredRules = {};
      for(const rid of ruleIds){
        const rec = state.discoveredRules[rid] || {count:0, firstSeenAt:0, unlocked:false};
        rec.count = (rec.count || 0) + 1;
        if(!rec.firstSeenAt) rec.firstSeenAt = Date.now();
        if(rec.count === 2 && !rec.unlocked){
          rec.unlocked = true;
          if(!justUnlocked){ justUnlocked = true; justUnlockedRule = rid; }
        }
        state.discoveredRules[rid] = rec;
      }
    }
    // Öğrenilen kelimeler koleksiyonu — sadece doğru cevaplarda
    if(correct){
      if(!state.cipherLearned) state.cipherLearned = {};
      const prev = state.cipherLearned[R.glyph] || {};
      state.cipherLearned[R.glyph] = {
        kana: R.glyph,
        romaji: R.romaji,
        source: R.source,
        tr: R.tr || (R.explain ? R.explain.split("= ")[1] : ""),
        firstLearnedAt: prev.firstLearnedAt || Date.now(),
        correctCount: (prev.correctCount || 0) + 1
      };
    }
    save();
  }
  const extra = (correct && R.story) ? `<div class="fb-hint"><span class="cmstory-tag">görsel çağrışım</span> ${R.story}</div>` : "";
  // Faz 9-B: cipher için özel reveal (kural + zincir)
  if(R.ptype === "katakana-cipher"){
    showCipherReveal(R, correct, justUnlocked, justUnlockedRule);
  } else {
    showGameFeedback(correct, (R.explain||"") + extra);
  }
}
function charIdOf(charOrId){
  if(DATA.chars[charOrId]) return charOrId;
  const found=Object.keys(DATA.chars).find(id=>DATA.chars[id].character===charOrId);
  return found||null;
}
/* Dinamik/oyun yüzeyinde ÜRETİLEN metnin manifest kategorisi. Yüzey tipi ("dynamic") kimlik çözümüne KARIŞMAZ;
   metin manifestte kayıtlıysa uygulamanın her yerinde AYNI ses kimliği kullanılır (Zeynep/GPT kararı 2026-07-20).
   chars = kanji+radikal (kana DEĞİL) → charIdOf kana'da null döner → "kana". */
function _charAudioCat(text){ const cid=charIdOf(text); const c=cid&&DATA.chars[cid]; return (c&&c.type==="kanji")?"kanji":"kana"; }
function roundAudioCat(R){ if(!R) return null; if(R.ptype==="cloze") return "sentence"; if(R.wkey) return "word"; return _charAudioCat(R.speak); }
function memoryCardAudio(G, card){
  if(!G||!card) return null;
  if(G.id==="kana-mahjong") return { text:card.label, cat:"kana" };
  const c=ch(card.key);
  return c ? { text:c.character, cat:_charAudioCat(c.character) } : { text:card.label, cat:"word" };
}
if(typeof window!=="undefined" && window.__play){ window.__play._charAudioCat=_charAudioCat; window.__play.roundAudioCat=roundAudioCat; window.__play.memoryCardAudio=memoryCardAudio; }
function showGameFeedback(correct, explain){
