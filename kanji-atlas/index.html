/* Faz 9-B v2: Katakana Şifreleri için zenginleştirilmiş reveal — multi-rule + passthrough */
function showCipherReveal(R, correct, justUnlocked, justUnlockedRule){
  const fb=$("#gfb"); if(!fb) return;
  const G=state._game; const last=G.i>=G.rounds.length-1;
  const RULES = (typeof GAIRAIGO_RULES !== "undefined") ? GAIRAIGO_RULES : {};
  const ruleIds = Array.isArray(R.rules) ? R.rules : [];
  // Dönüşüm zinciri (kaynak → ara → katakana)
  const chain = Array.isArray(R.chain) ? R.chain : [R.source||"", R.romaji||"", R.glyph];
  const chainHTML = chain.map((step, i) => {
    const isLast = i === chain.length - 1;
    const cls = isLast ? "chain-step final jp" : (i===0 ? "chain-step source" : "chain-step mid");
    return `<div class="${cls}">${step}</div>` + (isLast ? "" : `<div class="chain-arrow">↓</div>`);
  }).join("");
  // Kural kartları — sıfır, bir veya birden fazla olabilir
  let rulesHTML = "";
  if(ruleIds.length === 0){
    rulesHTML = `<div class="passthrough-note">Bu kelime Japoncanın hece yapısına zaten uyduğu için olduğu gibi geçmiş — özel bir kural uygulanmamış.</div>`;
  } else {
    rulesHTML = ruleIds.map(rid => {
      const rule = RULES[rid];
      if(!rule) return "";
      return `
        <div class="rule-card">
          <div class="rule-card-title">${rule.title}</div>
          <div class="rule-card-desc">${rule.desc}</div>
        </div>`;
    }).join("");
  }
  // Unlock banner — sadece bu turda yeni keşfedilen kural varsa
  let unlockHTML = "";
  if(justUnlocked && justUnlockedRule && RULES[justUnlockedRule]){
    const rule = RULES[justUnlockedRule];
    unlockHTML = `
      <div class="rule-unlock">
        <div class="rule-unlock-badge">Yeni Kural Keşfedildi ✓</div>
        <div class="rule-unlock-title">${rule.title}</div>
        <div class="rule-unlock-desc">${rule.desc}</div>
        <div class="rule-unlock-examples">
          ${(rule.examples||[]).map(ex => `<div class="rule-ex">${ex}</div>`).join("")}
        </div>
      </div>`;
  }
  const meaningLabel = (R.options.find(o=>o.correct)||{}).label || R.tr || "";
  fb.innerHTML = `
    <div class="cipher-reveal ${correct?'ok':'no'}">
      <div class="cipher-reveal-head">
        <span class="cipher-reveal-status">${correct?'Doğru':'Karışmış olabilir'}</span>
        <span class="cipher-reveal-eq jp">${R.glyph}</span>
        <span class="cipher-reveal-meaning">= ${meaningLabel}</span>
      </div>
      <div class="cipher-reveal-why">Neden böyle?</div>
      <div class="chain-wrap">${chainHTML}</div>
      ${rulesHTML}
      ${unlockHTML}
      <button class="btn ${correct?'':'soft'} full" style="margin-top:14px" data-act="game-next">${last?'Sonucu gör':'Devam'} ›</button>
    </div>`;
}
function gameMultiCheck(){
  const G=state._game; if(G.answered) return;
  const R=G.rounds[G.i];
  const chips=[...document.querySelectorAll(".selchip")];
  const selected=R.palette.map((p,i)=>chips[i].classList.contains("on"));
  let allRight=true;
  R.palette.forEach((p,i)=>{
    const sel=selected[i];
    if(p.correct){ chips[i].classList.add("ok"); if(!sel) allRight=false; }
    else if(sel){ chips[i].classList.add("bad"); allRight=false; }
    chips[i].classList.remove("on");
  });
  G.answered=true; G.results[G.i]=allRight; if(allRight)G.correct++; else G.wrong++;
  if(R.speak){ const cid=charIdOf(R.speak); markLearn(srsRecord(cid||R.speak, allRight), allRight, "game-stroke"); }
  const fb=$("#gfb"); const last=G.i>=G.rounds.length-1;
  fb.innerHTML=`<div class="fbx ${allRight?'ok':'no'}"><div class="ft">${allRight?'Doğru':'Tam değil'}</div>
    <div class="lead" style="margin-top:4px">${R.explain}</div>
    <button class="btn ${allRight?'':'soft'} full" style="margin-top:12px" data-act="game-next">${last?'Sonucu gör':'Devam'} ›</button></div>`;
}
function gameNext(){ const G=state._game; G.i++; G.answered=false; G._reveal=false; render(); }
function memoryFlip(idx){
  const G=state._game; const c=G.cards[idx];
  if(G.matched[c.id]||G.flipped.includes(idx)||G.flipped.length>=2||G._lock) return;
  G.flipped.push(idx);
  if(G.flipped.length===2){
    G.moves++;
    const [a,b]=G.flipped.map(i=>G.cards[i]);
    if(a.key===b.key && a.id!==b.id){
      G.matched[a.id]=true; G.matched[b.id]=true; G.flipped=[];
      if(state.settings.audioMode!=="off"){ const ma=memoryCardAudio(G,a); if(ma) playAudio(ma.text, ma.cat, null, "dynamic"); }
      // SRS credit
      const key=G.id==="kana-mahjong"? a.label : a.key; markLearn(srsRecord(charIdOf(key)||key, true), true, "game-match");
      render();
    } else {
      G._miss=G.flipped.slice(); G._lock=true; render();
      setTimeout(()=>{ G.flipped=[]; G._miss=null; G._lock=false; render(); }, 850);
    }
  } else render();
}
function afterRender(){
  // ADIM 7 · a11y: onboarding ekran değişiminde focus'u ekranın H1'ine taşı (klavye/ekran okuyucu)
  if(state.screen==="onboarding"){ try{ const _h=document.querySelector(".ob-stage h1"); if(_h && _h.focus) _h.focus({preventScroll:true}); }catch(e){} }
  if(state.screen==="detail"){ const c=ch(state.param); if(c&&state.settings.autoplay) animateStrokes($("#bigStage svg"), c.stroke_order_steps, false); }
  if(state.screen==="kanadetail"){ const k=KANA_BY_CHAR[state.param]; if(k&&state.settings.autoplay) animateStrokes($("#bigStage svg"), k.stroke_order_steps, false); }
  if(state.screen==="drill"||state.screen==="practice") setupDrill();
  if(state.screen==="game"&&state._game&&state._game.engine==="stroke") setupDrill();
  if(state.screen==="mochi" && state._mochi){
    const m = state._mochi;
    if(!m.success){
      setupDrill();
      // İlk açılışta animasyonu otomatik oynat (hayalet iz canlanır, kullanıcı vuruş sırasını görür)
      if(!m.hasWatched){
        const k = KANA_BY_CHAR[m.char];
        if(k){
          // Faz 6A flicker fix v2: animasyon süresince kvg-faint'i kaldır, bitince geri ekle
          // (Aksi halde path'ler 0.25 opacity ile animasyon yapıyor, "soluk akış" flicker hissi veriyor.)
          requestAnimationFrame(()=>requestAnimationFrame(()=>{
            // Defensive: test ortamında veya screen değiştiyse sessizce çık
            if(state.screen!=="mochi" || !state._mochi) return;
            let svg; try { svg = $("#guideSVG"); } catch(_){ return; }
            if(!svg) return;
            const wasFaint = svg.classList.contains("kvg-faint");
            svg.classList.remove("kvg-faint");
            let totalT = 0;
            svg.querySelectorAll("path").forEach(p=>{
              const len = p.getTotalLength();
              totalT += Math.max(.35, Math.min(.9, len/120)) + .12;
            });
            animateStrokes(svg, k.stroke_order_steps, false);
            setTimeout(()=>{
              try { if(wasFaint && svg.isConnected) svg.classList.add("kvg-faint"); } catch(_){}
            }, totalT*1000 + 150);
          }));
          m.hasWatched = true;
        }
      }
    }
  }
}

function animateStrokes(svg, strokes, loop){
  if(!svg) return;
  const paths=[...svg.querySelectorAll("path")];
  paths.forEach(p=>{const len=p.getTotalLength(); p.style.transition="none"; p.style.strokeDasharray=len; p.style.strokeDashoffset=len;});
  void svg.offsetWidth;
  let t=0;
  paths.forEach((p,i)=>{
    const len=p.getTotalLength(); const dur=Math.max(.35,Math.min(.9,len/120));
    setTimeout(()=>{ p.style.transition=`stroke-dashoffset ${dur}s ease`; p.style.strokeDashoffset=0; }, t*1000);
    t+=dur+.12;
  });
}

/* ===== FAZ 5: STROKE DOĞRULAMA (genel, tüm karakterler için) =====
   Girdi: userPts ve targetPts — her ikisi de 0..1 normalize {x,y} dizileri.
   Skorlar 0..1 (1=iyi). Başarı kararı overall + sert kapılarla verilir. */
function _resampleStroke(pts,n){
  if(!pts||!pts.length) return Array.from({length:n},()=>({x:0,y:0}));
  if(pts.length<2) return Array.from({length:n},()=>({x:pts[0].x,y:pts[0].y}));
  let len=0; const cum=[0];
  for(let i=1;i<pts.length;i++){ len+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y); cum.push(len); }
  if(len===0) return Array.from({length:n},()=>({x:pts[0].x,y:pts[0].y}));
  const out=[]; let j=0;
  for(let k=0;k<n;k++){ const target=len*k/(n-1);
    while(j<cum.length-2 && cum[j+1]<target) j++;
    const seg=(cum[j+1]-cum[j])||1; const f=Math.max(0,Math.min(1,(target-cum[j])/seg));
    out.push({x:pts[j].x+(pts[j+1].x-pts[j].x)*f, y:pts[j].y+(pts[j+1].y-pts[j].y)*f}); }
  return out;
}
function _strokeLen(pts){ let l=0; for(let i=1;i<pts.length;i++) l+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y); return l; }
function _strokeBBox(pts){ let a=1e9,b=1e9,c=-1e9,d=-1e9; pts.forEach(p=>{a=Math.min(a,p.x);b=Math.min(b,p.y);c=Math.max(c,p.x);d=Math.max(d,p.y);}); return {w:c-a,h:d-b,cx:(a+c)/2,cy:(b+d)/2}; }
const _c01=v=>Math.max(0,Math.min(1,v));
function validateStroke(userPts, targetPts, level){
  const fail={start:0,end:0,direction:0,shape:0,length:0,curvature:0,overall:0,level:"wrong",pass:false};
  if(!userPts||userPts.length<2||!targetPts||targetPts.length<2) return fail;
  const lev = level || (state._game && state._game.level) || "orta";
  // Faz 6A: "öğretici" — kana için gevşek mod. Stroke sayısı + genel şekil yeter, açı/pozisyon hassas değil.
  const tolMul = lev==="öğretici" ? 1.8 : lev==="kolay" ? 1.35 : lev==="zor" ? 0.85 : 1.0;
  const correctCut = lev==="öğretici" ? 0.32 : lev==="kolay" ? 0.50 : lev==="zor" ? 0.70 : 0.60;
  const closeCut   = lev==="öğretici" ? 0.18 : lev==="kolay" ? 0.35 : lev==="zor" ? 0.50 : 0.42;
  const N=16, u=_resampleStroke(userPts,N), t=_resampleStroke(targetPts,N);
  const uS=u[0],uE=u[N-1],tS=t[0],tE=t[N-1];
  const tb=_strokeBBox(t), ub=_strokeBBox(u);
  const tDiag=Math.hypot(tb.w,tb.h)||0.001, uDiag=Math.hypot(ub.w,ub.h)||0.001;
  const tolSE=Math.min(0.34,Math.max(0.20,tDiag*0.33)) * tolMul;
  const dStart=Math.hypot(uS.x-tS.x,uS.y-tS.y), dEnd=Math.hypot(uE.x-tE.x,uE.y-tE.y);
  const startScore=_c01(1-dStart/tolSE), endScore=_c01(1-dEnd/tolSE);
  const tdx=tE.x-tS.x,tdy=tE.y-tS.y,tdl=Math.hypot(tdx,tdy)||0.001;
  const udx=uE.x-uS.x,udy=uE.y-uS.y,udl=Math.hypot(udx,udy)||0.001;
  const cos=(tdx*udx+tdy*udy)/(tdl*udl);
  const isDot=tdl<0.10;
  const directionScore=isDot?1:_c01((cos-0.3)/0.7);
  let sd=0; for(let i=0;i<N;i++) sd+=Math.hypot(u[i].x-t[i].x,u[i].y-t[i].y); sd/=N;
  const tolShape=Math.min(0.34,Math.max(0.18,tDiag*0.38)) * tolMul;
  const shapeScore=_c01(1-sd/tolShape);
  const tLen=_strokeLen(t)||0.001, uLen=_strokeLen(u)||0.001, ratio=uLen/tLen;
  const lengthScore=_c01(1-Math.abs(Math.log(ratio))/Math.log(3));
  const tStraight=tLen/((Math.hypot(tE.x-tS.x,tE.y-tS.y))||0.001);
  const uStraight=uLen/((Math.hypot(uE.x-uS.x,uE.y-uS.y))||0.001);
  const excess=uStraight-tStraight;
  const curvatureScore=_c01(1-excess/0.9);
  const dCenter=Math.hypot(ub.cx-tb.cx,ub.cy-tb.cy), sizeRatio=uDiag/tDiag;
  let hard=false;
  // Faz 6A: öğretici modunda yumuşak hard fail kuralları — sadece açıkça alakasız çizimleri engelle
  if(lev==="öğretici"){
    if(sizeRatio>4.0 || sizeRatio<0.18) hard=true; // Çok büyük/küçük → alakasız çizim
    if(dCenter>0.55) hard=true; // Tamamen yanlış yerde
  } else {
    if(dStart>tolSE) hard=true;
    if(dEnd>tolSE) hard=true;
    if(!isDot && cos<0.5) hard=true;
    if(uStraight>1.9 && excess>0.7) hard=true;
    if(dCenter>0.34) hard=true;
    if(sizeRatio>3.2 || sizeRatio<0.28) hard=true;
  }
  const overall=(startScore+endScore+directionScore+shapeScore+lengthScore+curvatureScore)/6;
  let level_ = (!hard && overall>=correctCut) ? "correct" : (!hard && overall>=closeCut) ? "close" : "wrong";
  return {start:startScore,end:endScore,direction:directionScore,shape:shapeScore,length:lengthScore,curvature:curvatureScore,overall,level:level_,pass:level_==="correct"};
}

/* drawing pad */
let drillStrokeCount=0, drillExpected=1, drillValidated=0;
function setupDrill(){
  const stage=$("#stage"), pad=$("#pad"), guide=$("#guideSVG"), fb=$("#drillFeedback");
  if(!stage||!pad) return;
  const id = state.screen==="game" ? (state._game&&state._game.charId|| (state._game&&(state._game.charId=pickStrokeChar())) || "ki")
    : state.screen==="practice" ? (state._practiceSel||"ki")
    : state.screen==="mochi" && state._mochi ? state._mochi.char
    : (state.param||"ki");
  const c=ch(id)||KANA_BY_CHAR[id]; drillExpected=(c.stroke_order_steps||[]).length; drillStrokeCount=0; drillValidated=0;
  const dpr=window.devicePixelRatio||1; const rect=stage.getBoundingClientRect();
  pad.width=rect.width*dpr; pad.height=rect.height*dpr;
  const ctx=pad.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.strokeStyle="#272320"; ctx.lineWidth=7; ctx.lineCap="round"; ctx.lineJoin="round";
  const W=rect.width||1, H=rect.height||1;
  let drawing=false,last=null,curPts=[]; const validatedStrokes=[];
  function pos(e){const r=pad.getBoundingClientRect();const tt=e.touches?e.touches[0]:e;return {x:tt.clientX-r.left,y:tt.clientY-r.top};}
  function targetPts(i){
    if(!guide) return null; const paths=[...guide.querySelectorAll("path")]; const p=paths[i]; if(!p) return null;
    let L=0; try{L=p.getTotalLength();}catch(e){return null;} if(!L) return null;
    const M=24,out=[]; for(let k=0;k<M;k++){ let pt; try{pt=p.getPointAtLength(L*k/(M-1));}catch(e){return null;} out.push({x:pt.x/109,y:pt.y/109}); }
    return out;
  }
  function redraw(){ ctx.clearRect(0,0,pad.width,pad.height); validatedStrokes.forEach(s=>{ for(let i=1;i<s.length;i++){ ctx.beginPath(); ctx.moveTo(s[i-1].x,s[i-1].y); ctx.lineTo(s[i].x,s[i].y); ctx.stroke(); } }); }
  function setFb(txt,cls){ if(!fb)return; fb.innerHTML=txt; fb.style.color = cls==="ok"?"var(--ink-green)":cls==="no"?"var(--accent)":""; }
  function pickDominantFault(res){
    // Hangi boyutta en kötü? Kullanıcıya somut bir hata mesajı verebilelim.
    const dims = [
      {key:"start",     score: res.start,     msg:"Başlangıç noktası yanlış"},
      {key:"direction", score: res.direction, msg:"Yön ters"},
      {key:"end",       score: res.end,       msg:"Bitiş noktası uzakta"},
      {key:"shape",     score: res.shape,     msg:"Şekil çok farklı"},
      {key:"length",    score: res.length,    msg:"Çizgi boyutu farklı"},
      {key:"curvature", score: res.curvature, msg:"Kavis uymadı"}
    ];
    dims.sort((a,b)=>a.score-b.score);
    return dims[0];
  }
  function flashConfirm(){
    const el = document.getElementById("stageConfirm");
    if(!el) return;
    el.classList.remove("show");
    void el.offsetWidth;
    el.classList.add("show");
    setTimeout(()=>{ el.classList.remove("show"); }, 700);
  }
  function start(e){e.preventDefault();drawing=true;last=pos(e);curPts=[last];}
  function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;curPts.push(p);}
  function end(){
    if(!drawing)return; drawing=false; drillStrokeCount++;
    if(drillValidated>=drillExpected){ setFb(`Tüm vuruşlar zaten tamam ✓`,"ok"); redraw(); curPts=[]; return; }
    const tp=targetPts(drillValidated);
    const uNorm=curPts.map(p=>({x:p.x/W,y:p.y/H}));
    // Faz 6A: kana için "öğretici" gevşek mod, kanji için varsayılan/oyun seviyesi
    const validateLevel = state.screen==="mochi" ? "öğretici" : null;
    const res = tp ? validateStroke(uNorm,tp,validateLevel) : {level:"correct",pass:true,start:1,end:1,direction:1,shape:1,length:1,curvature:1};
    if(res.level==="correct"){
      validatedStrokes.push(curPts.slice()); drillValidated++;
      flashConfirm();
      if(drillValidated>=drillExpected){
        setFb(`Başardın ✓`,"ok");
        // Faz 6A UX patch: 700ms otomatik geçiş KALDIRILDI.
        // Çizim ekranında kalıyoruz; state güncellenir, butonlar DOM-swap ile değişir.
        if(state.screen==="mochi" && state._mochi && !state._mochi.success){
          state._mochi.success = true;
          state.kana[state._mochi.char] = true;
          markLearn(srsRecord(state._mochi.char, true), true, "write-mochi");
          save();
          showMochiSuccessActions();
        }
      }
      else setFb(`Doğru ✓ — Vuruş <b>${drillValidated+1}</b> / ${drillExpected}`,"ok");
    } else if(res.level==="close"){
      // Faz 6A: kana akıcı hissetmeli — tek sade mesaj, boyut bazlı detay yok
      if(state.screen==="mochi"){
        setFb(`Tekrar dene`,"");
      } else {
        const fault = pickDominantFault(res);
        setFb(`Yaklaştın. ${fault.msg}. Tekrar dene.`,"");
      }
    } else {
      if(state.screen==="mochi"){
        setFb(`Tekrar dene`,"no");
      } else {
        const fault = pickDominantFault(res);
        setFb(`${fault.msg}. Temizleyip tekrar dene.`,"no");
      }
    }
    redraw(); curPts=[];
  }
  pad.addEventListener("mousedown",start);pad.addEventListener("mousemove",move);window.addEventListener("mouseup",end);
  pad.addEventListener("touchstart",start,{passive:false});pad.addEventListener("touchmove",move,{passive:false});pad.addEventListener("touchend",end);
  pad._clear=()=>{ validatedStrokes.length=0; drillStrokeCount=0; drillValidated=0; ctx.clearRect(0,0,pad.width,pad.height); setFb(`Vuruş <b>1</b> / ${drillExpected}`,""); };
  playGuide();
}
function playGuide(){
  const guide=$("#guideSVG"); if(!guide) return;
  const paths=[...guide.querySelectorAll("path")];
  paths.forEach(p=>{const len=p.getTotalLength();p.style.transition="none";p.style.strokeDasharray=len;p.style.strokeDashoffset=len;p.classList.remove("active");});
  void guide.offsetWidth;
  let t=0;
  paths.forEach(p=>{const len=p.getTotalLength();const dur=Math.max(.4,Math.min(1,len/110));
    setTimeout(()=>{p.classList.add("active");p.style.transition=`stroke-dashoffset ${dur}s ease`;p.style.strokeDashoffset=0;
      setTimeout(()=>p.classList.remove("active"),dur*1000);},t*1000);
    t+=dur+.18;});
}

    const o = state.onboarding = normalizeOnboarding(state.onboarding);
    if(o.stage==="kana-q") o.stage="welcome";
    else if(o.stage==="kanji-q") o.stage="kana-q";
    save(); render();
  }
  else if(act==="ob-home"){
    // "Ana sayfaya git" — her zaman skip (tanıma çıkışları ayrı Evet/Hayır butonları).
    skipOnboarding();
    go("home", null, false);
  }
  else if(act==="ob-restart"){
    // Profil "Onboarding'i yeniden başlat" — öğrenme ilerlemesi KORUNUR; competency/target temizlenir;
    // firstMeaningfulActionAt KORUNUR (dönen kullanıcı yeniden dürtülmez); userProfile.name korunur (ellenmez).
    const prev = isPlainObject(state.onboarding) ? state.onboarding : {};
    state.onboarding = { status:"in-progress", completed:false, stage:"welcome", competency:null, startKey:null,
      introShown:false, firstMeaningfulActionAt: prev.firstMeaningfulActionAt||null,
      startedAt:new Date().toISOString(), completedAt:null, skippedAt:null };
    save(); go("onboarding", null, false);
  }
  else if(act==="pe-save"){
    const nameEl = document.getElementById("pe-name");
    const name = nameEl ? (nameEl.value||"").trim().slice(0,32) : "";
    const lvlEl = document.querySelector(".ob-lvl.on");
    const level = lvlEl ? lvlEl.dataset.lvl : "beginner";
    const now = new Date().toISOString();
    state.userProfile = Object.assign({createdAt:now}, state.userProfile||{}, { name:name, level:level, showAdvanced:level==="advanced", updatedAt:now });
    save(); toast("Profil güncellendi"); go("profile", null, false);
  }
  else if(act==="reset-cancel"){ go("profile", null, false); }
  else if(act==="reset-progress-only"){
    // Faz 9-C: merkezi clear — profil + onboarding + ayarlar korunur (userHints KORUNUR)
    // P0-5A: veri koruma modunda sahte başarı gösterme (canonical zaten save() ile korunuyor)
    if(STORE.readOnly || STORE.recoveryMode){ toast("Veri koruma modu açık — ilerleme sıfırlanamadı."); return; }
    clearProgressData();
    if(state.userProfile) state.userProfile.updatedAt = new Date().toISOString();
    if(save().ok){ toast("İlerleme sıfırlandı. Yeni başlangıca hazırsın."); go("home", null, false); }
    else toast("Sıfırlanamadı — kayıt yazılamadı, veri yerinde.");
  }
  else if(act==="reset-onboarding-only"){
    // Faz 9-C: sadece tanıtımı yeniden başlat — öğrenme ilerlemesi korunur
    if(STORE.readOnly || STORE.recoveryMode){ toast("Veri koruma modu açık — işlem yapılamadı."); return; }
    state.onboarding = { completed:false, step:1, name:"", motivation:"", level:"", style:"", startedAt:null, completedAt:null };
    // Tanıtım içinde gösterilen yardım/intro ekranlarını da tekrar göster
    state.seenReadingIntro = false; state.seenWritingSystem = false; state._wsStep = 0;
    if(save().ok){ toast("Tanıtım yeniden başlatıldı."); go("onboarding", null, false); }
    else toast("İşlem yapılamadı — kayıt yazılamadı.");
  }
  else if(act==="reset-full"){
    // P0-5A: tam profil sıfırlama MERKEZİ storage üzerinden — handler localStorage'a DOKUNMAZ.
    // readOnly/recovery → reddedilir, canonical byte-değişmez. removeItem YOK: temiz v2 tek atomik yazım.
    const res = STORE.resetCanonical();
    if(!res.ok){
      toast((res.reason==="read-only"||res.reason==="storage-recovery")
        ? "Veri koruma modu açıkken profil sıfırlanamaz."
        : "Profil sıfırlanamadı — veri yerinde.");
      return;
    }
    Object.assign(state, res.state);          // doğrulanmış temiz v2 state benimse (canonical zaten yazıldı)
    state.userProfile = null;
    state.onboarding = { completed:false, step:1, name:"", motivation:"", level:"", style:"", startedAt:null, completedAt:null };
    const _sv = save();                        // onboarding/profil sıfırını kalıcılaştır — sonucu kontrol et
    toast(_sv.ok ? "Profil sıfırlandı." : "Profil sıfırlandı — ayarlar bir sonraki açılışta tamamlanacak.");
    go("onboarding", null, false);
  }
  else if(act==="resume"){
    if(state._quiz && state._quiz.focusId){ go("quiz", state._quiz.focusId); }
  }
  else if(act==="resume-dismiss"){ state._resumeDismissed = state._quiz ? state._quiz.focusId : "_"; save(); render(); }
  // === Faz 4B: Writing system lesson navigation ===
  else if(act==="ws-next"){
    state._wsStep = (state._wsStep||0) + 1;
    if(state._wsStep >= WS_STEPS.length){ state._wsStep = 0; state.seenWritingSystem = true; save(); go("home", null, false); }
    else { save(); render(); }
  }
  else if(act==="ws-prev"){
    state._wsStep = Math.max(0, (state._wsStep||0) - 1);
    save(); render();
  }
  else if(act==="ws-skip"){
    state._wsStep = 0; state.seenWritingSystem = true; save(); go("home", null, false);
  }
  else if(act==="ws-finish"){
    state._wsStep = 0; state.seenWritingSystem = true; save();
    const target = el.dataset.target || "home";
    go(target, null, false);
  }
  // === Yaz Akışı (Faz 6A — tek aşama kana yazımı) handlers ===
  else if(act==="mochi-start"){
    mochiStart(el.dataset.param);
  }
  else if(act==="mochi-exit"){
    const ch = state._mochi ? state._mochi.char : null;
    state._mochi = null; save();
    if(ch) go("kanadetail", ch, false);
    else go("kana", null, false);
  }
  else if(act==="mochi-replay"){
    const m = state._mochi; if(!m) return;
    const c = KANA_BY_CHAR[m.char];
    const svg = $("#guideSVG"); if(!svg || !c) return;
    // Hayalet izi geçici olarak aç, animasyonu oynat, sonra eski sınıfa dön
    const wasFaint = svg.classList.contains("kvg-faint");
    const wasHidden = svg.classList.contains("kvg-hidden");
    svg.classList.remove("kvg-faint","kvg-hidden");
    animateStrokes(svg, c.stroke_order_steps);
    const total = (c.stroke_order_steps||[]).length * 700;
    setTimeout(()=>{
      if(wasFaint) svg.classList.add("kvg-faint");
      if(wasHidden) svg.classList.add("kvg-hidden");
    }, total + 200);
  }
  else if(act==="mochi-clear"){
    const pad = $("#pad"); if(pad && pad._clear) pad._clear();
  }
  // === Sonuç ekranı butonları ===
  else if(act==="mochi-restart-char"){
    mochiRestart();
  }
  else if(act==="mochi-next-char"){
    const next = el.dataset.target;
    if(next) mochiStart(next);
  }
  else if(act==="mochi-go-detail"){
    const m = state._mochi; if(!m) return;
    const ch = m.char;
    state._mochi = null; save();
    go("kanadetail", ch, false);
  }
});

document.addEventListener("input",e=>{
  if(e.target&&e.target.id==="wsearch"){
    state._wSearch=e.target.value;
    const pos=e.target.selectionStart;
    render();

function openGame(id){
  const g=GAMES[id]; if(!g) return;
  state._game=null;
  if(id==="kana-match"){ state._gamePick={id, kind:"mode"}; go("game",null); return; }
  if(g.engine==="memory"){ state._gamePick={id, kind:"diff"}; go("game",null); return; }
  if(id==="kana-romaji"||id==="kana-find"){ state._gamePick={id, kind:"set"}; go("game",null); return; }
  state._gamePick=null; startGame(id);
}
// chooser view (difficulty / kana set) rendered through the router before a round starts
function gamePickerView(){
  const P=state._gamePick; const g=GAMES[P.id];
  let opts="";
  if(P.kind==="mode") opts=`<button class="btn full" data-gstart="${P.id}" data-arg="hk">Hiragana ↔ Katakana</button>
    <button class="btn full" style="margin-top:9px" data-gstart="${P.id}" data-arg="hr">Hiragana ↔ Romaji</button>
    <button class="btn full" style="margin-top:9px" data-gstart="${P.id}" data-arg="rk">Romaji ↔ Katakana</button>
    <button class="btn ghost full" style="margin-top:9px" data-gstart="${P.id}" data-arg="mix">Karışık</button>`;
  else if(P.kind==="diff") opts=`<button class="btn full" data-gstart="${P.id}" data-arg="kolay">Kolay · 6 çift</button>
    <button class="btn full" style="margin-top:9px" data-gstart="${P.id}" data-arg="orta">Orta · 9 çift</button>
    <button class="btn full" style="margin-top:9px" data-gstart="${P.id}" data-arg="zor">Zor · 12 çift</button>`;
  else opts=`<button class="btn full" data-gstart="${P.id}" data-arg="hiragana">Hiragana</button>
    <button class="btn full" style="margin-top:9px" data-gstart="${P.id}" data-arg="katakana">Katakana</button>
    <button class="btn ghost full" style="margin-top:9px" data-gstart="${P.id}" data-arg="both">İkisi karışık</button>`;
  return `<div class="stagger"><div class="ghud"><button class="gh-x" data-act="game-exit">✕</button><div class="gh-bar"><div class="lead">${g.title}</div></div></div>
    <div class="gprompt" style="margin-bottom:18px"><div class="gp-glyph jp">${g.glyph}</div><div class="gp-label">${g.desc}</div></div>
    ${P.kind==="mode"?'<div class="gsec-t">Hangi eşlemeleri çalışmak istiyorsun?</div>':P.kind==="diff"?'<div class="gsec-t">Zorluk seç</div>':'<div class="gsec-t">Hangi set?</div>'}
    ${opts}</div>`;
}
function startGame(id, opts={}){
  state._gamePick=null;
  const g=GAMES[id];
  const G={id, engine:g.engine, i:0, correct:0, wrong:0, answered:false, results:[], opts};
  if(g.engine==="choice"||g.engine==="multi"){ G.rounds=buildRounds(id, opts); }
  else if(g.engine==="memory"){ setupMemory(G, opts); }
  else if(g.engine==="match"){ setupMatch(G, opts); }
  else if(g.engine==="stroke"){ G.level = opts.level || "kolay"; G.charId = opts.charId || pickStrokeChar([], G.level); G.recentCharIds=[]; G.correct=0; G._showHint=false; }
  state._game=G;
  go("game", null);
}

function handleQuizAnswer(i){
  const Q=state._quiz; if(Q.answered) return; Q.answered=true;
  const q=Q.qs[Q.i]; const opts=[...document.querySelectorAll(".q-opt")];
  const chosen=q.opts[i]; const correct=chosen===q.answer;
  opts.forEach((o,idx)=>{ o.classList.add("dim");
    if(q.opts[idx]===q.answer){o.classList.remove("dim");o.classList.add("correct");}
    if(idx===i&&!correct){o.classList.remove("dim");o.classList.add("wrong");}
  });
  if(correct) Q.correct++;
  else if(q.kind){ Q.wrongKinds=Q.wrongKinds||[]; Q.wrongKinds.push(q.kind); }
  if(Q.focusId) markLearn(srsRecord(Q.focusId, correct), correct, "quiz");
  // Smarter feedback for reading questions: acknowledge the other valid reading
  let explainHTML = q.explain;
  if(!correct && q.kind==="reading" && q.otherReading){
    const askedLabel = q.readingType==="kun" ? "Japonca kökenli (kun)" : "Çin kökenli (on)";
    const otherLabel = q.readingType==="kun" ? "Çin kökenli (on)" : "Japonca kökenli (kun)";
    if(chosen===q.otherReading){
      explainHTML = `<b>${q.otherReading}</b> de <span class="jp">${q.focusChar}</span> kanjisinin <b>doğru</b> okunuşudur — ama o <i>${otherLabel}</i>. Bu soruda <i>${askedLabel}</i> okunuş aranıyordu: <b>${q.answer}</b>.`;
    } else {
      explainHTML = `<span class="jp">${q.focusChar}</span> kanjisinin <i>${askedLabel}</i> okunuşu: <b>${q.answer}</b>. (Bu kanjinin <i>${otherLabel}</i> okunuşu da var: ${q.otherReading} — farklı kullanımlarda görürsün.)`;
    }
  }
  const fb=$("#qfeedback");
  fb.innerHTML=`<div class="card flat" style="background:${correct?'var(--ok-soft)':'var(--accent-tint)'};border-color:${correct?'var(--ok)':'var(--accent-soft)'}">
    <div style="font-weight:700;font-size:14px;color:${correct?'var(--ok)':'var(--accent-deep)'}">${correct?'Doğru':'Karışmış olabilir'}</div>
    <div class="lead" style="margin-top:4px">${explainHTML}</div>
    <button class="btn ${correct?'':'soft'} full" style="margin-top:12px" data-act="quiz-next">${Q.i+1>=Q.qs.length?'Sonucu gör':'Devam'} ›</button></div>`;
  // attach next
  fb.querySelector("[data-act=quiz-next]").addEventListener("click",()=>{ Q.i++; Q.answered=false; render(); });
}

// visible error net — turns a blank screen into a readable message on the phone
function showFatal(msg){
  try{ document.body.innerHTML='<div style="padding:28px;font-family:-apple-system,sans-serif;color:#272320">'
    +'<div style="font-size:18px;font-weight:700;margin-bottom:8px">Bir sorun oluştu</div>'
    +'<div style="font-size:13px;color:#6b6258;line-height:1.5">Lütfen bu mesajı paylaş:</div>'
    +'<pre style="white-space:pre-wrap;font-size:12px;background:#FCF8F1;border:1px solid #e6ddcd;border-radius:10px;padding:12px;margin-top:10px">'+String(msg)+'</pre></div>'; }catch(_){}
}
window.addEventListener("error",function(e){ showFatal((e.message||e.error||"hata")+"\n"+(e.filename||"")+":"+(e.lineno||"")); });
window.addEventListener("unhandledrejection",function(e){ showFatal("promise: "+(e.reason&&e.reason.message||e.reason)); });
try{ initVoices(); load(); render(); }
catch(err){ showFatal((err&&err.stack)||err); }
