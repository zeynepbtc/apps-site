<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Vireon HMS — Hospital Operations Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0D1B26; --ink-2:#3A4C5A; --ink-3:#7A8D9C;
  --canvas:#F1F5F7; --surface:#FFFFFF; --line:#E3EAEE;
  --teal:#0E9E96; --teal-soft:#E2F4F2;
  --blue:#2F62F5; --blue-soft:#E7EDFE;
  --violet:#6D5BE3; --violet-soft:#EEEBFC;
  --amber:#E8952C; --amber-soft:#FDF0DF;
  --rose:#E0525F; --rose-soft:#FCE9EA;
  --green:#16A97C; --green-soft:#E2F5EF;
  --r-s:10px; --r-m:16px; --r-l:22px;
  --sh-1:0 1px 2px rgba(13,27,38,.05), 0 4px 16px rgba(13,27,38,.05);
  --sh-2:0 12px 40px rgba(13,27,38,.13);
  --sb:264px;
  --disp:'Sora',ui-sans-serif,system-ui,sans-serif;
  --body:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--body); background:var(--canvas); color:var(--ink);
  font-size:14px; line-height:1.5; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#CBD7DE;border-radius:20px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#AEC0CA;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}

/* ---------- APP SHELL ---------- */
#app{display:flex;height:100dvh;width:100%;overflow:hidden}

.sidebar{
  width:var(--sb);flex:0 0 var(--sb);background:var(--surface);
  border-right:1px solid var(--line);display:flex;flex-direction:column;
  z-index:60;transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.brand{display:flex;align-items:center;gap:11px;padding:20px 20px 16px}
.brand-mark{
  width:38px;height:38px;border-radius:12px;flex:0 0 38px;
  background:linear-gradient(140deg,var(--teal),#1B7FD1 70%);
  display:grid;place-items:center;box-shadow:0 6px 16px rgba(14,158,150,.32);
}
.brand-mark svg{width:21px;height:21px}
.brand-name{font-family:var(--disp);font-weight:700;font-size:16.5px;letter-spacing:-.3px;line-height:1.1}
.brand-sub{font-size:10.5px;color:var(--ink-3);letter-spacing:.09em;text-transform:uppercase;font-weight:600}

.nav{flex:1;overflow-y:auto;padding:6px 12px 16px}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.12em;color:#9FB0BC;text-transform:uppercase;padding:14px 10px 7px}
.nav-item{
  display:flex;align-items:center;gap:11px;width:100%;padding:9.5px 11px;border-radius:11px;
  color:var(--ink-2);font-weight:500;font-size:13.5px;position:relative;
  transition:background .16s,color .16s,transform .16s;
}
.nav-item svg{width:18px;height:18px;flex:0 0 18px;stroke-width:1.7}
.nav-item:hover{background:#F3F7F9;color:var(--ink);transform:translateX(2px)}
.nav-item.on{background:var(--ink);color:#fff;box-shadow:0 6px 18px rgba(13,27,38,.22)}
.nav-item.on::after{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--teal)}
.nav-item .badge{margin-left:auto;font-size:10.5px;font-weight:700;background:var(--rose);color:#fff;padding:1px 6px;border-radius:20px;min-width:19px;text-align:center}
.nav-item.on .badge{background:var(--teal)}
.nav-item.ai{background:linear-gradient(100deg,var(--violet-soft),#F6F2FF);color:var(--violet);font-weight:600}
.nav-item.ai:hover{background:linear-gradient(100deg,#E4DFFB,#EFE9FE)}
.nav-item .dot-live{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(22,169,124,.6);animation:pulse 2s infinite}
@keyframes pulse{70%{box-shadow:0 0 0 7px rgba(22,169,124,0)}100%{box-shadow:0 0 0 0 rgba(22,169,124,0)}}

.side-foot{padding:12px;border-top:1px solid var(--line)}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:12px;width:100%;transition:background .16s}
.user-chip:hover{background:#F3F7F9}
.avatar{border-radius:50%;object-fit:cover;flex:none;background:#DCE6EB}
.u-name{font-weight:600;font-size:13px;text-align:left}
.u-role{font-size:11px;color:var(--ink-3);text-align:left}

/* ---------- MAIN ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.topbar{
  height:66px;flex:none;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 20px;z-index:40;
}
.burger{display:none;width:38px;height:38px;border-radius:11px;place-items:center;border:1px solid var(--line)}
.search{
  flex:1;max-width:420px;display:flex;align-items:center;gap:9px;height:40px;padding:0 13px;
  background:var(--canvas);border:1px solid transparent;border-radius:12px;transition:.18s;
}
.search:focus-within{background:#fff;border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-soft)}
.search input{border:none;background:none;outline:none;flex:1;font-size:13.5px}
.search kbd{font-family:var(--mono);font-size:10px;color:var(--ink-3);border:1px solid var(--line);border-radius:5px;padding:2px 5px;background:#fff}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{
  width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:var(--ink-2);
  border:1px solid var(--line);background:#fff;position:relative;transition:.16s;
}
.icon-btn:hover{border-color:#CFDBE2;color:var(--ink);transform:translateY(-1px);box-shadow:var(--sh-1)}
.icon-btn .ping{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--rose);border:1.5px solid #fff}
.btn{
  display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 15px;border-radius:12px;
  font-weight:600;font-size:13.5px;transition:.16s;white-space:nowrap;
}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:#1B3040;transform:translateY(-1px);box-shadow:0 8px 20px rgba(13,27,38,.24)}
.btn-teal{background:var(--teal);color:#fff}
.btn-teal:hover{background:#0C8C85;transform:translateY(-1px);box-shadow:0 8px 20px rgba(14,158,150,.3)}
.btn-ghost{border:1px solid var(--line);background:#fff;color:var(--ink-2)}
.btn-ghost:hover{border-color:#CFDBE2;color:var(--ink);box-shadow:var(--sh-1)}
.btn-danger{background:var(--rose-soft);color:var(--rose)}
.btn-danger:hover{background:var(--rose);color:#fff}
.btn-sm{height:33px;padding:0 11px;font-size:12.5px;border-radius:9px}
.btn:disabled{opacity:.45;pointer-events:none}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}
.page{padding:24px 26px 60px;max-width:1680px;margin:0 auto;animation:pageIn .45s cubic-bezier(.22,1,.36,1)}
@keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.page-head{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:5px}
h1{font-family:var(--disp);font-size:27px;font-weight:700;letter-spacing:-.7px;line-height:1.15}
.sub{color:var(--ink-3);font-size:13.5px;margin-top:4px}
.head-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}

/* ---------- CARDS / GRID ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-m);box-shadow:var(--sh-1)}
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.g21{grid-template-columns:2fr 1fr}
.g12{grid-template-columns:1fr 2fr}
.mt{margin-top:14px}
.mt24{margin-top:24px}
.section-title{font-family:var(--disp);font-size:16px;font-weight:600;letter-spacing:-.2px;margin:24px 0 12px;display:flex;align-items:center;gap:9px}
.section-title .pill{font-family:var(--body);font-size:11px;font-weight:600;color:var(--ink-3);background:var(--canvas);padding:3px 9px;border-radius:20px;border:1px solid var(--line)}

.kpi{padding:16px 17px;position:relative;overflow:hidden;transition:.2s;cursor:pointer}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--sh-2);border-color:#D3E0E6}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.kpi-ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center}
.kpi-ico svg{width:17px;height:17px;stroke-width:1.9}
.kpi-lab{font-size:12px;color:var(--ink-3);font-weight:600;letter-spacing:.01em}
.kpi-val{font-family:var(--disp);font-size:29px;font-weight:700;letter-spacing:-1.2px;line-height:1}
.kpi-val small{font-size:14px;font-weight:600;letter-spacing:0;color:var(--ink-3);margin-left:2px}
.kpi-foot{display:flex;align-items:center;gap:6px;margin-top:9px;font-size:11.5px;color:var(--ink-3)}
.trend{display:inline-flex;align-items:center;gap:3px;font-weight:700;font-size:11.5px;padding:2px 6px;border-radius:6px}
.trend.up{color:var(--green);background:var(--green-soft)}
.trend.down{color:var(--rose);background:var(--rose-soft)}
.spark{position:absolute;right:0;bottom:0;opacity:.55;pointer-events:none}

.chart-card{padding:16px 17px 8px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.chart-card:hover{box-shadow:var(--sh-2);border-color:#D3E0E6;transform:translateY(-2px)}
.chart-card:hover .expand{opacity:1;transform:none}
.expand{position:absolute;top:14px;right:14px;width:29px;height:29px;border-radius:9px;background:var(--canvas);display:grid;place-items:center;color:var(--ink-2);opacity:0;transform:translateY(-4px);transition:.2s}
.ch-head{margin-bottom:12px;padding-right:34px}
.ch-title{font-weight:600;font-size:14px;letter-spacing:-.1px}
.ch-sub{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.legend{display:flex;flex-wrap:wrap;gap:12px;padding:8px 2px 10px}
.legend span{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-2);font-weight:500}
.legend i{width:9px;height:9px;border-radius:3px;display:block}

/* ---------- TABLE ---------- */
.tbl-wrap{overflow-x:auto;border-radius:var(--r-m)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px}
thead th{
  text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);
  padding:12px 14px;background:#FAFCFD;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;z-index:2;
}
tbody td{padding:11px 14px;border-bottom:1px solid #EFF3F5;white-space:nowrap}
tbody tr{transition:background .14s;cursor:pointer}
tbody tr:hover{background:#F7FAFB}
tbody tr:last-child td{border-bottom:none}
.cell-user{display:flex;align-items:center;gap:10px}
.cell-user .nm{font-weight:600}
.cell-user .id{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3.5px 9px;border-radius:7px;white-space:nowrap}
.tag i{width:6px;height:6px;border-radius:50%;background:currentColor}
.t-green{background:var(--green-soft);color:#0E8A64}
.t-blue{background:var(--blue-soft);color:#2450CE}
.t-amber{background:var(--amber-soft);color:#B5711A}
.t-rose{background:var(--rose-soft);color:#C33E4A}
.t-teal{background:var(--teal-soft);color:#0A8079}
.t-violet{background:var(--violet-soft);color:#5847C9}
.t-gray{background:var(--canvas);color:var(--ink-3)}

/* ---------- FILTER BAR ---------- */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fld{
  display:flex;align-items:center;gap:7px;height:38px;padding:0 12px;background:#fff;
  border:1px solid var(--line);border-radius:11px;font-size:13px;font-weight:500;color:var(--ink-2);transition:.16s;
}
.fld:hover{border-color:#CFDBE2}
.fld:focus-within{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-soft)}
.fld select,.fld input{border:none;outline:none;background:none;font-weight:500;font-size:13px;cursor:pointer}
.fld input{cursor:text}
.seg{display:flex;background:var(--canvas);border-radius:11px;padding:3px;gap:2px;border:1px solid var(--line)}
.seg button{padding:6px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink-3);transition:.16s}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--sh-1)}
.seg button:hover:not(.on){color:var(--ink-2)}

/* ---------- LISTS ---------- */
.list{padding:6px}
.li{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:12px;transition:.16s;cursor:pointer}
.li:hover{background:#F5F9FA;transform:translateX(3px)}
.li-ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none}
.li-ico svg{width:16px;height:16px;stroke-width:1.9}
.li-main{flex:1;min-width:0}
.li-t{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-s{font-size:11.5px;color:var(--ink-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-r{font-size:11px;color:var(--ink-3);font-family:var(--mono);flex:none}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:15px 17px 10px}
.card-head h3{font-family:var(--disp);font-size:14.5px;font-weight:600;letter-spacing:-.1px}
.card-head .lnk{font-size:12px;font-weight:600;color:var(--teal)}
.card-head .lnk:hover{text-decoration:underline}

/* progress */
.bar{height:6px;border-radius:20px;background:var(--canvas);overflow:hidden}
.bar i{display:block;height:100%;border-radius:20px;background:var(--teal);width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1)}

/* quick actions */
.qa{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;padding:12px}
.qa button{
  display:flex;flex-direction:column;gap:8px;align-items:flex-start;padding:13px;border-radius:13px;
  border:1px solid var(--line);background:#fff;transition:.18s;text-align:left;
}
.qa button:hover{transform:translateY(-2px);box-shadow:var(--sh-2);border-color:transparent}
.qa .qi{width:32px;height:32px;border-radius:9px;display:grid;place-items:center}
.qa .qt{font-weight:600;font-size:12.5px}
.qa .qs{font-size:11px;color:var(--ink-3)}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(10,22,31,.5);backdrop-filter:blur(5px);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;animation:fadeIn .25s forwards;
}
@keyframes fadeIn{to{opacity:1}}
.overlay.out{animation:fadeOut .2s forwards}
@keyframes fadeOut{to{opacity:0}}
.modal{
  background:var(--surface);border-radius:var(--r-l);width:100%;max-width:1080px;max-height:90dvh;
  display:flex;flex-direction:column;box-shadow:0 32px 90px rgba(6,18,27,.35);overflow:hidden;
  transform:scale(.94) translateY(18px);opacity:0;animation:modalIn .42s cubic-bezier(.22,1.2,.36,1) forwards;
}
@keyframes modalIn{to{transform:none;opacity:1}}
.modal.sm{max-width:540px}
.modal.md{max-width:760px}
.modal.xl{max-width:1240px}
.m-head{display:flex;align-items:center;gap:14px;padding:20px 22px;border-bottom:1px solid var(--line);flex:none}
.m-head h2{font-family:var(--disp);font-size:19px;font-weight:600;letter-spacing:-.4px}
.m-head .sub{margin-top:2px}
.m-body{padding:22px;overflow-y:auto;flex:1}
.m-foot{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end;background:#FAFCFD;flex:none;flex-wrap:wrap}
.x{margin-left:auto;width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--ink-3);transition:.16s;flex:none}
.x:hover{background:var(--canvas);color:var(--ink);transform:rotate(90deg)}

/* ---------- FORMS ---------- */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.f{display:flex;flex-direction:column;gap:6px}
.f.full{grid-column:1/-1}
.f label{font-size:11.5px;font-weight:600;color:var(--ink-2);letter-spacing:.01em}
.f label span{color:var(--rose)}
.f input,.f select,.f textarea{
  height:42px;padding:0 13px;border:1px solid var(--line);border-radius:11px;background:#fff;
  outline:none;transition:.16s;font-size:13.5px;width:100%;
}
.f textarea{height:auto;padding:11px 13px;resize:vertical;min-height:84px;font-family:var(--body)}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-soft)}
.f input::placeholder,.f textarea::placeholder{color:#AFC0CA}
.step-rail{display:flex;gap:0;padding:0 22px;border-bottom:1px solid var(--line);overflow-x:auto;background:#FAFCFD;flex:none}
.step-rail button{
  padding:14px 15px;font-size:12.5px;font-weight:600;color:var(--ink-3);white-space:nowrap;
  border-bottom:2px solid transparent;transition:.18s;display:flex;align-items:center;gap:8px;
}
.step-rail button .n{width:20px;height:20px;border-radius:50%;background:var(--canvas);border:1px solid var(--line);display:grid;place-items:center;font-size:10.5px;font-family:var(--mono)}
.step-rail button.on{color:var(--ink);border-bottom-color:var(--teal)}
.step-rail button.on .n{background:var(--teal);color:#fff;border-color:var(--teal)}
.step-rail button.done .n{background:var(--green);color:#fff;border-color:var(--green)}
.step-rail button:hover{color:var(--ink-2)}
.tabs{display:flex;gap:3px;border-bottom:1px solid var(--line);overflow-x:auto;padding:0 4px}
.tabs button{padding:11px 13px;font-size:13px;font-weight:600;color:var(--ink-3);border-bottom:2px solid transparent;white-space:nowrap;transition:.16s}
.tabs button.on{color:var(--ink);border-bottom-color:var(--ink)}
.tabs button:hover{color:var(--ink-2)}

/* ---------- WORKFLOW ---------- */
.wf{padding:34px 30px;text-align:center}
.wf-ring{width:96px;height:96px;margin:0 auto 22px;position:relative}
.wf-ring svg{transform:rotate(-90deg)}
.wf-pct{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:21px}
.wf-steps{max-width:400px;margin:0 auto;text-align:left;display:flex;flex-direction:column;gap:3px}
.wf-step{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:11px;opacity:.32;transition:.35s}
.wf-step.on{opacity:1;background:var(--teal-soft)}
.wf-step.done{opacity:1}
.wf-dot{width:21px;height:21px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center;transition:.3s}
.wf-step.on .wf-dot{border-color:var(--teal);border-top-color:transparent;animation:spin .7s linear infinite}
.wf-step.done .wf-dot{background:var(--green);border-color:var(--green)}
.wf-step.done .wf-dot::after{content:"";width:5px;height:9px;border:2px solid #fff;border-top:0;border-left:0;transform:rotate(43deg) translateY(-1px)}
@keyframes spin{to{transform:rotate(360deg)}}
.wf-step span{font-size:13.5px;font-weight:600}
.success-pop{display:grid;place-items:center;padding:16px 0}
.success-ring{width:80px;height:80px;border-radius:50%;background:var(--green-soft);display:grid;place-items:center;animation:pop .55s cubic-bezier(.22,1.4,.36,1)}
.success-ring div{width:54px;height:54px;border-radius:50%;background:var(--green);display:grid;place-items:center}
@keyframes pop{from{transform:scale(.3);opacity:0}}

/* ---------- BOOT / SYNC SPLASH ---------- */
.sync{
  position:fixed;inset:0;z-index:400;background:linear-gradient(155deg,#0D1B26,#123240 55%,#0B2A33);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;color:#fff;
}
.sync.out{animation:fadeOut .45s forwards}
.sync-logo{width:64px;height:64px;border-radius:19px;background:linear-gradient(140deg,var(--teal),#1B7FD1);display:grid;place-items:center;box-shadow:0 14px 44px rgba(14,158,150,.45);animation:breathe 2.4s ease-in-out infinite}
@keyframes breathe{50%{transform:scale(1.07)}}
.sync-logo svg{width:34px;height:34px}
.sync h3{font-family:var(--disp);font-size:19px;font-weight:600;letter-spacing:-.3px}
.sync-steps{display:flex;flex-direction:column;gap:9px;min-width:280px}
.sync-step{display:flex;align-items:center;gap:11px;font-size:13.5px;color:rgba(255,255,255,.35);transition:.4s;font-weight:500}
.sync-step.on{color:#fff}
.sync-step.done{color:rgba(255,255,255,.62)}
.sync-step .sd{width:17px;height:17px;border-radius:50%;border:2px solid rgba(255,255,255,.22);flex:none;display:grid;place-items:center;transition:.3s}
.sync-step.on .sd{border-color:var(--teal);border-top-color:transparent;animation:spin .7s linear infinite}
.sync-step.done .sd{background:var(--teal);border-color:var(--teal)}
.sync-step.done .sd::after{content:"";width:4px;height:7px;border:2px solid #fff;border-top:0;border-left:0;transform:rotate(43deg) translateY(-1px)}
.sync-bar{width:260px;height:3px;border-radius:20px;background:rgba(255,255,255,.14);overflow:hidden}
.sync-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),#4FC3E8);border-radius:20px;transition:width .5s ease}

/* ---------- SKELETON ---------- */
.sk{background:linear-gradient(100deg,#EDF2F4 30%,#F7FAFB 50%,#EDF2F4 70%);background-size:220% 100%;animation:shimmer 1.25s infinite;border-radius:10px}
@keyframes shimmer{to{background-position:-220% 0}}
.sk-grid{display:grid;gap:14px;grid-template-columns:repeat(4,1fr)}
.sk-kpi{height:104px}
.sk-chart{height:250px}

/* ---------- TOAST ---------- */
#toasts{position:fixed;bottom:22px;right:22px;z-index:500;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.toast{
  display:flex;align-items:center;gap:11px;background:var(--ink);color:#fff;padding:12px 16px;border-radius:13px;
  box-shadow:0 16px 40px rgba(13,27,38,.3);font-size:13px;font-weight:500;animation:toastIn .4s cubic-bezier(.22,1.3,.36,1);max-width:330px;
}
@keyframes toastIn{from{transform:translateX(90px);opacity:0}}
.toast.out{animation:toastOut .3s forwards}
@keyframes toastOut{to{transform:translateX(90px);opacity:0}}
.toast .ti{width:24px;height:24px;border-radius:8px;background:var(--teal);display:grid;place-items:center;flex:none}

/* ---------- MISC ---------- */
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.stat-box{flex:1;min-width:132px;background:var(--canvas);border-radius:13px;padding:12px 13px}
.stat-box .l{font-size:11px;color:var(--ink-3);font-weight:600;margin-bottom:4px}
.stat-box .v{font-family:var(--disp);font-size:19px;font-weight:700;letter-spacing:-.5px}
.ai-note{
  margin-top:16px;padding:14px 15px;border-radius:14px;background:linear-gradient(100deg,var(--violet-soft),#F7F4FF);
  border:1px solid #E3DDFA;display:flex;gap:11px;
}
.ai-note .ai-i{width:29px;height:29px;border-radius:9px;background:var(--violet);display:grid;place-items:center;flex:none}
.ai-note h5{font-size:12.5px;font-weight:700;color:#4E3FB5;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.ai-note p{font-size:12.5px;color:#5B5580;line-height:1.55}
.chip{font-size:9.5px;font-weight:700;letter-spacing:.06em;background:#fff;color:var(--violet);padding:2px 6px;border-radius:5px;border:1px solid #DED7F8}
.empty{padding:40px 20px;text-align:center;color:var(--ink-3)}
.empty svg{width:40px;height:40px;margin-bottom:10px;opacity:.4}
.divider{height:1px;background:var(--line);margin:16px 0}

/* ---------- RESPONSIVE ---------- */
@media(max-width:1240px){
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
  .g21,.g12{grid-template-columns:1fr}
  .sk-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  .sidebar{position:fixed;inset:0 auto 0 0;transform:translateX(-100%);box-shadow:0 0 60px rgba(0,0,0,.2)}
  .sidebar.open{transform:none}
  .burger{display:grid}
  .scrim{position:fixed;inset:0;background:rgba(10,22,31,.45);z-index:55;backdrop-filter:blur(2px);animation:fadeIn .2s forwards;opacity:0}
  .page{padding:18px 16px 90px}
  h1{font-size:22px}
  .topbar{padding:0 14px;height:60px;gap:9px}
  .search{max-width:none}
  .search kbd{display:none}
  .head-actions{width:100%;margin-left:0}
}
@media(max-width:680px){
  .g4,.g3,.g2,.sk-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .overlay{padding:0;align-items:flex-end}
  .modal{max-width:none;max-height:94dvh;border-radius:22px 22px 0 0;animation:sheetIn .38s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes sheetIn{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
  .m-foot{justify-content:stretch}
  .m-foot .btn{flex:1;justify-content:center}
  .kpi-val{font-size:24px}
  .qa{grid-template-columns:1fr}
}
@media(max-width:460px){
  .g4,.g3,.g2{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
/* ================= VIRTUAL ASSISTANT — SEPARATE APP ================= */
#assistant-layer{position:fixed;inset:0;z-index:300;pointer-events:none}
.va{
  position:absolute;inset:0;pointer-events:auto;overflow:hidden;
  background:radial-gradient(1200px 700px at 50% 8%, #24325C 0%, #141C36 42%, #0A0F1F 100%);
  color:#EDF1FF;display:flex;flex-direction:column;
  animation:vaIn .55s cubic-bezier(.22,1,.36,1);
}
.va.out{animation:vaOut .35s forwards}
@keyframes vaIn{from{opacity:0;transform:scale(1.04)}}
@keyframes vaOut{to{opacity:0;transform:scale(.97)}}

/* ambient */
.va-aura{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;pointer-events:none}
.va-aura.a{width:520px;height:520px;background:#3D5BFF;top:-160px;left:-120px;animation:drift 15s ease-in-out infinite}
.va-aura.b{width:460px;height:460px;background:#12BFA8;bottom:-180px;right:-100px;animation:drift 18s ease-in-out infinite reverse}
.va-aura.c{width:380px;height:380px;background:#7B5BE3;top:35%;right:12%;animation:drift 22s ease-in-out infinite}
@keyframes drift{50%{transform:translate(60px,-40px) scale(1.14)}}
.va-grid{
  position:absolute;inset:0;pointer-events:none;opacity:.22;
  background-image:linear-gradient(rgba(255,255,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.07) 1px,transparent 1px);
  background-size:46px 46px;mask-image:radial-gradient(circle at 50% 45%,#000 20%,transparent 78%);
}
.va-stars{position:absolute;inset:0;pointer-events:none}
.va-stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.5;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.85;transform:scale(1.5)}}

/* header */
.va-top{position:relative;z-index:3;display:flex;align-items:center;gap:12px;padding:16px 20px;flex:none}
.va-brand{display:flex;align-items:center;gap:11px}
.va-brand .bm{
  width:38px;height:38px;border-radius:12px;background:linear-gradient(140deg,#5B7BFF,#12BFA8);
  display:grid;place-items:center;box-shadow:0 8px 26px rgba(91,123,255,.5)
}
.va-brand h4{font-family:var(--disp);font-size:15px;font-weight:600;letter-spacing:-.2px}
.va-brand p{font-size:10.5px;color:#8FA0C7;letter-spacing:.09em;text-transform:uppercase;font-weight:600}
.va-status{
  margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;
  padding:7px 12px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);
  backdrop-filter:blur(8px);color:#C7D2F0;
}
.va-status i{width:7px;height:7px;border-radius:50%;background:#12BFA8;box-shadow:0 0 10px #12BFA8;animation:pulse 2s infinite}
.va-x{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);color:#C7D2F0;transition:.18s}
.va-x:hover{background:rgba(255,255,255,.16);color:#fff;transform:rotate(90deg)}

/* stage */
.va-stage{flex:1;position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:6px 16px;min-height:0}

/* --- ROBOT --- */
.bot-wrap{position:relative;display:grid;place-items:center;animation:hover 3.4s ease-in-out infinite}
@keyframes hover{50%{transform:translateY(-9px)}}
.bot{width:min(280px,58vw);height:auto;overflow:visible;filter:drop-shadow(0 26px 40px rgba(5,10,30,.6))}
.bot-ring{
  position:absolute;width:min(360px,74vw);aspect-ratio:1;border-radius:50%;
  border:1px solid rgba(120,160,255,.2);pointer-events:none;
}
.bot-ring::after{
  content:"";position:absolute;inset:-22px;border-radius:50%;border:1px dashed rgba(120,160,255,.13);
  animation:rot 26s linear infinite;
}
@keyframes rot{to{transform:rotate(360deg)}}
.bot-shadow{position:absolute;bottom:-4px;width:120px;height:14px;border-radius:50%;background:rgba(0,0,0,.45);filter:blur(9px);animation:shad 3.4s ease-in-out infinite}
@keyframes shad{50%{transform:scale(.82);opacity:.6}}

/* robot part animations */
#eyeL,#eyeR{transform-origin:center;animation:blink 4.6s infinite}
@keyframes blink{0%,94%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}
#armL{transform-origin:118px 152px;animation:armIdleL 3.6s ease-in-out infinite}
#armR{transform-origin:222px 152px;animation:armIdleR 3.6s ease-in-out infinite}
@keyframes armIdleL{50%{transform:rotate(7deg)}}
@keyframes armIdleR{50%{transform:rotate(-7deg)}}
#legL{transform-origin:145px 246px;animation:legIdle 3.4s ease-in-out infinite}
#legR{transform-origin:195px 246px;animation:legIdle 3.4s ease-in-out infinite reverse}
@keyframes legIdle{50%{transform:rotate(4deg) translateY(2px)}}
#hat{transform-origin:170px 74px;animation:hatIdle 3.4s ease-in-out infinite}
@keyframes hatIdle{0%,100%{transform:rotate(-2deg) translateY(0)}50%{transform:rotate(2deg) translateY(-3px)}}
#antenna{transform-origin:170px 62px;animation:antenna 2.2s ease-in-out infinite}
@keyframes antenna{50%{transform:rotate(9deg)}}
#antennaDot{animation:glowDot 1.6s ease-in-out infinite}
@keyframes glowDot{50%{r:6;opacity:1}}
#head{transform-origin:170px 130px;animation:headIdle 5s ease-in-out infinite}
@keyframes headIdle{25%{transform:rotate(2.5deg)}75%{transform:rotate(-2.5deg)}}
#mouth{transform-origin:170px 152px;transition:.2s}

/* states */
.va[data-state="listening"] .bot-wrap{animation:hover 1.6s ease-in-out infinite}
.va[data-state="listening"] #antennaDot{animation:glowDot .5s ease-in-out infinite}
.va[data-state="listening"] #armL{animation:armUpL .8s ease-in-out infinite alternate}
.va[data-state="listening"] #armR{animation:armUpR .8s ease-in-out infinite alternate}
@keyframes armUpL{to{transform:rotate(26deg)}}
@keyframes armUpR{to{transform:rotate(-26deg)}}
.va[data-state="thinking"] #head{animation:headThink 1.1s ease-in-out infinite}
@keyframes headThink{50%{transform:rotate(-7deg) translateY(-2px)}}
.va[data-state="thinking"] .bot-ring::after{animation-duration:3s}
.va[data-state="speaking"] #mouth{animation:talk .26s ease-in-out infinite alternate}
@keyframes talk{from{transform:scaleY(.35)}to{transform:scaleY(1.5)}}
.va[data-state="speaking"] #legL{animation:march .42s ease-in-out infinite}
.va[data-state="speaking"] #legR{animation:march .42s ease-in-out infinite reverse}
@keyframes march{50%{transform:rotate(-13deg) translateY(-4px)}}
.va[data-state="speaking"] .bot-wrap{animation:hover 1.1s ease-in-out infinite}
.va[data-state="speaking"] #armL{animation:armTalkL .6s ease-in-out infinite alternate}
.va[data-state="speaking"] #armR{animation:armTalkR .7s ease-in-out infinite alternate}
@keyframes armTalkL{to{transform:rotate(-14deg)}}
@keyframes armTalkR{to{transform:rotate(14deg)}}

/* thinking dots above head */
.think-bubble{
  position:absolute;top:-6px;left:50%;transform:translateX(-50%);display:flex;gap:6px;padding:9px 13px;
  border-radius:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(8px);
  opacity:0;transition:.3s;pointer-events:none;
}
.va[data-state="thinking"] .think-bubble{opacity:1;top:-16px}
.think-bubble i{width:7px;height:7px;border-radius:50%;background:#9DB4FF;animation:bounceDot 1.1s infinite}
.think-bubble i:nth-child(2){animation-delay:.15s}
.think-bubble i:nth-child(3){animation-delay:.3s}
@keyframes bounceDot{0%,60%,100%{transform:translateY(0);opacity:.45}30%{transform:translateY(-6px);opacity:1}}

/* state label */
.va-label{text-align:center;min-height:52px}
.va-label h2{font-family:var(--disp);font-size:clamp(19px,4.6vw,26px);font-weight:600;letter-spacing:-.5px;transition:.3s}
.va-label p{font-size:12.5px;color:#8FA0C7;margin-top:4px;min-height:19px}
.va-label .cursor{display:inline-block;width:2px;height:14px;background:#12BFA8;margin-left:2px;animation:caret .9s steps(1) infinite;vertical-align:middle}
@keyframes caret{50%{opacity:0}}

/* --- WAVEFORM --- */
.wave{display:flex;align-items:center;justify-content:center;gap:3px;height:74px;width:min(560px,92vw)}
.wave i{
  width:4px;border-radius:20px;background:linear-gradient(180deg,#7DA0FF,#12BFA8);
  height:5px;transition:height .09s linear,opacity .3s;opacity:.32;
}
.va[data-state="listening"] .wave i{opacity:1;background:linear-gradient(180deg,#12BFA8,#5EE9D3)}
.va[data-state="speaking"] .wave i{opacity:1;background:linear-gradient(180deg,#8B6BFF,#5B9BFF)}
.va[data-state="thinking"] .wave i{opacity:.5}

/* frequency spectrum ring under bot */
.freq{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:30px;opacity:.75}
.freq i{width:3px;border-radius:20px;background:#5B7BFF;height:4px;transition:height .1s linear}

/* --- CONTROLS --- */
.va-bottom{position:relative;z-index:3;padding:8px 16px calc(22px + env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;gap:12px;flex:none}
.ptt-wrap{position:relative;display:grid;place-items:center}
.ptt{
  width:82px;height:82px;border-radius:50%;display:grid;place-items:center;position:relative;z-index:2;
  background:linear-gradient(150deg,#5B7BFF,#12BFA8);color:#fff;box-shadow:0 12px 40px rgba(60,110,255,.5);
  transition:transform .16s cubic-bezier(.22,1.3,.36,1),box-shadow .2s;touch-action:none;user-select:none;
  border:3px solid rgba(255,255,255,.18);
}
.ptt svg{width:31px;height:31px}
.ptt:hover{transform:scale(1.05)}
.ptt.held{transform:scale(.93);background:linear-gradient(150deg,#12BFA8,#5EE9D3);box-shadow:0 0 0 12px rgba(18,191,168,.16),0 12px 40px rgba(18,191,168,.55)}
.ptt.busy{background:linear-gradient(150deg,#6D5BE3,#5B7BFF);pointer-events:none;opacity:.9}
.ptt-ring{position:absolute;width:82px;height:82px;border-radius:50%;border:2px solid rgba(18,191,168,.5);opacity:0}
.va[data-state="listening"] .ptt-ring{animation:ripple 1.5s ease-out infinite}
.va[data-state="listening"] .ptt-ring:nth-child(2){animation-delay:.5s}
@keyframes ripple{0%{opacity:.85;transform:scale(1)}100%{opacity:0;transform:scale(2.15)}}
.ptt-hint{font-size:12px;color:#8FA0C7;font-weight:600;letter-spacing:.02em;text-align:center}
.ptt-hint b{color:#C7D2F0}
.va-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:640px}
.va-chip{
  padding:8px 14px;border-radius:20px;font-size:12.5px;font-weight:600;color:#C7D2F0;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);transition:.18s;backdrop-filter:blur(6px);
}
.va-chip:hover{background:rgba(255,255,255,.16);color:#fff;transform:translateY(-2px)}
.va-transcript{
  width:min(680px,94vw);min-height:0;max-height:19vh;overflow-y:auto;padding:0 4px;
  display:flex;flex-direction:column;gap:8px;
}
.bub{max-width:82%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.55;animation:bubIn .35s cubic-bezier(.22,1.2,.36,1)}
@keyframes bubIn{from{opacity:0;transform:translateY(8px)}}
.bub.me{align-self:flex-end;background:linear-gradient(140deg,#5B7BFF,#4A63E8);color:#fff;border-bottom-right-radius:5px}
.bub.bot{align-self:flex-start;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);border-bottom-left-radius:5px;color:#DCE4FA}
.va-transcript::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);background-clip:content-box}

/* boot screen of the assistant app */
.va-boot{position:absolute;inset:0;z-index:9;display:grid;place-items:center;background:#0A0F1F}
.va-boot.out{animation:fadeOut .5s forwards}
.va-boot-in{display:flex;flex-direction:column;align-items:center;gap:18px}
.va-boot .bm{width:66px;height:66px;border-radius:20px;background:linear-gradient(140deg,#5B7BFF,#12BFA8);display:grid;place-items:center;animation:breathe 1.6s ease-in-out infinite;box-shadow:0 14px 44px rgba(91,123,255,.5)}
.va-boot p{font-size:12.5px;color:#8FA0C7;font-weight:600;letter-spacing:.09em;text-transform:uppercase}
.va-boot .bar{width:180px;height:3px;background:rgba(255,255,255,.12)}
.va-boot .bar i{background:linear-gradient(90deg,#5B7BFF,#12BFA8);animation:loadBar 1.5s cubic-bezier(.5,0,.2,1) forwards}
@keyframes loadBar{to{width:100%}}

@media(max-width:680px){
  .va-transcript{max-height:15vh}
  .bot{width:min(210px,52vw)}
  .wave{height:56px}
  .ptt{width:74px;height:74px}
  .ptt-ring{width:74px;height:74px}
  .va-chips{max-height:38px;overflow:hidden}
}
@media(max-height:620px){
  .bot{width:170px}
  .wave{height:44px}
  .va-transcript{display:none}
}

/* ================= PHASE 2 ================= */

/* ---------- THEMES ---------- */
.theming, .theming *{transition:background-color .5s ease,color .45s ease,border-color .5s ease,box-shadow .5s ease !important}

[data-theme="green"]{
  --canvas:#EFF6F1; --surface:#FFFFFF; --surface-2:#F6FBF7; --hover:#EBF4EE; --line:#DCE9E1;
  --ink:#10201A; --ink-2:#3B5348; --ink-3:#759486;
}
[data-theme="dark"]{
  --canvas:#0C1520; --surface:#141F2E; --surface-2:#101B29; --hover:#1B2939; --line:#243448;
  --ink:#E9F0F6; --ink-2:#B9C7D3; --ink-3:#7E92A3;
  --teal-soft:#10302D; --blue-soft:#152547; --violet-soft:#231F45; --amber-soft:#33270F; --rose-soft:#381A20; --green-soft:#0F2E25;
  --sh-1:0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.28);
  --sh-2:0 12px 40px rgba(0,0,0,.5);
}
[data-theme="dark"] .t-green{color:#4CDFA6}
[data-theme="dark"] .t-blue{color:#8AA8FF}
[data-theme="dark"] .t-amber{color:#F3B45C}
[data-theme="dark"] .t-rose{color:#FF8B94}
[data-theme="dark"] .t-teal{color:#4ED9CF}
[data-theme="dark"] .t-violet{color:#AC9FFF}
[data-theme="dark"] .t-gray{color:var(--ink-3)}
[data-theme="dark"] .sk{background:linear-gradient(100deg,#1A2838 30%,#22334A 50%,#1A2838 70%);background-size:220% 100%}
[data-theme="dark"] .nav-item.on{background:#E9F0F6;color:#0C1520}
[data-theme="dark"] .btn-primary{background:#E9F0F6;color:#0C1520}
[data-theme="dark"] .btn-primary:hover{background:#fff}
[data-theme="dark"] .search kbd{border-color:var(--line)}
[data-noanim] *{animation:none !important;transition:none !important}

/* ---------- CINEMATIC BUTTON ---------- */
.icon-btn.cine-on{background:var(--teal);border-color:var(--teal);color:#fff}
.icon-btn.cine-on::after{content:"";position:absolute;inset:-4px;border-radius:15px;border:2px solid var(--teal);animation:cineP 1.8s ease-out infinite;pointer-events:none}
@keyframes cineP{0%{transform:scale(.9);opacity:.9}100%{transform:scale(1.28);opacity:0}}

/* ---------- REPORT VIEWER ---------- */
.rp-head{position:relative;overflow:hidden;border-radius:16px;padding:22px 24px;color:#fff;
  background:linear-gradient(135deg,#0E1D2B,#153650 62%,#12303F)}
.rp-water{position:absolute;right:-24px;bottom:-38px;opacity:.08;pointer-events:none}
.rp-water svg{width:190px;height:190px}
.rp-eyebrow{font-size:10px;font-weight:700;letter-spacing:.18em;opacity:.6}
.rp-title{font-family:var(--disp);font-size:21px;font-weight:700;letter-spacing:-.4px;margin-top:4px}
.rp-meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:11px;opacity:.82;font-family:var(--mono)}
.rp-badge{display:inline-flex;align-items:center;gap:6px;background:#16A97C;color:#fff;font-size:11px;font-weight:700;
  padding:6px 12px;border-radius:20px;box-shadow:0 6px 18px rgba(22,169,124,.4);animation:pop .5s cubic-bezier(.22,1.4,.36,1)}
.rp-sec{margin-top:24px}
.rp-sec-h{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.rp-sec-h .n{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--teal);background:var(--teal-soft);
  padding:3px 8px;border-radius:6px;letter-spacing:.06em}
.rp-sec-h b{font-family:var(--disp);font-size:14.5px;font-weight:600;letter-spacing:-.1px}
.rp-summary{font-size:13.5px;line-height:1.75;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line);
  border-left:3px solid var(--teal);border-radius:12px;padding:15px 17px}
.rp-find{display:flex;gap:11px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;align-items:flex-start}
.rp-find .fi{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;flex:none}
.rp-find p{font-size:13px;color:var(--ink-2);line-height:1.55}
.rp-next{background:var(--amber-soft);border:1px solid color-mix(in srgb, var(--amber) 26%, transparent);
  border-radius:13px;padding:14px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.rp-sig{margin-top:26px;border:2px dashed var(--line);border-radius:16px;padding:22px;text-align:center;background:var(--surface-2)}
.rp-sig .sig-empty{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--ink-3);font-size:13px}
.rp-sig .sig-done{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;text-align:left}
.rp-sig .sig-done img{height:66px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.12))}
[data-theme="dark"] .rp-sig .sig-done img{filter:invert(.92) hue-rotate(180deg)}
.rp-sig .sig-done .sd-meta{font-size:12px;color:var(--ink-3);line-height:1.6}
.rp-foot-note{margin-top:18px;font-size:10.5px;color:var(--ink-3);text-align:center;font-family:var(--mono);letter-spacing:.04em}

/* ---------- SIGNATURE PAD ---------- */
.sig-wrap{position:relative;border:2px dashed var(--line);border-radius:16px;background:var(--surface-2);overflow:hidden}
#sigPad{display:block;width:100%;height:230px;touch-action:none;cursor:crosshair}
.sig-base{position:absolute;left:9%;right:9%;bottom:54px;border-bottom:1.5px solid var(--line);pointer-events:none}
.sig-x{position:absolute;left:9%;bottom:60px;color:var(--ink-3);font-size:13px;pointer-events:none}
.sig-hint{position:absolute;inset:0;display:grid;place-items:center;color:#B5C4CE;font-family:var(--disp);
  font-size:17px;font-weight:600;letter-spacing:.02em;pointer-events:none;transition:opacity .3s}
[data-theme="dark"] .sig-hint{color:#3D5065}
.sig-meta{margin-top:12px;font-size:12px;color:var(--ink-3);line-height:1.6}

/* ---------- VOICE NOTES ---------- */
.vn-idle{display:flex;flex-direction:column;align-items:center;gap:14px;padding:26px 0}
.vn-start{width:92px;height:92px;border-radius:50%;display:grid;place-items:center;color:#fff;
  background:linear-gradient(150deg,var(--violet),#8B6BFF);box-shadow:0 12px 36px rgba(109,91,227,.42);transition:.2s}
.vn-start:hover{transform:scale(1.06)}
.vn-rec{display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px 0}
.vn-dot{width:70px;height:70px;border-radius:50%;background:var(--rose);display:grid;place-items:center;position:relative}
.vn-dot::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:2px solid var(--rose);animation:cineP 1.4s ease-out infinite}
.vn-dot i{width:22px;height:22px;border-radius:6px;background:#fff;display:block}
.vn-timer{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:.06em}
.vn-wave{display:flex;align-items:center;gap:3px;height:44px}
.vn-wave i{width:4px;border-radius:20px;background:var(--violet);height:5px;transition:height .1s linear}

/* ---------- VA ASSIST SHEET ---------- */
.va-tools-btn{height:38px;padding:0 14px;border-radius:12px;display:flex;align-items:center;gap:7px;margin-left:10px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);color:#C7D2F0;font-weight:600;font-size:12px;transition:.18s}
.va-tools-btn:hover{background:rgba(255,255,255,.17);color:#fff;transform:translateY(-1px)}
.va-sheet{position:absolute;left:0;right:0;bottom:0;top:68px;z-index:6;display:flex;flex-direction:column;
  background:var(--canvas);color:var(--ink);border-radius:26px 26px 0 0;box-shadow:0 -22px 70px rgba(0,0,0,.45);
  animation:sheetUp .45s cubic-bezier(.22,1,.36,1)}
@keyframes sheetUp{from{transform:translateY(70px);opacity:0}}
.va-sheet.out{animation:sheetDn .3s forwards}
@keyframes sheetDn{to{transform:translateY(70px);opacity:0}}
.va-sheet-head{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line);flex:none}
.va-sheet-head h4{font-family:var(--disp);font-size:15.5px;font-weight:600;letter-spacing:-.2px}
.va-sheet-head .sub{font-size:11.5px;color:var(--ink-3)}
.va-sheet-body{flex:1;overflow-y:auto;padding:18px 20px 34px}
.va-tool{display:flex;align-items:center;gap:12px;padding:14px 15px;text-align:left;transition:.18s;cursor:pointer;width:100%}
.va-tool:hover{transform:translateY(-2px);box-shadow:var(--sh-2);border-color:transparent}
.va-tool .vt-i{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none}
.va-tool b{font-size:13.5px;display:block}
.va-tool span{font-size:11.5px;color:var(--ink-3);display:block;margin-top:2px}
.va-tool .chev{margin-left:auto;color:var(--ink-3);flex:none}

/* ---------- MISC PHASE 2 ---------- */
.li.new{animation:liNew .55s cubic-bezier(.22,1,.36,1)}
@keyframes liNew{from{opacity:0;transform:translateX(-16px)}}
.theme-card{padding:14px;cursor:pointer;transition:.2s;border-radius:16px;border:2px solid var(--line);background:var(--surface)}
.theme-card:hover{transform:translateY(-3px);box-shadow:var(--sh-2)}
.theme-card.on{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-soft)}
.theme-prev{height:74px;border-radius:11px;overflow:hidden;display:flex;flex-direction:column;margin-bottom:11px;border:1px solid rgba(0,0,0,.06)}
.theme-prev .tp-top{height:16px;display:flex;align-items:center;gap:4px;padding:0 8px}
.theme-prev .tp-top i{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.6)}
.theme-prev .tp-body{flex:1;display:flex;gap:5px;padding:7px}
.theme-prev .tp-body i{border-radius:5px;flex:1}
.accent-dot{width:42px;height:42px;border-radius:14px;position:relative;transition:.18s;cursor:pointer;border:none}
.accent-dot:hover{transform:translateY(-3px) scale(1.05)}
.accent-dot.on::after{content:"";position:absolute;inset:-5px;border-radius:18px;border:2.5px solid var(--ink);opacity:.85}
.notif-row{display:flex;gap:11px;padding:11px 12px;border-radius:13px;cursor:pointer;transition:.16s;align-items:flex-start;position:relative}
.notif-row:hover{background:var(--hover);transform:translateX(3px)}
.notif-row .unread{position:absolute;right:12px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--teal)}

/* ---------- light defaults for new vars ---------- */
:root{--surface-2:#FAFCFD;--hover:#F5F9FA}

/* ---------- dark theme: rewrite the hardcoded light surfaces ---------- */
[data-theme="dark"] body{background:var(--canvas)}
[data-theme="dark"] .sidebar,[data-theme="dark"] .card,[data-theme="dark"] .modal{background:var(--surface)}
[data-theme="dark"] .topbar{background:rgba(20,31,46,.86)}
[data-theme="dark"] thead th{background:var(--surface-2);color:var(--ink-3)}
[data-theme="dark"] tbody td{border-bottom-color:var(--line)}
[data-theme="dark"] tbody tr:hover{background:var(--hover)}
[data-theme="dark"] .li:hover,[data-theme="dark"] .nav-item:hover,[data-theme="dark"] .user-chip:hover,[data-theme="dark"] .notif-row:hover{background:var(--hover)}
[data-theme="dark"] .m-foot,[data-theme="dark"] .step-rail{background:var(--surface-2)}
[data-theme="dark"] .icon-btn,[data-theme="dark"] .btn-ghost,[data-theme="dark"] .fld,
[data-theme="dark"] .f input,[data-theme="dark"] .f select,[data-theme="dark"] .f textarea,
[data-theme="dark"] .seg button.on,[data-theme="dark"] .search kbd,[data-theme="dark"] .qa button,
[data-theme="dark"] .theme-card{background:var(--surface-2);border-color:var(--line);color:var(--ink-2)}
[data-theme="dark"] .f input,[data-theme="dark"] .f select,[data-theme="dark"] .f textarea{color:var(--ink)}
[data-theme="dark"] .seg button.on{color:var(--ink)}
[data-theme="dark"] .search:focus-within{background:var(--surface-2)}
[data-theme="dark"] .icon-btn:hover,[data-theme="dark"] .btn-ghost:hover{border-color:#33465F;color:var(--ink)}
[data-theme="dark"] .sig-wrap,[data-theme="dark"] .rp-summary{background:var(--surface-2)}
[data-theme="dark"] .bub.bot{background:rgba(255,255,255,.07)}
[data-theme="dark"] .ai-note{background:linear-gradient(100deg,#221E42,#1B1C36);border-color:#2E2A55}
[data-theme="dark"] .ai-note h5{color:#B8ADFF}
[data-theme="dark"] .ai-note p{color:#9C97C4}
[data-theme="dark"] .chip{background:#2A2652;border-color:#3A3470;color:#B8ADFF}
[data-theme="dark"] .avatar{background:#22314A}
[data-theme="dark"] .empty svg{opacity:.3}

/* ================= PHASE 3 ================= */

/* ---------- NEW THEMES ---------- */
[data-theme="softteal"]{
  --canvas:#EEF6F6; --surface:#FFFFFF; --surface-2:#F5FBFB; --hover:#E7F3F3; --line:#D9E9E9;
  --ink:#0E2221; --ink-2:#3A5654; --ink-3:#71918F;
}
[data-theme="warm"]{
  --canvas:#F6F3EE; --surface:#FFFFFF; --surface-2:#FBF8F4; --hover:#F1ECE4; --line:#E6DFD4;
  --ink:#241E17; --ink-2:#4E463C; --ink-3:#8A7F70;
}
[data-theme="midnight"]{
  --canvas:#0A0E14; --surface:#12181F; --surface-2:#0E141B; --hover:#1A222C; --line:#222D39;
  --ink:#E6EEF5; --ink-2:#B3C2CF; --ink-3:#75879A;
  --teal-soft:#0B2E33; --blue-soft:#0F2340; --violet-soft:#1E1B3C; --amber-soft:#2E2410; --rose-soft:#331A1E; --green-soft:#0C2A22;
  --sh-1:0 1px 2px rgba(0,0,0,.4), 0 4px 18px rgba(0,0,0,.34);
  --sh-2:0 14px 46px rgba(0,0,0,.58);
}

/* structural fixes shared by every dark theme */
[data-dark] body{background:var(--canvas)}
[data-dark] .sidebar,[data-dark] .card,[data-dark] .modal{background:var(--surface)}
[data-dark] .topbar{background:color-mix(in srgb, var(--surface) 86%, transparent)}
[data-dark] thead th{background:var(--surface-2);color:var(--ink-3)}
[data-dark] tbody td{border-bottom-color:var(--line)}
[data-dark] tbody tr:hover{background:var(--hover)}
[data-dark] .li:hover,[data-dark] .nav-item:hover,[data-dark] .user-chip:hover,[data-dark] .notif-row:hover{background:var(--hover)}
[data-dark] .m-foot,[data-dark] .step-rail{background:var(--surface-2)}
[data-dark] .icon-btn,[data-dark] .btn-ghost,[data-dark] .fld,
[data-dark] .f input,[data-dark] .f select,[data-dark] .f textarea,
[data-dark] .seg button.on,[data-dark] .search kbd,[data-dark] .qa button,
[data-dark] .theme-card{background:var(--surface-2);border-color:var(--line);color:var(--ink-2)}
[data-dark] .f input,[data-dark] .f select,[data-dark] .f textarea,[data-dark] .seg button.on{color:var(--ink)}
[data-dark] .search:focus-within{background:var(--surface-2)}
[data-dark] .icon-btn:hover,[data-dark] .btn-ghost:hover{border-color:color-mix(in srgb, var(--ink-3) 55%, transparent);color:var(--ink)}
[data-dark] .sig-wrap,[data-dark] .rp-summary,[data-dark] .rp-sig{background:var(--surface-2)}
[data-dark] .bub.bot{background:rgba(255,255,255,.07)}
[data-dark] .ai-note{background:linear-gradient(100deg,color-mix(in srgb, var(--violet) 20%, var(--surface)),var(--surface-2));border-color:color-mix(in srgb, var(--violet) 34%, transparent)}
[data-dark] .ai-note h5{color:#B8ADFF}
[data-dark] .ai-note p{color:var(--ink-2)}
[data-dark] .chip{background:color-mix(in srgb, var(--violet) 26%, transparent);border-color:color-mix(in srgb, var(--violet) 40%, transparent);color:#C6BCFF}
[data-dark] .avatar{background:var(--hover)}
[data-dark] .nav-item.on{background:var(--ink);color:var(--surface)}
[data-dark] .btn-primary{background:var(--ink);color:var(--surface)}
[data-dark] .btn-primary:hover{background:#fff}
[data-dark] .sk{background:linear-gradient(100deg,var(--surface-2) 30%,var(--hover) 50%,var(--surface-2) 70%);background-size:220% 100%}
[data-dark] .t-green{color:#4CDFA6}[data-dark] .t-blue{color:#8AA8FF}[data-dark] .t-amber{color:#F3B45C}
[data-dark] .t-rose{color:#FF8B94}[data-dark] .t-teal{color:#4ED9CF}[data-dark] .t-violet{color:#AC9FFF}
[data-dark] .t-gray{color:var(--ink-3)}
[data-dark] #chatBody{background:var(--surface-2)}
[data-dark] .empty svg{opacity:.3}
[data-dark] .toast{background:var(--surface);border:1px solid var(--line)}
[data-dark] .rp-head{background:linear-gradient(135deg,#0A121A,#12293B 62%,#0E2530)}

/* accent-aware focus + links */
.f input:focus,.f select:focus,.f textarea:focus,.search:focus-within,.fld:focus-within{border-color:var(--teal)}
.card-head .lnk{color:var(--teal)}

/* ---------- CINEMATIC DISABLED ---------- */
.icon-btn.cine-off{opacity:.42;cursor:not-allowed}
.icon-btn.cine-off:hover{transform:none;box-shadow:none;border-color:var(--line)}

/* ---------- DOWNLOAD CONFIRMATION ---------- */
.dl-modal{max-width:380px !important}
.dl-body{padding:30px 26px;text-align:center}
.dl-ring{width:66px;height:66px;margin:0 auto 16px;position:relative}
.dl-ring svg{transform:rotate(-90deg)}
.dl-ico{position:absolute;inset:0;display:grid;place-items:center;color:var(--teal)}
.dl-bar{height:5px;border-radius:20px;background:var(--canvas);overflow:hidden;margin:16px auto 0;max-width:210px}
.dl-bar i{display:block;height:100%;width:0;border-radius:20px;background:var(--teal);transition:width 1s cubic-bezier(.3,.9,.3,1)}
.dl-ok{width:66px;height:66px;border-radius:50%;background:var(--green-soft);display:grid;place-items:center;margin:0 auto 14px;animation:pop .5s cubic-bezier(.22,1.4,.36,1)}
.dl-ok div{width:44px;height:44px;border-radius:50%;background:var(--green);display:grid;place-items:center}
.dl-body h3{font-family:var(--disp);font-size:17px;font-weight:600;letter-spacing:-.2px}
.dl-body p{font-size:12.5px;color:var(--ink-3);margin-top:5px;font-family:var(--mono)}

/* ---------- ANATOMY / BODY MAP ---------- */
.body-map{display:grid;grid-template-columns:1fr 220px;gap:16px;align-items:center}
.body-stage{
  position:relative;border-radius:16px;padding:12px;min-height:400px;display:grid;place-items:center;overflow:hidden;
  background:radial-gradient(560px 380px at 50% 18%, color-mix(in srgb, var(--teal) 9%, var(--surface)), var(--surface-2));
  border:1px solid var(--line);
}
.body-stage::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(color-mix(in srgb, var(--ink-3) 14%, transparent) 1px,transparent 1px),
                   linear-gradient(90deg,color-mix(in srgb, var(--ink-3) 14%, transparent) 1px,transparent 1px);
  background-size:30px 30px;
  mask-image:radial-gradient(circle at 50% 50%,#000 25%,transparent 76%);
}
.anat{width:min(260px,90%);height:auto;overflow:visible;position:relative;z-index:2}
#anatBody{animation:breathe2 4.6s ease-in-out infinite;transform-origin:150px 300px}
@keyframes breathe2{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}
#anatScan{animation:scanDown 4.2s cubic-bezier(.5,0,.5,1) infinite}
@keyframes scanDown{0%{transform:translateY(0);opacity:0}8%{opacity:.9}92%{opacity:.9}100%{transform:translateY(470px);opacity:0}}
.anat .zone{cursor:pointer;transition:.2s}
.anat .zone:hover .zdot{r:11}
.anat .zone:hover .zhalo{opacity:.5}
.zpulse{animation:zp 2.4s ease-out infinite}
.zpulse:nth-of-type(2){animation-delay:.6s}
.zpulse:nth-of-type(3){animation-delay:1.2s}
@keyframes zp{0%{r:6;opacity:.65}100%{r:24;opacity:0}}
.anat-marker{animation:markSpin 22s linear infinite;transform-origin:150px 260px}
@keyframes markSpin{to{transform:rotate(360deg)}}
.vitals-side{display:flex;flex-direction:column;gap:8px}
.vital-chip{
  display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:12px;border:1px solid var(--line);
  background:var(--surface);transition:.18s;cursor:pointer;
}
.vital-chip:hover{transform:translateX(3px);box-shadow:var(--sh-1);border-color:color-mix(in srgb, var(--teal) 45%, transparent)}
.vital-chip .vc-i{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;flex:none}
.vital-chip b{font-size:12.5px;display:block;line-height:1.25}
.vital-chip span{font-size:10.5px;color:var(--ink-3)}
.vital-chip .vc-v{margin-left:auto;font-family:var(--mono);font-size:11.5px;font-weight:600;flex:none}
@media(max-width:820px){
  .body-map{grid-template-columns:1fr}
  .body-stage{min-height:330px}
}

/* ---------- APPOINTMENT / LAB DETAIL ---------- */
.det-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.det{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.det .dl{font-size:10.5px;color:var(--ink-3);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.det .dv{font-size:13px;font-weight:600;margin-top:3px}
@media(max-width:680px){.det-grid{grid-template-columns:1fr 1fr}}
.tl-mini{display:flex;gap:0;margin-top:6px;flex-wrap:wrap}
.tl-step{flex:1;min-width:96px;text-align:center;position:relative;padding-top:22px}
.tl-step::before{content:"";position:absolute;top:6px;left:50%;width:100%;height:2px;background:var(--line)}
.tl-step:last-child::before{display:none}
.tl-step i{position:absolute;top:0;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;
  background:var(--surface);border:2px solid var(--line);z-index:2}
.tl-step.done i{background:var(--teal);border-color:var(--teal)}
.tl-step.now i{border-color:var(--teal);animation:zpBlink 1.4s ease-in-out infinite}
@keyframes zpBlink{50%{box-shadow:0 0 0 5px color-mix(in srgb, var(--teal) 22%, transparent)}}
.tl-step b{font-size:11.5px;display:block;font-weight:600}
.tl-step span{font-size:10px;color:var(--ink-3);font-family:var(--mono)}
.res-flag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;white-space:nowrap}

/* ---------- CLICKABLE HINTS ---------- */
.clickable{cursor:pointer;transition:.18s}
.clickable:hover{transform:translateY(-2px);box-shadow:var(--sh-2)}
.lnk-inline{color:var(--teal);font-weight:600;cursor:pointer}
.lnk-inline:hover{text-decoration:underline}
.tag.clickable:hover{transform:translateY(-1px);filter:brightness(.96)}
.accent-dot{width:38px;height:38px;border-radius:13px}

/* modals must sit above the assistant app (charts are clickable there too) */
.overlay{z-index:350}

/* Dark Navy: re-assert its surfaces (a later :root default was overriding them) */
[data-theme="dark"]{
  --canvas:#0C1520; --surface:#141F2E; --surface-2:#101B29; --hover:#1B2939; --line:#243448;
  --ink:#E9F0F6; --ink-2:#B9C7D3; --ink-3:#7E92A3;
}

/* ================= PHASE 4 — POLISH & INTERACTION ================= */

/* ---------- MICRO INTERACTIONS ---------- */
.btn,.icon-btn,.nav-item,.seg button,.va-chip,.accent-dot,.theme-card,.vital-chip{will-change:transform}
.btn:active,.icon-btn:active,.seg button:active,.qa button:active{transform:scale(.965)}
.btn:active{transition:transform .06s}
.icon-btn:active svg{animation:iconTap .3s cubic-bezier(.22,1.4,.36,1)}
@keyframes iconTap{40%{transform:scale(.82)}100%{transform:scale(1)}}
.kpi{transition:transform .22s cubic-bezier(.22,1,.36,1),box-shadow .22s,border-color .22s}
.kpi:active{transform:scale(.985)}
.kpi.opening{animation:kpiOpen .34s cubic-bezier(.3,1,.4,1)}
@keyframes kpiOpen{40%{transform:scale(1.025);box-shadow:var(--sh-2)}100%{transform:scale(1)}}
.card{transition:transform .22s cubic-bezier(.22,1,.36,1),box-shadow .22s,border-color .22s,background-color .3s}
.nav-item.on::after{animation:navPop .34s cubic-bezier(.22,1.4,.36,1)}
@keyframes navPop{from{height:0;opacity:0}}
.glow-ok{animation:glowOk 1.1s ease-out}
@keyframes glowOk{0%{box-shadow:0 0 0 0 color-mix(in srgb, var(--green) 55%, transparent)}100%{box-shadow:0 0 0 16px rgba(0,0,0,0)}}
.tabs button{position:relative}
.tabs button::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;background:var(--ink);
  transform:scaleX(0);transform-origin:center;transition:transform .28s cubic-bezier(.22,1,.36,1)}
.tabs button.on::after{transform:scaleX(1)}
.tabs button.on{border-bottom-color:transparent !important}
.tab-pane{animation:tabIn .34s cubic-bezier(.22,1,.36,1)}
@keyframes tabIn{from{opacity:0;transform:translateX(12px)}}
.bar i{transition:width 1.05s cubic-bezier(.22,1,.36,1)}
select{transition:.16s}
.fld select:focus{transform:translateY(-1px)}
.li,.notif-row,.vital-chip,tbody tr{transition:background .16s,transform .16s,box-shadow .16s}

/* ---------- CHART TOOLBAR + TOOLTIP ---------- */
.chart-card{position:relative}
.ch-tools{
  position:absolute;top:12px;right:12px;display:flex;gap:5px;opacity:0;transform:translateY(-5px);
  transition:.22s cubic-bezier(.22,1,.36,1);z-index:3;
}
.chart-card:hover .ch-tools{opacity:1;transform:none}
.ch-tools button{
  width:29px;height:29px;border-radius:9px;display:grid;place-items:center;color:var(--ink-3);
  background:var(--surface-2);border:1px solid var(--line);transition:.16s;
}
.ch-tools button:hover{color:var(--teal);border-color:var(--teal);transform:translateY(-2px)}
.ch-tools button.pinned{background:var(--teal);color:#fff;border-color:var(--teal)}
.chart-card .expand{display:none}
#tip{
  position:fixed;z-index:900;pointer-events:none;background:var(--ink);color:var(--surface);
  padding:6px 10px;border-radius:9px;font-size:11.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);
  opacity:0;transform:translateY(4px);transition:opacity .14s,transform .14s;white-space:nowrap;font-family:var(--mono);
}
#tip.on{opacity:1;transform:none}
svg rect[fill],svg circle,svg path{transition:opacity .15s}
.chart-card svg:hover rect:hover,.chart-card svg:hover circle:hover{opacity:1 !important;filter:brightness(1.08)}

/* ---------- GLOBAL SEARCH ---------- */
.search-wrap{position:relative;flex:1;max-width:440px}
#searchPanel{
  position:absolute;top:calc(100% + 9px);left:0;right:0;z-index:80;background:var(--surface);
  border:1px solid var(--line);border-radius:16px;box-shadow:0 22px 60px rgba(6,18,27,.22);
  max-height:min(460px,62vh);overflow-y:auto;padding:7px;display:none;
  animation:dropIn .22s cubic-bezier(.22,1,.36,1);
}
#searchPanel.on{display:block}
@keyframes dropIn{from{opacity:0;transform:translateY(-7px) scale(.985)}}
.sr-group{font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);
  padding:10px 10px 5px;display:flex;align-items:center;gap:7px}
.sr-group span{flex:1;height:1px;background:var(--line)}
.sr{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:11px;cursor:pointer;transition:.14s}
.sr:hover,.sr.sel{background:var(--hover)}
.sr.sel{box-shadow:inset 0 0 0 1.5px var(--teal)}
.sr-i{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;flex:none}
.sr-t{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-s{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr mark{background:color-mix(in srgb, var(--teal) 24%, transparent);color:inherit;border-radius:3px;padding:0 1px;font-weight:700}
.sr-k{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--ink-3);flex:none}
.sr-empty{padding:26px 14px;text-align:center;color:var(--ink-3);font-size:12.5px}
.sr-foot{display:flex;gap:12px;padding:9px 11px;border-top:1px solid var(--line);margin-top:5px;
  font-size:10.5px;color:var(--ink-3);font-family:var(--mono)}
.sr-foot b{color:var(--ink-2);font-weight:600}

/* ---------- MULTI SELECT ---------- */
.cbx{
  width:17px;height:17px;border-radius:5px;border:1.8px solid var(--line);display:grid;place-items:center;
  background:var(--surface);transition:.16s;flex:none;cursor:pointer;
}
.cbx:hover{border-color:var(--teal)}
.cbx.on{background:var(--teal);border-color:var(--teal)}
.cbx svg{opacity:0;transform:scale(.5);transition:.18s cubic-bezier(.22,1.4,.36,1)}
.cbx.on svg{opacity:1;transform:none}
tr.picked{background:color-mix(in srgb, var(--teal) 7%, transparent) !important}
tr.picked td:first-child{box-shadow:inset 3px 0 0 var(--teal)}
#selBar{
  position:fixed;left:50%;bottom:26px;transform:translate(-50%,90px);z-index:120;
  display:flex;align-items:center;gap:8px;padding:9px 10px 9px 16px;border-radius:16px;
  background:var(--ink);color:var(--surface);box-shadow:0 20px 50px rgba(6,18,27,.4);
  opacity:0;transition:.34s cubic-bezier(.22,1,.36,1);pointer-events:none;max-width:calc(100vw - 32px);flex-wrap:wrap;
}
#selBar.on{transform:translate(-50%,0);opacity:1;pointer-events:auto}
#selBar .cnt{font-weight:700;font-size:13px;white-space:nowrap}
#selBar .cnt b{font-family:var(--mono)}
#selBar .sep{width:1px;height:22px;background:rgba(255,255,255,.18);margin:0 3px}
#selBar button{
  height:33px;padding:0 12px;border-radius:10px;font-size:12.5px;font-weight:600;
  background:rgba(255,255,255,.1);color:inherit;transition:.16s;display:flex;align-items:center;gap:6px;white-space:nowrap;
}
#selBar button:hover{background:rgba(255,255,255,.22);transform:translateY(-1px)}
#selBar button.x{width:33px;padding:0;justify-content:center}
[data-dark] #selBar{background:var(--surface-2);border:1px solid var(--line)}

/* ---------- SPLIT VIEW ---------- */
.main{position:relative}
#splitDock{
  flex:0 0 var(--split-w,420px);width:var(--split-w,420px);border-left:1px solid var(--line);
  background:var(--surface-2);display:flex;flex-direction:column;overflow:hidden;
  animation:splitIn .38s cubic-bezier(.22,1,.36,1);
}
@keyframes splitIn{from{flex-basis:0;width:0;opacity:0}}
.split-head{display:flex;align-items:center;gap:9px;padding:12px 14px;border-bottom:1px solid var(--line);flex:none}
.split-head h4{font-family:var(--disp);font-size:13.5px;font-weight:600;flex:1}
.split-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
.sp-panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  animation:panelIn .34s cubic-bezier(.22,1,.36,1)}
@keyframes panelIn{from{opacity:0;transform:translateY(12px)}}
.sp-head{display:flex;align-items:center;gap:9px;padding:11px 13px;border-bottom:1px solid var(--line)}
.sp-head .si{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;flex:none}
.sp-head b{font-size:12.5px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-head button{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;color:var(--ink-3);flex:none;transition:.16s}
.sp-head button:hover{background:var(--hover);color:var(--ink)}
.sp-body{padding:13px}
#splitGrip{
  width:6px;flex:none;cursor:col-resize;background:transparent;position:relative;
}
#splitGrip::after{content:"";position:absolute;inset:0 2px;border-radius:20px;background:var(--line);transition:.16s}
#splitGrip:hover::after{background:var(--teal)}
@media(max-width:1100px){
  #splitDock{position:fixed;inset:auto 0 0 0;width:100% !important;flex-basis:auto;height:58dvh;
    border-left:none;border-top:1px solid var(--line);z-index:70;border-radius:20px 20px 0 0;box-shadow:0 -20px 60px rgba(0,0,0,.2)}
  #splitGrip{display:none}
}

/* ---------- COMPARE ---------- */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cmp-col{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--surface-2)}
.cmp-head{padding:13px;display:flex;align-items:center;gap:10px;background:var(--surface);border-bottom:1px solid var(--line)}
.cmp-scroll{max-height:52vh;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:12px}
.cmp-row{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px}
.cmp-row .l{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px}
.cmp-diff{font-family:var(--mono);font-size:11px;font-weight:700;padding:1px 6px;border-radius:5px}
@media(max-width:760px){.cmp{grid-template-columns:1fr}}

/* ---------- WIDGET DRAG ---------- */
.widget-drag{cursor:grab}
.widget-drag:active{cursor:grabbing}
.widget-ghost{opacity:.32;transform:scale(.97)}
.widget-over{box-shadow:0 0 0 2px var(--teal),var(--sh-2) !important}
.drag-hint{font-size:11px;color:var(--ink-3);display:flex;align-items:center;gap:6px}

/* ---------- FAVOURITES / RECENT ---------- */
.star{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--ink-3);transition:.18s;flex:none}
.star:hover{background:var(--hover);color:var(--amber)}
.star.on{color:var(--amber)}
.star.on svg{fill:var(--amber);animation:starPop .4s cubic-bezier(.22,1.5,.36,1)}
@keyframes starPop{40%{transform:scale(1.28) rotate(9deg)}}

/* ---------- FULLSCREEN REPORT ---------- */
.overlay.full{padding:0}
.modal.full{
  max-width:none !important;width:100%;height:100dvh;max-height:100dvh;border-radius:0;
  animation:fsIn .38s cubic-bezier(.22,1,.36,1);
}
@keyframes fsIn{from{opacity:0;transform:scale(.985)}}
.modal.full .m-body{display:grid;grid-template-columns:212px 1fr;gap:0;padding:0;overflow:hidden}
.rp-nav{border-right:1px solid var(--line);padding:16px 12px;overflow-y:auto;background:var(--surface-2)}
.rp-nav .t{font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);padding:0 10px 9px}
.rp-nav button{
  display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border-radius:10px;
  font-size:12.5px;font-weight:500;color:var(--ink-2);transition:.16s;text-align:left;
}
.rp-nav button:hover{background:var(--hover);color:var(--ink)}
.rp-nav button.on{background:var(--teal-soft);color:var(--teal);font-weight:600}
.rp-nav button i{font-family:var(--mono);font-size:10px;opacity:.65;font-style:normal}
.rp-scroll{overflow-y:auto;padding:24px 28px 60px;scroll-behavior:smooth}
@media(max-width:900px){
  .modal.full .m-body{grid-template-columns:1fr}
  .rp-nav{display:none}
  .rp-scroll{padding:18px 16px 50px}
}

/* ---------- ADVANCED FILTERS ---------- */
.filt-adv{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;padding:15px 16px;
  background:var(--surface);border:1px solid var(--line);border-radius:16px;margin-bottom:14px;
  animation:dropIn .26s cubic-bezier(.22,1,.36,1);
}
.filt-adv .fl{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--ink-2);margin-bottom:9px;display:flex;justify-content:space-between}
.filt-adv .fl b{font-family:var(--mono);color:var(--teal)}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:20px;background:var(--canvas);outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--teal);cursor:grab;
  border:3px solid var(--surface);box-shadow:0 2px 8px rgba(0,0,0,.2);transition:transform .16s;
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.16)}
input[type=range]::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(.94)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--teal);border:3px solid var(--surface);cursor:grab}
.chk-row{display:flex;flex-wrap:wrap;gap:7px}
.chk{
  display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:9px;border:1px solid var(--line);
  background:var(--surface);font-size:12px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.16s;
}
.chk:hover{border-color:var(--teal);color:var(--ink)}
.chk.on{background:var(--teal-soft);border-color:var(--teal);color:var(--teal)}
.chk .cbx{width:14px;height:14px;border-radius:4px}
.redraw{animation:redraw .5s cubic-bezier(.22,1,.36,1)}
@keyframes redraw{from{opacity:0;transform:scale(.98)}}

/* ---------- TIMELINE FILTERS ---------- */
.tl-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tl-item{animation:tlIn .38s cubic-bezier(.22,1,.36,1) backwards}
@keyframes tlIn{from{opacity:0;transform:translateX(-14px)}}

/* ---------- MENU (export etc) ---------- */
.menu{
  position:fixed;z-index:920;background:var(--surface);border:1px solid var(--line);border-radius:13px;
  box-shadow:0 18px 48px rgba(6,18,27,.24);padding:6px;min-width:184px;animation:dropIn .2s cubic-bezier(.22,1,.36,1);
}
.menu button{
  display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border-radius:9px;
  font-size:13px;font-weight:500;color:var(--ink-2);transition:.14s;text-align:left;
}
.menu button:hover{background:var(--hover);color:var(--ink)}
.menu .mh{font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);padding:8px 11px 5px}

/* ================= PHASE 5 — MY WORKSPACE ================= */

/* ---------- header ---------- */
.ws-hero{
  display:flex;align-items:center;gap:18px;padding:20px 22px;border-radius:20px;margin-bottom:16px;
  background:linear-gradient(115deg,color-mix(in srgb, var(--teal) 13%, var(--surface)),var(--surface) 58%);
  border:1px solid var(--line);box-shadow:var(--sh-1);flex-wrap:wrap;
}
.ws-hero .ws-av{position:relative;flex:none}
.ws-hero .ws-av .dot{
  position:absolute;right:0;bottom:0;width:14px;height:14px;border-radius:50%;background:var(--green);
  border:3px solid var(--surface);
}
.ws-hero h1{font-family:var(--disp);font-size:26px;font-weight:600;letter-spacing:-.5px;line-height:1.15}
.ws-hero .sub{font-size:12.5px;color:var(--ink-3);margin-top:3px}
.ws-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ws-meta span{
  display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:8px;
  background:var(--surface-2);border:1px solid var(--line);font-size:11.5px;font-weight:600;color:var(--ink-2);
}
.ws-meta span b{font-family:var(--mono);color:var(--ink);font-weight:600}
.ws-hero-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ws-clock{text-align:right}
.ws-clock .t{font-family:var(--mono);font-size:26px;font-weight:600;letter-spacing:-.5px;line-height:1}
.ws-clock .d{font-size:11.5px;color:var(--ink-3);margin-top:4px}

/* ---------- AI daily brief ---------- */
.ws-brief{
  display:flex;gap:14px;align-items:flex-start;padding:16px 18px;border-radius:18px;margin-bottom:16px;cursor:pointer;
  background:linear-gradient(105deg,color-mix(in srgb, var(--violet) 10%, var(--surface)),var(--surface) 62%);
  border:1px solid color-mix(in srgb, var(--violet) 26%, var(--line));transition:.22s cubic-bezier(.22,1,.36,1);
}
.ws-brief:hover{transform:translateY(-2px);box-shadow:var(--sh-2)}
.ws-brief .bi{
  width:40px;height:40px;border-radius:13px;flex:none;display:grid;place-items:center;color:#fff;
  background:linear-gradient(140deg,var(--violet),#8B7BF0);box-shadow:0 6px 18px color-mix(in srgb, var(--violet) 40%, transparent);
}
.ws-brief h4{font-family:var(--disp);font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.ws-brief p{font-size:13px;color:var(--ink-2);line-height:1.62;margin-top:5px}
.ws-brief .go{margin-left:auto;align-self:center;color:var(--ink-3);flex:none}

/* ---------- layout ---------- */
.ws-grid{display:grid;grid-template-columns:1.12fr 1fr .92fr;gap:16px;align-items:start}
.ws-col{display:flex;flex-direction:column;gap:16px;min-width:0}
@media(max-width:1400px){.ws-grid{grid-template-columns:1fr 1fr}.ws-col:nth-child(3){grid-column:span 2}}
@media(max-width:900px){.ws-grid{grid-template-columns:1fr}.ws-col:nth-child(3){grid-column:auto}}

.ws-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh-1);overflow:hidden}
.ws-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
.ws-head .hi{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none}
.ws-head h3{font-family:var(--disp);font-size:14px;font-weight:600;flex:1;letter-spacing:-.2px}
.ws-head .n{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;
  background:var(--surface-2);color:var(--ink-3);border:1px solid var(--line)}
.ws-body{padding:12px 14px}
.ws-body.tight{padding:6px 8px}

/* ---------- tasks ---------- */
.tk{
  display:flex;gap:11px;align-items:flex-start;padding:11px 10px;border-radius:12px;cursor:pointer;transition:.16s;
}
.tk:hover{background:var(--hover)}
.tk+.tk{border-top:1px solid var(--line)}
.tk .tick{
  width:20px;height:20px;border-radius:7px;border:1.8px solid var(--line);display:grid;place-items:center;
  flex:none;margin-top:1px;background:var(--surface);transition:.18s;
}
.tk .tick:hover{border-color:var(--teal)}
.tk .tick svg{opacity:0;transform:scale(.5);transition:.2s cubic-bezier(.22,1.4,.36,1)}
.tk.done .tick{background:var(--green);border-color:var(--green)}
.tk.done .tick svg{opacity:1;transform:none}
.tk.done .tt{text-decoration:line-through;color:var(--ink-3)}
.tk.leaving{animation:tkOut .45s cubic-bezier(.4,0,.2,1) forwards}
@keyframes tkOut{to{opacity:0;transform:translateX(26px);max-height:0;padding:0;margin:0}}
.tk .tt{font-weight:600;font-size:13px;line-height:1.35}
.tk .ts{font-size:11.5px;color:var(--ink-3);margin-top:3px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tk .ts b{font-family:var(--mono);font-weight:600}
.tk .tr{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:none}
.prio{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:6px}
.prio.high{background:var(--rose-soft);color:var(--rose)}
.prio.medium{background:var(--amber-soft);color:var(--amber)}
.prio.normal{background:var(--surface-2);color:var(--ink-3);border:1px solid var(--line)}

/* ---------- generic list rows ---------- */
.ws-row{display:flex;align-items:center;gap:11px;padding:10px;border-radius:12px;cursor:pointer;transition:.16s}
.ws-row:hover{background:var(--hover);transform:translateX(2px)}
.ws-row+.ws-row{border-top:1px solid var(--line)}
.ws-row .ri{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none}
.ws-row .rm{flex:1;min-width:0}
.ws-row .rt{font-weight:600;font-size:12.8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-row .rs{font-size:11.5px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ws-row .rr{flex:none;font-size:11px;color:var(--ink-3);font-family:var(--mono);text-align:right}

/* ---------- continue working ---------- */
.cw{
  display:flex;gap:12px;align-items:center;padding:12px;border-radius:14px;border:1px solid var(--line);
  background:var(--surface-2);transition:.2s cubic-bezier(.22,1,.36,1);cursor:pointer;
}
.cw:hover{transform:translateY(-2px);box-shadow:var(--sh-1);border-color:color-mix(in srgb, var(--teal) 40%, transparent)}
.cw+.cw{margin-top:10px}
.cw .ci{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex:none}
.cw .cm{flex:1;min-width:0}
.cw .ct{font-weight:600;font-size:13px}
.cw .cs{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.cw .cbar{height:4px;border-radius:20px;background:var(--canvas);margin-top:7px;overflow:hidden}
.cw .cbar i{display:block;height:100%;border-radius:20px;background:var(--teal);transition:width 1s cubic-bezier(.22,1,.36,1)}
.cw .cp{font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--teal);flex:none}

/* ---------- queue ---------- */
.q-now{
  padding:14px;border-radius:14px;margin-bottom:10px;
  background:linear-gradient(120deg,color-mix(in srgb, var(--teal) 14%, var(--surface)),var(--surface-2));
  border:1px solid color-mix(in srgb, var(--teal) 32%, var(--line));
}
.q-now .lab{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--teal)}
