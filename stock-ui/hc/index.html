/* ---------------- QUICK NOTES ---------------- */
function qnRow(n,i){
  return `<div class="qn-saved ${n.pin?'pin':''}">
    <span style="color:var(${n.pin?'--amber':'--ink-3'});flex:none;margin-top:1px">${ico('file','currentColor',14)}</span>
    <p>${esc(n.t)}</p>
    <div style="display:flex;flex-direction:column;gap:3px">
      <button class="${n.pin?'on':''}" onclick="qnPin(${i})" title="Pin">${ico('star','currentColor',13)}</button>
      <button onclick="qnDel(${i})" title="Remove">${ico('x','currentColor',13)}</button>
    </div></div>`;
}
function qnSave(){
  const ta=$('#qnText'); const v=ta.value.trim();
  if(!v){ toast('Write a note first'); ta.focus(); return; }
  const btn=$$('.qn .btn-teal')[0];
  const old=btn.innerHTML;
  btn.innerHTML='<span style="display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite"></span> Saving…';
  btn.disabled=true;
  setTimeout(()=>{
    WS.notes.unshift({t:v,pin:false,at:Date.now()});
    ta.value='';
    $('#qnList').innerHTML=WS.notes.map(qnRow).join('');
    btn.innerHTML=old; btn.disabled=false;
    btn.classList.add('glow-ok'); setTimeout(()=>btn.classList.remove('glow-ok'),1100);
    toast('Note saved');
    wsAct('Clinical note saved',v.slice(0,46)+(v.length>46?'…':''),'msg','--teal');
  },SP(900));
}
function qnPin(i){ WS.notes[i].pin=!WS.notes[i].pin; $('#qnList').innerHTML=WS.notes.map(qnRow).join(''); toast(WS.notes[i].pin?'Note pinned':'Note unpinned') }
function qnDel(i){ WS.notes.splice(i,1); $('#qnList').innerHTML=WS.notes.map(qnRow).join(''); toast('Note removed') }
function wsNoteFocus(who){
  if(PAGE!=='workspace'){ render('workspace'); }
  setTimeout(()=>{
    const ta=$('#qnText'); if(!ta)return;
    if(who) ta.value=who+' — ';
    ta.focus();
    ta.scrollIntoView({behavior:'smooth',block:'center'});
  },SP(280));
}

/* ---------------- TEAM ---------------- */
function wsTeam(i){
  const s=DB.staff[i]; if(!s)return;
  const state=pick(['Available','With patient','In procedure','Meeting','On break']);
  openModal(`
    <div class="m-head">${av(s.name,44)}
      <div><h2>${s.name}</h2><div class="sub">${s.role} · ${s.dept}</div></div>
      <span class="tag ${state==='Available'?'t-green':state==='On break'?'t-amber':'t-blue'}" style="margin-left:8px"><i></i>${state}</span>
      <button class="x" onclick="closeModal()">${I.x}</button></div>
    <div class="m-body">
      <div class="det-grid">
        ${[['Role',s.role],['Department',s.dept],['Shift',s.shift],['Status',state],['Contact','Internal ext. '+rnd(200,899)],['Availability',state==='Available'?'Now':'In '+rnd(10,45)+' min']]
          .map(d=>`<div class="det"><div class="dl">${d[0]}</div><div class="dv">${d[1]}</div></div>`).join('')}
      </div>
      <div class="card mt" style="padding:16px 17px">
        <div class="ch-title" style="margin-bottom:10px">Current workload</div>
        ${['Patients','Tasks','Documentation'].map(l=>{const v=rnd(30,92);
          return `<div style="margin-bottom:11px">
            <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px">
              <span style="color:var(--ink-2);font-weight:500">${l}</span><b style="font-family:var(--mono)">${v}%</b></div>
            <div class="bar"><i data-w="${v}" style="background:var(${v>85?'--rose':v>65?'--amber':'--teal'})"></i></div></div>`}).join('')}
      </div>
    </div>
    <div class="m-foot"><button class="btn btn-ghost" onclick="closeModal()">Close</button>
      <span style="flex:1"></span>
      <button class="btn btn-teal" onclick="closeModal();go('messages')">${ico('msg','currentColor',15)}Send message</button></div>`,'md');
  animateBars($('#layer'));
}

/* ---------------- FOCUS / SHIFT CONTROLS ---------------- */
function wsFocus(){
  WS.focus=!WS.focus;
  document.documentElement.toggleAttribute('data-focus',WS.focus);
  render('workspace');
  toast(WS.focus?'Focus mode on — low-priority widgets hidden':'Focus mode off');
}
function wsStartShift(){
  WS.shiftStarted=true; WS.shiftEnded=false;
  render('workspace');
  toast('Shift started — good luck out there');
  wsAct('Shift started','Handover received','play','--teal');
}
function wsBreak(btn){
  const old=btn.innerHTML;
  btn.innerHTML='<span style="display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite"></span> On break';
  btn.disabled=true;
  toast('Break started — the queue will hold');
  setTimeout(()=>{ btn.innerHTML=old; btn.disabled=false; toast('Back from break'); wsAct('Returned from break','Queue resumed','refresh','--blue') },SP(2600));
}
function wsRestartShift(){
  wsInit();
  render('workspace');
  toast('A new shift has been started');
}

/* ---------------- END SHIFT ---------------- */
const SHIFT_STEPS=['Collecting shift activity','Reviewing completed tasks','Preparing patient summary','Generating shift report','Summary ready'];
function endShift(){
  openModal(`
    <div class="m-head">
      <div style="width:38px;height:38px;border-radius:11px;background:var(--amber-soft);color:var(--amber);display:grid;place-items:center">${ico('file','currentColor',19)}</div>
      <div><h2>Ending your shift</h2><div class="sub">Preparing the daily shift summary</div></div>
    </div>
    <div class="m-body" id="esWf">
      <div class="wf" style="padding:18px 10px 6px">
        <div class="wf-ring">
          <svg width="96" height="96"><circle cx="48" cy="48" r="42" fill="none" stroke="var(--canvas)" stroke-width="7"/>
            <circle id="esArc" cx="48" cy="48" r="42" fill="none" stroke="var(--teal)" stroke-width="7" stroke-linecap="round"
              stroke-dasharray="263.9" stroke-dashoffset="263.9" style="transition:stroke-dashoffset .55s cubic-bezier(.3,.9,.3,1)"/></svg>
          <div class="wf-pct" id="esPct">0%</div>
        </div>
        <div class="wf-steps">${SHIFT_STEPS.map(s=>`<div class="wf-step"><span class="wf-dot"></span><span>${s}</span></div>`).join('')}</div>
      </div>
    </div>`,'md');
  const steps=$$('.wf-step',$('#esWf')), arc=$('#esArc'), pct=$('#esPct');
  const ms=[520,560,540,520,420];
  let i=0;
  const tick=()=>{
    if(!$('#esWf'))return;
    if(i>0){steps[i-1].classList.remove('on');steps[i-1].classList.add('done')}
    if(i<SHIFT_STEPS.length){
      steps[i].classList.add('on');
      const p=Math.round((i+1)/SHIFT_STEPS.length*100);
      arc.style.strokeDashoffset=263.9*(1-p/100); pct.textContent=p+'%';
      const d=ms[i]; i++; setTimeout(tick,SP(d));
    } else { closeModal(); setTimeout(shiftReport,SP(220)); }
  };
  setTimeout(tick,SP(180));
}
function shiftReport(){
  const id='SH-'+rnd(1000,9999);
  const done=WS.tasks.filter(t=>t.st==='Completed');
  const open=WS.tasks.filter(t=>t.st!=='Completed');
  window.__R={id,author:ME.name+', '+ME.role,title:'Daily Shift Summary'};
  window.__shiftDoc=id;
  openModal(`
    <div class="m-head">
      <div style="width:38px;height:38px;border-radius:11px;background:var(--teal-soft);color:var(--teal);display:grid;place-items:center">${ico('file','currentColor',19)}</div>
      <div><h2>Daily shift summary</h2><div class="sub">${ME.name} · <span style="font-family:var(--mono)">${id}</span></div></div>
      <span id="rpBadgeSlot"></span>
      <button class="x" onclick="closeModal()">${I.x}</button>
    </div>
    <div class="m-body" id="rpDoc">
      <div class="rp-head">
        <div class="rp-water">${I.logo}</div>
        <div class="rp-eyebrow">MERIDIAN GENERAL · VIREON HMS</div>
        <div class="rp-title">Daily Shift Summary</div>
        <div class="rp-meta">
          <span>REF MG/SHIFT/${new Date().getFullYear()}/${rnd(100,999)}</span>
          <span>CLINICIAN ${ME.name.toUpperCase()}</span>
          <span>SHIFT ${pad(ME.start)}:00 — ${pad(ME.end)}:00</span>
          <span>ISSUED ${dateStr(0)}</span>
        </div>
      </div>

      <div class="rp-sec">
        <div class="rp-sec-h"><span class="n">01</span><b>Shift information</b></div>
        <div class="det-grid">
          ${[['Clinician',ME.name],['Role',ME.role],['Department',ME.dept],
             ['Shift','Day shift'],['Start',pad(ME.start)+':00'],['End',pad(ME.end)+':00'],
             ['Handover to','Evening team'],['Status','Completed'],['Document',id]]
            .map(d=>`<div class="det"><div class="dl">${d[0]}</div><div class="dv">${d[1]}</div></div>`).join('')}
        </div>
      </div>

      <div class="rp-sec">
        <div class="rp-sec-h"><span class="n">02</span><b>Shift at a glance</b></div>
        <div class="grid g4">
          ${[{l:'Patients seen',n:WS.stats.seen},{l:'Appointments completed',n:WS.stats.appts},
             {l:'Reports signed',n:WS.stats.signed+WS.recentlySigned.length},{l:'Laboratory reviews',n:WS.stats.labs},
             {l:'Tasks completed',n:done.length},{l:'Tasks outstanding',n:open.length},
             {l:'Pending follow-ups',n:WS.follow.length},{l:'Average consultation',n:WS.stats.avg,sfx:' min'}]
            .map(k=>`<div class="card kpi" style="cursor:default"><div class="kpi-lab">${k.l}</div>
              <div class="kpi-val" data-count="${k.n}" data-suffix="${k.sfx||''}">0</div></div>`).join('')}
        </div>
      </div>

      <div class="rp-sec">
        <div class="rp-sec-h"><span class="n">03</span><b>Activity across the shift</b></div>
        <div class="grid g2">
          ${chartCard('shiftA','Hourly activity','Patients and documentation',
            lineChart([{name:'Patients',data:Array.from({length:10},()=>rnd(0,4)),color:'--teal'},
              {name:'Documents',data:Array.from({length:10},()=>rnd(0,3)),color:'--amber'}],
              {h:190,labels:Array.from({length:10},(_,i)=>pad(8+i))}))}
          ${chartCard('shiftB','Task categories','Completed this shift',
            donut([{l:'Clinical review',v:5,color:'--teal'},{l:'Documentation',v:4,color:'--amber'},
              {l:'Laboratory',v:3,color:'--violet'},{l:'Administration',v:2,color:'--blue'}],{h:180,center:'14'}))}
        </div>
      </div>

      <div class="rp-sec">
        <div class="rp-sec-h"><span class="n">04</span><b>Completed tasks</b></div>
        <div class="card"><div class="tbl-wrap"><table>
          <thead><tr><th>Task</th><th>Related to</th><th>Category</th><th>Time</th><th>Status</th></tr></thead>
          <tbody>${(done.length?done:WS.tasks.slice(0,3)).map(t=>`<tr style="cursor:default">
            <td><b>${t.title}</b></td><td>${t.who}</td><td>${t.cat}</td>
            <td style="font-family:var(--mono)">${t.time}</td>
            <td><span class="tag t-green"><i></i>Completed</span></td></tr>`).join('')}</tbody>
        </table></div></div>
      </div>

      <div class="rp-sec">
        <div class="rp-sec-h"><span class="n">05</span><b>Outstanding for the next shift</b></div>
        ${open.length?open.slice(0,5).map(t=>`<div class="rp-find">
          <span class="fi" style="background:var(--amber-soft);color:var(--amber)">${ico('clock','currentColor',15)}</span>
          <p><b>${t.title}</b> — ${t.who}. Scheduled for ${t.time}, ${t.prio.toLowerCase()} priority, ${t.st.toLowerCase()}.</p>
        </div>`).join('')
        :`<div class="rp-find"><span class="fi" style="background:var(--green-soft);color:var(--green)">${ico('check','currentColor',15)}</span>
          <p>Nothing outstanding. Every task on the list was completed during this shift.</p></div>`}
      </div>

      <div class="rp-sec">
        <div class="rp-sec-h"><span class="n">06</span><b>Assigned patients</b></div>
        <div class="card"><div class="tbl-wrap"><table>
          <thead><tr><th>Patient</th><th>Room</th><th>Status</th><th>Next action</th><th>Priority</th></tr></thead>
          <tbody>${WS.assigned.map(a=>`<tr style="cursor:default">
            <td><b>${a.name}</b><div style="font-size:11px;color:var(--ink-3);font-family:var(--mono)">${a.pid}</div></td>
            <td>${a.room}</td><td><span class="tag ${tstat(a.status)}"><i></i>${a.status}</span></td>
            <td>${a.next}</td><td><span class="prio ${a.prio.toLowerCase()}">${a.prio}</span></td></tr>`).join('')}</tbody>
        </table></div></div>
      </div>

      <div class="rp-sec">
        <div class="rp-sec-h"><span class="n">07</span><b>Notes for the next shift</b></div>
        <div class="rp-summary">The morning block carried most of the day's demand. ${open.length} task${open.length===1?'':'s'} remain open and
        ${WS.signatures.length} report${WS.signatures.length===1?'':'s'} still await a signature. Two patients on the ward are flagged for a
        follow-up review in the evening round. Nothing is escalating, and no clinical decision has been deferred.</div>
        <div class="ai-note">
          <div class="ai-i">${ico('spark','#fff',16)}</div>
          <div><h5>Operational summary <span class="chip">OPERATIONAL</span></h5>
          <p>Throughput held to plan across the shift. The one recurring friction is the mid-morning overlap between laboratory review
          and booked consultations — worth raising at the next department meeting rather than fixing case by case.</p></div>
        </div>
      </div>

      <div class="rp-sig" id="rpSig">
        <div class="sig-empty">
          ${ico('badge','currentColor',26)}
          <div><b style="color:var(--ink-2)">This summary is unsigned</b><div style="margin-top:3px">A digital signature completes the handover.</div></div>
          <button class="btn btn-teal" onclick="openSignature('${id}','report')">${ico('badge','currentColor',15)}Sign shift summary</button>
        </div>
      </div>

      <div class="rp-foot-note">FICTIONAL DOCUMENT · MERIDIAN GENERAL IS NOT A REAL HOSPITAL · NOT FOR CLINICAL USE</div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn btn-ghost" onclick="toggleReportFull()">${I.expand}Fullscreen</button>
      <span style="flex:1"></span>
      <button class="btn btn-ghost" onclick="dl('${id} — shift summary.pdf')">${I.dl}Download</button>
      <button class="btn btn-teal" id="shiftComplete" disabled onclick="completeShift()">${ico('check','currentColor',15)}Complete shift</button>
    </div>`,'xl');
  killChartAnim($('#rpDoc'));
  toast('Daily shift summary ready');
}
function completeShift(){
  const modal=$('#layer .modal');
  modal.innerHTML=`<div class="m-body">
    <div class="done-screen">
      <div class="ring"><div>${I.check}</div></div>
      <h2>Shift complete</h2>
      <p>Your daily summary has been signed and filed. The handover has been sent to the evening team.</p>
      <div class="grid g4" style="max-width:640px;margin:24px auto 0">
        ${[{l:'Patients seen',n:WS.stats.seen},{l:'Tasks completed',n:WS.tasks.filter(t=>t.st==='Completed').length},
           {l:'Reports signed',n:WS.stats.signed+WS.recentlySigned.length},{l:'Hours worked',n:ME.end-ME.start}]
          .map(k=>`<div class="card kpi" style="cursor:default"><div class="kpi-lab">${k.l}</div>
            <div class="kpi-val" style="font-size:24px" data-count="${k.n}">0</div></div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:24px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="closeModal();render('workspace')">Back to workspace</button>
        <button class="btn btn-teal" onclick="closeModal();wsRestartShift()">${I.refresh}Start a new shift</button>
      </div>
    </div></div>`;
  animateCounters(modal);
  WS.shiftEnded=true; WS.shiftStarted=false;
  wsAct('Shift completed','Daily summary signed and filed','check','--green');
  toast('Shift completed — summary filed');
  if(PAGE==='workspace') render('workspace');   // page behind the modal reflects the new state
}

/* ---------------- SIGNATURE HOOKS ---------------- */
const _confirmSig5=confirmSig;
confirmSig=function(docId,ctx='report'){
  _confirmSig5(docId,ctx);
  setTimeout(()=>{
    if(window.__shiftDoc===docId){
      const b=$('#shiftComplete');
      if(b){ b.disabled=false; b.classList.add('glow-ok'); toast('Shift summary successfully signed'); }
    }
    if(window.__wsSigPending && WS){ wsSigned(); }
  },SP(2400));
};

/* ---------------- LIVE CLOCK ---------------- */
setInterval(()=>{
  const c=$('#wsClock');
  if(c){ const n=new Date(); c.textContent=pad(n.getHours())+':'+pad(n.getMinutes()); }
},20000);


/* ---------------- START ---------------- */
shell();
initCineBtn();
try{
  const _t=sessionStorage.getItem('vireon.theme'), _a=sessionStorage.getItem('vireon.accent');
  if(_t) PREF.theme=_t;
  if(_a) PREF.accent=_a;
}catch(_){}
applyTheme(PREF.theme,false);
syncDemo(()=>{seedNotifs();wsInit();render('workspace')});

</script>
