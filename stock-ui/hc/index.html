function avatar(seed){
  // deterministic, license-free generated avatar (initials on gradient)
  const hues=[188,206,258,340,22,150,268,200];
  const h=hues[Math.abs(hash(seed))%hues.length];
  const ini=seed.split(' ').map(w=>w[0]).slice(0,2).join('');
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="hsl(${h},62%,64%)"/><stop offset="1" stop-color="hsl(${h+24},58%,46%)"/></linearGradient></defs><rect width="64" height="64" rx="32" fill="url(#g)"/><text x="32" y="41" font-family="Inter,sans-serif" font-size="24" font-weight="600" fill="#fff" text-anchor="middle">${ini}</text></svg>`;
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return h}
const av=(n,s=36)=>`<img class="avatar" src="${avatar(n)}" width="${s}" height="${s}" alt="">`;

let DB={};

function genActivity(patients,doctors){
  const kinds=[
    ['Patient admitted','users','--blue'],['Lab result published','flask','--teal'],
    ['Surgery completed','knife','--amber'],['Bed released','bed','--green'],
    ['Emergency triage','siren','--rose'],['Prescription issued','pill','--violet'],
    ['Appointment confirmed','cal','--blue'],['Discharge approved','file','--green']];
  return Array.from({length:9},(_,i)=>{
    const k=pick(kinds), p=pick(patients);
    return {t:k[0], ico:k[1], color:k[2], who:p.name, dept:pick(doctors).dept, ago:rnd(1,58)+' min ago'};
  });
}
function genTasks(){
  const t=['Sign off ICU night report','Approve radiology requisition','Review discharge summary — Ward B','Confirm surgery roster for Thursday','Call back post-op patient','Restock triage supply cart','Verify insurance pre-authorisation'];
  return t.map((x,i)=>({t:x, done:i<2, when:pick(['Today','In 2 h','In 5 h','Tomorrow']), pri:pick(['High','Normal','Normal','Low'])}));
}
function genAmb(){
  return Array.from({length:4},(_,i)=>({
    unit:'AMB-'+pad(rnd(11,48)), eta:rnd(2,18)+' min', cond:pick(['Chest pain','Multi-trauma','Respiratory distress','Head injury','Cardiac arrest']),
    sev:pick(['Critical','Urgent','Stable']), crew:rnd(2,3)+' crew', from:pick(['Northgate Ave','Riverside Blvd','Cedar Hill','Old Mill Road'])}));
}
function dateStr(off){
  const d=new Date(); d.setDate(d.getDate()+off);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

/* ==================== CHART ENGINE (pure SVG, no libraries) ==================== */
const C = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
let uid=0; const nid=()=>'c'+(++uid);

function axisY(min,max,steps=4){const out=[];for(let i=0;i<=steps;i++)out.push(min+(max-min)*i/steps);return out}

function lineChart(series,{h=210,labels=[],area=true,dots=true}={}){
  const w=680, pl=38, pr=10, pt=12, pb=26;
  const all=series.flatMap(s=>s.data);
  const max=Math.max(...all)*1.15, min=0;
  const iw=w-pl-pr, ih=h-pt-pb;
  const X=i=>pl+(iw*i/(series[0].data.length-1));
  const Y=v=>pt+ih-((v-min)/(max-min))*ih;
  let g='';
  axisY(min,max).forEach(v=>{
    g+=`<line x1="${pl}" x2="${w-pr}" y1="${Y(v)}" y2="${Y(v)}" stroke="${C('--line')}" stroke-dasharray="3 4"/>
        <text x="${pl-8}" y="${Y(v)+3.5}" text-anchor="end" font-size="10" fill="${C('--ink-3')}" font-family="var(--mono)">${Math.round(v)}</text>`;
  });
  labels.forEach((l,i)=>{ if(labels.length>9 && i%2) return;
    g+=`<text x="${X(i)}" y="${h-7}" text-anchor="middle" font-size="10" fill="${C('--ink-3')}">${l}</text>`;});
  series.forEach((s,si)=>{
    const col=C(s.color);
    const pts=s.data.map((v,i)=>`${X(i)},${Y(v)}`).join(' ');
    const id=nid();
    if(area) g+=`<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${col}" stop-opacity=".26"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
      <polygon points="${pl},${pt+ih} ${pts} ${w-pr},${pt+ih}" fill="url(#${id})" opacity="0"><animate attributeName="opacity" to="1" dur=".7s" begin="${si*.15}s" fill="freeze"/></polygon>`;
    g+=`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="2200" stroke-dashoffset="2200"><animate attributeName="stroke-dashoffset" to="0" dur="1.3s" begin="${si*.15}s" fill="freeze" calcMode="spline" keySplines=".2 .8 .2 1"/></polyline>`;
    if(dots) s.data.forEach((v,i)=>{
      g+=`<circle cx="${X(i)}" cy="${Y(v)}" r="0" fill="#fff" stroke="${col}" stroke-width="2.4">
        <animate attributeName="r" to="3.6" dur=".3s" begin="${.7+si*.15+i*.05}s" fill="freeze"/>
        <title>${s.name}: ${v}</title></circle>`;
    });
  });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;overflow:visible">${g}</svg>`;
}

function barChart(data,{h=210,horizontal=false,color='--teal',grad=false}={}){
  const w=680,pl=horizontal?96:36,pr=14,pt=12,pb=horizontal?12:28;
  const max=Math.max(...data.map(d=>d.v))*1.12;
  const iw=w-pl-pr, ih=h-pt-pb;
  let g='';
  if(!horizontal){
    const bw=Math.min(46, iw/data.length*.58);
    axisY(0,max).forEach(v=>{const y=pt+ih-(v/max)*ih;
      g+=`<line x1="${pl}" x2="${w-pr}" y1="${y}" y2="${y}" stroke="${C('--line')}" stroke-dasharray="3 4"/>
          <text x="${pl-8}" y="${y+3.5}" text-anchor="end" font-size="10" fill="${C('--ink-3')}" font-family="var(--mono)">${Math.round(v)}</text>`;});
    data.forEach((d,i)=>{
      const x=pl+iw*(i+.5)/data.length-bw/2, bh=(d.v/max)*ih, y=pt+ih-bh;
      const col=C(d.color||color);
      g+=`<rect x="${x}" y="${pt+ih}" width="${bw}" height="0" rx="6" fill="${col}" opacity=".92">
          <animate attributeName="height" to="${bh}" dur=".8s" begin="${i*.06}s" fill="freeze" calcMode="spline" keySplines=".2 .9 .2 1"/>
          <animate attributeName="y" to="${y}" dur=".8s" begin="${i*.06}s" fill="freeze" calcMode="spline" keySplines=".2 .9 .2 1"/>
          <title>${d.l}: ${d.v}</title></rect>
        <text x="${x+bw/2}" y="${h-9}" text-anchor="middle" font-size="10" fill="${C('--ink-3')}">${d.l}</text>`;
    });
  } else {
    const bh=Math.min(24, ih/data.length*.6);
    data.forEach((d,i)=>{
      const y=pt+ih*(i+.5)/data.length-bh/2, bwid=(d.v/max)*iw;
      const col=C(d.color||color);
      g+=`<text x="${pl-10}" y="${y+bh/2+3.5}" text-anchor="end" font-size="11" fill="${C('--ink-2')}" font-weight="500">${d.l}</text>
        <rect x="${pl}" y="${y}" width="${iw}" height="${bh}" rx="6" fill="${C('--canvas')}"/>
        <rect x="${pl}" y="${y}" width="0" height="${bh}" rx="6" fill="${col}">
          <animate attributeName="width" to="${bwid}" dur=".9s" begin="${i*.07}s" fill="freeze" calcMode="spline" keySplines=".2 .9 .2 1"/></rect>
        <text x="${pl+bwid+7}" y="${y+bh/2+3.5}" font-size="10.5" font-family="var(--mono)" fill="${C('--ink-3')}" opacity="0" font-weight="600">${d.v}
          <animate attributeName="opacity" to="1" dur=".4s" begin="${.6+i*.07}s" fill="freeze"/></text>`;
    });
  }
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;overflow:visible">${g}</svg>`;
}

function stackChart(data,keys,colors,{h=210}={}){
  const w=680,pl=36,pr=12,pt=12,pb=28;
  const totals=data.map(d=>keys.reduce((a,k)=>a+d[k],0));
  const max=Math.max(...totals)*1.14, iw=w-pl-pr, ih=h-pt-pb;
  const bw=Math.min(42, iw/data.length*.58);
  let g='';
  axisY(0,max).forEach(v=>{const y=pt+ih-(v/max)*ih;
    g+=`<line x1="${pl}" x2="${w-pr}" y1="${y}" y2="${y}" stroke="${C('--line')}" stroke-dasharray="3 4"/>
        <text x="${pl-8}" y="${y+3.5}" text-anchor="end" font-size="10" fill="${C('--ink-3')}" font-family="var(--mono)">${Math.round(v)}</text>`;});
  data.forEach((d,i)=>{
    const x=pl+iw*(i+.5)/data.length-bw/2; let acc=0;
    keys.forEach((k,ki)=>{
      const bh=(d[k]/max)*ih, y=pt+ih-acc-bh; acc+=bh;
      g+=`<rect x="${x}" y="${pt+ih}" width="${bw}" height="0" rx="${ki===keys.length-1?5:0}" fill="${C(colors[ki])}">
        <animate attributeName="height" to="${bh}" dur=".7s" begin="${i*.05+ki*.08}s" fill="freeze"/>
        <animate attributeName="y" to="${y}" dur=".7s" begin="${i*.05+ki*.08}s" fill="freeze"/>
        <title>${k}: ${d[k]}</title></rect>`;
    });
    g+=`<text x="${x+bw/2}" y="${h-9}" text-anchor="middle" font-size="10" fill="${C('--ink-3')}">${d.l}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;overflow:visible">${g}</svg>`;
}

function donut(data,{h=210,inner=.62,center=''}={}){
  const size=h, cx=size/2, cy=size/2, R=size/2-8, r=R*inner;
  const total=data.reduce((a,d)=>a+d.v,0);
  let a0=-Math.PI/2, g='';
  data.forEach((d,i)=>{
    const a1=a0+(d.v/total)*Math.PI*2;
    const large=(a1-a0)>Math.PI?1:0;
    const p=`M ${cx+R*Math.cos(a0)} ${cy+R*Math.sin(a0)} A ${R} ${R} 0 ${large} 1 ${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)} L ${cx+r*Math.cos(a1)} ${cy+r*Math.sin(a1)} A ${r} ${r} 0 ${large} 0 ${cx+r*Math.cos(a0)} ${cy+r*Math.sin(a0)} Z`;
    g+=`<path d="${p}" fill="${C(d.color)}" opacity="0" style="transform-origin:${cx}px ${cy}px">
      <animate attributeName="opacity" to="1" dur=".45s" begin="${i*.09}s" fill="freeze"/>
      <animateTransform attributeName="transform" type="scale" from=".6" to="1" dur=".6s" begin="${i*.09}s" fill="freeze" calcMode="spline" keySplines=".2 .9 .35 1"/>
      <title>${d.l}: ${d.v} (${Math.round(d.v/total*100)}%)</title></path>`;
  });
  if(center) g+=`<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="21" font-weight="700" font-family="var(--disp)" fill="${C('--ink')}">${center}</text>
    <text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="10" fill="${C('--ink-3')}" font-weight="600">TOTAL</text>`;
  return `<div style="display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap">
    <svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;max-width:52%">${g}</svg>
    <div style="display:flex;flex-direction:column;gap:7px">${data.map(d=>{
      const pc=Math.round(d.v/total*100);
      return `<div style="display:flex;align-items:center;gap:8px;font-size:12px"><i style="width:9px;height:9px;border-radius:3px;background:${C(d.color)};flex:none"></i>
      <span style="color:var(--ink-2);font-weight:500;flex:1">${d.l}</span><b style="font-family:var(--mono);font-size:11.5px">${pc}%</b></div>`;}).join('')}</div></div>`;
}

function ring(pct,{size=132,color='--teal',label='',sub=''}={}){
  const R=size/2-10, cir=2*Math.PI*R;
  return `<div style="display:grid;place-items:center;position:relative;padding:6px 0">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${R}" fill="none" stroke="${C('--canvas')}" stroke-width="10"/>
      <circle cx="${size/2}" cy="${size/2}" r="${R}" fill="none" stroke="${C(color)}" stroke-width="10" stroke-linecap="round"
        stroke-dasharray="${cir}" stroke-dashoffset="${cir}">
        <animate attributeName="stroke-dashoffset" to="${cir*(1-pct/100)}" dur="1.2s" fill="freeze" calcMode="spline" keySplines=".2 .9 .2 1"/></circle>
    </svg>
    <div style="position:absolute;text-align:center">
      <div style="font-family:var(--disp);font-size:${size/5.2}px;font-weight:700;letter-spacing:-1px" data-count="${pct}" data-suffix="%">0%</div>
      <div style="font-size:10.5px;color:var(--ink-3);font-weight:600">${label}</div>
    </div>${sub?`<div style="font-size:11.5px;color:var(--ink-3);margin-top:8px">${sub}</div>`:''}</div>`;
}

function scatter(data,{h=210}={}){
  const w=680,pl=36,pr=14,pt=14,pb=28;
  const iw=w-pl-pr, ih=h-pt-pb;
  const mx=Math.max(...data.map(d=>d.x))*1.1, my=Math.max(...data.map(d=>d.y))*1.15;
  let g='';
  axisY(0,my).forEach(v=>{const y=pt+ih-(v/my)*ih;
    g+=`<line x1="${pl}" x2="${w-pr}" y1="${y}" y2="${y}" stroke="${C('--line')}" stroke-dasharray="3 4"/>
    <text x="${pl-8}" y="${y+3.5}" text-anchor="end" font-size="10" fill="${C('--ink-3')}" font-family="var(--mono)">${Math.round(v)}</text>`;});
  data.forEach((d,i)=>{
    const x=pl+(d.x/mx)*iw, y=pt+ih-(d.y/my)*ih, r=6+d.r*1.4;
    g+=`<circle cx="${x}" cy="${y}" r="0" fill="${C(d.color)}" opacity=".62" stroke="${C(d.color)}" stroke-width="1.5">
      <animate attributeName="r" to="${r}" dur=".7s" begin="${i*.07}s" fill="freeze" calcMode="spline" keySplines=".2 .9 .35 1"/>
      <title>${d.l} — severity ${d.x}, ${d.y} days</title></circle>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;overflow:visible">${g}</svg>`;
}

function heatStrip(data,{h=190}={}){
  const w=680, cols=data[0].v.length, cw=(w-70)/cols, ch=(h-34)/data.length;
  let g='';
  data.forEach((row,ri)=>{
    g+=`<text x="60" y="${20+ri*ch+ch/2+4}" text-anchor="end" font-size="10.5" fill="${C('--ink-2')}" font-weight="500">${row.l}</text>`;
    row.v.forEach((v,ci)=>{
      g+=`<rect x="${68+ci*cw}" y="${20+ri*ch+2}" width="${cw-3}" height="${ch-4}" rx="4" fill="${C('--teal')}" opacity="0">
        <animate attributeName="opacity" to="${.12+v/100*.85}" dur=".5s" begin="${(ri*cols+ci)*.012}s" fill="freeze"/>
        <title>${row.l} — ${v}% load</title></rect>`;
    });
  });
  ['08','10','12','14','16','18','20','22'].forEach((t,i)=>{
    g+=`<text x="${68+ (i*(cols/8)+cols/16)*cw}" y="14" text-anchor="middle" font-size="9.5" fill="${C('--ink-3')}">${t}</text>`;});
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">${g}</svg>`;
}

function chartCard(key,title,sub,body,cls=''){

/* ---------- MODAL / TOAST / COUNTERS ---------- */
function openModal(html,size=''){
  const o=el(`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal ${size}">${html}</div></div>`);
  $('#layer').appendChild(o);
  document.body.style.overflow='hidden';
  requestAnimationFrame(()=>{animateCounters(o);animateBars(o)});
  return o;
}
function closeModal(){
  const o=$('#layer').lastElementChild; if(!o)return;
  o.classList.add('out'); setTimeout(()=>o.remove(),200);
}
function toast(msg,icon='check'){
  const t=el(`<div class="toast"><div class="ti">${ico(icon,'#fff',14)}</div><span>${esc(msg)}</span></div>`);
  $('#toasts').appendChild(t);
  setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),300)},2600);
}
function animateCounters(root=document){
  $$('[data-count]',root).forEach(n=>{
    if(n.dataset.done)return; n.dataset.done=1;
    const to=parseFloat(n.dataset.count), pfx=n.dataset.prefix||'', sfx=n.dataset.suffix||'';
    const dec=(to%1!==0)?1:0, dur=1100, t0=performance.now();
    const tick=t=>{
      const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);
      const v=to*e;
      n.textContent=pfx+(dec?v.toFixed(1):Math.round(v).toLocaleString('en-US'))+sfx;
      if(p<1)requestAnimationFrame(tick);
    };requestAnimationFrame(tick);
  });
}
function animateBars(root=document){
  setTimeout(()=>$$('.bar i[data-w]',root).forEach(b=>b.style.width=b.dataset.w+'%'),80);
}

const SYNC_STEPS=['Synchronizing workspace','Restoring hospital data','Updating dashboard','Workspace ready'];
function syncDemo(done){
  const s=el(`<div class="sync">
    <div class="sync-logo">${I.logo}</div>
    <h3>Synchronizing the Vireon workspace</h3>
    <div class="sync-steps">${SYNC_STEPS.map((t,i)=>`<div class="sync-step" data-s="${i}"><span class="sd"></span>${t}</div>`).join('')}</div>
    <div class="sync-bar"><i></i></div>
  </div>`);
  document.body.appendChild(s);
  const steps=$$('.sync-step',s), bar=$('.sync-bar i',s);
  let i=0;
  const next=()=>{
    if(i>0){steps[i-1].classList.remove('on');steps[i-1].classList.add('done')}
    if(i<steps.length){
      steps[i].classList.add('on');
      bar.style.width=Math.round((i+1)/steps.length*100)+'%';
      i++; setTimeout(next, i===steps.length?700:820);
    } else {
      buildDB(); // reset app to original state
      done&&done();
      s.classList.add('out'); setTimeout(()=>s.remove(),450);
    }
  };
  setTimeout(next,140);
}

  return `<div class="card kpi" onclick="toast('${k.l} — detail view')">
    <svg class="spark" width="118" height="34" viewBox="0 0 118 34"><polyline points="${pts}" fill="none" stroke="var(${k.c})" stroke-width="2" opacity=".35" stroke-linecap="round"/></svg>

function queueRows(){
  const pcol={Critical:'t-rose',Urgent:'t-amber',Normal:'t-teal'};
  return `<div class="list">${DB.queue.map((q,i)=>`
    <div class="li" style="cursor:default">
      <span class="li-ico" style="background:var(--canvas);font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink-2)">${q.no}</span>

        <button class="btn btn-ghost btn-sm" onclick="queueAct(${i},'call',this)">Call</button>
        <button class="btn btn-ghost btn-sm" onclick="queueAct(${i},'complete',this)">Done</button>
        <button class="btn btn-ghost btn-sm" onclick="queueAct(${i},'delay',this)">Delay</button>
        <button class="btn btn-ghost btn-sm" onclick="queueAct(${i},'priority',this)">${I.up}</button>
      </div>
    </div>`).join('')}</div>`;
}
function queueAct(i,act,btn){
  const q=DB.queue[i], row=btn.closest('.li');
  if(act==='call'){
    row.style.transition='.4s';row.style.background='var(--teal-soft)';row.style.transform='scale(1.02)';
    setTimeout(()=>{row.style.background='';row.style.transform=''},900);
    q.state='Called'; toast('Now calling '+q.name+' — '+q.no,'phone');
  } else if(act==='complete'){
    row.style.transition='.45s';row.style.opacity='0';row.style.transform='translateX(40px)';
    setTimeout(()=>{DB.queue.splice(i,1);$('#queueList').innerHTML=queueRows();toast('Consultation completed')},450);
  } else if(act==='delay'){
    q.wait+=10; toast(q.name+' delayed by 10 minutes','clock');
    row.querySelector('.li-s').textContent=`${q.dept} · waiting ${q.wait} min · ${q.state}`;
  } else {
    const order=['Normal','Urgent','Critical'];
    q.priority=order[Math.min(2,order.indexOf(q.priority)+1)];
    $('#queueList').innerHTML=queueRows(); toast('Priority raised to '+q.priority);
  }
}
function toggleTask(i,node){
  DB.tasks[i].done=!DB.tasks[i].done;
  const done=DB.tasks[i].done;
  const ic=node.querySelector('.li-ico'), t=node.querySelector('.li-t');
  ic.style.background=done?'var(--green-soft)':'var(--canvas)';
  ic.style.color=done?'var(--green)':'var(--ink-3)';
  ic.innerHTML=done?'<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m4 12 5 5L20 6"/></svg>':'<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="4"/></svg>';
  t.style.textDecoration=done?'line-through':'';t.style.color=done?'var(--ink-3)':'';
  node.animate([{transform:'scale(1)'},{transform:'scale(1.02)'},{transform:'scale(1)'}],{duration:280});
  if(done) toast('Task completed');
}

const REG_STEPS=['Personal information','Medical information','Insurance','Emergency contact','Initial vitals','Notes'];
let regStep=0, regDraft={};

function newPatient(){
  regStep=0;
  openModal(`
    <div class="m-head">
      <div style="width:38px;height:38px;border-radius:11px;background:var(--teal-soft);color:var(--teal);display:grid;place-items:center">${ico('users','currentColor',19)}</div>
      <div><h2>Register a new patient</h2><div class="sub">Six sections · draft saves automatically in this session</div></div>
      <button class="x" onclick="closeModal()">${I.x}</button>
    </div>
    <div class="step-rail" id="regRail">${REG_STEPS.map((s,i)=>`
      <button data-step="${i}" class="${i===0?'on':''}" onclick="gotoStep(${i})"><span class="n">${i+1}</span>${s}</button>`).join('')}</div>
    <div class="m-body" id="regBody">${regForm(0)}</div>
    <div class="m-foot" id="regFoot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-ghost" onclick="toast('Draft saved','file')">Save draft</button>
      <span style="flex:1"></span>
      <button class="btn btn-ghost" id="prevBtn" onclick="gotoStep(regStep-1)" disabled>Previous</button>
      <button class="btn btn-primary" id="nextBtn" onclick="gotoStep(regStep+1)">Next</button>
    </div>`,'xl');
}
function gotoStep(i){
  if(i<0) return;
  if(i>=REG_STEPS.length){ registerPatient(); return; }
  regStep=i;
  $$('#regRail button').forEach((b,bi)=>{
    b.classList.toggle('on',bi===i); b.classList.toggle('done',bi<i);
  });
  const body=$('#regBody');
  body.innerHTML=regForm(i);
  body.animate([{opacity:0,transform:'translateX(16px)'},{opacity:1,transform:'none'}],{duration:320,easing:'cubic-bezier(.22,1,.36,1)'});
  $('#prevBtn').disabled=i===0;
  $('#nextBtn').textContent=i===REG_STEPS.length-1?'Register patient':'Next';
  $('#nextBtn').className=i===REG_STEPS.length-1?'btn btn-teal':'btn btn-primary';
}

const WF=['Validating information','Creating patient record','Assigning patient ID','Updating hospital database','Preparing patient profile','Registration complete'];
function registerPatient(){
  const body=$('#regBody'), foot=$('#regFoot'), rail=$('#regRail');
  rail.style.display='none'; foot.style.display='none';
  body.innerHTML=`<div class="wf">
    <div class="wf-ring">
      <svg width="96" height="96"><circle cx="48" cy="48" r="42" fill="none" stroke="var(--canvas)" stroke-width="7"/>
        <circle id="wfArc" cx="48" cy="48" r="42" fill="none" stroke="var(--teal)" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="263.9" stroke-dashoffset="263.9" style="transition:stroke-dashoffset .8s cubic-bezier(.3,.9,.3,1)"/></svg>
      <div class="wf-pct" id="wfPct">0%</div>
    </div>
    <div class="wf-steps">${WF.map((s,i)=>`<div class="wf-step" data-w="${i}"><span class="wf-dot"></span><span>${s}</span></div>`).join('')}</div>
  </div>`;
  const steps=$$('.wf-step',body), arc=$('#wfArc'), pct=$('#wfPct');
  let i=0;
  const tick=()=>{
    if(i>0){steps[i-1].classList.remove('on');steps[i-1].classList.add('done')}
    if(i<WF.length){
      steps[i].classList.add('on');
      const p=Math.round((i+1)/WF.length*100);
      arc.style.strokeDashoffset=263.9*(1-p/100); pct.textContent=p+'%';
      i++; setTimeout(tick,1000);
    } else { finishRegistration(); }
  };
  setTimeout(tick,200);
}

function calShift(n){
  if(calView==='Month') calCursor.setMonth(calCursor.getMonth()+n);
  else calCursor.setDate(calCursor.getDate()+(calView==='Week'?7*n:n));
  render('calendar');
}
function monthGrid(){
  const y=calCursor.getFullYear(), m=calCursor.getMonth();
  const first=new Date(y,m,1), start=(first.getDay()+6)%7;
  const days=new Date(y,m+1,0).getDate();
  let cells='';
  for(let i=0;i<start;i++) cells+=`<div style="min-height:96px;border-radius:11px;background:#FBFCFD"></div>`;
  for(let d=1;d<=days;d++){
    const iso=`${y}-${pad(m+1)}-${pad(d)}`;
    const evs=DB.events.filter(e=>e.date===iso);
    const isToday=new Date().toDateString()===new Date(y,m,d).toDateString();
    cells+=`<div ondragover="event.preventDefault();this.style.background='var(--teal-soft)'" ondragleave="this.style.background=''"
      ondrop="dropEvent(event,'${iso}',this)" onclick="newEvent('${iso}')"
      style="min-height:96px;border:1px solid var(--line);border-radius:11px;padding:7px;cursor:pointer;transition:.16s;${isToday?'border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)':''}"
      onmouseover="if(!event.buttons)this.style.borderColor='#CFDBE2'" onmouseout="this.style.borderColor='${isToday?'var(--teal)':'var(--line)'}'">
      <div style="font-size:11.5px;font-weight:${isToday?'700':'600'};color:${isToday?'var(--teal)':'var(--ink-3)'};margin-bottom:5px;font-family:var(--mono)">${pad(d)}</div>
      ${evs.slice(0,3).map(e=>`<div draggable="true" ondragstart="event.dataTransfer.setData('id','${e.id}')" onclick="event.stopPropagation();openEvent(${DB.events.indexOf(e)})"
        style="font-size:10.5px;font-weight:600;padding:3px 6px;border-radius:6px;margin-bottom:3px;background:color-mix(in srgb, var(${e.color}) 14%, #fff);color:var(${e.color});cursor:grab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
        ${pad(e.start)}:00 ${e.title}</div>`).join('')}
      ${evs.length>3?`<div style="font-size:10px;color:var(--ink-3);padding-left:4px">+${evs.length-3} more</div>`:''}
    </div>`;
  }
  return `<div style="font-family:var(--disp);font-weight:600;font-size:16px;margin-bottom:12px">${MONTHS[m]} ${y}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px">
      ${DAYS.map(d=>`<div style="font-size:10.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;text-align:center;padding:4px">${d}</div>`).join('')}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;overflow-x:auto">${cells}</div>`;
}
function weekGrid(){

function dayGrid(){

function dropEvent(ev,iso,node){

function saveEvent(){

function startCall(){
  const st=$('#videoStage'); if(!st) return;
  const p=DB.patients[0], d=DB.doctors[0];
  st.innerHTML=`<div style="position:absolute;inset:0;display:grid;place-items:center;color:#DCE7EE">
    <div style="text-align:center">
      <div style="width:60px;height:60px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:#5FD6CB;margin:0 auto 16px;animation:spin .9s linear infinite"></div>
      <div id="callMsg" style="font-family:var(--disp);font-size:15px;font-weight:600">Establishing secure channel…</div>
    </div></div>`;
  const msgs=['Establishing secure channel…','Verifying patient identity…','Negotiating video stream…','Connecting…'];
  let i=1;
  const t=setInterval(()=>{
    const m=$('#callMsg'); if(!m){clearInterval(t);return}
    m.textContent=msgs[i]; i++;
    if(i>=msgs.length){clearInterval(t);setTimeout(liveCall,900)}
  },900);
}
function liveCall(){
  const st=$('#videoStage'); if(!st) return;
  const p=DB.patients[0], d=DB.doctors[0];
  st.innerHTML=`
    <div style="position:absolute;inset:0;background:radial-gradient(600px 340px at 50% 40%, #1D3E52, #0C1A26)"></div>
    <div style="position:absolute;inset:0;display:grid;place-items:center;animation:fadeIn .6s">
      <div style="text-align:center">
        <img class="avatar" src="${avatar(p.name)}" width="108" height="108" style="border:3px solid rgba(255,255,255,.16)">
        <div style="color:#fff;font-family:var(--disp);font-size:17px;font-weight:600;margin-top:12px">${p.name}</div>
        <div style="color:#8FA5B5;font-size:12.5px">Patient · ${p.age} yrs · ${p.dept}</div>
      </div>
    </div>
    <div style="position:absolute;right:14px;bottom:14px;width:29%;max-width:190px;aspect-ratio:16/10;border-radius:12px;background:linear-gradient(150deg,#20465C,#12283A);border:2px solid rgba(255,255,255,.14);display:grid;place-items:center;animation:pop .5s">
      <img class="avatar" src="${avatar(d.name)}" width="46" height="46">
      <div style="position:absolute;bottom:5px;left:8px;color:#DCE7EE;font-size:10.5px;font-weight:600">You · ${d.name}</div>
    </div>
    <div style="position:absolute;left:14px;top:14px;display:flex;gap:7px;align-items:center;background:rgba(0,0,0,.42);padding:6px 11px;border-radius:20px;backdrop-filter:blur(6px)">
      <span style="width:7px;height:7px;border-radius:50%;background:#FF5A5A;animation:pulse 1.6s infinite"></span>
      <span style="color:#fff;font-size:11.5px;font-weight:600;font-family:var(--mono)" id="callTimer">00:00</span>
    </div>`;
  toast('Consultation connected','video');
  let s=0;
  clearInterval(window.callT);
  window.callT=setInterval(()=>{
    const el=$('#callTimer'); if(!el){clearInterval(window.callT);return}
    s++; el.textContent=pad(Math.floor(s/60))+':'+pad(s%60);
  },1000);
}
function endCall(){
  clearInterval(window.callT);
  toast('Consultation ended · summary saved');
  if(PAGE==='telemedicine') render('telemedicine');
}

function bedAct(id,st){
  const b=DB.beds.find(x=>x.id===id);
  const colors={Available:'--green',Occupied:'--blue',Reserved:'--amber',Cleaning:'--teal',Maintenance:'--ink-3'};
  b.status=st; b.color=colors[st];
  b.patient = st==='Occupied' ? pick(DB.patients).name : null;
  closeModal(); render('beds'); toast('Bed '+id+' → '+st);
}

let chatIdx=0;
PAGES.messages=()=>`
  <div class="page-head">

      <div style="overflow-y:auto;padding:0 8px 8px">
        ${DB.msgs.map((m,i)=>`<div onclick="chatIdx=${i};render('messages')" style="display:flex;gap:10px;padding:10px;border-radius:12px;cursor:pointer;transition:.16s;${i===chatIdx?'background:var(--canvas)':''}"
          onmouseover="this.style.background='#F5F9FA'" onmouseout="this.style.background='${i===chatIdx?'var(--canvas)':''}'">
          <div style="position:relative;flex:none">${av(m.name,38)}
            ${m.online?'<span style="position:absolute;right:0;bottom:0;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid #fff"></span>':''}</div>
          <div style="flex:1;min-width:0">

          ${m.unread?`<span style="align-self:center;background:var(--teal);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px">${m.unread}</span>`:''}
        </div>`).join('')}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;overflow:hidden" class="chat-pane">
      <div style="display:flex;align-items:center;gap:11px;padding:14px 18px;border-bottom:1px solid var(--line)">
        ${av(DB.msgs[chatIdx].name,38)}
        <div><div style="font-weight:600;font-size:13.5px">${DB.msgs[chatIdx].name}</div>
          <div style="font-size:11.5px;color:var(--ink-3)">${DB.msgs[chatIdx].role} · ${DB.msgs[chatIdx].online?'online':'last seen 2 h ago'}</div></div>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="icon-btn" onclick="toast('Calling…')">${ico('phone','currentColor',17)}</button>
          <button class="icon-btn" onclick="go('telemedicine')">${ico('video','currentColor',17)}</button>
        </div>
      </div>
      <div id="chatBody" style="flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;background:#FBFCFD">
        ${chatBubbles()}
      </div>
      <div style="padding:12px 14px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center">
        <button class="icon-btn" onclick="toast('Attachment uploaded')">${ico('clip','currentColor',17)}</button>
        <div class="fld" style="flex:1"><input id="chatInput" placeholder="Write a message…" onkeydown="if(event.key==='Enter')sendMsg()" style="flex:1"></div>
        <button class="btn btn-teal" onclick="sendMsg()">${I.send}Send</button>
      </div>
    </div>
  </div>`;
function chatBubbles(){
  const conv=[
    ['them','Morning — bed 214 has been cleared and cleaned.'],
    ['me','Perfect. Can we move the post-op patient from recovery?'],
    ['them','Yes, porters are on the way. ETA about ten minutes.'],
    ['me','Thanks. I will update the ward board.'],
    ['them',DB.msgs[chatIdx].last],
  ];
  return conv.map(c=>`<div style="align-self:${c[0]==='me'?'flex-end':'flex-start'};max-width:70%">
    <div style="padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.55;${c[0]==='me'
      ?'background:var(--ink);color:#fff;border-bottom-right-radius:5px'
      :'background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px'}">${c[1]}</div>
    <div style="font-size:10px;color:var(--ink-3);margin-top:3px;font-family:var(--mono);text-align:${c[0]==='me'?'right':'left'}">${pad(rnd(8,17))}:${pick(['05','21','38','54'])} ${c[0]==='me'?'· read':''}</div>
  </div>`).join('');
}
function sendMsg(){
  const inp=$('#chatInput'); const v=inp.value.trim(); if(!v)return;
  const body=$('#chatBody');
  body.appendChild(el(`<div style="align-self:flex-end;max-width:70%">
    <div style="padding:10px 14px;border-radius:16px;font-size:13px;background:var(--ink);color:#fff;border-bottom-right-radius:5px">${esc(v)}</div>
    <div style="font-size:10px;color:var(--ink-3);margin-top:3px;font-family:var(--mono);text-align:right">now · sent</div></div>`));
  inp.value=''; body.scrollTop=body.scrollHeight;
  const typing=el(`<div style="align-self:flex-start;display:flex;gap:5px;padding:12px 14px;background:#fff;border:1px solid var(--line);border-radius:16px;border-bottom-left-radius:5px">
    <i style="width:6px;height:6px;border-radius:50%;background:var(--ink-3);animation:bounceDot 1.1s infinite"></i>
    <i style="width:6px;height:6px;border-radius:50%;background:var(--ink-3);animation:bounceDot 1.1s .15s infinite"></i>
    <i style="width:6px;height:6px;border-radius:50%;background:var(--ink-3);animation:bounceDot 1.1s .3s infinite"></i></div>`);
  setTimeout(()=>{body.appendChild(typing);body.scrollTop=body.scrollHeight},400);
  setTimeout(()=>{
    typing.remove();
    body.appendChild(el(`<div style="align-self:flex-start;max-width:70%">
      <div style="padding:10px 14px;border-radius:16px;font-size:13px;background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px">${pick(['Understood — I will action that now.','Noted, thanks for the update.','On it. Will confirm in a few minutes.','Copy that. The ward board is updated.'])}</div>
      <div style="font-size:10px;color:var(--ink-3);margin-top:3px;font-family:var(--mono)">now</div></div>`));
    body.scrollTop=body.scrollHeight;
  },2200);
}

function closeAssistant(){

function vaSet(state,title,sub,status){
  vaState=state;
  const va=$('.va'); if(!va)return;
  va.dataset.state=state;
  const t=$('#vaTitle'), s=$('#vaSub'), st=$('#vaStatus');
  t.textContent=title; s.innerHTML=sub; st.textContent=status;
  t.animate([{opacity:0,transform:'translateY(7px)'},{opacity:1,transform:'none'}],{duration:280});
  $('#vaPtt').classList.toggle('held',state==='listening');
  $('#vaPtt').classList.toggle('busy',state==='thinking'||state==='speaking');
}
function vaStart(){
  vaBusy=true;
  vaSet('listening','Listening','Keep holding — I can hear you','Listening');
  $('#vaHint').innerHTML='<b>Release</b> when you have finished speaking';
  navigator.vibrate?.(12);
}
function vaStop(idx){
  const pair = VA_LINES[idx!==undefined?idx:rnd(0,VA_LINES.length-1)];
  vaBubble('me',pair[0]);
  vaSet('thinking','Thinking','Working through the workspace data','Thinking');
  $('#vaHint').textContent='One moment…';
  setTimeout(()=>vaSpeak(pair[1]),1800);
}
function vaAsk(i){
  if(vaBusy)return;
  vaBusy=true;
  vaSet('listening','Listening','Keep holding — I can hear you','Listening');
  setTimeout(()=>vaStop(i),1200);
}
function vaSpeak(text){
  vaSet('speaking','Speaking','','Speaking');
  $('#vaHint').textContent='Vera is answering…';
  const bub=vaBubble('bot','');
  // type the answer out across the 6 second speaking window
  const DUR=6000, step=Math.max(14, Math.floor(DUR/Math.max(text.length,1)));
  let i=0;
  const sub=$('#vaSub');
  const typer=setInterval(()=>{
    i++; bub.textContent=text.slice(0,i);
    sub.textContent=text.slice(Math.max(0,i-58),i);
    $('#vaScript').scrollTop=$('#vaScript').scrollHeight;
    if(i>=text.length) clearInterval(typer);
  },step);
  setTimeout(()=>{
    clearInterval(typer);
    bub.textContent=text;
    vaSet('idle','Hold the button and speak','Vera listens while you hold, then answers out loud','Ready');
    $('#vaHint').innerHTML='<b>Hold to talk</b> · release to hear the answer';
    vaBusy=false;
  },DUR);
}
function vaBubble(who,text){
  const b=el(`<div class="bub ${who}">${esc(text)}</div>`);
  $('#vaScript').appendChild(b);
  $('#vaScript').scrollTop=$('#vaScript').scrollHeight;
  return b;
}
/* live waveform + frequency spectrum */
function vaAnimate(){
  const wave=$('#vaWave'), freq=$('#vaFreq');
  if(!wave){vaRaf=null;return}
  const bars=[...wave.children], fbars=[...freq.children];
  let t=0;
  const loop=()=>{
    if(!document.body.contains(wave)){vaRaf=null;return}
    t+=0.09;
    const target = vaState==='listening'?1 : vaState==='speaking'?0.85 : vaState==='thinking'?0.22 : 0.1;
    vaLevel += (target-vaLevel)*0.14;
    bars.forEach((b,i)=>{
      const c=1-Math.abs(i-bars.length/2)/(bars.length/2);      // centre emphasis
      let v;
      if(vaState==='listening') v = (Math.sin(t*2.6+i*.42)*.5+.5)*Math.random()*.9+.12;
      else if(vaState==='speaking') v = (Math.sin(t*3.4+i*.3)*.5+.5)*(.45+Math.random()*.55);
      else if(vaState==='thinking') v = (Math.sin(t*1.5+i*.5)*.5+.5)*.35;
      else v = (Math.sin(t*.9+i*.35)*.5+.5)*.2+.05;
      const h = 4 + v*vaLevel*(0.35+c*0.75)*66;
      b.style.height=h.toFixed(1)+'px';
    });
    fbars.forEach((b,i)=>{
      const v=(Math.sin(t*2.1+i*.7)*.5+.5)*(vaState==='idle'?.25:Math.random());
      b.style.height=(3+v*vaLevel*26).toFixed(1)+'px';
    });
    vaRaf=requestAnimationFrame(loop);
  };
  loop();
}

let sigCtx=null, sigHas=false, sigDrawing=false;
function openSignature(reportId){
  openModal(`

      </div>
      <div class="sig-meta">
        Signing as <b style="color:var(--ink)">Dr. A. Whitfield</b> · Chief of Medicine · Meridian General<br>
        Document <span style="font-family:var(--mono)">${reportId}</span> · this signature is applied only within the current session.
      </div>
    </div>
    <div class="m-foot" id="sigFoot">
      <button class="btn btn-ghost" onclick="clearSig()">Clear</button>
      <span style="flex:1"></span>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-teal" id="sigOk" disabled onclick="confirmSig('${reportId}')">${ico('check','currentColor',15)}Confirm signature</button>
    </div>`,'md');
  initSigPad();
}
function initSigPad(){
  const cv=$('#sigPad'); if(!cv)return;
  const fit=()=>{
    const r=cv.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
    cv.width=r.width*dpr; cv.height=r.height*dpr;
    sigCtx=cv.getContext('2d');
    sigCtx.scale(dpr,dpr);
    sigCtx.lineWidth=2.6; sigCtx.lineCap='round'; sigCtx.lineJoin='round';
    sigCtx.strokeStyle=C('--ink')||'#0D1B26';
  };
  fit();
  sigHas=false; sigDrawing=false;
  const pos=e=>{const r=cv.getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top}};
  const start=e=>{
    e.preventDefault(); sigDrawing=true;
    const p=pos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y);
    sigCtx.lineWidth = e.pressure && e.pressure>0 && e.pressure<1 ? 1.4+e.pressure*3 : 2.6;
    if(!sigHas){sigHas=true;$('#sigHint').style.opacity=0;$('#sigOk').disabled=false}
  };
  const move=e=>{
    if(!sigDrawing)return; e.preventDefault();
    const p=pos(e);
    if(e.pressure && e.pressure>0 && e.pressure<1) sigCtx.lineWidth=1.4+e.pressure*3;
    sigCtx.lineTo(p.x,p.y); sigCtx.stroke();
  };
  const end=()=>{sigDrawing=false};
  cv.addEventListener('pointerdown',start);
  cv.addEventListener('pointermove',move);
  window.addEventListener('pointerup',end);
  cv.addEventListener('pointerleave',end);
}
function clearSig(){
  const cv=$('#sigPad'); if(!cv||!sigCtx)return;
  sigCtx.clearRect(0,0,cv.width,cv.height);
  sigHas=false; $('#sigOk').disabled=true; $('#sigHint').style.opacity=1;
}
const SIG_STEPS=['Validating signature','Applying digital signature','Updating report','Signature verified','Report successfully signed'];
function confirmSig(reportId){
  const data=$('#sigPad').toDataURL('image/png');
  const body=$('#sigBody'), foot=$('#sigFoot');
  foot.style.display='none';
  body.innerHTML=`<div class="wf" style="padding:24px 10px 10px">
    <div class="wf-steps">${SIG_STEPS.map(s=>`<div class="wf-step"><span class="wf-dot"></span><span>${s}</span></div>`).join('')}</div>
  </div>`;
  const steps=$$('.wf-step',body);
  let i=0;
  const tick=()=>{
    if(i>0){steps[i-1].classList.remove('on');steps[i-1].classList.add('done')}
    if(i<SIG_STEPS.length){steps[i].classList.add('on');i++;setTimeout(tick,SP(850))}
    else{
      body.innerHTML=`<div class="wf" style="padding:10px">
        <div class="success-pop"><div class="success-ring"><div>${I.check}</div></div></div>
        <h2 style="font-family:var(--disp);font-size:20px;margin-top:12px">Report signed</h2>
        <p style="color:var(--ink-3);font-size:13px;margin-top:5px">The signature has been applied to ${reportId}.</p></div>`;
      SIGNED[reportId]=data;
      setTimeout(()=>{
        closeModal();
        const sig=$('#rpSig');
        if(sig && window.__R && window.__R.id===reportId){
          sig.innerHTML=signedBlock(window.__R);
          sig.style.borderStyle='solid';
          sig.style.borderColor='color-mix(in srgb, var(--green) 40%, transparent)';
          sig.scrollIntoView({behavior:'smooth',block:'center'});
          markSignedBadge();
        }
        toast('Report '+reportId+' successfully signed');
        pushNotif('sign',reportId+' was signed by Dr. A. Whitfield');
      },SP(1100));
    }
  };
  setTimeout(tick,SP(250));
}

const VN_STEPS=['Recording','Processing audio','Transcribing','Formatting clinical notes','Notes ready'];
const VN_TEXT=`Ward round note — bed F2-40.

Patient reviewed this morning with the attending nurse present. Overnight observations were within the expected range and no new concerns were raised by the night team.

Plan:
• Continue current observation schedule
• Repeat routine bloods in the morning
• Physiotherapy to assess mobility before discharge planning
• Reassess at the evening round

Discharge is provisionally targeted for the end of the week, subject to the morning review.`;
function vnIdle(){
  return `<div class="vn-idle">
    <button class="vn-start" onclick="vnStart()">${ico('mic','#fff',34)}</button>
    <div style="text-align:center">
      <div style="font-family:var(--disp);font-size:15px;font-weight:600">Start recording</div>
      <div style="font-size:12px;color:var(--ink-3);margin-top:3px">Dictate a note — Vera formats it into a clinical record</div>
    </div>
  </div>`;
}
function vnStart(){
  const card=$('#vnCard'); if(!card)return;
  const bars=Array.from({length:30},()=>'<i></i>').join('');
  card.innerHTML=`<div class="vn-rec">
    <div class="vn-dot"><i></i></div>
    <div class="vn-timer" id="vnTime">00:00</div>
    <div class="vn-wave" id="vnWave">${bars}</div>
    <div style="font-size:12px;color:var(--ink-3)">Recording · microphone input is simulated</div>
    <button class="btn btn-primary" onclick="vnStop()">Stop recording</button>
  </div>`;
  let s=0, f=0;
  clearInterval(window.vnT); clearInterval(window.vnW);
  window.vnT=setInterval(()=>{
    const t=$('#vnTime'); if(!t){clearInterval(window.vnT);return}
    s++; t.textContent=pad(Math.floor(s/60))+':'+pad(s%60);
  },1000);
  window.vnW=setInterval(()=>{
    const w=$('#vnWave'); if(!w){clearInterval(window.vnW);return}
    f++;
    $$('#vnWave i').forEach((b,i)=>b.style.height=(5+Math.abs(Math.sin(f*.4+i*.6))*Math.random()*36).toFixed(0)+'px');
  },110);
}
function vnStop(){
  clearInterval(window.vnT); clearInterval(window.vnW);
  const card=$('#vnCard'); if(!card)return;
  card.innerHTML=`<div class="wf" style="padding:22px 10px">
    <div class="wf-steps">${VN_STEPS.map(s=>`<div class="wf-step"><span class="wf-dot"></span><span>${s}</span></div>`).join('')}</div>
  </div>`;
  const steps=$$('.wf-step',card);
  steps[0].classList.add('done');
  let i=1;
  const tick=()=>{
    if(!document.body.contains(card))return;
    if(i>1){steps[i-1].classList.remove('on');steps[i-1].classList.add('done')}
    if(i<VN_STEPS.length){steps[i].classList.add('on');i++;setTimeout(tick,SP(1000))}
    else vnReady();
  };
  setTimeout(tick,SP(500));
}
function vnReady(){
  const card=$('#vnCard'); if(!card)return;
  card.innerHTML=`<div style="padding:16px">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:12px">
      <span class="tag t-green"><i></i>Transcribed</span>
      <span style="font-size:11.5px;color:var(--ink-3)">Editable · 38 seconds of audio</span>
    </div>
    <div class="f"><label>Clinical note</label><textarea id="vnText" style="min-height:190px">${VN_TEXT}</textarea></div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="$('#vnCard').innerHTML=vnIdle()">Discard</button>
      <button class="btn btn-ghost btn-sm" onclick="vnStart()">${I.mic}Record again</button>
      <span style="flex:1"></span>
      <button class="btn btn-teal btn-sm" onclick="toast('Voice note saved to the patient record');$('#vnCard').innerHTML=vnIdle()">Save note</button>
    </div>
  </div>`;
}

/* ---------------- DOWNLOAD CONFIRMATION ---------------- */
function dl(label='Report'){
  const o=openModal(`
    <div class="dl-body" id="dlBody">
      <div class="dl-ring">
        <svg width="66" height="66"><circle cx="33" cy="33" r="28" fill="none" stroke="var(--canvas)" stroke-width="5"/>
          <circle id="dlArc" cx="33" cy="33" r="28" fill="none" stroke="var(--teal)" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="175.9" stroke-dashoffset="175.9" style="transition:stroke-dashoffset 1s cubic-bezier(.3,.9,.3,1)"/></svg>
        <div class="dl-ico">${ico('dl','currentColor',24)}</div>
      </div>
      <h3>Preparing your file</h3>
      <p id="dlPct">0%</p>
      <div class="dl-bar"><i id="dlBar"></i></div>
    </div>`,'dl-modal');
  const arc=$('#dlArc',o), bar=$('#dlBar',o), pct=$('#dlPct',o);
  requestAnimationFrame(()=>{arc.style.strokeDashoffset=0;bar.style.width='100%'});
  let p=0;
  const t=setInterval(()=>{p=Math.min(100,p+rnd(9,22)); if(pct)pct.textContent=p+'%'; if(p>=100)clearInterval(t)},110);
  setTimeout(()=>{
    clearInterval(t);
    const b=$('#dlBody',o); if(!b)return;
    b.innerHTML=`
      <div class="dl-ok"><div>${I.check}</div></div>
      <h3>Download completed</h3>
      <p>${esc(label)}</p>
      <button class="btn btn-ghost btn-sm" style="margin-top:16px" onclick="closeModal()">Close</button>`;
    toast(esc(label)+' downloaded successfully');
    setTimeout(()=>{ if($('#layer').lastElementChild===o) closeModal(); },SP(1600));
  },SP(1150));
}

function kpiCard(k){

  const pts=spark.map((v,i)=>`${i*9},${30-v}`).join(' ');
  return `<div class="card kpi" onclick="openKpi('${key}')">
    <svg class="spark" width="118" height="34" viewBox="0 0 118 34"><polyline points="${pts}" fill="none" stroke="var(${k.c})" stroke-width="2" opacity=".35" stroke-linecap="round"/></svg>

const RP_FLOWS={
  patient:{steps:['Accessing patient record','Reviewing medical history','Preparing health summary','Building charts','Report ready'],ms:[520,560,540,520,420]},
  laboratory:{steps:['Accessing laboratory records','Collecting sample results','Verifying reference ranges','Building charts','Report ready'],ms:[520,560,540,520,420]},
  operations:{steps:['Accessing hospital records','Collecting department statistics','Reviewing activity','Analysing operational data','Preparing charts','Generating summary','Report ready'],ms:[560,580,560,580,560,560,480]},
};
RP_FLOWS.department=RP_FLOWS.operations;

function generateReport(type='operations',subject=''){
  const tpl=RP_TEMPLATES[type]||RP_TEMPLATES.operations;
  const flow=RP_FLOWS[type]||RP_FLOWS.operations;
  openModal(`
    <div class="m-head">
      <div style="width:38px;height:38px;border-radius:11px;background:var(--amber-soft);color:var(--amber);display:grid;place-items:center">${ico('file','currentColor',19)}</div>
      <div><h2>Generating report</h2><div class="sub">${tpl.name}${subject?' · '+esc(subject):''}</div></div>
    </div>
    <div class="m-body" id="rpWf">
      <div class="wf" style="padding:18px 10px 6px">
        <div class="wf-ring">
          <svg width="96" height="96"><circle cx="48" cy="48" r="42" fill="none" stroke="var(--canvas)" stroke-width="7"/>
            <circle id="rpArc" cx="48" cy="48" r="42" fill="none" stroke="var(--teal)" stroke-width="7" stroke-linecap="round"
              stroke-dasharray="263.9" stroke-dashoffset="263.9" style="transition:stroke-dashoffset .55s cubic-bezier(.3,.9,.3,1)"/></svg>
          <div class="wf-pct" id="rpPct">0%</div>
        </div>
        <div class="wf-steps">${flow.steps.map(s=>`<div class="wf-step"><span class="wf-dot"></span><span>${s}</span></div>`).join('')}</div>
      </div>
    </div>`,'md');
  const steps=$$('.wf-step',$('#rpWf')), arc=$('#rpArc'), pct=$('#rpPct');
  let i=0;
  const tick=()=>{
    if(!$('#rpWf'))return;
    if(i>0){steps[i-1].classList.remove('on');steps[i-1].classList.add('done')}
    if(i<flow.steps.length){
      steps[i].classList.add('on');
      const p=Math.round((i+1)/flow.steps.length*100);
      arc.style.strokeDashoffset=263.9*(1-p/100); pct.textContent=p+'%';
      const d=flow.ms[i]; i++;
      setTimeout(tick,SP(d));
    } else {
      closeModal();
      setTimeout(()=>showReport(type,subject),SP(220));
    }
  };
  setTimeout(tick,SP(180));
}

  'Allergy Screening':[['Total IgE','IU/mL','< 100',180,1240],['Eosinophils','%','1 – 4',5,58]],
  'Electrolyte Panel':[['Sodium','mmol/L','135 – 145',1330,1470],['Potassium','mmol/L','3.5 – 5.1',33,54],
    ['Chloride','mmol/L','98 – 107',960,1100],['Calcium','mg/dL','8.6 – 10.2',84,105]],
  'Inflammation Markers':[['C-reactive protein','mg/L','< 5',3,86],['ESR','mm/h','< 20',60,320]],
  'General Metabolic Panel':[['Glucose','mg/dL','70 – 99',650,1090],['Sodium','mmol/L','135 – 145',1330,1470],
    ['Creatinine','mg/dL','0.6 – 1.3',55,145],['Protein, total','g/dL','6.0 – 8.3',58,86]],
};
const LAB_NAMES=Object.keys(LAB_PANELS);
function labRows(panel){
  return (LAB_PANELS[panel]||LAB_PANELS['Complete Blood Count']).map(a=>{
    const raw=rnd(a[3],a[4]);
    const val=(raw/(a[3]>=1000?10:a[3]>=100?10:10)).toFixed(a[1]==='%'||a[1]==='g/dL'||a[1]==='mg/dL'&&a[4]<200?1:1);
    const r=Math.random();
    const st=r<.66?['Within range','t-green']:r<.86?['Slight variation','t-amber']:r<.96?['Review recommended','t-rose']:['Awaiting review','t-gray'];
    return {a:a[0],u:a[1],ref:a[2],v:val,st:st[0],tag:st[1]};
  });
}

/* ---------------- DIGITAL SIGNATURE (faster, reusable) ---------------- */
const SIG_FLOW={
  report:['Validating signature','Applying signature','Updating report','Report signed'],
  lab:['Validating signature','Applying signature','Saving laboratory result','Completed'],
};
function openSignature(docId,ctx='report'){
  openModal(`
    <div class="m-head">
      <div style="width:38px;height:38px;border-radius:11px;background:var(--violet-soft);color:var(--violet);display:grid;place-items:center">${ico('badge','currentColor',19)}</div>
      <div><h2>Digital signature</h2><div class="sub">Sign with a mouse, trackpad, stylus or tablet pen</div></div>
      <button class="x" onclick="closeModal()">${I.x}</button>
    </div>
    <div class="m-body" id="sigBody">
      <div class="sig-wrap">
        <canvas id="sigPad"></canvas>
        <div class="sig-base"></div>
        <div class="sig-x">×</div>
        <div class="sig-hint" id="sigHint">Sign here</div>
      </div>
      <div class="sig-meta">
        Signing as <b style="color:var(--ink)">Dr. A. Whitfield</b> · Chief of Medicine · Meridian General<br>
        Document <span style="font-family:var(--mono)">${docId}</span> · the signature is retained for the current session.
      </div>
    </div>
    <div class="m-foot" id="sigFoot">
      <button class="btn btn-ghost" onclick="clearSig()">Clear</button>
      <span style="flex:1"></span>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-teal" id="sigOk" disabled onclick="confirmSig('${docId}','${ctx}')">${ico('check','currentColor',15)}Confirm signature</button>
    </div>`,'md');
  initSigPad();
}
function confirmSig(docId,ctx='report'){
  const data=$('#sigPad').toDataURL('image/png');
  const body=$('#sigBody'), foot=$('#sigFoot');
  const flow=SIG_FLOW[ctx]||SIG_FLOW.report;
  foot.style.display='none';
  body.innerHTML=`<div class="wf" style="padding:20px 10px 6px">
    <div class="wf-steps">${flow.map(s=>`<div class="wf-step"><span class="wf-dot"></span><span>${s}</span></div>`).join('')}</div>
  </div>`;
  const steps=$$('.wf-step',body);
  let i=0;
  const tick=()=>{
    if(!document.body.contains(body))return;
    if(i>0){steps[i-1].classList.remove('on');steps[i-1].classList.add('done')}
    if(i<flow.length){steps[i].classList.add('on');i++;setTimeout(tick,SP(360))}
    else{
      steps[flow.length-1].classList.add('done');
      SIGNED[docId]=data;
      body.innerHTML=`<div class="wf" style="padding:6px 10px">
        <div class="success-pop"><div class="success-ring"><div>${I.check}</div></div></div>
        <h2 style="font-family:var(--disp);font-size:19px;margin-top:10px">${ctx==='lab'?'Laboratory result signed':'Report signed'}</h2>
        <p style="color:var(--ink-3);font-size:13px;margin-top:5px">${docId}</p></div>`;
      setTimeout(()=>{
        closeModal();
        if(ctx==='lab'){
          const s=$('#labSig');
          if(s){
            s.innerHTML=labSignedBlock(docId);
            s.style.borderStyle='solid';
            s.style.borderColor='color-mix(in srgb, var(--green) 40%, transparent)';
            s.scrollIntoView({behavior:'smooth',block:'center'});
            const slot=$('#labBadgeSlot');
            if(slot&&!slot.children.length) slot.innerHTML=`<span class="rp-badge">${ico('check','#fff',14)}Signed</span>`;
          }
          toast('Laboratory result successfully signed and saved');
          pushNotif('sign',docId+' was signed and filed');
        } else {
          const sig=$('#rpSig');
          if(sig && window.__R && window.__R.id===docId){
            sig.innerHTML=signedBlock(window.__R);
            sig.style.borderStyle='solid';
            sig.style.borderColor='color-mix(in srgb, var(--green) 40%, transparent)';
            sig.scrollIntoView({behavior:'smooth',block:'center'});
            markSignedBadge();
          }
          toast('Report successfully signed');
          pushNotif('sign',docId+' was signed by Dr. A. Whitfield');
        }
      },SP(480));
    }
  };
  setTimeout(tick,SP(150));
}
function labSignedBlock(id){
  return `<div class="sig-done">
    <div><img src="${SIGNED[id]}" alt="signature"></div>
    <div class="sd-meta">
      <b style="color:var(--ink);font-size:13px;display:block">Dr. A. Whitfield</b>
      Verified and filed · ${new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}<br>
      <span style="font-family:var(--mono);font-size:11px">CERT ${id}-${rnd(10000,99999)} · VERIFIED</span>
    </div>
    <span class="rp-badge">${ico('check','#fff',14)}Signed</span>
  </div>`;
}

  green:{n:'Clinical Green',d:'Warm clinical palette',dark:false,p:['#10201A','#EFF6F1','#16A97C','#0E9E96']},

  dark:{n:'Dark Navy',d:'Low-light, high contrast',dark:true,p:['#0C1520','#141F2E','#0E9E96','#2F62F5']},
  midnight:{n:'Midnight Medical',d:'Deep charcoal with cyan highlights',dark:true,p:['#0A0E14','#12181F','#0FA3C4','#2F62F5']},
};
const ACCENT_LIST={
  teal:{c:'#0E9E96',s:'#E2F4F2',d:'#0C2E2C'},
  blue:{c:'#2F62F5',s:'#E7EDFE',d:'#132444'},
  green:{c:'#16A97C',s:'#E2F5EF',d:'#0D2C24'},
  cyan:{c:'#0FA3C4',s:'#E1F4F9',d:'#0B2C36'},

  indigo:{c:'#4A5AD9',s:'#E9EBFB',d:'#1B1F42'},
  azure:{c:'#1E85D8',s:'#E4F0FB',d:'#0E2740'},
  coral:{c:'#EE6C55',s:'#FCEAE6',d:'#3A1E19'},
  amber:{c:'#E8952C',s:'#FDF0DF',d:'#382812'},
  rose:{c:'#E0525F',s:'#FCE9EA',d:'#3A1B20'},
};
function applyTheme(t,animate=true){
  if(!THEME_LIST[t])t='blue';
  PREF.theme=t;
  try{sessionStorage.setItem('vireon.theme',t)}catch(_){}
  const r=document.documentElement;
  if(animate && PREF.uiAnim){document.body.classList.add('theming');setTimeout(()=>document.body.classList.remove('theming'),520)}
  if(t==='blue') r.removeAttribute('data-theme'); else r.setAttribute('data-theme',t);
  r.toggleAttribute('data-dark',!!THEME_LIST[t].dark);
  applyAccent(PREF.accent,false);
}
function applyAccent(a,animate=true){
  if(!ACCENT_LIST[a])a='teal';
  PREF.accent=a;
  try{sessionStorage.setItem('vireon.accent',a)}catch(_){}
  const r=document.documentElement, A=ACCENT_LIST[a];
  if(animate && PREF.uiAnim){document.body.classList.add('theming');setTimeout(()=>document.body.classList.remove('theming'),520)}
  r.style.setProperty('--teal',A.c);
  r.style.setProperty('--teal-soft',THEME_LIST[PREF.theme].dark?A.d:A.s);
}

/* ---------------- HOVER TOOLTIPS FOR EVERY CHART ---------------- */
(function tooltips(){
  const tip=el('<div id="tip"></div>');
  document.body.appendChild(tip);
  let raf=null;
  document.addEventListener('mouseover',e=>{
    const t=e.target;
    if(!(t instanceof SVGElement))return;
    const title=t.querySelector?.('title');
    if(!title||!title.textContent)return;
    tip.textContent=title.textContent;
    tip.classList.add('on');
    t.style.filter='brightness(1.09)';
  });
  document.addEventListener('mouseout',e=>{
    const t=e.target;
    if(t instanceof SVGElement) t.style.filter='';
    tip.classList.remove('on');
  });
  document.addEventListener('mousemove',e=>{
    if(!tip.classList.contains('on'))return;
    if(raf)return;
    raf=requestAnimationFrame(()=>{
      raf=null;
      const w=tip.offsetWidth, h=tip.offsetHeight;
      let x=e.clientX+14, y=e.clientY-h-10;
      if(x+w>innerWidth-8) x=e.clientX-w-14;
      if(y<8) y=e.clientY+18;
      tip.style.left=x+'px'; tip.style.top=y+'px';
    });
  });
})();

function doSearch(q){
  const panel=$('#searchPanel');
  q=q.trim();
  if(q.length<1){ panel.classList.remove('on'); panel.innerHTML=''; SR=[]; SRI=-1; return; }
  const all=searchIndex().filter(x=>x.k.toLowerCase().includes(q.toLowerCase()));
  const groups={};
  all.forEach(x=>{ (groups[x.g]=groups[x.g]||[]).push(x) });
  SR=[]; SRI=-1;
  let html='';
  Object.keys(groups).forEach(g=>{
    const items=groups[g].slice(0,4);
    html+=`<div class="sr-group">${g}<span></span><b style="font-family:var(--mono);font-weight:600">${groups[g].length}</b></div>`;
    items.forEach(x=>{
      const n=SR.length; SR.push(x);
      html+=`<div class="sr" data-n="${n}" onclick="pickResult(${n})" onmouseenter="hoverResult(${n})">
        <span class="sr-i" style="background:color-mix(in srgb, var(${x.c}) 12%, transparent);color:var(${x.c})">${ico(x.i,'currentColor',16)}</span>
        <span style="flex:1;min-width:0"><span class="sr-t" style="display:block">${hl(x.t,q)}</span><span class="sr-s" style="display:block">${hl(x.s,q)}</span></span>
        <span class="sr-k">↵</span></div>`;
    });
  });
  if(!SR.length) html=`<div class="sr-empty">${ico('search','currentColor',26)}<div style="margin-top:8px">Nothing matches “${esc(q)}”</div></div>`;
  else html+=`<div class="sr-foot"><b>↑↓</b> navigate <b>↵</b> open <b>esc</b> close<span style="flex:1"></span>${SR.length} of ${all.length} shown</div>`;
  panel.innerHTML=html;
  panel.classList.add('on');
  if(SR.length) hoverResult(0);
}
function hoverResult(n){
  SRI=n;
  $$('#searchPanel .sr').forEach(e=>e.classList.toggle('sel',+e.dataset.n===n));
}
function pickResult(n){
  const x=SR[n]; if(!x)return;
  closeSearch();
  setTimeout(()=>x.go(),120);
}
function closeSearch(){
  $('#searchPanel')?.classList.remove('on');
  const i=$('#gSearch'); if(i){i.value='';i.blur()}
  SR=[]; SRI=-1;
}
function searchKey(e){
  const panel=$('#searchPanel');
  if(e.key==='Escape'){ closeSearch(); return; }
  if(!SR.length)return;
  if(e.key==='ArrowDown'){ e.preventDefault(); hoverResult((SRI+1)%SR.length); scrollSel(); }
  if(e.key==='ArrowUp'){ e.preventDefault(); hoverResult((SRI-1+SR.length)%SR.length); scrollSel(); }
  if(e.key==='Enter'){ e.preventDefault(); pickResult(SRI<0?0:SRI); }
}
function scrollSel(){
  $('#searchPanel .sr.sel')?.scrollIntoView({block:'nearest'});
}

  paintFavCount();
}
function paintFavCount(){
  const n=Object.values(FAVS).reduce((a,b)=>a+b.length,0);

}

        <span class="li-r">Reopen</span></div>`).join('')
       :`<div class="empty">${ico('file','currentColor',40)}<div>No bookmarked reports. Generate a report and tap the star to keep it here.</div></div>`);

  const html=`
    <div class="m-head">
      <div style="width:38px;height:38px;border-radius:11px;background:var(--amber-soft);color:var(--amber);display:grid;place-items:center">${ico('star','currentColor',19)}</div>

      ${[['favourites','Favourites',Object.values(FAVS).reduce((a,b)=>a+b.length,0)],
         ['recent','Recent',RECENTS.length],['bookmarks','Bookmarked reports',FAVS.reports.length]]
        .map(t=>`<button class="${favTab===t[0]?'on':''}" onclick="favPanelSwap('${t[0]}')">${t[1]}${t[2]?` <span class="pill" style="margin-left:5px">${t[2]}</span>`:''}</button>`).join('')}
    </div>

      <button class="btn btn-ghost" onclick="RECENTS.length=0;favPanelSwap('recent');toast('Recent history cleared')">Clear recent</button>
    </div>`;

  else openModal(html,'sm');
}
function favPanelSwap(t){ favTab=t; favPanel(t); }
function favOpen(kind,id){
  if(kind==='patients') openPatient(id);
  else if(kind==='doctors') openDoctor(id);
  else if(kind==='departments') openDept(id);
  else if(kind==='reports'){
    const r=RECENTS.find(x=>x.id===id);
    generateReport(r?.rtype||'operations', r?.subject||'');
  }
}
function recOpen(t,id){
  if(t==='patient') openPatient(id);
  else if(t==='doctor') openDoctor(id);
  else if(t==='department') openDept(id);
  else if(t==='report'){ const r=RECENTS.find(x=>x.id===id); generateReport(r?.rtype||'operations', r?.subject||''); }
  else if(t==='appointment'){ const r=RECENTS.find(x=>x.id===id); render('appointments'); setTimeout(()=>openAppt(r?.n||0),620); }
  else if(t==='lab'){ const r=RECENTS.find(x=>x.id===id); render('laboratory'); setTimeout(()=>openLabResult(r?.n||0),620); }
}
function ago(ts){
  const s=Math.round((Date.now()-ts)/1000);
  if(s<60)return 'just now';
  if(s<3600)return Math.round(s/60)+' min ago';
  return Math.round(s/3600)+' h ago';
}

let SEL={kind:null,ids:new Set()};
const CB=`<span class="cbx">${ico('check','#fff',11)}</span>`;
function selToggle(kind,id,e){
  e.stopPropagation();
  if(SEL.kind!==kind){ SEL={kind,ids:new Set()} }
  SEL.ids.has(id)?SEL.ids.delete(id):SEL.ids.add(id);
  paintSel();
}
function selAll(kind,ids,e){
  e.stopPropagation();
  if(SEL.kind===kind && SEL.ids.size===ids.length) SEL={kind:null,ids:new Set()};
  else SEL={kind,ids:new Set(ids)};
  paintSel();
}
function paintSel(){
  $$('tr[data-sel]').forEach(tr=>{
    const on=SEL.ids.has(tr.dataset.sel);
    tr.classList.toggle('picked',on);
    $('.cbx',tr)?.classList.toggle('on',on);
  });
  const head=$('.cbx-all');
  if(head) head.classList.toggle('on', SEL.ids.size>0 && SEL.ids.size===$$('tr[data-sel]').length);
  const bar=$('#selBar');
  if(!bar)return;
  const n=SEL.ids.size;
  bar.classList.toggle('on',n>0);
  if(n) $('.cnt b',bar).textContent=n;
  const label=SEL.kind==='patient'?'patient':SEL.kind==='appt'?'appointment':'sample';
  if(n) $('.cnt span',bar).textContent=' '+label+(n>1?'s':'')+' selected';
}
function selClear(){ SEL={kind:null,ids:new Set()}; paintSel(); }
function selAction(a){
  const n=SEL.ids.size;
  if(!n)return;
  if(a==='report'){
    const kind=SEL.kind;
    selClear();
    generateReport(kind==='lab'?'laboratory':kind==='appt'?'scheduling':'operations', n+' selected records');
    return;
  }
  if(a==='export'){ dl(n+' records.csv'); selClear(); return; }
  const flows={
    status:['Validating selection','Applying new status','Updating records','Completed'],
    doctor:['Checking availability','Assigning clinician','Notifying the team','Completed'],
    notes:['Opening records','Appending note','Saving changes','Completed'],
  };
  const titles={status:'Change status',doctor:'Assign doctor',notes:'Add notes'};
  const fields={
    status:`<div class="f"><label>New status</label><select><option>Confirmed</option><option>Checked In</option><option>Under Review</option><option>Completed</option></select></div>`,
    doctor:`<div class="f"><label>Assign to</label><select>${DB.doctors.map(d=>`<option>${d.name}</option>`).join('')}</select></div>`,
    notes:`<div class="f"><label>Note</label><textarea placeholder="This note will be appended to every selected record…">Reviewed during the morning round. No action outstanding.</textarea></div>`,
  };
  openModal(`
    <div class="m-head">
      <div style="width:38px;height:38px;border-radius:11px;background:var(--teal-soft);color:var(--teal);display:grid;place-items:center">${ico('layers','currentColor',19)}</div>
      <div><h2>${titles[a]}</h2><div class="sub">${n} record${n>1?'s':''} selected</div></div>
      <button class="x" onclick="closeModal()">${I.x}</button></div>
    <div class="m-body" id="bulkBody">${fields[a]}
      <div class="card list mt">
        ${[...SEL.ids].slice(0,5).map(id=>`<div class="li" style="cursor:default">
          <span class="li-ico" style="background:var(--teal-soft);color:var(--teal)">${ico('check','currentColor',15)}</span>
          <div class="li-main"><div class="li-t" style="font-family:var(--mono);font-size:12px">${id}</div></div></div>`).join('')}
        ${n>5?`<div class="li" style="cursor:default"><div class="li-main"><div class="li-s">and ${n-5} more…</div></div></div>`:''}
      </div>
    </div>
    <div class="m-foot" id="bulkFoot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <span style="flex:1"></span>
      <button class="btn btn-teal" onclick="bulkRun('${a}')">${ico('check','currentColor',15)}Apply to ${n} record${n>1?'s':''}</button>
    </div>`,'md');
  window.__bulkFlow=flows[a];
}
function bulkRun(a){
  const body=$('#bulkBody'), foot=$('#bulkFoot'), flow=window.__bulkFlow;
  const n=SEL.ids.size;
  foot.style.display='none';
  body.innerHTML=`<div class="wf" style="padding:22px 10px 6px">
    <div class="wf-steps">${flow.map(s=>`<div class="wf-step"><span class="wf-dot"></span><span>${s}</span></div>`).join('')}</div></div>`;
  const steps=$$('.wf-step',body);
  let i=0;
  const tick=()=>{
    if(!document.body.contains(body))return;
    if(i>0){steps[i-1].classList.remove('on');steps[i-1].classList.add('done')}
    if(i<flow.length){steps[i].classList.add('on');i++;setTimeout(tick,SP(480))}
    else{
      steps[flow.length-1].classList.add('done');
      body.innerHTML=`<div class="wf" style="padding:6px 10px">
        <div class="success-pop"><div class="success-ring glow-ok"><div>${I.check}</div></div></div>
        <h2 style="font-family:var(--disp);font-size:19px;margin-top:10px">${n} record${n>1?'s':''} updated</h2>
        <p style="color:var(--ink-3);font-size:13px;margin-top:5px">The change has been applied across the selection.</p></div>`;
      setTimeout(()=>{
        closeModal(); selClear();
        toast(n+' record'+(n>1?'s':'')+' updated successfully');
        render(PAGE);
      },SP(900));
    }
  };
  setTimeout(tick,SP(180));
}

    <button class="x" onclick="selClear()" title="Clear selection">${I.x}</button>
  </div>`));
}

/* ---------------- DASHBOARD WIDGET DRAG ---------------- */
let dragEl=null;
function enableWidgetDrag(container){
  if(!container)return;
  $$('.kpi',container).forEach(card=>{
    card.classList.add('widget-drag');
    card.draggable=true;
    card.addEventListener('dragstart',e=>{
      dragEl=card; card.classList.add('widget-ghost');
      e.dataTransfer.effectAllowed='move';
      try{e.dataTransfer.setData('text/plain','w')}catch(_){}
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('widget-ghost');
      $$('.widget-over',container).forEach(c=>c.classList.remove('widget-over'));
      dragEl=null;
      toast('Dashboard layout updated');
    });
    card.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!dragEl||dragEl===card)return;
      card.classList.add('widget-over');
    });
    card.addEventListener('dragleave',()=>card.classList.remove('widget-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault(); e.stopPropagation();
      card.classList.remove('widget-over');
      if(!dragEl||dragEl===card)return;
      const kids=[...container.children];
      const from=kids.indexOf(dragEl), to=kids.indexOf(card);
      if(from<0||to<0)return;
      // FLIP animation
      const boxes=kids.map(k=>k.getBoundingClientRect());
      from<to ? card.after(dragEl) : card.before(dragEl);
      [...container.children].forEach((k,i)=>{
        const old=boxes[kids.indexOf(k)], now=k.getBoundingClientRect();
        const dx=old.left-now.left, dy=old.top-now.top;
        if(!dx&&!dy)return;
        k.animate([{transform:`translate(${dx}px,${dy}px)`},{transform:'none'}],
          {duration:340,easing:'cubic-bezier(.22,1,.36,1)'});
      });
    });
  });
}

const TSTAT={
  'Not Started':'t-gray','In Progress':'t-blue','Waiting':'t-amber','Completed':'t-green','Overdue':'t-rose',
  'Waiting ':'t-amber','In Consultation':'t-blue','Monitoring':'t-violet','Follow-up Required':'t-amber',
  'Ready for Review':'t-teal','Next Patient':'t-teal','Completed ':'t-green','Follow-up':'t-violet',
};
const tstat=s=>TSTAT[s]||'t-gray';
function wsAct(t,s,i,c){
  WS.activity.unshift({t,s,ago:'just now',i,c});
  WS.activity=WS.activity.slice(0,8);
  const list=$('#wsAct');
  if(list){
    const a=WS.activity[0];
    list.insertAdjacentHTML('afterbegin',`<div class="ws-row tl-item" style="cursor:default">
      <span class="ri" style="background:color-mix(in srgb, var(${a.c}) 12%, transparent);color:var(${a.c})">${ico(a.i,'currentColor',16)}</span>
      <div class="rm"><div class="rt">${esc(a.t)}</div><div class="rs">${esc(a.s)}</div></div>
      <span class="rr">just now</span></div>`);
    if(list.children.length>8) list.lastElementChild.remove();
  }
}
function shiftPct(){
  const now=new Date(), h=now.getHours()+now.getMinutes()/60;
  return Math.max(0,Math.min(100,Math.round((h-ME.start)/(ME.end-ME.start)*100)));
}
function greeting(){
  const h=new Date().getHours();
  return h<12?'Good morning':h<18?'Good afternoon':'Good evening';
}

/* ---------------- TASKS ---------------- */
function taskRow(t,i){
  return `<div class="tk ${t.st==='Completed'?'done':''}" id="tk_${t.id}" onclick="openTask('${t.id}')">
    <span class="tick" onclick="event.stopPropagation();wsTaskDone('${t.id}')">${ico('check','#fff',12)}</span>
    <div style="flex:1;min-width:0">
      <div class="tt">${t.title}</div>
      <div class="ts">
        <span>${t.who}</span><span>·</span><b>${t.time}</b><span>·</span><span>${t.cat}</span>
        <span class="tag ${tstat(t.st)}" style="margin-left:2px"><i></i>${t.st}</span>
      </div>
    </div>
    <div class="tr"><span class="prio ${t.prio.toLowerCase()}">${t.prio}</span>
      <span style="font-size:10.5px;color:var(--ink-3);font-family:var(--mono)">${t.dur}</span></div>
  </div>`;
}
function wsTaskDone(id){
  const t=WS.tasks.find(x=>x.id===id); if(!t||t.st==='Completed')return;
  const row=$('#tk_'+id);
  row.classList.add('done');
  setTimeout(()=>{
    t.st='Completed';
    row.classList.add('leaving');
    setTimeout(()=>{
      const done=WS.tasks.filter(x=>x.st==='Completed');
      $('#tkList').innerHTML=WS.tasks.map(taskRow).join('');
      $('#tkCount').textContent=done.length+'/'+WS.tasks.length;
      const p=Math.round(done.length/WS.tasks.length*100);
      $('#tkPct').textContent=p+'%';
      $('#tkBar').style.width=p+'%';
      WS.stats.tasks=done.length;
      wsAct('Task completed',t.title,'check','--green');
      toast('Task completed — '+t.title);
    },SP(420));
  },SP(260));
}
function openTask(id){

  openModal(`
    <div class="m-head">

      <div><h2>${t.title}</h2><div class="sub">${t.cat} · assigned by ${t.by}</div></div>
      <span class="prio ${t.prio.toLowerCase()}" style="margin-left:8px">${t.prio}</span>
      <button class="x" onclick="closeModal()">${I.x}</button></div>
    <div class="m-body">
      <div class="det-grid">
        ${[['Task ID',t.id],['Related to',t.who],['Scheduled',t.time],['Priority',t.prio],

          <button class="btn btn-ghost btn-sm" style="margin-top:9px" onclick="wsTaskNote('${t.id}')">Save note</button>
        </div>
        <div class="card" style="padding:16px 17px">
          <div class="ch-title" style="margin-bottom:12px">Timeline</div>
          ${['Task created','Assigned to me','Scheduled for '+t.time,t.st==='Completed'?'Completed':'Awaiting completion']
            .map((s,k)=>`<div style="display:flex;gap:10px;align-items:flex-start">
              <div style="display:flex;flex-direction:column;align-items:center">
                <span style="width:10px;height:10px;border-radius:50%;background:${k<3||t.st==='Completed'?'var(--teal)':'var(--line)'};margin-top:4px"></span>
                ${k<3?'<span style="flex:1;width:2px;background:var(--line);min-height:20px"></span>':''}

    </div>`,'xl');
}
function refreshTasks(){
  const list=$('#tkList'); if(!list)return;
  list.innerHTML=WS.tasks.map(taskRow).join('');
}
function wsTaskState(id,st){
  const t=WS.tasks.find(x=>x.id===id); if(!t)return;
  t.st=st; refreshTasks(); closeModal();
  wsAct('Task started',t.title,'play','--blue');
  toast(t.title+' — '+st.toLowerCase());
}
function wsTaskDelay(id){
  const t=WS.tasks.find(x=>x.id===id); if(!t)return;
  const [h,m]=t.time.split(':').map(Number);
  t.time=pad((h+1)%24)+':'+pad(m); t.st='Waiting';
  refreshTasks(); closeModal();
  toast(t.title+' delayed to '+t.time);
}
function wsTaskPrio(id){

/* ---------------- QUEUE ---------------- */
function qAct(i,a){
  const q=WS.queue[i]; if(!q)return;
  if(a==='call'){ toast(q.name+' has been called through'); wsAct('Patient called',q.name,'bell','--teal'); return }
  if(a==='start'){
    toast('Consultation started with '+q.name);
    wsAct('Consultation started',q.name,'stetho','--blue');
    setTimeout(()=>openPatient(q.pid),SP(500)); return;
  }
  if(a==='delay'){ q.wait+=10; WS.queue.push(WS.queue.splice(i,1)[0]); render('workspace'); toast(q.name+' moved down the queue'); return }
  if(a==='done'){
    WS.queue.splice(i,1);
    WS.queue.forEach((x,n)=>x.pos=n+1);
    WS.stats.seen++;
    render('workspace');
    toast(q.name+' — consultation completed');
    wsAct('Consultation completed',q.name,'check','--green');
    return;
  }
  if(a==='prio'){
    const order=['Normal','Medium','High'];
    q.prio=order[(order.indexOf(q.prio)+1)%3];
    render('workspace'); toast(q.name+' — priority set to '+q.prio); return;
  }
}

  'Weekly Performance Report':'Fifty-eight patients seen across the week against seventy-one booked. Attendance is stable at 82%, and the gap sits almost entirely in late-afternoon slots.',
