    out.push({o:s[0].o,c:s[s.length-1].c,h:Math.max(...s.map(x=>x.h)),l:Math.min(...s.map(x=>x.l)),v:s.reduce((t,x)=>t+x.v,0)});
  }
  return out;
}

function candlesSVG(cs,dec,h=340,showVol=true){
  const W=880,pl=58,pr=16,pt=14,pb=showVol?66:26,iw=W-pl-pr,ih=h-pt-pb;
  if(!cs.length)return '';
  const hi=Math.max(...cs.map(c=>c.h)),lo=Math.min(...cs.map(c=>c.l));
  const pad=(hi-lo)*0.12||1,max=hi+pad,min=lo-pad,rg=max-min||1;
  const Y=v=>pt+ih-((v-min)/rg)*ih;
  const slot=iw/cs.length,bw=Math.max(3,Math.min(22,slot*0.62));
  let g='';
  for(let i=0;i<=4;i++){const y=pt+ih*i/4;
    g+=`<line class="grid-line" x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}"/>
      <text x="${pl-8}" y="${y+4}" text-anchor="end">${(max-rg*i/4).toFixed(dec)}</text>`;}
  let body='',vol='';
  const vmax=Math.max(...cs.map(c=>c.v));
  cs.forEach((c,i)=>{
    const cx=pl+slot*i+slot/2, up=c.c>=c.o, col=up?'var(--pos)':'var(--neg)';
    const y1=Y(Math.max(c.o,c.c)), y2=Y(Math.min(c.o,c.c));
    body+=`<line x1="${cx}" y1="${Y(c.h)}" x2="${cx}" y2="${Y(c.l)}" stroke="${col}" stroke-width="${Math.max(1.4,bw*0.16)}" stroke-linecap="round"/>
      <rect x="${cx-bw/2}" y="${y1}" width="${bw}" height="${Math.max(y2-y1,3)}" rx="2" fill="${col}"/>`;
    if(showVol){const vh=(c.v/vmax)*34;
      vol+=`<rect x="${cx-bw/2}" y="${h-18-vh}" width="${bw}" height="${vh}" rx="1.5" fill="${col}" opacity=".35"/>`;}
  });
  const last=cs[cs.length-1].c, ly=Y(last);
  const mark=`<line x1="${pl}" y1="${ly}" x2="${W-pr}" y2="${ly}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 4" opacity=".8"/>
    <rect x="${W-pr-62}" y="${ly-11}" width="62" height="22" rx="6" fill="var(--accent)"/>
    <text x="${W-pr-31}" y="${ly+4}" text-anchor="middle" style="fill:#fff;font-weight:800">${last.toFixed(dec)}</text>`;
  return `<svg viewBox="0 0 ${W} ${h}" width="100%" style="display:block">${g}${vol}${body}${mark}</svg>`;
}
function aSpark(a){
  const d=a.m.slice(-40).map(c=>c.c),w=140,h=38;
  const mx=Math.max(...d),mn=Math.min(...d),rg=mx-mn||1;
  const pts=d.map((v,i)=>[i/(d.length-1)*w,h-3-((v-mn)/rg)*(h-6)]);
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="display:block">
    <path d="${smoothPath(pts)}" fill="none" stroke="var(--${aChg(a)>=0?'pos':'neg'})" stroke-width="2" stroke-linecap="round"/></svg>`;
}

  const end=d.length-S.gOff, st=Math.max(0,end-win);

    let x0=null,o0=0;
    el.addEventListener('pointerdown',e=>{x0=e.clientX;o0=S.gOff;});
    el.addEventListener('pointermove',e=>{if(x0===null)return;
      const per=(el.clientWidth||360)/14;S.gOff=o0+Math.round((e.clientX-x0)/per);paintGrowth();});

  }
}

const PER_KEYS=['1D','1W','1M','3M','6M','1Y','5Y'];
const PER_LAB={'1D':['09:00','11:00','13:00','15:00','17:00'],'1W':['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
  '1M':['W1','W2','W3','W4'],'3M':['Jul','Aug','Sep'],'6M':['Apr','May','Jun','Jul','Aug','Sep'],
  '1Y':['Q1','Q2','Q3','Q4'],'5Y':['2022','2023','2024','2025','2026']};
function rng(seed){let s=7;for(const c of String(seed))s=(s*31+c.charCodeAt(0))>>>0;
  return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
const SER_CACHE={};
function perData(label,per,base){
  const key=label+per;
  if(SER_CACHE[key])return SER_CACHE[key];
  const n=PER_LAB[per].length, r=rng(key);
  const arr=[]; let v=base*(0.72+r()*0.1);
  for(let i=0;i<n;i++){v=v*(1+(r()-0.35)*0.06);arr.push(Math.round(v*100)/100);}
  arr[n-1]=base;
  SER_CACHE[key]=arr; return arr;
}

/* ---------- Calendar: month grid ---------- */
const CAL_EVENTS={2:['c1'],3:['c3'],4:['c4'],5:['c2'],6:['c6'],9:['c1','c3'],11:['c4'],
  15:['c2'],16:['c1'],18:['c3','c6'],22:['c1'],23:['c4'],25:['c2'],29:['c1','c3','c4'],30:['c2']};
const _calBase=V.calendar;
V.calendar=()=>{
  const dows=['MON','TUE','WED','THU','FRI','SAT','SUN'];
  let cells='';
  for(let i=-2;i<=35;i++){
    const day=i+1;
    const out=day<1||day>30;
    const evs=CAL_EVENTS[day]||[];
    cells+=`<div class="cell ${out?'out':''} ${day===2?'today':''}">
      <b>${out?(day<1?30+day:day-30):day}</b>
      ${evs.map(c=>`<div class="ev" style="background:var(--${c})"></div>`).join('')}
      ${evs.length&&!out?`<div class="evt-mini">${evs.length} event${evs.length>1?'s':''}</div>`:''}</div>`;
  }
  const month=`<div class="card pad-lg" style="margin-bottom:16px">
      <div class="card-head"><div><h3>September</h3><div class="sub">14 scheduled events this month</div></div>
        <div class="legend"><span class="li"><span class="sw" style="background:var(--c1)"></span>Meetings</span>
          <span class="li"><span class="sw" style="background:var(--c3)"></span>Finance</span>
          <span class="li"><span class="sw" style="background:var(--c4)"></span>Clients</span></div></div>
      <div class="cal">${dows.map(d=>`<div class="cdow">${d}</div>`).join('')}${cells}</div>
    </div>`;
  const base=_calBase();
  const i=base.indexOf('</div>')+6;
  return base.slice(0,i)+month+base.slice(i);
};

V.calendar=()=>{
  const y=S.calY,m=S.calM;
  const first=new Date(y,m,1), dim=new Date(y,m+1,0).getDate();
  const lead=(first.getDay()+6)%7;
  const prevDim=new Date(y,m,0).getDate();
  const dows=['MON','TUE','WED','THU','FRI','SAT','SUN'];
  let cells='';
  for(let i=0;i<42;i++){
    const dn=i-lead+1;
    const out=dn<1||dn>dim;
    const shown=out?(dn<1?prevDim+dn:dn-dim):dn;
    const evs=out?[]:(EV[evKey(y,m,dn)]||[]);
    const isToday=!out&&y===TODAY.getFullYear()&&m===TODAY.getMonth()&&dn===TODAY.getDate();
    cells+=`<div class="cell ${out?'out':''} ${isToday?'today':''}" ${out?'':`data-day="${dn}"`}>
      <b>${shown}</b>
      ${evs.slice(0,2).map(e=>`<div class="ev" style="background:var(--${e.c})"></div>`).join('')}
      ${evs.length?`<div class="evt-mini">${evs.length} event${evs.length>1?'s':''}</div>`:''}</div>`;
  }
  const selEvs=EV[evKey(y,m,S.calSel)]||[];
  const dayList=selEvs.length?selEvs.map((e,i)=>`<div class="evline">
      <div class="bar" style="background:var(--${e.c})"></div>
      <div style="min-width:0"><div style="font-weight:700;font-size:13.5px">${e.t}</div>
        <div style="font-size:12px;color:var(--text-3)">${e.time} · ${e.tag} · ${e.people} people</div></div>
      <button class="btn btn-primary" style="margin-left:auto;padding:8px 12px" data-meet="${e.t}">${icon('check')}Join</button>
    </div>`).join('')
    :`<div class="empty">Nothing scheduled. Tap a day to add an event.</div>`;
  const monthCount=Object.keys(EV).filter(k=>k.startsWith(`${y}-${m}-`)).reduce((s,k)=>s+EV[k].length,0);
  const upcoming=[];
  for(let d=S.calSel;d<=dim&&upcoming.length<5;d++){(EV[evKey(y,m,d)]||[]).forEach(e=>{if(upcoming.length<5)upcoming.push([d,e]);});}
  return `<div class="view-head"><h1>Calendar</h1><p>${monthCount} events in ${MONTHS[m]} ${y} · tap any day to add one.</p></div>
    <div class="card pad-lg" style="margin-bottom:16px">
      <div class="card-head">
        <div class="cal-nav">
          <button class="icon-btn" data-cal="-1">${icon('reply')}</button>
          <b>${MONTHS[m]} ${y}</b>
          <button class="icon-btn" data-cal="1" style="transform:scaleX(-1)">${icon('reply')}</button>
        </div>
        <button class="btn btn-primary" data-newev="${S.calSel}">${icon('plus')}New event</button>
      </div>
      <div class="cal">${dows.map(d=>`<div class="cdow">${d}</div>`).join('')}${cells}</div>
    </div>
    <div class="grid dash-2col">
      <div class="card pad-lg"><div class="card-head"><div><h3>${MONTHS[m]} ${S.calSel}</h3><div class="sub">${selEvs.length} event${selEvs.length===1?'':'s'} scheduled</div></div>
        <button class="btn" data-newev="${S.calSel}">${icon('plus')}Add</button></div>${dayList}</div>
      <div class="card pad-lg"><div class="card-head"><h3>Upcoming</h3><span class="sub">Next 5</span></div>
        ${upcoming.length?upcoming.map(([d,e])=>`<div class="evline">
          <div class="avatar" style="width:40px;height:40px;background:var(--accent-soft);color:var(--accent);font-family:var(--font-display);border-radius:12px">${d}</div>
          <div style="min-width:0"><div style="font-weight:700;font-size:13.5px">${e.t}</div>
            <div style="font-size:12px;color:var(--text-3)">${MONTHS[m]} ${d} · ${e.time}</div></div></div>`).join('')
          :'<div class="empty">Nothing left this month.</div>'}</div>
    </div>`;
};

function caption(who,txt){
  const w=document.getElementById('capWho'), t=document.getElementById('capTxt');
  if(w)w.textContent=who;
  if(t)t.textContent=txt;
}
turnLoop=function(){
  clearTimeout(meetLoop);
  const step=()=>{
    if(!document.getElementById('mt0'))return;
    if(S.meMic){setSpeaker(-1);meetLoop=setTimeout(step,400);return;}
    if(S.meAnswer){
      S.meAnswer=false;
      const i=Math.floor(Math.random()*4);
      setSpeaker(i);
      caption(MEET_PEOPLE[i].n,MEET_LINES[i][Math.floor(Math.random()*MEET_LINES[i].length)]);
      meetLoop=setTimeout(()=>{
        setSpeaker(-1);
        caption('ROOM','…');
        meetLoop=setTimeout(step,900);
      },10000);
      return;
    }
    if(Math.random()<0.24){
      setSpeaker(-1);
      caption('ROOM','…');
      meetLoop=setTimeout(step,900+Math.random()*1500);
      return;
    }
    const i=Math.floor(Math.random()*4);
    const dur=[3000,4000,5000,6000][Math.floor(Math.random()*4)];
    setSpeaker(i);
    caption(MEET_PEOPLE[i].n,MEET_LINES[i][Math.floor(Math.random()*MEET_LINES[i].length)]);
    meetLoop=setTimeout(()=>{setSpeaker(-1);meetLoop=setTimeout(step,500+Math.random()*900);},dur);
  };
  step();

        <div style="font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3)" id="youTxt">Your microphone is off</div>
        <div class="mbars">${Array(7).fill('<i></i>').join('')}</div>
      </div>
      <div style="display:flex;gap:10px;margin-top:12px;align-items:stretch">
        <button class="hold-btn" id="holdTalk">${icon('mic')}<span id="holdTxt">HOLD TO TALK</span></button>
        <button class="icon-btn" style="width:52px;height:52px;border-radius:16px" data-toast="Screen sharing started">${icon('layers')}</button>
        <button class="icon-btn leave" style="width:52px;height:52px;border-radius:16px" data-close>${icon('close')}</button>
      </div>
      <div class="hintbar" style="justify-content:center;margin-bottom:4px">${icon('mic')}Hold the button to speak — the room waits, then someone replies</div>

      <div class="cap" id="capBox"><div class="cwho" id="capWho">LIVE</div>
        <div class="ctxt" id="capTxt">The session has started. Everyone is connected.</div></div>
      <div class="meet-chat" id="meetChat"></div>
      <div class="card" style="padding:12px;margin-top:14px">
        <div class="card-head" style="margin-bottom:6px"><h3 style="font-size:14px">Live transcript</h3>
          <span class="live"><i></i>REC</span></div>
        <div class="transcript" id="transcript" style="border:none;padding:0;background:none"></div>
      </div>
    </div>`);
  $('#modal').classList.add('viewer','expand');
  clearInterval(meetTimer); clearTimeout(meetLoop); clearInterval(chatTimer);
  clearInterval(agendaTimer); clearInterval(transTimer);
  S.meMic=false; S.meAnswer=false;

  let sec=0;
  meetTimer=setInterval(()=>{
    const cl=document.getElementById('meetClock');
    if(!cl){clearInterval(meetTimer);return;}
    sec++;
    cl.textContent=String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');
  },1000);

  let ci=0;
  chatTimer=setInterval(()=>{
    const box=document.getElementById('meetChat');
    if(!box){clearInterval(chatTimer);return;}
    const [w,t]=MEET_CHAT[ci%MEET_CHAT.length]; ci++;
    box.insertAdjacentHTML('beforeend',`<div class="mc"><b>${w.split(' ')[0]}</b><span>${t}</span></div>`);
    box.scrollTop=box.scrollHeight;
  },5200);

  let ag=0;
  agendaTimer=setInterval(()=>{
    const box=document.getElementById('agenda');
    if(!box){clearInterval(agendaTimer);return;}
    const items=[...box.children];
    if(ag<items.length-1){items[ag].classList.remove('on');items[ag].classList.add('done');ag++;items[ag].classList.add('on');}
  },14000);

  transTimer=setInterval(()=>{
    const box=document.getElementById('transcript');
    if(!box){clearInterval(transTimer);return;}
    const who=document.getElementById('capWho'), txt=document.getElementById('capTxt');
    if(!who||!txt||who.textContent==='ROOM'||txt.textContent==='…')return;
    const last=box.lastElementChild;
    if(last&&last.dataset.k===who.textContent+txt.textContent)return;
    const d=new Date();
    const tm=String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
    box.insertAdjacentHTML('beforeend',
      `<div class="tr" data-k="${who.textContent+txt.textContent}"><span class="trt">${tm}</span>
        <span class="trw">${who.textContent.split(' ')[0]}</span><span class="trx">${txt.textContent}</span></div>`);
    while(box.children.length>14)box.removeChild(box.firstChild);
    box.scrollTop=box.scrollHeight;
  },1400);

  caption('LIVE','The session has started. Everyone is connected.');
  turnLoop();
};

/* drawer: one debounced toggle (two older listeners were cancelling each other) */
let drawerTs=0;
function drawerToggle(){
  const now=Date.now();
  if(now-drawerTs<260)return;
  drawerTs=now;
  const d=$('#drawer'), bg=$('#drawerBg');
  if(d.classList.contains('show')){d.classList.remove('show');bg.classList.remove('show');}
  else{buildDrawer();d.classList.add('show');bg.classList.add('show');}
}
openDrawer=drawerToggle;
toggleDrawer=drawerToggle;

/* bot logo: fills the orb */
V.voice=()=>_voiceView().replace(`<div class="orb2">${icon('spark')}</div>`,
  `<div class="orb2" style="background:none">${botSVG(76)}</div>`);
V.voice.mount=()=>{
  startWave();
  const t=$('#aiThread'); if(t)t.scrollTop=t.scrollHeight;
  setVoice(S.voice||'idle',S.vLabel||'Ready',S.vHint||'Press and hold to talk');
};

/* expose */
window.App={go,openModal,closeModal,toast,render,runReport,showSuccess,openDrawer:drawerToggle,S,D,V,icon};

NAV.find(n=>n.id==='notifications').badge=D.notifications.filter(n=>n.unread).length;
applyTheme();applyAccent();renderShell();render();
window.addEventListener('resize',()=>{clearTimeout(window._rz);window._rz=setTimeout(render,180);});
})();
