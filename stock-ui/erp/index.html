function attachSelfCam(){
  const pip=$('#selfPip'); if(!pip)return;
  if(mState.cam&&mStream){
    let v=pip.querySelector('video');
    if(!v){v=document.createElement('video');v.autoplay=true;v.muted=true;v.playsInline=true;pip.insertBefore(v,pip.firstChild);}
    v.srcObject=mStream;
    const off=pip.querySelector('.sp-off');if(off)off.style.display='none';
  }
}
let mSpeakIdx=-1;
function meetSpeakLoop(){
  const step=()=>{
    if(!$('#mGrid'))return;
    MPART.forEach((p,i)=>{
      const t=document.getElementById('vt'+i),s=document.getElementById('vst'+i);
      if(!t)return;
      const sp=i===mSpeakIdx;
      t.classList.toggle('speaking',sp);
      if(s&&!t.dataset.forced)s.textContent=sp?'Speaking':(mState[`mute${i}`]?'Muted':'Listening');
    });
  };
  const pick=()=>{
    if(!$('#mGrid'))return;
    mSpeakIdx=Math.floor(Math.random()*MPART.length);
    step();
    const dur=5000+Math.random()*1500;
    mTimers.push(setTimeout(()=>{
      mSpeakIdx=-1;step();
      mTimers.push(setTimeout(pick,600+Math.random()*900));
    },dur));
  };
  pick();
}
function renderPanel(){
  const p=$('#mPanel'); if(!p)return;
  if(mState.tab==='notes'){
    p.innerHTML=`<h6>AI meeting notes</h6><div id="notesList">${mState.notes.map(n=>noteHtml(n)).join('')||'<div style="color:#8FA0C7;font-size:12.5px">Listening for key points…</div>'}</div>`;
  }else if(mState.tab==='transcript'){
    p.innerHTML=`<h6>Live transcript</h6><div id="transList">${mState.trans.map(t=>transHtml(t)).join('')||'<div style="color:#8FA0C7;font-size:12.5px">Transcribing…</div>'}</div>`;
  }else if(mState.tab==='chat'){
    p.innerHTML=`<h6>Meeting chat</h6><div class="mchat-scroll" id="chatList">${mState.chat.map(c=>chatHtml(c)).join('')||'<div style="color:#8FA0C7;font-size:12.5px">No messages yet</div>'}</div>`;
  }else{
    p.innerHTML=`<h6>Shared documents</h6>${M_DOCS.map(([n,ty,rep])=>`<div class="mdoc" data-mdoc="${rep}">
      <div class="ft" style="background:${FT[ty]}2a;color:${FT[ty]}">${ty}</div>
      <div style="min-width:0"><div style="font-size:13px;font-weight:600;color:#EAEFFB">${n}</div>
        <div style="font-size:11px;color:#8FA0C7">Shared in meeting</div></div>${icon('export')}</div>`).join('')}`;
  }
}
const noteHtml=n=>`<div class="note-item"><span class="ni">${icon(n[1])}</span><span>${n[0]}</span></div>`;
const transHtml=t=>`<div class="tr-item"><span class="trw">${t[0]}</span><span class="trx">${t[1]}</span></div>`;
const chatHtml=c=>`<div class="mchat-msg"><span class="mcw">${c[0]}</span> <span class="mcx">${c[1]}</span></div>`;
function meetNote(){
  if(mState.notes.length>=M_NOTES.length)return;
  mState.notes.push(M_NOTES[mState.notes.length]);
  if(mState.tab==='notes'){const l=$('#notesList');if(l){l.insertAdjacentHTML('beforeend',noteHtml(mState.notes[mState.notes.length-1]));l.scrollTop=l.scrollHeight;}}
}
function meetTrans(){
  const t=M_TRANS[mState.trans.length%M_TRANS.length];
  mState.trans.push(t);
  if(mState.tab==='transcript'){const l=$('#transList');if(l){l.insertAdjacentHTML('beforeend',transHtml(t));l.scrollTop=l.scrollHeight;while(l.children.length>20)l.removeChild(l.firstChild);}}
}
function meetChat(){
  const c=M_CHAT[mState.chat.length%M_CHAT.length];
  mState.chat.push(c);
  if(mState.tab==='chat'){const l=$('#chatList');if(l){l.insertAdjacentHTML('beforeend',chatHtml(c));l.scrollTop=l.scrollHeight;}}
}
function meetAgenda(){
  if(mState.agenda>=M_AGENDA.length)return;
  mState.agenda++;
}
function meetRandom(){
  if(!$('#mGrid'))return;
  const r=Math.random();
  const i=Math.floor(Math.random()*MPART.length);
  if(r<0.3){ // reaction
    const emo=['👍','👏','✋'][Math.floor(Math.random()*3)];
    const t=document.getElementById('vt'+i);
    if(t){const e=document.createElement('div');e.className='reaction';e.textContent=emo;t.appendChild(e);setTimeout(()=>e.remove(),2000);}
  }else if(r<0.5){ // mute toggle
    mState['mute'+i]=!mState['mute'+i];
    const s=document.getElementById('vst'+i);
    if(s&&i!==mSpeakIdx)s.textContent=mState['mute'+i]?'Muted':'Listening';
  }
}

function meetCtrl(k,el){
  if(k==='mic'){mState.mic=!mState.mic;el.classList.toggle('off',!mState.mic);
    const l=$('#selfPip .sp-lbl');if(l)l.textContent='You'+(mState.mic?'':' · muted');}
  else if(k==='cam'){mState.cam=!mState.cam;el.classList.toggle('off',!mState.cam);
    const pip=$('#selfPip');const v=pip.querySelector('video');const off=pip.querySelector('.sp-off');
    if(!mState.cam){if(v)v.style.display='none';if(off)off.style.display='';}
    else{if(v)v.style.display='';if(off)off.style.display='none';attachSelfCam();}}
  else if(k==='share'){mState.share=!mState.share;el.classList.toggle('active',mState.share);toggleShare();}
  else if(k==='hand'){el.classList.toggle('active');toast(el.classList.contains('active')?'Hand raised':'Hand lowered');}
  else if(k==='react'){
    if($('#reactPop')){$('#reactPop').remove();return;}
    const foot=$('#mroom .mr-foot');

      ${['👍','👏','✋','🎉','❤️'].map(x=>`<button data-mreact="${x}">${x}</button>`).join('')}</div>`);
  }
}

let presState={idx:0,notes:true,auto:false,autoTimer:null};
function toggleShare(){
  const stage=$('.mr-stage'); if(!stage)return;
  if(mState.share){ presState.idx=0; presState.auto=false; renderPresentation(); }
  else { clearInterval(presState.autoTimer); restoreGrid(); }
}
function restoreGrid(){
  const stage=$('.mr-stage'); if(!stage)return;
  const tiles=MPART.map((p,i)=>`<div class="vtile ${i===mSpeakIdx?'speaking':''}" id="vt${i}">
      ${portrait(p)}<div class="vstat" id="vst${i}">${i===mSpeakIdx?'Speaking':'Listening'}</div>
      <div class="vlabel"><span>${p.n.split(' ')[0]} ${p.n.split(' ')[1][0]}.</span>
        <span class="vwave"><i></i><i></i><i></i><i></i><i></i></span></div></div>`).join('');
  stage.innerHTML=`<div class="mr-grid ${MPART.length>4?'p6':''}" id="mGrid">${tiles}</div>`;
  const pip=$('#selfPip'); if(pip)pip.style.display='';
}
function renderPresentation(dir){

  if(!stage.querySelector('.pres-stage')){

    <button class="pn-btn" data-pthumbs title="Slide overview">${icon('layers')}</button>
    <button class="pn-btn ${presState.auto?'accent':''}" data-pplay title="Auto-play">${icon(presState.auto?'clock':'spark')}</button>
    ${presState.idx===SLIDES.length-1
      ? `<button class="pn-btn wide accent" data-pshare>${icon('export')}Share report</button>`
      : ''}
    <button class="pn-btn wide stop" data-pstop>${icon('close')}Stop</button>`;
}
function animateSlide(canvas){
  // KPI count-up
  canvas.querySelectorAll('.pk .pv').forEach(el=>{
    const raw=el.textContent; const m=raw.match(/[\d,.]+/);
    if(!m)return;
    const target=parseFloat(m[0].replace(/,/g,'')); if(isNaN(target))return;
    const pre=raw.slice(0,m.index), post=raw.slice(m.index+m[0].length);
    const dec=(m[0].split('.')[1]||'').length;
    let cur=0; const t0=performance.now(), D=900;
    const step=now=>{
      const k=Math.min((now-t0)/D,1), e=1-Math.pow(1-k,3);
      cur=target*e;
      el.textContent=pre+cur.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec})+post;
      if(k<1)requestAnimationFrame(step);else el.textContent=raw;
    };
    requestAnimationFrame(step);
  });
  wireChartTips(canvas);
}

/* ---------- interactive tooltips on presentation charts ---------- */
function presTip(x,y,title,val,chg,tone){
  const stage=$('#presStage'); if(!stage)return;
  let tip=$('#presTip');
  if(!tip){stage.insertAdjacentHTML('beforeend','<div class="p-tip" id="presTip"></div>');tip=$('#presTip');}
  const r=stage.getBoundingClientRect();
  tip.style.left=(x-r.left)+'px';
  tip.style.top=(y-r.top)+'px';
  tip.innerHTML=`<div>${title}</div><div class="ptv">${val}</div>${chg?`<div class="ptc" style="color:var(--${tone||'pos'})">${chg}</div>`:''}`;
  tip.classList.add('on');
  clearTimeout(tip._t);
  tip._t=setTimeout(()=>tip.classList.remove('on'),2600);
}
function wireChartTips(canvas){
  if(canvas._tipsWired)return; canvas._tipsWired=1;
  canvas.addEventListener('pointerdown',e=>{
    // charts: any element the chart helpers tagged with data-tip (bars, line points, donut slices)
    const seg=e.target.closest('[data-tip]');
    if(seg){
      const raw=seg.getAttribute('data-tip')||'';
      // format "Label: value"  ->  title + big value
      const ci=raw.lastIndexOf(':');
      const title=ci>-1?raw.slice(0,ci).trim():'Value';
      const val=ci>-1?raw.slice(ci+1).trim():raw;
      presTip(e.clientX,e.clientY,title,val,'','pos');
      // pop the element for feedback
      seg.style.transition='transform .15s';seg.style.transformOrigin='center';
      seg.style.transform='scale(1.12)';setTimeout(()=>{seg.style.transform='';},260);
      e.stopPropagation();
      return;
    }
    // KPI cards
    const pk=e.target.closest('.pk');
    if(pk){
      const l=pk.querySelector('.pl')?.textContent||'';
      const v=pk.querySelector('.pv')?.textContent||'';
      const c=pk.querySelector('.pc')?.textContent||'';
      const tone=(pk.querySelector('.pc')?.getAttribute('style')||'').includes('neg')?'neg':'pos';
      presTip(e.clientX,e.clientY,l,v,c,tone);
      pk.style.transition='transform .15s';pk.style.transform='scale(1.03)';setTimeout(()=>{pk.style.transform='';},260);
      e.stopPropagation();
      return;
    }
    // table rows
    const tr=e.target.closest('.ptbl tbody tr');
    if(tr){
      const c=[...tr.children].map(td=>td.textContent.trim());
      const chg=c[c.length-1]||'';
      presTip(e.clientX,e.clientY,c[0],c[c.length-2]||c[1]||'',chg,
        chg.includes('-')&&!chg.includes('+')?'neg':'pos');
      e.stopPropagation();
    }
  },true);
}
function attachPresCam(){
  const pip=$('#presPip'); if(!pip)return;
  if(mState.cam&&mStream){
    let v=pip.querySelector('video');
    if(!v){v=document.createElement('video');v.autoplay=true;v.muted=true;v.playsInline=true;pip.appendChild(v);}
    v.srcObject=mStream;
    pip.insertAdjacentHTML('beforeend',`<div class="pp-lbl">${S.me.n.split(' ')[0]} (You) · <span class="hd">HD</span></div>`);
  }else{
    pip.innerHTML=`<div class="pp-off"><div class="avatar" style="width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--accent-2));font-size:18px">${initials(S.me.n)}</div></div>
      <div class="pp-lbl">${S.me.n.split(' ')[0]} (You)${mState.mic?'':' · muted'}</div>`;
  }
  // draggable between corners
  let drag=false,sx,sy;
  pip.addEventListener('pointerdown',e=>{drag=true;sx=e.clientX;sy=e.clientY;pip.setPointerCapture(e.pointerId);pip.style.cursor='grabbing';});
  pip.addEventListener('pointermove',e=>{
    if(!drag)return;
    const st=$('#presStage').getBoundingClientRect();
    const rel=(e.clientY-st.top)<st.height/2;
    const relL=(e.clientX-st.left)<st.width/2;
    pip.style.top=rel?'64px':'';pip.style.bottom=rel?'':'78px';
    pip.style.left=relL?'18px':'';pip.style.right=relL?'':'18px';
  });
  ['pointerup','pointercancel'].forEach(ev=>pip.addEventListener(ev,()=>{drag=false;pip.style.cursor='grab';}));
}
function attachPointer(){
  const canvas=$('#presCanvas'), ptr=$('#presPointer'); if(!canvas||!ptr)return;
  let active=false,hideT=null;
  canvas.addEventListener('pointerdown',e=>{
    if(!e.target.closest('.pres-canvas'))return;
    if(e.target.closest('button,a,select,input,.pk,.vtile,.ptbl,[data-tip],svg'))return;
    active=true;movePtr(e);
  });
  canvas.addEventListener('pointermove',e=>{if(active)movePtr(e);});
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>canvas.addEventListener(ev,()=>{
    active=false;clearTimeout(hideT);hideT=setTimeout(()=>ptr.classList.remove('on'),500);
  }));
  function movePtr(e){
    const r=canvas.getBoundingClientRect();
    ptr.style.left=(e.clientX-r.left+canvas.scrollLeft)+'px';
    ptr.style.top=(e.clientY-r.top+canvas.scrollTop)+'px';
    ptr.classList.add('on');
  }
}
function presGoto(i,dir){
  presState.idx=Math.max(0,Math.min(SLIDES.length-1,i));
  renderPresentation(dir);
}
document.addEventListener('click',e=>{
  let el;
  if(e.target.closest('[data-pprev]')){e.stopPropagation();presGoto(presState.idx-1,'back');return;}
  if(e.target.closest('[data-pnext]')){e.stopPropagation();presGoto(presState.idx+1);return;}
  if(el=e.target.closest('[data-pgoto]')){e.stopPropagation();presGoto(+el.dataset.pgoto);return;}
  if(e.target.closest('[data-pnotes]')){e.stopPropagation();presState.notes=!presState.notes;renderPresentation();return;}
  if(e.target.closest('[data-pplay]')){e.stopPropagation();togglePlay();return;}
  if(e.target.closest('[data-pthumbs]')){e.stopPropagation();showThumbs();return;}
  if(el=e.target.closest('[data-pthumb]')){e.stopPropagation();const ov=$('.thumb-ov');if(ov)ov.remove();presGoto(+el.dataset.pthumb);return;}
  if(e.target.closest('[data-pthclose]')){e.stopPropagation();const ov=$('.thumb-ov');if(ov)ov.remove();return;}
  if(e.target.closest('[data-pshare]')){e.stopPropagation();
    if(!M_DOCS.some(d=>d[0]===PRES_TITLE))M_DOCS.push([PRES_TITLE,'SLIDES','ws_qbr']);
    toast('Presentation added to shared documents');return;}
  if(e.target.closest('[data-pstop]')){e.stopPropagation();mState.share=false;clearInterval(presState.autoTimer);
    const b=document.querySelector('[data-mctrl="share"]');if(b)b.classList.remove('active');restoreGrid();return;}
},true);
function togglePlay(){
  presState.auto=!presState.auto;
  clearInterval(presState.autoTimer);
  if(presState.auto){
    presState.autoTimer=setInterval(()=>{
      if(presState.idx>=SLIDES.length-1){presState.idx=0;}
      else presState.idx++;
      renderPresentation();
    },8000);
  }
  renderPresentation();
}
function showThumbs(){
  const stage=$('#presStage'); if(!stage)return;
  if(stage.querySelector('.thumb-ov'))return;
  const grid=SLIDES.map((s,i)=>`<div class="thumb ${i===presState.idx?'on':''}" data-pthumb="${i}">
    <div class="tv"><span class="tn">Slide ${i+1}</span>${icon('layers')}</div><b>${s.t}</b></div>`).join('');
  stage.insertAdjacentHTML('beforeend',`<div class="thumb-ov">
    <div class="to-head"><h3>Slide overview</h3><button class="va-x" data-pthclose style="margin-left:auto">${icon('close')}</button></div>
    <div class="thumb-grid">${grid}</div></div>`);
}
/* keyboard nav while presenting */
document.addEventListener('keydown',e=>{
  if(!$('#presStage'))return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();presGoto(presState.idx+1);}
  else if(e.key==='ArrowLeft'){e.preventDefault();presGoto(presState.idx-1,'back');}
});
/* keep the participant strip / speaking highlight live during presentation */
const _meetSpeakLoop=meetSpeakLoop;
meetSpeakLoop=function(){
  _meetSpeakLoop();
  mTimers.push(setInterval(()=>{
    if(!$('#presStage'))return;
    document.querySelectorAll('#presCanvas .ps').forEach((el,i)=>el.classList.toggle('speaking',i===mSpeakIdx));
  },1000));
};
/* include presentation in the meeting summary */
const _buildReport=buildMeetingReport;
buildMeetingReport=function(title){
  _buildReport(title);
  const r=REPORTS.meeting;
  r.summary.unshift(`A ${SLIDES.length}-slide "${PRES_TITLE}" presentation was delivered by ${S.me.n}.`);
  r.presentation={title:PRES_TITLE,slides:SLIDES.length,presenter:S.me.n};
};

/* expose */
window.App={go,openModal,closeModal,toast,render,runReport,showSuccess,openDrawer:drawerToggle,openAssistant,signOpen,taskDetail,joinFlow,S,D,V,icon};

/* ============ INIT ============ */
NAV.find(n=>n.id==='email').badge=unreadCount();
NAV.find(n=>n.id==='notifications').badge=D.notifications.filter(n=>n.unread).length;
applyTheme();applyAccent();renderShell();render();
window.addEventListener('resize',()=>{clearTimeout(window._rz);window._rz=setTimeout(render,180);});
})();
</script>
</body>
