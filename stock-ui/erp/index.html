  border-radius:12px;padding:10px 14px;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:.16s}
.ws-switch:hover{background:rgba(255,255,255,.3)}
.ws-switch svg{width:16px;height:16px}

.qa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:620px){.qa-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1120px){.qa-grid{grid-template-columns:repeat(6,1fr)}}
.qa{display:flex;flex-direction:column;align-items:center;gap:8px;padding:15px 10px;border-radius:16px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);font-weight:700;font-size:12.5px;color:var(--text);
  transition:.16s;text-align:center;position:relative;overflow:hidden}
.qa:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow)}
.qa .qi{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent)}
.qa .qi svg{width:19px;height:19px}

.trow2{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border-2)}
.trow2:last-child{border-bottom:none}
.trow2 .tcheck{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);flex:0 0 auto;margin-top:2px;
  cursor:pointer;display:grid;place-items:center;transition:.15s}
.trow2 .tcheck:hover{border-color:var(--accent)}
.trow2 .tcheck.done{background:var(--pos);border-color:var(--pos);color:#fff}
.trow2 .tcheck svg{width:12px;height:12px;opacity:0}
.trow2 .tcheck.done svg{opacity:1}
.trow2 .tt2{font-weight:600;font-size:13.5px;line-height:1.35}
.trow2 .tt2.done{text-decoration:line-through;color:var(--text-3)}
.trow2 .tm2{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;align-items:center}
.trow2 .ttime{margin-left:auto;font-size:12px;font-weight:800;color:var(--text-3);white-space:nowrap;font-variant-numeric:tabular-nums}

.st-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.brief{display:flex;flex-direction:column;gap:9px}
.brief div{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;color:var(--text-2);font-weight:600;line-height:1.45}
.brief div b{color:var(--text);font-weight:800}
.brief .bi{width:22px;height:22px;border-radius:7px;flex:0 0 auto;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff}
.brief .bi svg{width:13px;height:13px}
.prof-card{display:flex;gap:11px;align-items:center;padding:12px;border-radius:14px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);transition:.15s;margin-bottom:8px}
.prof-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.prof-card.on{border-color:var(--accent);background:var(--accent-soft)}

/* ===== task detail ===== */
.td-head{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px}
.td-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:620px){.td-meta{grid-template-columns:repeat(4,1fr)}}
.td-meta div{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
.td-meta span{display:block;font-size:9.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin-bottom:3px}
.td-meta b{font-size:13px;font-weight:700}
.prog-wrap{margin-bottom:16px}
.prog-bar{height:10px;border-radius:20px;background:var(--surface-3);overflow:hidden}
.prog-bar i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent-2));
  transition:width .7s cubic-bezier(.3,1,.4,1)}
.tl{position:relative;padding-left:22px}
.tl:before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--border)}
.tli{position:relative;padding:8px 0}
.tli:before{content:'';position:absolute;left:-21px;top:13px;width:11px;height:11px;border-radius:50%;
  background:var(--surface);border:2px solid var(--border)}
.tli.done:before{background:var(--pos);border-color:var(--pos)}
.tli.now:before{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.tli b{font-size:13px;font-weight:700;display:block}
.tli span{font-size:11.5px;color:var(--text-3);font-weight:600}
.lifecycle{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.lifecycle span{font-size:11px;font-weight:800;padding:6px 11px;border-radius:20px;background:var(--surface-3);color:var(--text-3)}
.lifecycle span.done{background:var(--pos-soft);color:var(--pos)}
.lifecycle span.on{background:var(--accent);color:#fff}
.btn-xl{width:100%;min-height:58px;font-size:15px;border-radius:16px}

/* ===== signature ===== */
.sig-wrap{position:relative}
.sigpad2{width:100%;height:200px;border-radius:16px;border:2px dashed var(--border);background:var(--surface-2);
  touch-action:none;display:block;cursor:crosshair}
.sigpad2.filled{border-style:solid;border-color:var(--accent)}
.sig-base{position:absolute;left:24px;right:24px;bottom:34px;border-bottom:1px solid var(--border);pointer-events:none}
.sig-hint{position:absolute;left:0;right:0;bottom:12px;text-align:center;font-size:11.5px;color:var(--text-3);
  font-weight:700;pointer-events:none}
.sig-warn{display:none;align-items:center;gap:8px;margin-top:10px;padding:10px 12px;border-radius:10px;
  background:var(--warn-soft);color:var(--warn);font-size:12.5px;font-weight:700}
.sig-warn.show{display:flex;animation:slideIn .3s both}
.sig-warn svg{width:15px;height:15px}
.sig-terms{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:13px;
  font-size:12.5px;color:var(--text-2);line-height:1.55;margin-bottom:14px}
.sig-ref{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px}
.sig-ref div{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:9px 11px}
.sig-ref span{display:block;font-size:9.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin-bottom:2px}
.sig-ref b{font-size:12.5px;font-weight:700}
.signed-card{border:1px solid var(--pos);background:var(--pos-soft);border-radius:18px;padding:18px;margin-top:16px}
.signed-card .sh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.signed-card .vchk{width:34px;height:34px;border-radius:50%;background:var(--pos);color:#fff;display:grid;place-items:center}
.signed-card .vchk svg{width:19px;height:19px}
.signed-card .sig-img{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 14px;display:inline-block}
.signed-card .sig-img img{height:56px;display:block}

/* ================= ASSISTANT v2 ================= */
/* backgrounds */
.va[data-bg="aurora"]{background:radial-gradient(1200px 700px at 50% 6%,#26304F 0%,#151B31 44%,#0A0D18 100%)}
.va[data-bg="deep"]{background:radial-gradient(900px 620px at 50% 40%,#141A2E 0%,#0A0E1C 45%,#04060C 100%)}
.va[data-bg="studio"]{background:linear-gradient(160deg,#1A2138 0%,#141A2C 40%,#0C1020 100%)}
.va[data-bg="deep"] .va-grid{opacity:.1}
.va[data-bg="studio"] .va-grid{opacity:0}
.va[data-bg="studio"] .va-aura{opacity:.26;filter:blur(90px)}
.va[data-bg="deep"] .va-aura{opacity:.3}
.va[data-bg="studio"]:after{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.05) 50%,transparent 60%)}
.va.no-motion .va-aura,.va.no-motion .va-stars i,.va.no-motion .parts i,.va.no-motion .sph-ring,
.va.no-motion .bot-wrap,.va.no-motion .bot-shadow,.va.no-motion .sphere,.va.no-motion .sph-core{animation:none!important}
.va.no-motion .va-stars{display:none}
.va.no-motion .parts{display:none}

/* settings panel v2 */
.vset{position:absolute;top:0;right:0;bottom:0;width:350px;max-width:92vw;z-index:14;
  background:rgba(10,14,26,.95);backdrop-filter:blur(20px);border-left:1px solid rgba(255,255,255,.1);
  transform:translateX(104%);transition:transform .32s cubic-bezier(.3,1,.4,1);overflow-y:auto;padding:20px}
.vset.show{transform:none}
.vset h5{font-family:var(--font-display);font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:#8FA0C7;margin:22px 0 11px}
.vset h5:first-of-type{margin-top:16px}
.vcard{display:flex;gap:12px;align-items:center;padding:13px;border-radius:14px;cursor:pointer;margin-bottom:9px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:.18s}
.vcard:hover{background:rgba(255,255,255,.12)}
.vcard.on{border-color:var(--accent);background:rgba(255,255,255,.14);box-shadow:0 0 0 1px var(--accent),0 8px 24px -12px var(--accent)}
.vcard .vi{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
  background:linear-gradient(140deg,var(--accent),var(--accent-2));color:#fff}
.vcard .vi svg{width:22px;height:22px}
.vcard b{font-size:13.5px;color:#EDF1FF;display:block}
.vcard span{font-size:11.5px;color:#8FA0C7;font-weight:600}
.vcard .vchk2{margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.25);
  display:grid;place-items:center;flex:0 0 auto}
.vcard.on .vchk2{background:var(--accent);border-color:var(--accent)}
.vcard .vchk2 svg{width:12px;height:12px;color:#fff;opacity:0}
.vcard.on .vchk2 svg{opacity:1}
.vacc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
.vacc{aspect-ratio:1;border-radius:12px;cursor:pointer;border:2px solid transparent;display:grid;place-items:center;
  transition:.16s;position:relative}
.vacc:hover{transform:scale(1.08)}
.vacc.on{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.16)}
.vacc svg{width:16px;height:16px;color:#fff;opacity:0}
.vacc.on svg{opacity:1}
.vacc-name{font-size:12px;color:#C7D2F0;font-weight:800;margin-top:11px;text-align:center}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.bgo{border-radius:12px;cursor:pointer;border:2px solid transparent;overflow:hidden;transition:.16s}
.bgo.on{border-color:#fff}
.bgo .bgp{height:56px}
.bgo b{display:block;font-size:10.5px;font-weight:800;color:#C7D2F0;text-align:center;padding:7px 2px;
  background:rgba(255,255,255,.05)}
.vsw{display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid rgba(255,255,255,.08)}
.vsw b{font-size:13.5px;color:#EDF1FF;display:block}
.vsw span{font-size:11.5px;color:#8FA0C7;font-weight:600}
.vtog{margin-left:auto;width:46px;height:26px;border-radius:20px;background:rgba(255,255,255,.14);position:relative;
  cursor:pointer;transition:.2s;flex:0 0 auto}
.vtog i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.22s cubic-bezier(.3,1.4,.4,1)}
.vtog.on{background:var(--accent)}
.vtog.on i{left:23px}

/* happy chatbot face inside the sphere */
.sph-face{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;z-index:6}
.sph-face svg{width:66%;height:66%;overflow:visible;filter:drop-shadow(0 8px 18px rgba(4,8,20,.45))}
.fFace{transform-box:fill-box;transform-origin:center;animation:fidle 5.6s ease-in-out infinite}
@keyframes fidle{0%,100%{transform:translate(0,0) rotate(0)}30%{transform:translate(2px,-2px) rotate(1deg)}
  65%{transform:translate(-2px,1px) rotate(-1deg)}}
.fEye{transform-box:fill-box;transform-origin:center;animation:fblink 4.6s infinite}
@keyframes fblink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.12)}}
.fCheek{animation:fcheek 3.6s ease-in-out infinite}
@keyframes fcheek{0%,100%{opacity:.35}50%{opacity:.7}}
.fSmile{transition:opacity .2s}
.fOpen{opacity:0;transform-box:fill-box;transform-origin:center;transition:opacity .18s}
.fSpark{animation:fspark 2.6s ease-in-out infinite}
@keyframes fspark{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.9;transform:scale(1.25)}}
/* listening — happy, gently bobbing */
.va[data-state="listening"] .fFace{animation:flisten 3.8s ease-in-out infinite}
@keyframes flisten{0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(3px,-3px) rotate(2deg)}
  50%{transform:translate(0,-4px) rotate(0)}75%{transform:translate(-3px,-3px) rotate(-2deg)}}
.va[data-state="listening"] .fEye{animation:fblink 2.8s infinite}
.va[data-state="listening"] .fCheek{animation:fcheek 1.6s ease-in-out infinite}
/* thinking — tilts and glances */
.va[data-state="thinking"] .fFace{animation:fthink 2s ease-in-out infinite}
@keyframes fthink{0%,100%{transform:rotate(-4deg) translateY(0)}50%{transform:rotate(4deg) translateY(-2px)}}
/* speaking — the mouth opens and closes */
.va[data-state="speaking"] .fSmile{opacity:.2}
.va[data-state="speaking"] .fOpen{opacity:1;animation:ftalk .3s ease-in-out infinite alternate}
@keyframes ftalk{from{transform:scaleY(.4)}to{transform:scaleY(1.3)}}
.va[data-state="speaking"] .fFace{animation:fidle 2.8s ease-in-out infinite}

/* THEME 3 — AI CHAT */
.va[data-exp="chat"] .va-stage{justify-content:flex-start;padding-top:8px}
.chatp{width:min(700px,96vw);flex:1;min-height:0;display:flex;flex-direction:column;
  border-radius:22px;background:rgba(16,22,40,.62);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.13);
  box-shadow:0 30px 70px -30px rgba(0,0,0,.8);overflow:hidden;animation:rise .5s cubic-bezier(.22,1,.36,1) both}
.chatp-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04)}
.chatp-head .ca{width:46px;height:46px;border-radius:14px;background:linear-gradient(140deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;position:relative;flex:0 0 auto}
.chatp-head .ca svg{width:30px;height:30px}
.chatp-head .ca:after{content:'';position:absolute;right:-2px;bottom:-2px;width:12px;height:12px;border-radius:50%;
  background:var(--pos);border:2px solid #131A2C;animation:blink 2s infinite}
.chatp-head b{font-family:var(--font-display);font-size:15.5px;color:#fff;display:block}
.chatp-head span{font-size:11px;color:#8FA0C7;font-weight:800;letter-spacing:.07em;text-transform:uppercase}
.chatp-head .cbadge{margin-left:auto;font-size:10.5px;font-weight:800;letter-spacing:.08em;padding:6px 11px;border-radius:20px;
  background:var(--accent);color:#fff}
.chatp-body{flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.cmsg{max-width:80%;padding:11px 15px;border-radius:18px;font-size:13.5px;line-height:1.55;animation:bubIn .35s cubic-bezier(.22,1.2,.36,1)}
.cmsg.me{align-self:flex-end;background:linear-gradient(140deg,var(--accent),var(--accent-2));color:#fff;border-bottom-right-radius:5px}
.cmsg.bot{align-self:flex-start;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);
  color:#DCE4FA;border-bottom-left-radius:5px}
.cmsg.bot.typing{display:flex;gap:5px;padding:14px 16px}
.cmsg.bot.typing i{width:7px;height:7px;border-radius:50%;background:#9DB4FF;animation:bounceDot 1.1s infinite}
.cmsg.bot.typing i:nth-child(2){animation-delay:.15s}
.cmsg.bot.typing i:nth-child(3){animation-delay:.3s}
.chat-empty{text-align:center;color:#8FA0C7;font-size:13px;font-weight:600;padding:24px 12px}
.chat-empty b{display:block;color:#fff;font-family:var(--font-display);font-size:16px;margin-bottom:6px}
.va[data-exp="chat"] .va-wave{height:44px}
.va[data-exp="chat"] .va-freq{display:none}
.va[data-exp="chat"] .va-script{display:none!important}

/* ===== market overview enrichments ===== */
.mkt-status{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.mkt-status:before{content:'';position:absolute;right:-40px;top:-50px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.1)}
.mkt-status>*{position:relative;z-index:1}
.mkt-status .ms-big{font-family:var(--font-display);font-size:22px;font-weight:800;line-height:1.1}
.mkt-status .ms-sub{font-size:12px;opacity:.9;font-weight:600}
.mkt-status .ms-pill{background:rgba(255,255,255,.18);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:800;display:flex;align-items:center;gap:7px}
.mkt-status .ms-pill .live-dot{width:8px;height:8px;border-radius:50%;background:#7CFFB0;box-shadow:0 0 8px #7CFFB0;animation:blink 1.6s infinite}
.mover{display:flex;align-items:center;gap:11px;padding:10px;border-radius:12px;transition:.15s;cursor:pointer}
.mover:hover{background:var(--surface-2)}
.mover .msym{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-family:var(--font-display);
  font-size:11px;font-weight:800;flex:0 0 auto}
.mover .mnm{font-weight:600;font-size:13.5px;line-height:1.2}
.mover .msub{font-size:11.5px;color:var(--text-3);font-weight:600}
.mover .mval{margin-left:auto;text-align:right}
.mover .mval .mp{font-weight:800;font-size:13.5px;font-variant-numeric:tabular-nums}
.mover .mval .mc{font-size:11.5px;font-weight:800}
.heat{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:620px){.heat{grid-template-columns:repeat(3,1fr)}}
.heat-cell{border-radius:12px;padding:12px;color:#fff;position:relative;overflow:hidden;cursor:pointer;transition:.15s;min-height:76px}
.heat-cell:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.heat-cell b{font-family:var(--font-display);font-size:13px;font-weight:800;display:block}
.heat-cell .hc-val{font-size:18px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.heat-cell .hc-chg{position:absolute;bottom:8px;right:10px;font-size:12px;font-weight:800;opacity:.95}
.wl-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-2)}
.wl-row:last-child{border-bottom:none}
.wl-spark{width:70px;height:26px;flex:0 0 auto}
.mkcat{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.mkcat button{font-size:12px;font-weight:700;padding:7px 13px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-2);cursor:pointer;transition:.15s}
.mkcat button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.mkcat button:hover:not(.on){border-color:var(--accent);color:var(--accent)}

/* faux-fullscreen fallback (works inside iframes where the FS API is blocked) */
html.faux-full,body.faux-full{overflow:hidden!important}
body.faux-full .app{position:fixed;inset:0;z-index:60;width:100vw;height:100vh;height:100dvh;
  margin:0;border-radius:0;box-shadow:none;background:var(--bg)}
body.faux-full .content{max-width:none}

/* ================= ENTERPRISE MEETING ================= */
#meet-layer{position:fixed;inset:0;z-index:200;pointer-events:none}
.mroom{position:absolute;inset:0;pointer-events:auto;background:#0B1020;color:#EAEFFB;display:flex;flex-direction:column;
  animation:vaIn .4s cubic-bezier(.22,1,.36,1);overflow:hidden;user-select:none;-webkit-user-select:none}
.mroom.out{animation:vaOut .3s forwards}
.mrbar{display:flex;align-items:center;gap:12px;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  background:rgba(8,11,20,.7);border-bottom:1px solid rgba(255,255,255,.08);flex:none;flex-wrap:wrap}
.mrbar h3{font-family:var(--font-display);font-size:16px;font-weight:800;margin:0}
.rec-dot{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:#FF6369}

@keyframes recpulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,99,105,.5)}50%{opacity:.6;box-shadow:0 0 0 6px rgba(255,99,105,0)}}

function initials(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function avColor(n){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))>>>0;return AV_C[h%AV_C.length];}
function avatar(name,size=38){return `<div class="avatar" style="width:${size}px;height:${size}px;background:${avColor(name)};font-size:${size*0.34}px">${initials(name)}</div>`;}

/* -------- CHARTS -------- */
function smoothPath(pts){
  if(pts.length<2)return '';
  let d=`M${pts[0][0]},${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C${c1x},${c1y} ${c2x},${c2y} ${p2[0]},${p2[1]}`;
  }
  return d;
}
function lineChart(o){
  // o:{labels, series:[{data,color,name}], h, unit, prefix}
  const W=760,H=o.h||280,pl=40,pr=16,pt=18,pb=32;
  const iw=W-pl-pr, ih=H-pt-pb;
  const all=o.series.flatMap(s=>s.data);
  let max=Math.max(...all),min=Math.min(...all,0);
  max=max*1.12||1; const range=max-min||1;
  const n=o.labels.length;
  const X=i=>pl+(n===1?iw/2:iw*i/(n-1));
  const Y=v=>pt+ih-((v-min)/range)*ih;
  let grid='',gl=4;
  for(let g=0;g<=gl;g++){const y=pt+ih*g/gl;const val=max-(range*g/gl);
    grid+=`<line class="grid-line" x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}"/><text x="${pl-8}" y="${y+4}" text-anchor="end">${fmtAxis(val,o)}</text>`;}
  let labels='';o.labels.forEach((l,i)=>{labels+=`<text x="${X(i)}" y="${H-10}" text-anchor="middle">${l}</text>`;});
  let paths='',dots='';
  o.series.forEach((s,si)=>{
    const pts=s.data.map((v,i)=>[X(i),Y(v)]);
    const dp=smoothPath(pts);
    const col=`var(--${s.color})`;
    if(si===0){ // area for first series
      const area=dp+` L${X(n-1)},${pt+ih} L${X(0)},${pt+ih} Z`;
      paths+=`<path d="${area}" fill="url(#area0)" opacity=".9"/>`;
    }
    paths+=`<path d="${dp}" fill="none" stroke="${col}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
    pts.forEach((p,i)=>{ dots+=`<circle class="hoverable" cx="${p[0]}" cy="${p[1]}" r="4.5" fill="var(--surface)" stroke="${col}" stroke-width="2.5" data-tip="${s.name?s.name+' · ':''}${o.labels[i]}: ${fmtV(s.data[i],o)}"/>`; });
  });
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">
    <defs><linearGradient id="area0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:var(--${o.series[0].color});stop-opacity:.28"/>
      <stop offset="100%" style="stop-color:var(--${o.series[0].color});stop-opacity:0"/></linearGradient></defs>
    ${grid}${paths}${dots}${labels}</svg></div>`;
}
function fmtAxis(v,o){v=Math.round(v);return (o.prefix||'')+(v>=1000?(v/1000).toFixed(v>=10000?0:1)+'k':v);}
function fmtV(v,o){return (o.prefix||'')+v+(o.unit||'');}

function barChart(o){
  // o:{labels, groups:[{data,color,name}] , h, unit, prefix}
  const W=760,H=o.h||280,pl=40,pr=16,pt=18,pb=34;
  const iw=W-pl-pr, ih=H-pt-pb;
  const all=o.groups.flatMap(g=>g.data);
  let max=Math.max(...all)*1.12||1;
  const n=o.labels.length, gcnt=o.groups.length;
  const slot=iw/n, bw=Math.min(30,(slot*0.62)/gcnt), gap=6;
  const Y=v=>pt+ih-(v/max)*ih;
  let grid='',gl=4;
  for(let g=0;g<=gl;g++){const y=pt+ih*g/gl;grid+=`<line class="grid-line" x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}"/><text x="${pl-8}" y="${y+4}" text-anchor="end">${fmtAxis(max-(max*g/gl),o)}</text>`;}
  let bars='',labels='';
  o.labels.forEach((l,i)=>{
    const cx=pl+slot*i+slot/2;
    const totalW=gcnt*bw+(gcnt-1)*gap;
    o.groups.forEach((g,gi)=>{
      const x=cx-totalW/2+gi*(bw+gap);
      const y=Y(g.data[i]),h=pt+ih-y;
      bars+=`<rect class="hoverable" x="${x}" y="${y}" width="${bw}" height="${Math.max(h,2)}" rx="6" fill="var(--${g.color})" data-tip="${g.name} · ${l}: ${fmtV(g.data[i],o)}"/>`;
    });
    labels+=`<text x="${cx}" y="${H-10}" text-anchor="middle">${l}</text>`;
  });
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">${grid}${bars}${labels}</svg></div>`;
}
function donut(o){
  // o:{data:[{label,value,c}], size, center, sub}
  const sz=o.size||220,cx=sz/2,cy=sz/2,r=sz*0.38,th=sz*0.14,C=2*Math.PI*r;
  const total=o.data.reduce((a,b)=>a+b.value,0);
  let off=0,arcs='';
  o.data.forEach(d=>{
    const frac=d.value/total,len=frac*C;
    arcs+=`<circle class="hoverable" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--${d.c})" stroke-width="${th}"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" stroke-linecap="butt"
      transform="rotate(-90 ${cx} ${cy})" data-tip="${d.label}: ${d.value}%"/>`;
    off+=len;
  });
  return `<div class="chart-wrap" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center">
    <div style="position:relative;width:${sz}px;height:${sz}px;flex:0 0 auto">
      <svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="${th}"/>${arcs}</svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
        <div style="font-family:var(--font-display);font-weight:800;font-size:${sz*0.13}px;letter-spacing:-.03em">${o.center||total+'%'}</div>
        <div style="font-size:12px;color:var(--text-3);font-weight:600">${o.sub||''}</div></div>
    </div>
    <div class="legend" style="flex-direction:column;gap:9px">${o.data.map(d=>`<div class="li"><span class="sw" style="background:var(--${d.c})"></span>${d.label}<b style="margin-left:6px;color:var(--text);font-weight:700">${d.value}%</b></div>`).join('')}</div>
  </div>`;
}
function ring(pct,size=118,label=''){
  const r=size*0.4,C=2*Math.PI*r,cx=size/2;
  return `<div style="position:relative;width:${size}px;height:${size}px;flex:0 0 auto">
    <svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="${size*0.1}"/>
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--accent)" stroke-width="${size*0.1}" stroke-linecap="round"
        stroke-dasharray="${C*pct/100} ${C}" transform="rotate(-90 ${cx} ${cx})"/>
    </svg><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <b style="font-family:var(--font-display);font-size:${size*0.2}px;font-weight:800">${pct}%</b>
      ${label?`<span style="font-size:11px;color:var(--text-3);font-weight:600">${label}</span>`:''}</div></div>`;
}
function spark(data,w=96,h=40){
  const max=Math.max(...data),min=Math.min(...data),rg=max-min||1;
  const pts=data.map((v,i)=>[i/(data.length-1)*w,h-4-((v-min)/rg)*(h-8)]);
  return `<svg class="spark" viewBox="0 0 ${w} ${h}"><path d="${smoothPath(pts)}" fill="none" stroke="var(--accent)" stroke-width="2.4" opacity=".55" stroke-linecap="round"/></svg>`;
}

function openTask(key){
  const [k,i]=key.split(':'); const t=D.projects[k][+i];
  openModal(`<div class="modal-head"><h3>Task</h3><button class="icon-btn" data-close>${icon('close')}</button></div>
    <div class="modal-body">
      <div style="font-family:var(--font-display);font-size:20px;font-weight:800;margin-bottom:12px">${t.t}</div>

      <div class="row" style="border:none;padding:0 0 18px">${avatar(t.who,38)}
        <div><div class="t1">${t.who}</div><div class="t2">Assignee</div></div></div>
      <label style="display:block;font-size:12.5px;font-weight:700;color:var(--text-2);margin-bottom:8px">Move to stage</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${COLS.map(([ck,cl])=>`<button class="chip ${ck===k?'on':''}" data-move="${key}:${ck}">${cl}</button>`).join('')}
      </div></div>`);
}
function moveTask(k,i,to){
  if(k===to){closeModal();return;}
  const [t]=D.projects[k].splice(+i,1); D.projects[to].push(t);
  closeModal(); render(); toast(`Moved to ${COLS.find(c=>c[0]===to)[1]}`);
}

/* ---------- module event wiring ---------- */
document.addEventListener('click',e=>{
  let el;
  if(el=e.target.closest('[data-toast]')){toast(el.dataset.toast);return;}
  // projects
  if(el=e.target.closest('[data-task]')){openTask(el.dataset.task);return;}
  if(el=e.target.closest('[data-move]')){const [k,i,to]=el.dataset.move.split(':');moveTask(k,i,to);return;}
  // team
  if(el=e.target.closest('[data-leave]')){const i=+el.dataset.leave;
    D.leave[i].st=el.dataset.act==='approve'?'Approved':'Declined';render();
    toast(`Leave request ${D.leave[i].st.toLowerCase()}`);return;}
  // calendar
  if(el=e.target.closest('[data-day]')){S.calDay=el.dataset.day;S.calEvent=0;render();return;}
  if(el=e.target.closest('[data-evt]')){S.calEvent=+el.dataset.evt;render();return;}
  // documents
  if(el=e.target.closest('[data-docopen]')){openDoc(+el.dataset.docopen);return;}
  // email
  if(el=e.target.closest('[data-mailfolder]')){S.emailFolder=el.dataset.mailfolder;S.emailOpen=null;render();return;}
  if(el=e.target.closest('[data-mailopen]')){const i=+el.dataset.mailopen;const m=mailList()[i];
    if(m.unread){m.unread=false;const nav=NAV.find(n=>n.id==='email');nav.badge=unreadCount()||0;renderShell();}
    S.emailOpen=i;render();return;}
  if(e.target.closest('[data-mailback]')){S.emailOpen=null;render();return;}
  if(el=e.target.closest('[data-star]')){const m=mailList()[+el.dataset.star];m.star=!m.star;render();return;}
  if(el=e.target.closest('[data-compose]')){openCompose(el.dataset.compose);return;}
  if(e.target.closest('[data-send]')){sendMail();return;}
  // chat
  if(el=e.target.closest('[data-chat]')){S.activeChat=el.dataset.chat;S.chatOpen=true;render();return;}
  if(e.target.closest('[data-chatback]')){S.chatOpen=false;render();return;}
  if(e.target.closest('#chatSend')){sendChat();return;}
  // notifications
  if(e.target.closest('[data-readall]')){D.notifications.forEach(n=>n.unread=false);
    NAV.find(n=>n.id==='notifications').badge=0;renderShell();render();toast('All notifications marked as read');return;}
  // settings
  if(el=e.target.closest('[data-theme]')){S.theme=el.dataset.theme;applyTheme();render();return;}
  if(el=e.target.closest('[data-accent]')){S.accent=el.dataset.accent;applyAccent();render();return;}
  if(el=e.target.closest('[data-pref]')){const k=el.dataset.pref;S.prefs[k]=!S.prefs[k];render();applyDisplayPrefs();return;}
});
document.addEventListener('input',e=>{
  if(e.target.id==='docSearch'){const q=e.target.value.toLowerCase();
    document.querySelectorAll('[data-doc]').forEach(r=>{r.style.display=r.dataset.doc.includes(q)?'':'none';});}
  if(e.target.id==='mailSearch'){const q=e.target.value.toLowerCase();

/* ============ THEME / ACCENT ============ */
function applyTheme(){
  document.documentElement.dataset.theme=S.theme;
  const b=$('#btnTheme');
  if(b)b.innerHTML=icon(S.theme==='light'?'moon':'sun');
}
function toggleThemeBtn(){
  if(S.theme==='light'){S.theme=S.lastDark||'dark';}
  else{S.lastDark=S.theme;S.theme='light';}
  document.documentElement.dataset.theme=S.theme;
  document.querySelectorAll('#btnTheme').forEach(b=>b.innerHTML=icon(S.theme==='light'?'moon':'sun'));
  try{applyAccent();}catch(e){}

}
function applyAccent(){const a=ACCENTS[S.accent];const rs=document.documentElement.style;
  rs.setProperty('--accent',a.a);rs.setProperty('--accent-2',a.b);
  const [r,g,b]=hex2rgb(a.a);rs.setProperty('--accent-soft',`rgba(${r},${g},${b},.13)`);
  // keep chart c1 tied to accent
  rs.setProperty('--c1',a.a);
}

/* ============ MODAL / TOAST / TIP ============ */
function openModal(html){$('#modal').innerHTML=html;$('#modalBg').classList.add('show');}
function closeModal(){$('#modalBg').classList.remove('show');}
function toast(msg){let t=document.createElement('div');t.className='tip show';t.style.left='50%';t.style.bottom='96px';t.style.top='auto';
  t.style.transform='translateX(-50%)';t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),250);},1900);}
function openSheet(){$('#sheet').classList.add('show');$('#sheetBg').classList.add('show');}
function closeSheet(){$('#sheet').classList.remove('show');$('#sheetBg').classList.remove('show');}

// chart tooltip (delegated)
const tip=$('#tip');
document.addEventListener('mousemove',e=>{ if(tip.classList.contains('show')){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';}});
document.addEventListener('mouseover',e=>{const el=e.target.closest('[data-tip]');if(el){tip.innerHTML=el.getAttribute('data-tip').replace(/(\S+)$/,'<b>$1</b>');tip.classList.add('show');}});
document.addEventListener('mouseout',e=>{if(e.target.closest('[data-tip]'))tip.classList.remove('show');});
// touch: tap chart element -> brief tooltip near it
document.addEventListener('click',e=>{const el=e.target.closest('[data-tip]');if(el&&window.matchMedia('(pointer:coarse)').matches){const r=el.getBoundingClientRect();tip.innerHTML=el.getAttribute('data-tip').replace(/(\S+)$/,'<b>$1</b>');tip.style.left=(r.left+r.width/2)+'px';tip.style.top=(r.top-12)+'px';tip.classList.add('show');clearTimeout(tip._t);tip._t=setTimeout(()=>tip.classList.remove('show'),1500);}});

document.addEventListener('click',e=>{

  if(e.target===$('#sheetBg')){closeSheet();return;}
  if(e.target===$('#modalBg')||e.target.closest('[data-close]')){closeModal();return;}
  const seg=e.target.closest('#rangeSeg [data-range]'); if(seg){S.analyticsRange=seg.dataset.range;render();return;}
});

/* ---------- report generation flow ---------- */
const STEPS=['Reviewing data','Analyzing performance','Creating charts','Preparing summary','Finalizing report'];
function runReport(){
  const f=$('#flow');
  f.classList.remove('done'); f.classList.add('show');
  $('#flowOrb').innerHTML=icon('loader');
  $('#flowSteps').innerHTML=STEPS.map((s,i)=>`<div class="step" data-step="${i}"><span class="sc"></span><b>${s}</b></div>`).join('');
  $('#flowBar').style.width='0%';
  const els=[...document.querySelectorAll('.step')];
  let i=0;
  const tick=()=>{
    if(i>0){els[i-1].classList.remove('on');els[i-1].classList.add('done');els[i-1].querySelector('.sc').innerHTML=icon('check');}
    $('#flowBar').style.width=(i/STEPS.length*100)+'%';
    if(i<STEPS.length){els[i].classList.add('on');i++;setTimeout(tick,780);}
    else{
      $('#flowBar').style.width='100%';
      setTimeout(()=>{
        $('#checkRing').innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>`;
        f.classList.add('done');
        setTimeout(()=>{f.classList.remove('show','done');go('report');},1900);
      },340);
    }
  };
  setTimeout(tick,260);
}

V.assistant.mount=()=>{const t=$('#aiThread');if(t)t.scrollTop=t.scrollHeight;};
function aiAsk(key,label){
  if(S.aiBusy)return;
  S.aiBusy=true;
  S.aiMsgs.push({me:true,t:label});
  S.aiMsgs.push({typing:true});
  render();
  setTimeout(()=>{
    S.aiMsgs.pop();
    if(key==='report'){S.aiMsgs.push({t:'I can compile a Monthly Performance Report from September data — revenue, expenses, team performance and project delivery.',report:true});}
    else{const r=AI_REPLIES[key]||AI_REPLIES.default;S.aiMsgs.push({t:r.t,stats:r.stats,act:r.act});}
    S.aiBusy=false;render();
  },1100);
}
function aiSendFree(){
  const inp=$('#aiInput'); if(!inp)return; const v=inp.value.trim(); if(!v)return;
  const l=v.toLowerCase();
  let k='default';
  if(/expens|spend|cost/.test(l))k='expenses';
  else if(/report/.test(l))k='report';
  else if(/sale|forecast|predict|next month/.test(l))k='sales';
  else if(/team|employee|staff|performance/.test(l))k='team';
  else if(/project|task/.test(l))k='projects';
  else if(/unusual|anomal|alert/.test(l))k='unusual';
  else if(/budget/.test(l))k='budget';
  else if(/mail|inbox/.test(l))k='email';
  else if(/meeting|calendar|schedule/.test(l))k='meetings';
  inp.value='';
  aiAsk(k,v);
}

/* ---------- Budget Planning ---------- */
V.budget=()=>{
  const plan=D.budgetPlan;
  const planned=plan.reduce((a,b)=>a+b.p,0), actual=plan.reduce((a,b)=>a+b.a,0);
  const util=Math.round(actual/planned*100);
  const alloc=donut({size:230,center:'$'+planned+'k',sub:'Allocated',data:plan.map(b=>({label:b.d,value:Math.round(b.p/planned*100),c:b.c}))});
  const cmp=barChart({labels:['Ops','Payroll','Marketing','R&D','Facilities'],prefix:'$',unit:'k',h:260,
    groups:[{data:plan.map(b=>b.p),color:'c5',name:'Planned'},{data:plan.map(b=>b.a),color:'c1',name:'Actual'}]});
  const rows=plan.map(b=>{const over=b.a>b.p;const pct=Math.round(b.a/b.p*100);
    return `<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;margin-bottom:7px">
      <span>${b.d}</span><span class="num" style="color:var(--${over?'neg':'text-2'})">$${b.a}k / $${b.p}k</span></div>
      <div class="meter" style="height:10px"><i style="width:${Math.min(pct,100)}%;background:${over?'var(--neg)':'linear-gradient(90deg,var(--accent),var(--accent-2))'}"></i></div></div>`;}).join('');
  const cards=[['Total budget','$'+planned+'k','accent','wallet'],['Spent','$'+actual.toFixed(1)+'k','amber','finance'],
    ['Remaining','$'+(planned-actual).toFixed(1)+'k','green','check'],['Utilization',util+'%','accent','gauge']]
    .map(([l,v,t,ic])=>`<div class="kpi"><div class="top"><div class="kicon" style="background:var(--${t==='accent'?'accent-soft':t+'-soft'});color:var(--${t==='accent'?'accent':t})">${icon(ic)}</div></div>
      <div class="label">${l}</div><div class="value num">${v}</div></div>`).join('');
  return `<div class="view-head"><h1>Budget Planning</h1><p>September plan · ${util}% utilized, $${(planned-actual).toFixed(1)}k remaining.</p>
      <div class="head-actions"><button class="btn btn-primary" data-report="budget">${icon('spark')}Analyze Data</button></div></div>
    <div class="grid kpi-grid" style="grid-template-columns:repeat(2,1fr);margin-bottom:16px">${cards}</div>
    <div class="grid dash-2col" style="margin-bottom:16px">
      <div class="card pad-lg"><div class="card-head"><div><h3>Planned vs Actual</h3><div class="sub">Per department · in thousands</div></div>
        <div class="legend"><span class="li"><span class="sw" style="background:var(--c5)"></span>Planned</span><span class="li"><span class="sw" style="background:var(--c1)"></span>Actual</span></div></div>${cmp}</div>
      <div class="card pad-lg"><div class="card-head"><h3>Budget Allocation</h3></div>${alloc}</div>
    </div>
    <div class="grid cols-2">
      <div class="card pad-lg"><div class="card-head"><h3>Department Spending</h3></div>${rows}</div>
      <div class="card pad-lg" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
        <div class="card-head" style="margin:0;width:100%"><h3>Budget Utilization</h3></div>
        ${ring(util,150,'of plan')}
        <div style="text-align:center;color:var(--text-3);font-size:13px">Within target. $${(planned-actual).toFixed(1)}k is still unallocated for September.</div>
      </div>
    </div>`;
};

/* ---------- motion system ---------- */
function animCount(el){
  const raw=el.textContent.trim();
  const m=raw.match(/^([^\d]*)([\d][\d,.]*)(.*)$/);
  if(!m)return;
  const pre=m[1],ns=m[2],suf=m[3];
  const target=parseFloat(ns.replace(/,/g,''));
  if(isNaN(target))return;
  const dec=(ns.split('.')[1]||'').length, grouped=ns.includes(',');
  const t0=performance.now(),dur=900;
  const step=t=>{
    const p=Math.min((t-t0)/dur,1), e=1-Math.pow(1-p,3);
    let v=(target*e).toFixed(dec);
    if(grouped)v=Number(v).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
    el.textContent=pre+v+suf;
    if(p<1)requestAnimationFrame(step); else el.textContent=raw;
  };
  requestAnimationFrame(step);
}
function animateView(){
  const root=$('#view'); if(!root)return;
  [...root.querySelectorAll('.card,.kpi,.act,.tcard,.hl,.kcol')].slice(0,26)
    .forEach((el,i)=>{el.style.animation=`rise .5s ${Math.min(i*42,520)}ms both cubic-bezier(.22,1,.36,1)`;});
  [...root.querySelectorAll('.rowlist .row,.reg')].slice(0,14)
    .forEach((el,i)=>{el.style.animation=`slideIn .42s ${140+i*55}ms both cubic-bezier(.22,1,.36,1)`;});
  root.querySelectorAll('.value.num,.rep-stat b,.hs b').forEach(animCount);
  root.querySelectorAll('.chart-wrap path').forEach((p,i)=>{
    const f=p.getAttribute('fill');
    if(f&&f.startsWith('url')){p.style.opacity=0;p.style.transition='opacity .8s .45s ease';requestAnimationFrame(()=>{p.style.opacity=.9;});return;}
    if(f!=='none')return;
    const L=p.getTotalLength();
    p.style.strokeDasharray=L;p.style.strokeDashoffset=L;p.getBoundingClientRect();
    p.style.transition=`stroke-dashoffset 1.15s ${i*110}ms cubic-bezier(.4,0,.2,1)`;
    requestAnimationFrame(()=>{p.style.strokeDashoffset=0;});
  });
  root.querySelectorAll('.chart-wrap circle').forEach((c,i)=>{
    c.style.opacity=0;c.style.transition=`opacity .3s ${520+i*35}ms ease`;
    requestAnimationFrame(()=>{c.style.opacity=1;});
  });
  root.querySelectorAll('.chart-wrap rect').forEach((r,i)=>{
    r.style.transformBox='fill-box';r.style.transformOrigin='bottom';
    r.style.animation=`grow .72s ${i*55}ms both cubic-bezier(.22,1,.36,1)`;
  });
  root.querySelectorAll('svg circle[stroke-dasharray]').forEach((c,i)=>{
    const f=c.getAttribute('stroke-dasharray');
    c.style.strokeDasharray='0 9999';c.getBoundingClientRect();
    c.style.transition=`stroke-dasharray .95s ${180+i*130}ms cubic-bezier(.4,0,.2,1)`;
    requestAnimationFrame(()=>{c.style.strokeDasharray=f;});
  });
  root.querySelectorAll('.meter i,.tbar i').forEach((m,i)=>{
    const w=m.style.width;m.style.width='0';m.getBoundingClientRect();
    m.style.transition=`width .9s ${160+i*45}ms cubic-bezier(.4,0,.2,1)`;
    requestAnimationFrame(()=>{m.style.width=w;});
  });
}

/* ---------- ripple ---------- */
document.addEventListener('pointerdown',e=>{
  const el=e.target.closest('.btn,.icon-btn,.chip,.act,.nav-item,.bn-item,.tcard,.conv,.mail-row,.doc-row,.evt,.daypill,.swatch,.theme-card');
  if(!el)return;
  const r=el.getBoundingClientRect(), d=Math.max(r.width,r.height);
  const s=document.createElement('span');
  s.className='rip';
  s.style.width=s.style.height=d+'px';
  s.style.left=(e.clientX-r.left-d/2)+'px';
  s.style.top=(e.clientY-r.top-d/2)+'px';
  el.appendChild(s);
  setTimeout(()=>s.remove(),640);
});

function tickMarket(){
  MKT.forEach(m=>{
    const drift=(Math.random()-0.48)*m.v*1.6;
    m.p=Math.max(m.p+drift,m.v*3);
    m.hist.push(m.p); if(m.hist.length>60)m.hist.shift();
    m.tickN++;
    const last=m.candles[m.candles.length-1];
    if(m.tickN%3===0){
      m.candles.push({o:m.p,c:m.p,h:m.p,l:m.p});
      if(m.candles.length>24)m.candles.shift();
    }else if(last){
      last.c=m.p; last.h=Math.max(last.h,m.p); last.l=Math.min(last.l,m.p);
    }
  });
}
const chg=m=>((m.p-m.open)/m.open)*100;
const fmtP=m=>m.p.toLocaleString('en-US',{minimumFractionDigits:m.dec,maximumFractionDigits:m.dec});
function candleChart(m,h=340){
  const cs=m.candles.slice(-16),W=760,pl=56,pr=14,pt=16,pb=26,iw=W-pl-pr,ih=h-pt-pb;
  const hi=Math.max(...cs.map(c=>c.h)),lo=Math.min(...cs.map(c=>c.l));
  const pad=(hi-lo)*0.14||m.v;const max=hi+pad,min=lo-pad,rg=max-min||1;
  const Y=v=>pt+ih-((v-min)/rg)*ih;
  const slot=iw/cs.length,bw=Math.max(14,slot*0.62);
  let grid='';
  for(let g=0;g<=4;g++){const y=pt+ih*g/4;const val=max-rg*g/4;
    grid+=`<line class="grid-line" x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}"/>
      <text x="${pl-8}" y="${y+4}" text-anchor="end">${val.toFixed(m.dec)}</text>`;}
  let body='';
  cs.forEach((c,i)=>{
    const cx=pl+slot*i+slot/2,up=c.c>=c.o,col=up?'var(--pos)':'var(--neg)';
    const y1=Y(Math.max(c.o,c.c)),y2=Y(Math.min(c.o,c.c));
    body+=`<line x1="${cx}" y1="${Y(c.h)}" x2="${cx}" y2="${Y(c.l)}" stroke="${col}" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="${cx-bw/2}" y="${y1}" width="${bw}" height="${Math.max(y2-y1,4)}" rx="3" fill="${col}"/>`;
  });
  const lastY=Y(m.p);
  const marker=`<line x1="${pl}" y1="${lastY}" x2="${W-pr}" y2="${lastY}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 4" opacity=".7"/>
    <rect x="${W-pr-56}" y="${lastY-10}" width="56" height="20" rx="6" fill="var(--accent)"/>
    <text x="${W-pr-28}" y="${lastY+4}" text-anchor="middle" style="fill:#fff;font-weight:800">${fmtP(m)}</text>`;
  return `<svg viewBox="0 0 ${W} ${h}" width="100%" style="display:block">${grid}${body}${marker}</svg>`;
}
function mkSpark(m){
  const d=m.hist.slice(-30),w=140,h=38;

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="display:block">
    <path d="${smoothPath(pts)}" fill="none" stroke="var(--${up?'pos':'neg'})" stroke-width="2" stroke-linecap="round"/></svg>`;
}

let waveRAF=null,waveT=0,waveAmp=6;
function startWave(){
  if(waveRAF)cancelAnimationFrame(waveRAF);
  const draw=()=>{
    const svg=document.getElementById('waveSvg');
    if(!svg||S.view!=='voice'){waveRAF=null;return;}
    const target=S.voice==='listening'?44:S.voice==='speaking'?24:7;
    const speed=S.voice==='listening'?0.115:S.voice==='speaking'?0.055:0.022;
    waveAmp+=(target-waveAmp)*0.12;
    waveT+=speed;
    const W=520,H=170,mid=H/2;
    const layer=(phase,amp,op,sw)=>{
      let d='';
      for(let x=0;x<=W;x+=8){
        const env=Math.sin((x/W)*Math.PI);
        const y=mid+Math.sin(x*0.028+waveT+phase)*amp*env
          +Math.sin(x*0.061+waveT*1.7+phase)*amp*0.4*env;
        d+=(x===0?'M':'L')+x+','+y.toFixed(1);
      }
      return `<path d="${d}" fill="none" stroke="var(--accent)" stroke-width="${sw}" stroke-linecap="round" opacity="${op}"/>`;
    };
    const bars=[];
    for(let i=0;i<34;i++){
      const x=12+i*15, env=Math.sin((i/33)*Math.PI);
      const h=Math.max(4,Math.abs(Math.sin(waveT*1.6+i*0.45))*waveAmp*1.5*env+4);
      bars.push(`<rect x="${x}" y="${mid-h/2}" width="5" height="${h}" rx="2.5" fill="var(--accent)" opacity="${0.18+0.5*env}"/>`);
    }
    svg.innerHTML=bars.join('')+layer(0,waveAmp,0.9,3)+layer(1.9,waveAmp*0.65,0.45,2.2)+layer(3.6,waveAmp*0.4,0.25,1.6);
    waveRAF=requestAnimationFrame(draw);
  };
  draw();
}
function setVoice(st,label,hint){
  S.voice=st;
  const s=document.getElementById('vState'),h=document.getElementById('vHint'),b=document.getElementById('micBtn');
  if(s){s.textContent=label;s.style.color=st==='listening'?'var(--accent)':st==='speaking'?'var(--pos)':'var(--text-3)';}
  if(h)h.textContent=hint;

}

function voiceStart(){

}

function genMaster(base,n){
  const out=[]; let p=base*0.72; const vol=base*0.011, drift=base*0.00028;
  for(let i=0;i<n;i++){
    const o=p;
    p=Math.max(p+(Math.random()-0.5)*vol*2+drift, base*0.25);
    out.push({o,c:p,h:Math.max(o,p)+Math.random()*vol*0.5,l:Math.min(o,p)-Math.random()*vol*0.5,
      v:Math.round(1800+Math.random()*7400)});
  }
  return out;
}

function aggCandles(cs,g){
  if(g<=1)return cs.slice();
  const out=[];
  for(let i=0;i<cs.length;i+=g){
    const s=cs.slice(i,i+g); if(!s.length)break;
    out.push({o:s[0].o,c:s[s.length-1].c,h:Math.max(...s.map(x=>x.h)),l:Math.min(...s.map(x=>x.l)),v:s.reduce((t,x)=>t+x.v,0)});
  }
  return out;
}

function candlesSVG(cs,dec,h=340,showVol=true){
  const W=880,pl=58,pr=16,pt=14,pb=showVol?66:26,iw=W-pl-pr,ih=h-pt-pb;
  if(!cs.length)return '';
  const hi=Math.max(...cs.map(c=>c.h)),lo=Math.min(...cs.map(c=>c.l));
  const pad=(hi-lo)*0.12||1,max=hi+pad,min=lo-pad,rg=max-min||1;
  const Y=v=>pt+ih-((v-min)/rg)*ih;
  const slot=iw/cs.length,bw=Math.max(3,Math.min(22,slot*0.62));
  let g='';
  for(let i=0;i<=4;i++){const y=pt+ih*i/4;
    g+=`<line class="grid-line" x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}"/>
      <text x="${pl-8}" y="${y+4}" text-anchor="end">${(max-rg*i/4).toFixed(dec)}</text>`;}
  let body='',vol='';
  const vmax=Math.max(...cs.map(c=>c.v));
  cs.forEach((c,i)=>{
    const cx=pl+slot*i+slot/2, up=c.c>=c.o, col=up?'var(--pos)':'var(--neg)';
    const y1=Y(Math.max(c.o,c.c)), y2=Y(Math.min(c.o,c.c));
    body+=`<line x1="${cx}" y1="${Y(c.h)}" x2="${cx}" y2="${Y(c.l)}" stroke="${col}" stroke-width="${Math.max(1.4,bw*0.16)}" stroke-linecap="round"/>
      <rect x="${cx-bw/2}" y="${y1}" width="${bw}" height="${Math.max(y2-y1,3)}" rx="2" fill="${col}"/>`;
    if(showVol){const vh=(c.v/vmax)*34;
      vol+=`<rect x="${cx-bw/2}" y="${h-18-vh}" width="${bw}" height="${vh}" rx="1.5" fill="${col}" opacity=".35"/>`;}
  });
  const last=cs[cs.length-1].c, ly=Y(last);
  const mark=`<line x1="${pl}" y1="${ly}" x2="${W-pr}" y2="${ly}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 4" opacity=".8"/>
    <rect x="${W-pr-62}" y="${ly-11}" width="62" height="22" rx="6" fill="var(--accent)"/>
    <text x="${W-pr-31}" y="${ly+4}" text-anchor="middle" style="fill:#fff;font-weight:800">${last.toFixed(dec)}</text>`;
  return `<svg viewBox="0 0 ${W} ${h}" width="100%" style="display:block">${g}${vol}${body}${mark}</svg>`;
}
function aSpark(a){
  const d=a.m.slice(-40).map(c=>c.c),w=140,h=38;
  const mx=Math.max(...d),mn=Math.min(...d),rg=mx-mn||1;
  const pts=d.map((v,i)=>[i/(d.length-1)*w,h-3-((v-mn)/rg)*(h-6)]);
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="display:block">
    <path d="${smoothPath(pts)}" fill="none" stroke="var(--${aChg(a)>=0?'pos':'neg'})" stroke-width="2" stroke-linecap="round"/></svg>`;
}

function attachDrag(){
  const el=document.getElementById('vChart'); if(!el)return;
  let x0=null,off0=0;
  el.addEventListener('pointerdown',e=>{x0=e.clientX;off0=S.vOff;el.setPointerCapture(e.pointerId);});

function paintAssets(){

function paintGrowth(){
  const el=document.getElementById('gChart'); if(!el)return;
  const d=G_SERIES[S.gPer],l=G_LABELS[S.gPer];
  const win=Math.min(d.length,14);
  const maxOff=Math.max(0,d.length-win);
  S.gOff=Math.max(0,Math.min(S.gOff,maxOff));
  const end=d.length-S.gOff, st=Math.max(0,end-win);
  const html=lineChart({labels:l.slice(st,end),h:280,series:[{data:d.slice(st,end),color:'c1',name:'Growth index'}]});
  el.innerHTML=html;
  el.querySelectorAll('circle[data-tip]').forEach((c,i)=>{
    c.style.cursor='pointer';
    c.addEventListener('click',ev=>{ev.stopPropagation();growthPoint(st+i);});
  });
  if(!el._drag){
    el._drag=1;
    let x0=null,o0=0;
    el.addEventListener('pointerdown',e=>{x0=e.clientX;o0=S.gOff;});
    el.addEventListener('pointermove',e=>{if(x0===null)return;
      const per=(el.clientWidth||360)/14;S.gOff=o0+Math.round((e.clientX-x0)/per);paintGrowth();});
    ['pointerup','pointercancel','pointerleave'].forEach(ev=>el.addEventListener(ev,()=>{x0=null;}));
  }
}

function rng(seed){let s=7;for(const c of String(seed))s=(s*31+c.charCodeAt(0))>>>0;
  return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};}

function perData(label,per,base){
  const key=label+per;

  const n=PER_LAB[per].length, r=rng(key);
  const arr=[]; let v=base*(0.72+r()*0.1);
  for(let i=0;i<n;i++){v=v*(1+(r()-0.35)*0.06);arr.push(Math.round(v*100)/100);}
  arr[n-1]=base;
  SER_CACHE[key]=arr; return arr;
}

const _mkView=V.market;
V.market=()=>{
  const a=AMAP[S.asset]||ASSETS[0];
  const ser=aSeries(a,S.per);
  const view=ser.slice(-44);
  const c=aChg(a);
  const last=view[view.length-1]||{o:a.p,h:a.p,l:a.p,c:a.p,v:0};
  const f=v=>v.toLocaleString('en-US',{minimumFractionDigits:a.dec,maximumFractionDigits:a.dec});

  /* --- market-wide computed figures --- */
  const withChg=ASSETS.map(x=>({x,ch:aChg(x)}));
  const up=withChg.filter(o=>o.ch>=0).length;
  const down=withChg.length-up;
  const advPct=Math.round(up/withChg.length*100);
  const gainers=[...withChg].sort((p,q)=>q.ch-p.ch).slice(0,4);
  const losers=[...withChg].sort((p,q)=>p.ch-q.ch).slice(0,4);
  const avgMove=(withChg.reduce((s,o)=>s+Math.abs(o.ch),0)/withChg.length).toFixed(2);
  const mood=advPct>=60?'Bullish':advPct<=40?'Cautious':'Mixed';

  /* --- sector heatmap (group by asset class) --- */
  const classes={};
  ASSETS.forEach(x=>{(classes[x.c]=classes[x.c]||[]).push(x);});
  const heat=Object.entries(classes).slice(0,6).map(([cls,arr])=>{
    const ch=arr.reduce((s,x)=>s+aChg(x),0)/arr.length;
    const pos=ch>=0;
    const strength=Math.min(Math.abs(ch)/1.2,1);
    const bg=pos?`rgba(24,161,80,${0.35+strength*0.5})`:`rgba(229,72,77,${0.35+strength*0.5})`;
    return `<div class="heat-cell" data-heatcls="${cls}" style="background:${bg}">
        <b>${cls}</b><div class="hc-val">${arr.length}</div>
        <div class="hc-chg">${pos?'▲':'▼'}${Math.abs(ch).toFixed(2)}%</div></div>`;
  }).join('');

  const moverRow=(o,rank)=>{
    const pos=o.ch>=0;
    return `<div class="mover" data-asset="${o.x.k}">
      <div class="msym" style="background:var(--${pos?'pos':'neg'}-soft);color:var(--${pos?'pos':'neg'})">${o.x.s}</div>
      <div style="min-width:0"><div class="mnm">${o.x.n}</div><div class="msub">${o.x.c}</div></div>
      <div class="mval"><div class="mp">${o.x.p.toLocaleString('en-US',{minimumFractionDigits:o.x.dec,maximumFractionDigits:o.x.dec})}</div>
        <div class="mc" style="color:var(--${pos?'pos':'neg'})">${pos?'+':''}${o.ch.toFixed(2)}%</div></div>
    </div>`;
  };
  const watch=[...withChg].sort((p,q)=>q.x.cap-p.x.cap).slice(0,6).map(o=>{
    const pos=o.ch>=0;
    return `<div class="wl-row" data-asset="${o.x.k}" style="cursor:pointer">
      <div class="msym" style="width:34px;height:34px;background:var(--surface-3);color:var(--text-2);font-size:10px">${o.x.s}</div>
      <div style="min-width:0;flex:1"><div class="mnm" style="font-size:13px">${o.x.n}</div>
        <div class="msub">${money(o.x.cap*1000)}</div></div>
      <div class="wl-spark">${aSpark(o.x)}</div>
      <div class="mval" style="min-width:78px"><div class="mp" style="font-size:13px">${o.x.p.toLocaleString('en-US',{minimumFractionDigits:o.x.dec,maximumFractionDigits:o.x.dec})}</div>
        <div class="mc" style="color:var(--${pos?'pos':'neg'})">${pos?'+':''}${o.ch.toFixed(2)}%</div></div>
    </div>`;
  }).join('');

  const statusBar=`<div class="mkt-status">
      <div><div class="ms-big">Markets are open</div><div class="ms-sub">Global commodities & sector indices</div></div>
      <div class="ms-pill" style="margin-left:auto"><span class="live-dot"></span>LIVE</div>
      <div class="ms-pill">${mood} · ${advPct}% advancing</div>
      <div class="ms-pill">${up} ▲ / ${down} ▼</div>
      <div class="ms-pill">Avg move ${avgMove}%</div>
    </div>`;

  const overview=`
    <div class="grid dash-2col" style="margin-bottom:16px">
      <div class="card pad-lg"><div class="card-head"><h3>Top gainers</h3><span class="badge b-green"><span class="bdot"></span>${up} up</span></div>
        ${gainers.map(moverRow).join('')}</div>
      <div class="card pad-lg"><div class="card-head"><h3>Top losers</h3><span class="badge b-red"><span class="bdot"></span>${down} down</span></div>
        ${losers.map(moverRow).join('')}</div>
    </div>
    <div class="card pad-lg" style="margin-bottom:16px"><div class="card-head"><div><h3>Sector heat map</h3><div class="sub">Average move by asset class</div></div></div>
      <div class="heat">${heat}</div></div>
    <div class="card pad-lg" style="margin-bottom:16px"><div class="card-head"><div><h3>Watchlist</h3><div class="sub">Largest by market cap · tap to open</div></div>
      <span class="live"><i></i>LIVE</span></div>${watch}</div>`;

  const selChips=`<div class="mkcat" id="mkPick">
      ${ASSETS.slice(0,14).map(x=>`<button class="${x.k===a.k?'on':''}" data-asset="${x.k}">${x.s} · ${x.n}</button>`).join('')}
    </div>`;

  const inline=`<div class="card pad-lg" style="margin-bottom:16px">
      <div class="card-head">
        <div><h3><span class="symtag">${a.s}</span><span id="mkName">${a.n}</span></h3><div class="sub">${a.c} · ${a.u}</div></div>
        <div style="text-align:right">
          <div class="num" id="iPrice" style="font-family:var(--font-display);font-size:24px;font-weight:800">${aFmt(a)}</div>
          <span class="mkchg" id="iChg" style="background:var(--${c>=0?'pos':'neg'}-soft);color:var(--${c>=0?'pos':'neg'})">${c>=0?'+':''}${c.toFixed(2)}%</span></div>
      </div>
      ${selChips}
      <div class="per-tabs" style="margin-bottom:12px">
        ${PERIODS?Object.keys(PERIODS).map(p=>`<button class="per ${p===S.per?'on':''}" data-iper="${p}">${p}</button>`).join(''):''}
      </div>
      <div class="mk-stage" id="mkInline" style="cursor:zoom-in">${candlesSVG(view,a.dec,300,true)}</div>
      <div class="hintbar">${icon('search')}Tap the chart to open the full viewer</div>
      <div class="ohlc-grid">
        <div><span>Open</span>${f(last.o)}</div><div><span>High</span>${f(last.h)}</div>
        <div><span>Low</span>${f(last.l)}</div><div><span>Close</span>${f(last.c)}</div>
        <div><span>Volume</span>${last.v.toLocaleString('en-US')}</div>
        <div><span>Daily change</span>${c>=0?'+':''}${c.toFixed(2)}%</div>
        <div><span>Market cap</span>${money(a.cap*1000)}</div>
        <div><span>Avg volume</span>${Math.round(ser.reduce((s,x)=>s+x.v,0)/ser.length).toLocaleString('en-US')}</div>
      </div>
      ${srcLine('Market Intelligence','Commodity & Sector Feed')}
    </div>`;
  const base=_mkView();
  return base.replace('<div class="card-head"><h3>Markets</h3>',statusBar+inline+overview+'<div class="card-head"><h3>Markets</h3>');
};

const CAL_EVENTS={2:['c1'],3:['c3'],4:['c4'],5:['c2'],6:['c6'],9:['c1','c3'],11:['c4'],
  15:['c2'],16:['c1'],18:['c3','c6'],22:['c1'],23:['c4'],25:['c2'],29:['c1','c3','c4'],30:['c2']};
const _calBase=V.calendar;
V.calendar=()=>{
  const dows=['MON','TUE','WED','THU','FRI','SAT','SUN'];
  let cells='';
  for(let i=-2;i<=35;i++){
    const day=i+1;
    const out=day<1||day>30;
    const evs=CAL_EVENTS[day]||[];
    cells+=`<div class="cell ${out?'out':''} ${day===2?'today':''}">
      <b>${out?(day<1?30+day:day-30):day}</b>
      ${evs.map(c=>`<div class="ev" style="background:var(--${c})"></div>`).join('')}
      ${evs.length&&!out?`<div class="evt-mini">${evs.length} event${evs.length>1?'s':''}</div>`:''}</div>`;
  }
  const month=`<div class="card pad-lg" style="margin-bottom:16px">
      <div class="card-head"><div><h3>September</h3><div class="sub">14 scheduled events this month</div></div>
        <div class="legend"><span class="li"><span class="sw" style="background:var(--c1)"></span>Meetings</span>
          <span class="li"><span class="sw" style="background:var(--c3)"></span>Finance</span>
          <span class="li"><span class="sw" style="background:var(--c4)"></span>Clients</span></div></div>
      <div class="cal">${dows.map(d=>`<div class="cdow">${d}</div>`).join('')}${cells}</div>
    </div>`;
  const base=_calBase();
  const i=base.indexOf('</div>')+6;
  return base.slice(0,i)+month+base.slice(i);
};

setVoice=function(st,label,hint){
  S.voice=st;
  const s=$('#vState'),h=$('#vHint'),b=$('#micBtn'),g=$('#vBadge');
  if(s){s.textContent=label;s.style.color=st==='listening'?'var(--accent)':st==='speaking'?'var(--pos)':'var(--text-3)';}
  if(h)h.textContent=hint;

  if(b)b.classList.toggle('rec',st==='listening');
};
voiceStart=function(){
  if(S.voice!=='idle')return;
  clearTimeout(voiceTimer);
  setVoice('listening','Listening','Release when you are done');
};
voiceStop=function(){
  if(S.voice!=='listening')return;
  setVoice('speaking','Thinking','Reviewing your workspace…');
  voiceTimer=setTimeout(()=>{
    setVoice('speaking','Speaking','Answering your question…');
    voiceTimer=setTimeout(()=>setVoice('idle','Ready','Press and hold to talk'),6000);
  },1500);
};

function setSpeaker(idx){
  for(let i=0;i<4;i++){
    const t=document.getElementById('mt'+i), s=document.getElementById('ms'+i);
    if(!t)return false;
    t.classList.toggle('speaking',i===idx);

  }
  return true;
}
function turnLoop(){
  clearTimeout(meetLoop);
  const step=()=>{
    if(!document.getElementById('mt0'))return;
    if(S.meMic){setSpeaker(-1);meetLoop=setTimeout(step,500);return;}
    if(S.meAnswer){
      S.meAnswer=false;
      const i=Math.floor(Math.random()*4);
      setSpeaker(i);
      meetLoop=setTimeout(()=>{setSpeaker(-1);meetLoop=setTimeout(step,900);},10000);
      return;
    }
    if(Math.random()<0.25){
      setSpeaker(-1);
      meetLoop=setTimeout(step,900+Math.random()*1600);
      return;
    }
    const i=Math.floor(Math.random()*4);
    const dur=[3000,4000,5000,6000][Math.floor(Math.random()*4)];
    setSpeaker(i);
    meetLoop=setTimeout(()=>{setSpeaker(-1);meetLoop=setTimeout(step,500+Math.random()*900);},dur);
  };
  step();
}

turnLoop=function(){

  const step=()=>{
    if(!document.getElementById('mt0'))return;

    if(S.meAnswer){
      S.meAnswer=false;
      const i=Math.floor(Math.random()*4);

    if(Math.random()<0.24){

      caption('ROOM','…');
      meetLoop=setTimeout(step,900+Math.random()*1500);
      return;
    }
    const i=Math.floor(Math.random()*4);

    setSpeaker(i);

  }else{

}

  const ptt=document.getElementById('vaPtt');

function closeAssistant(){

}
function vaSet(state,title,sub,status){
  vaState=state;
  const va=document.querySelector('.va'); if(!va)return;
  va.dataset.state=state;
  const t=document.getElementById('vaTitle'),s=document.getElementById('vaSub'),st=document.getElementById('vaStatus');
  if(t){t.textContent=title;t.animate([{opacity:0,transform:'translateY(7px)'},{opacity:1,transform:'none'}],{duration:280});}
  if(s)s.textContent=sub;
  if(st)st.textContent=status;
  const p=document.getElementById('vaPtt');
  if(p){p.classList.toggle('held',state==='listening');p.classList.toggle('busy',state==='thinking'||state==='speaking');}
}
function vaStart(){
  vaBusy=true;
  vaSet('listening','Listening',vaTxt('Keep holding — I can hear you'),'Listening');
  const h=document.getElementById('vaHint');
  if(h)h.innerHTML=S.vaScript?'<b>Release</b> when you have finished speaking':'';
  if(navigator.vibrate)navigator.vibrate(12);
}
function vaStop(idx){
  const pair=VA_QA[idx!==undefined?idx:rnd(0,VA_QA.length-1)];
  vaBubble('me',pair[0]);
  vaSet('thinking','Thinking',vaTxt('Working through your workspace data'),'Thinking');
  const h=document.getElementById('vaHint');
  if(h)h.textContent=vaTxt('One moment…');
  setTimeout(()=>vaSpeak(pair[1]),1800);
}
function vaAsk(i){
  if(vaBusy)return;
  vaBusy=true;
  vaSet('listening','Listening','Keep holding — I can hear you','Listening');
  setTimeout(()=>vaStop(i),1200);
}
function vaSpeak(text){
  vaSet('speaking','Speaking','','Speaking');
  const h=document.getElementById('vaHint');
  if(h)h.textContent=vaTxt('Answering your question…');
  const bub=vaBubble('bot','');
  const DUR=6500, step=Math.max(14,Math.floor(DUR/Math.max(text.length,1)));
  let i=0;
  const sub=document.getElementById('vaSub');
  const typer=setInterval(()=>{
    i++;
    if(bub)bub.textContent=text.slice(0,i);
    if(sub)sub.textContent=S.vaScript?text.slice(Math.max(0,i-58),i):'';
    const sc=document.getElementById('vaScript');
    if(sc)sc.scrollTop=sc.scrollHeight;
    if(i>=text.length)clearInterval(typer);
  },step);
  setTimeout(()=>{
    clearInterval(typer);
    if(bub)bub.textContent=text;
    vaSet('idle','Hold the button and speak',vaTxt('Listens while you hold, then answers out loud'),'Ready');
    const h2=document.getElementById('vaHint');
    if(h2)h2.innerHTML='<b>Hold to talk</b> · release to hear the answer';
    const sb=document.getElementById('vaSub');
    if(sb&&!S.vaScript)sb.textContent='';
    vaBusy=false;
  },DUR);
}
const vaTxt=t=>S.vaScript?t:'';
function vaBubble(who,text){
  const sc=document.getElementById('vaScript');
  if(!sc||!S.vaScript)return null;
  const b=document.createElement('div');
  b.className='bub '+who;
  b.textContent=text;
  sc.appendChild(b);
  sc.scrollTop=sc.scrollHeight;
  return b;
}
function vaAnimate(){
  const wave=document.getElementById('vaWave'), freq=document.getElementById('vaFreq');
  if(!wave){vaRaf=null;return;}
  const bars=[...wave.children], fbars=[...freq.children];
  let t=0;
  const loop=()=>{
    if(!document.body.contains(wave)){vaRaf=null;return;}
    t+=0.09;
    const target=vaState==='listening'?1:vaState==='speaking'?0.85:vaState==='thinking'?0.22:0.1;
    vaLevel+=(target-vaLevel)*0.14;
    bars.forEach((b,i)=>{
      const c=1-Math.abs(i-bars.length/2)/(bars.length/2);
      let v;
      if(vaState==='listening')v=(Math.sin(t*2.6+i*.42)*.5+.5)*Math.random()*.9+.12;
      else if(vaState==='speaking')v=(Math.sin(t*3.4+i*.3)*.5+.5)*(.45+Math.random()*.55);
      else if(vaState==='thinking')v=(Math.sin(t*1.5+i*.5)*.5+.5)*.35;
      else v=(Math.sin(t*.9+i*.35)*.5+.5)*.2+.05;
      b.style.height=(4+v*vaLevel*(0.35+c*0.75)*62).toFixed(1)+'px';
    });
    fbars.forEach((b,i)=>{
      const v=(Math.sin(t*2.1+i*.7)*.5+.5)*(vaState==='idle'?.25:Math.random());
      b.style.height=(3+v*vaLevel*24).toFixed(1)+'px';
    });
    vaRaf=requestAnimationFrame(loop);
  };
  loop();
}

},true);

/* ---------- digital signature ---------- */
function signModal(idx,repId){
  const a=idx!==null&&idx!==undefined?D.approvals[idx]:null;
  const title=a?a.t:(REPORTS[repId]||REPORTS.monthly).title;
  openModal(`<div class="modal-head"><h3>Digital signature</h3><button class="icon-btn" data-close>${icon('close')}</button></div>
    <div class="modal-body exp-body">
      <div style="font-size:13.5px;color:var(--text-2);margin-bottom:6px">You are signing:</div>
      <div style="font-family:var(--font-display);font-weight:800;font-size:16px;margin-bottom:14px">${title}</div>
      <div class="field"><label>Full name</label><input class="input" id="sigName" value="${D.user.name}"/></div>
      <div class="field"><label>Draw your signature</label>
        <canvas id="sigPad" class="sigpad"></canvas>
        <div class="hintbar">${icon('mic')}Sign with your finger or mouse
          <button class="btn" style="margin-left:auto;padding:6px 10px" id="sigClear">Clear</button></div>
      </div>
      <div class="card" style="background:var(--surface-2);padding:12px;font-size:12.5px;color:var(--text-2);line-height:1.5">
        By signing you confirm the figures have been reviewed and approve the item for processing.
        The signature is recorded with a timestamp against reference ${a?a.id:'REP-'+(repId||'monthly').toUpperCase()}.
      </div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn" style="flex:1" data-close>Cancel</button>
        <button class="btn btn-primary" style="flex:1" data-sigsave="${idx===null||idx===undefined?'':idx}" data-sigrep="${repId||''}">${icon('check')}Sign & approve</button>
      </div>
    </div>`);
  $('#modal').classList.add('expand');
  setTimeout(initPad,60);
}
function initPad(){
  const c=document.getElementById('sigPad'); if(!c)return;
  const r=c.getBoundingClientRect();
  c.width=r.width*2; c.height=r.height*2;
  const x=c.getContext('2d');
  x.scale(2,2);
  x.lineWidth=2.4; x.lineCap='round'; x.lineJoin='round';
  x.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--text').trim()||'#111';
  let drawing=false,last=null;
  const pos=e=>{const b=c.getBoundingClientRect();return[e.clientX-b.left,e.clientY-b.top];};
  c.addEventListener('pointerdown',e=>{drawing=true;last=pos(e);c.setPointerCapture(e.pointerId);});
  c.addEventListener('pointermove',e=>{
    if(!drawing)return;
    const p=pos(e);
    x.beginPath(); x.moveTo(last[0],last[1]); x.lineTo(p[0],p[1]); x.stroke();
    last=p;
  });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>c.addEventListener(ev,()=>{drawing=false;}));
  const cl=document.getElementById('sigClear');
  if(cl)cl.addEventListener('click',ev=>{ev.stopPropagation();x.clearRect(0,0,c.width,c.height);});
}
document.addEventListener('click',e=>{
  let el;
  if(el=e.target.closest('[data-apsign]')){e.stopPropagation();signModal(+el.dataset.apsign);return;}
  if(el=e.target.closest('[data-apopen]')){
    e.stopPropagation();
    const a=D.approvals[+el.dataset.apopen];
    S.reportId=a.rep||'monthly';
    S.signIdx=+el.dataset.apopen;
    go('report');
    return;
  }
  if(el=e.target.closest('[data-signrep]')){e.stopPropagation();signModal(S.signIdx,el.dataset.signrep);return;}
  if(el=e.target.closest('[data-sigsave]')){
    e.stopPropagation();
    const c=document.getElementById('sigPad');
    const name=(document.getElementById('sigName')||{}).value||D.user.name;
    const data=c?c.toDataURL():'';
    const idxRaw=el.dataset.sigsave;
    const repId=el.dataset.sigrep||S.reportId||'monthly';
    const when=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    S.signatures[repId]={name,data,when};
    if(idxRaw!==''){
      const a=D.approvals[+idxRaw];
      if(a){a.st='Approved';a.signed=true;S.signatures[a.rep]={name,data,when};}
    }
    syncApprovalBadge();
    closeModal();
    showSuccess('Report Signed',`${name} · ${when}`,()=>render());
    return;
  }
},true);

let sigHasInk=false;
function initPad2(){
  const c=document.getElementById('sigPad'); if(!c)return;
  sigHasInk=false;
  const ctx=c.getContext('2d');
  let strokes=[];              // store points so a resize can redraw them
  let cur=null;
  const dpr=()=>Math.max(window.devicePixelRatio||1,1);

  function sizeCanvas(){
    const r=c.getBoundingClientRect();
    if(!r.width||!r.height)return false;
    const d=dpr();
    c.width=Math.round(r.width*d);
    c.height=Math.round(r.height*d);
    ctx.setTransform(d,0,0,d,0,0);
    ctx.lineWidth=2.6; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--text').trim()||'#111';
    redraw(r.width,r.height);
    c._w=r.width; c._h=r.height;
    return true;
  }
  function redraw(){
    ctx.clearRect(0,0,c.width,c.height);
    strokes.forEach(st=>{
      if(st.length<1)return;
      ctx.beginPath();
      ctx.moveTo(st[0][0],st[0][1]);
      if(st.length===1)ctx.lineTo(st[0][0]+0.1,st[0][1]);
      else for(let i=1;i<st.length;i++)ctx.lineTo(st[i][0],st[i][1]);
      ctx.stroke();
    });
  }
  // coordinates in CSS pixels relative to the canvas box (matches the ctx transform)
  const pos=e=>{
    const b=c.getBoundingClientRect();
    return [ (e.clientX-b.left), (e.clientY-b.top) ];
  };

  c.addEventListener('pointerdown',e=>{
    e.preventDefault();
    c.setPointerCapture(e.pointerId);
    cur=[pos(e)];
    strokes.push(cur);
    redraw();
    sigHasInk=true;
    c.classList.add('filled');
    const h=document.getElementById('sigHint'); if(h)h.style.opacity='0';
    const w=document.getElementById('sigWarn'); if(w)w.classList.remove('show');
  });
  c.addEventListener('pointermove',e=>{
    if(!cur)return;
    e.preventDefault();
    cur.push(pos(e));
    // draw just the last segment for smoothness
    const n=cur.length;
    ctx.beginPath();
    ctx.moveTo(cur[n-2][0],cur[n-2][1]);
    ctx.lineTo(cur[n-1][0],cur[n-1][1]);
    ctx.stroke();
  });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>c.addEventListener(ev,()=>{cur=null;}));

  const cl=document.getElementById('sigClear');
  if(cl)cl.addEventListener('click',ev=>{
    ev.stopPropagation();
    strokes=[]; cur=null;
    ctx.clearRect(0,0,c.width,c.height);
    sigHasInk=false;
    c.classList.remove('filled');
    const h=document.getElementById('sigHint'); if(h)h.style.opacity='1';
  });

  // size now, and again after the modal's grow animation settles + on any resize
  sizeCanvas();
  let tries=0;
  const settle=setInterval(()=>{
    const r=c.getBoundingClientRect();
    if((Math.abs(r.width-(c._w||0))>1)||tries===0)sizeCanvas();
    if(++tries>12)clearInterval(settle);
  },100);
  c._settle=settle;
  const onResize=()=>sizeCanvas();
  window.addEventListener('resize',onResize);
  window.addEventListener('orientationchange',onResize);
  c._cleanup=()=>{clearInterval(settle);window.removeEventListener('resize',onResize);window.removeEventListener('orientationchange',onResize);};
}

function signFlow(o,rec){
  const f=$('#flow');
  f.classList.remove('done'); f.classList.add('show');
  $('#flowOrb').innerHTML=icon('loader');
  $('#flowTitle').textContent='Signing '+(o.kind==='task'?'the task':'the report');
  $('#flowSub').textContent=o.title;
  $('#flowSteps').innerHTML=SIG_STEPS.map(s=>`<div class="step"><span class="sc"></span><b>${s}</b></div>`).join('');
  $('#flowBar').style.width='0%';
  const els=[...document.querySelectorAll('#flowSteps .step')];
  let i=0;
  const tick=()=>{
    if(i>0){els[i-1].classList.remove('on');els[i-1].classList.add('done');els[i-1].querySelector('.sc').innerHTML=icon('check');}
    $('#flowBar').style.width=(i/SIG_STEPS.length*100)+'%';
    if(i<SIG_STEPS.length){els[i].classList.add('on');i++;setTimeout(tick,950);}
    else{
      $('#flowBar').style.width='100%';
      setTimeout(()=>{
        $('#checkRing').innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>`;
        f.querySelector('.success h2').textContent=o.kind==='task'?'Task Approved Successfully':'Report Signed Successfully';
        f.querySelector('.success p').textContent=o.kind==='task'
          ? 'The task has been approved and digitally signed.'
          : 'Your signature has been added to the report.';
        f.classList.add('done');
        setTimeout(()=>{
          f.classList.remove('show','done');
          f.querySelector('.success h2').textContent='Your Report Is Ready';
          f.querySelector('.success p').textContent='Your business analysis has been completed successfully.';
          applySignature(o,rec);
        },2400);
      },350);
    }
  };
  setTimeout(tick,300);
}
function applySignature(o,rec){
  if(o.repId)S.signatures[o.repId]=rec;
  const actIcon=o.kind==='task'?'check':'file';
  if(o.kind==='task'&&o.taskIdx!==undefined){
    const t=S.wsTasks[o.taskIdx];
    t.st='Approved & Signed'; t.prog=100; t.sig=rec;
    t.tl[3]=['Approved & signed',`July 14, ${rec.time}`,1];
    S.wsActs.unshift([t.t+' approved',rec.name,'just now',actIcon,'pos']);
    const ai=S.wsApprovals.findIndex(a=>a.rep===t.rep);
    if(ai>-1)S.wsApprovals.splice(ai,1);
  }else{
    const title=(REPORTS[o.repId]||{}).title||o.title;
    S.wsActs.unshift([title+' signed',rec.name,'just now',actIcon,'pos']);
    const ai=S.wsApprovals.findIndex(a=>a.rep===o.repId);
    if(ai>-1)S.wsApprovals.splice(ai,1);
    S.wsTasks.forEach(t=>{
      if(t.rep===o.repId&&t.st==='Ready for Review'){
        t.st='Approved & Signed'; t.sig=rec;
        t.tl[3]=['Approved & signed',`July 14, ${rec.time}`,1];
      }
    });
  }
  const dp=D.approvals.find(a=>a.rep===o.repId&&a.st==='Pending');
  if(dp){dp.st='Approved';dp.signed=true;}
  syncApprovalBadge();
  if(o.kind==='task'){go('workspace');setTimeout(()=>taskDetail(o.taskIdx),420);}
  else render();
}

document.addEventListener('click',e=>{
  const va=document.querySelector('.va');
  if(!va)return;
  {
    let el;
    if(e.target.closest('#vaGear')){e.stopPropagation();va.querySelector('#vset').classList.add('show');return;}
    if(e.target.closest('#vsetClose')){e.stopPropagation();va.querySelector('#vset').classList.remove('show');return;}

      e.stopPropagation();

      vsetRefresh();

    chatPush(true,pair[0],false);

function vaSpeakChat(text){
  vaSet('speaking','Speaking','','Speaking');
  const el=chatPush(false,'',false);
  S.chatMsgs[S.chatMsgs.length-1].t=text;
  const DUR=6500, step=Math.max(14,Math.floor(DUR/text.length));
  let i=0;
  const b=document.getElementById('chatBody');
  const typer=setInterval(()=>{
    i++;
    if(el)el.textContent=text.slice(0,i);
    if(b)b.scrollTop=b.scrollHeight;
    if(i>=text.length)clearInterval(typer);
  },step);
  setTimeout(()=>{
    clearInterval(typer);
    if(el)el.textContent=text;
    vaSet('idle','Hold the button and speak',vaTxt('Listens while you hold, then answers out loud'),'Ready');
    const h=document.getElementById('vaHint');
    if(h)h.innerHTML=S.vaScript?'<b>Hold to talk</b> · release to hear the answer':'';
    vaBusy=false;
  },DUR);
}

async function startCam(){
  const view=$('#camView'); if(!view)return;
  if(!mState.cam){if(mStream){mStream.getTracks().forEach(t=>t.stop());mStream=null;}return;}
  try{
    mStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    const off=$('#camOff'); if(off)off.remove();
    let v=view.querySelector('video');
    if(!v){v=document.createElement('video');v.autoplay=true;v.muted=true;v.playsInline=true;view.appendChild(v);}
    v.srcObject=mStream;
  }catch(e){
    const off=$('#camOff');
    if(off)off.querySelector('div:last-child').textContent='Camera unavailable — you can still join';
  }
}

const CONNECT_STEPS=['Joining the session','Checking your microphone','Checking your camera','Adding participants','Securing the connection'];
function connectFlow(title){
  const room=$('#mroom'); if(!room)return;
  const body=room.querySelector('.mr-body');
  body.style.display='grid'; body.style.placeItems='center'; body.style.overflowY='auto';
  body.innerHTML=`<div style="text-align:center;max-width:420px;width:100%;padding:20px">
    <div class="join-hero" style="margin:0 auto 16px">${icon('team')}</div>
    <div style="font-family:var(--font-display);font-size:19px;font-weight:800">${title}</div>
    <div style="color:#8FA0C7;font-size:13px;margin-bottom:20px">Connecting you to the session…</div>
    <div class="steps" id="csteps" style="max-width:none">
      ${CONNECT_STEPS.map((st,i)=>`<div class="step" data-cs="${i}"><span class="sc"></span><b>${st}</b></div>`).join('')}
    </div>
    <div class="pbar" style="max-width:none;margin-top:14px"><i id="cbar"></i></div></div>`;
  let i=0;
  const per=Math.round(3000/CONNECT_STEPS.length); // ~3s total
  const tick=()=>{
    const els=[...document.querySelectorAll('[data-cs]')];
    if(!els.length)return;
    if(i>0){els[i-1].classList.remove('on');els[i-1].classList.add('done');els[i-1].querySelector('.sc').innerHTML=icon('check');}
    const bar=$('#cbar'); if(bar)bar.style.width=(i/CONNECT_STEPS.length*100)+'%';
    if(i<CONNECT_STEPS.length){els[i].classList.add('on');i++;setTimeout(tick,per);}
    else{const bar2=$('#cbar');if(bar2)bar2.style.width='100%';setTimeout(()=>{
      body.style.display='';body.style.placeItems='';liveMeeting(title);
    },300);}
  };
  setTimeout(tick,250);
}

/* ---------- 3. live meeting room ---------- */
function liveMeeting(title){
  const room=$('#mroom');
  room.querySelector('.mrbar').innerHTML=`
    <span class="rec-dot"><i></i>Recording</span>

    <button class="va-x" data-mend="${title}">${icon('close')}</button>`;
  const tiles=MPART.map((p,i)=>`<div class="vtile" id="vt${i}">
      ${portrait(p)}
      <div class="vstat" id="vst${i}">Listening</div>
      <div class="vlabel"><span>${p.n.split(' ')[0]} ${p.n.split(' ')[1][0]}.</span>
        <span class="vwave"><i></i><i></i><i></i><i></i><i></i></span></div>
    </div>`).join('');
  const body=room.querySelector('.mr-body');
  body.style.display='';body.style.overflowY='';
  body.innerHTML=`
    <div class="mr-stage">
      <div class="mr-grid ${MPART.length>4?'p6':''}" id="mGrid">${tiles}</div>

    <div class="mr-side">
      <div class="mr-tabs">

        <button data-mtab="transcript">Transcript</button>
        <button data-mtab="chat">Chat</button>
        <button data-mtab="docs">Docs</button>
      </div>
      <div class="mr-panel" id="mPanel"></div>
    </div>`;
  attachSelfCam();
  mState.tab='notes'; mState.notes=[]; mState.trans=[]; mState.chat=[]; mState.agenda=0;
  renderPanel();
  let sec=0;
  mTimers.push(setInterval(()=>{
    sec++;const t=$('#mTimer');if(!t)return;
    t.textContent=[Math.floor(sec/3600),Math.floor(sec/60)%60,sec%60].map(x=>String(x).padStart(2,'0')).join(':');
  },1000));
  meetSpeakLoop();
  mTimers.push(setInterval(meetNote,4500));
  mTimers.push(setInterval(meetTrans,3800));
  mTimers.push(setInterval(meetChat,5200));
