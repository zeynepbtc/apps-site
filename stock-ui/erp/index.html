<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="color-scheme" content="light dark" />
<title>Operations Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --font-display:'Sora',-apple-system,'Segoe UI',system-ui,sans-serif;
  --font-body:'Inter',-apple-system,'Segoe UI',system-ui,sans-serif;
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:28px;
  --sp:16px;
  /* accent (overwritten by JS) */
  --accent:#6366F1; --accent-2:#8B5CF6; --accent-soft:rgba(99,102,241,.12); --accent-ink:#fff;
  --c1:var(--accent); --c2:#12B5A6; --c3:#F5A524; --c4:#8B5CF6; --c5:#3B82F6; --c6:#EC6AA0;
}
html[data-theme="light"]{
  color-scheme:light;
  --bg:#F1F4FB; --bg-2:#E7EBF6; --surface:#FFFFFF; --surface-2:#F7F9FE; --surface-3:#EEF1FA;
  --text:#171A26; --text-2:#5D6474; --text-3:#98A0B2;
  --border:#E6EAF4; --border-2:#EDF0F8;
  --pos:#12A150; --pos-soft:rgba(18,161,80,.12); --neg:#E5484D; --neg-soft:rgba(229,72,77,.12); --warn:#E8A33D; --warn-soft:rgba(232,163,61,.14);
  --shadow-sm:0 1px 2px rgba(19,23,40,.05); --shadow:0 1px 2px rgba(19,23,40,.04),0 10px 26px -14px rgba(19,23,40,.22);
  --shadow-lg:0 4px 12px rgba(19,23,40,.06),0 30px 60px -24px rgba(19,23,40,.30);
  --topbar-bg:rgba(255,255,255,.78); --grid:#EEF1F9;
}
html[data-theme="dark"]{
  color-scheme:dark;
  --bg:#0B0D14; --bg-2:#07090F; --surface:#141824; --surface-2:#1A1F2E; --surface-3:#222839;
  --text:#EDEFF6; --text-2:#9AA1B4; --text-3:#697084;
  --border:rgba(255,255,255,.07); --border-2:rgba(255,255,255,.05);
  --pos:#3DD68C; --pos-soft:rgba(61,214,140,.14); --neg:#FF6369; --neg-soft:rgba(255,99,105,.14); --warn:#F5B454; --warn-soft:rgba(245,180,84,.14);
  --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow:0 1px 2px rgba(0,0,0,.4),0 14px 34px -16px rgba(0,0,0,.7);
  --shadow-lg:0 6px 16px rgba(0,0,0,.5),0 40px 70px -28px rgba(0,0,0,.8);
  --topbar-bg:rgba(17,21,32,.72); --grid:rgba(255,255,255,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* lock long-press copy/paste/select callouts (native-app feel) */
html,body{
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;-webkit-user-drag:none;touch-action:manipulation;
}
input,textarea,select,[contenteditable="true"]{
  -webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text;
  -webkit-touch-callout:default;
}
img,svg{-webkit-user-drag:none;user-select:none;pointer-events:auto}
::selection{background:var(--accent-soft)}
html,body{margin:0;height:100%}
html{background:var(--bg)}
.app{background:var(--bg)}
.content{background:var(--bg)}
body{
  font-family:var(--font-body); background:var(--bg); color:var(--text);
  font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;letter-spacing:-.02em;font-weight:700}
button{font-family:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:20px}
.num{font-variant-numeric:tabular-nums}

/* ============ APP SHELL ============ */
.app{display:flex;min-height:100dvh}
.sidebar{
  width:250px;flex:0 0 250px;background:var(--surface);border-right:1px solid var(--border);
  padding:20px 14px;position:sticky;top:0;height:100dvh;display:none;flex-direction:column;gap:6px;z-index:40;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
.logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;box-shadow:0 8px 20px -8px var(--accent);flex:0 0 auto}
.logo svg{width:22px;height:22px}
.brand-name{font-family:var(--font-display);font-weight:800;font-size:19px;line-height:1;letter-spacing:-.03em}
.brand-sub{font-size:11.5px;color:var(--text-3);font-weight:500;letter-spacing:.02em}
.nav-label{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-3);padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;color:var(--text-2);
  font-weight:600;font-size:14.5px;cursor:pointer;border:none;background:none;width:100%;text-align:left;position:relative;transition:.16s}
.nav-item svg{width:20px;height:20px;flex:0 0 auto;stroke-width:1.9}
.nav-item:hover{background:var(--surface-3);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent)}
.nav-item .badge-dot{margin-left:auto;background:var(--accent);color:var(--accent-ink);font-size:11px;font-weight:700;
  min-width:20px;height:20px;border-radius:20px;display:grid;place-items:center;padding:0 6px}
.nav-item.active .badge-dot{background:var(--accent);color:#fff}
.sidebar-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--border)}
.userchip{display:flex;align-items:center;gap:11px;padding:8px;border-radius:12px;cursor:pointer}
.userchip:hover{background:var(--surface-3)}
.userchip .meta{min-width:0}
.userchip .meta b{font-size:13.5px;display:block;font-weight:600}
.userchip .meta span{font-size:11.5px;color:var(--text-3)}
.userchip svg{width:16px;height:16px;color:var(--text-3);margin-left:auto;flex:0 0 auto}
.userchip:hover svg{color:var(--accent)}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:12px 18px;
  background:var(--topbar-bg);backdrop-filter:saturate(1.6) blur(14px);border-bottom:1px solid var(--border)}
.topbar .mbrand{display:flex;align-items:center;gap:9px}
.topbar .mbrand .logo{width:34px;height:34px;border-radius:10px}
.topbar .mbrand .logo svg{width:19px;height:19px}
.topbar .mbrand b{font-family:var(--font-display);font-weight:800;font-size:17px;letter-spacing:-.03em}
.page-title{font-size:19px;font-weight:700;display:none}
.spacer{flex:1}
.search{display:flex;align-items:center;gap:9px;background:var(--surface-3);border:1px solid var(--border-2);
  border-radius:12px;padding:9px 13px;max-width:300px;flex:1;color:var(--text-2)}
.search svg{width:17px;height:17px;flex:0 0 auto}
.search input{border:none;background:none;outline:none;color:var(--text);font-size:14px;width:100%;font-family:inherit}
.search input::placeholder{color:var(--text-3)}
.icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--surface);
  display:grid;place-items:center;cursor:pointer;color:var(--text-2);position:relative;transition:.15s;flex:0 0 auto}
.icon-btn:hover{color:var(--text);border-color:var(--accent);background:var(--surface-2)}
.icon-btn svg{width:20px;height:20px}
.icon-btn .dot{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--neg);border:2px solid var(--surface)}
.avatar{border-radius:50%;display:grid;place-items:center;font-weight:700;color:#fff;font-size:13px;flex:0 0 auto;
  font-family:var(--font-display);letter-spacing:-.02em;overflow:hidden}

.content{padding:22px 20px 110px;max-width:1320px;width:100%;margin:0 auto;flex:1}
.view-head{margin-bottom:20px}
.view-head h1{font-size:26px;font-weight:800}
.view-head p{color:var(--text-2);margin:5px 0 0;font-size:14.5px}

/* ============ CARDS / GRID ============ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-sm)}
.card.pad-lg{padding:24px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.card-head h3{font-size:16.5px;font-weight:700}
.card-head .sub{font-size:12.5px;color:var(--text-3);font-weight:500}
.grid{display:grid;gap:16px}
.kpi-grid{grid-template-columns:repeat(2,1fr)}
.cols-2{grid-template-columns:1fr}
.cols-3{grid-template-columns:1fr}
.dash-2col{grid-template-columns:1fr}

/* KPI */
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:17px 18px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.kpi .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi .kicon{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent)}
.kpi .kicon svg{width:20px;height:20px}
.kpi .label{font-size:13px;color:var(--text-2);font-weight:600}
.kpi .value{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.03em;margin-top:3px}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:12.5px;font-weight:700;margin-top:9px;
  padding:4px 9px;border-radius:20px;line-height:1.2}
.delta svg{width:13px!important;height:13px!important;flex:0 0 auto}
.delta.up{color:var(--pos);background:var(--pos-soft)} .delta.down{color:var(--neg);background:var(--neg-soft)}
.delta.flat{color:var(--text-2);background:var(--surface-3)}
.kpi .spark{position:absolute;right:0;bottom:0;width:96px;height:44px;opacity:.9}

/* generic bits */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
.badge .bdot{width:6px;height:6px;border-radius:50%;background:currentColor}
.b-green{color:var(--pos);background:var(--pos-soft)} .b-amber{color:var(--warn);background:var(--warn-soft)}
.b-red{color:var(--neg);background:var(--neg-soft)} .b-gray{color:var(--text-2);background:var(--surface-3)}
.b-accent{color:var(--accent);background:var(--accent-soft)}
.chip{font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-2);cursor:pointer;transition:.14s}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.seg{display:inline-flex;background:var(--surface-3);border:1px solid var(--border-2);border-radius:12px;padding:4px;gap:2px}
.seg button{border:none;background:none;padding:7px 14px;border-radius:9px;font-weight:600;font-size:13px;color:var(--text-2);cursor:pointer}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
html[data-theme="dark"] .seg button.on{background:var(--surface-3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--border);background:var(--surface);
  color:var(--text);font-weight:600;font-size:14px;padding:10px 16px;border-radius:12px;cursor:pointer;transition:.15s}
.btn svg{width:17px;height:17px}
.btn:hover{border-color:var(--accent);background:var(--surface-2)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:var(--accent-ink);border:none;
  box-shadow:0 8px 20px -10px var(--accent)}
.btn-primary:hover{filter:brightness(1.05)}
.divider{height:1px;background:var(--border);margin:16px -20px}

/* list rows */
.rowlist{display:flex;flex-direction:column}
.row{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--border-2)}
.row:last-child{border-bottom:none}
.row .t1{font-weight:600;font-size:14px}
.row .t2{font-size:12.5px;color:var(--text-3)}
.row .rt{margin-left:auto;text-align:right;flex:0 0 auto}

/* charts */
.chart-wrap{position:relative}
svg .grid-line{stroke:var(--grid);stroke-width:1}
svg text{fill:var(--text-3);font-family:var(--font-body);font-size:11px;font-weight:600}
.legend{display:flex;flex-wrap:wrap;gap:12px 18px;margin-top:8px}
.legend .li{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text-2);font-weight:600}
.legend .sw{width:11px;height:11px;border-radius:4px}
.tip{position:fixed;z-index:200;pointer-events:none;background:var(--text);color:var(--bg);padding:8px 11px;border-radius:10px;
  font-size:12.5px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(4px);transition:.12s;white-space:nowrap}
html[data-theme="dark"] .tip{background:#fff;color:#111}
.tip.show{opacity:1;transform:translateY(0)}
.tip b{font-weight:800}
.hoverable{cursor:pointer;transition:.15s} .hoverable:hover{opacity:.82}

/* progress + meter */
.meter{height:8px;background:var(--surface-3);border-radius:20px;overflow:hidden}
.meter i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent-2))}

/* ============ BOTTOM NAV (phone) ============ */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:45;display:flex;background:var(--topbar-bg);
  backdrop-filter:saturate(1.6) blur(16px);border-top:1px solid var(--border);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:var(--text-3);
  font-size:10.5px;font-weight:600;cursor:pointer;padding:6px 2px;border-radius:12px;position:relative}
.bn-item svg{width:23px;height:23px;stroke-width:1.9}
.bn-item.active{color:var(--accent)}
.bn-item .ndot{position:absolute;top:3px;right:calc(50% - 16px);width:7px;height:7px;border-radius:50%;background:var(--neg)}

/* sheet (more menu) */
.sheet-bg{position:fixed;inset:0;background:rgba(8,10,18,.5);z-index:60;opacity:0;pointer-events:none;transition:.2s;backdrop-filter:blur(2px)}
.sheet-bg.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--surface);border-radius:24px 24px 0 0;
  padding:10px 14px calc(20px + env(safe-area-inset-bottom));transform:translateY(110%);transition:.28s cubic-bezier(.3,1,.4,1);box-shadow:var(--shadow-lg)}
.sheet.show{transform:translateY(0)}
.sheet .grab{width:40px;height:4px;background:var(--border);border-radius:20px;margin:8px auto 12px}
.sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sheet-grid .nav-item{flex-direction:column;text-align:center;gap:8px;font-size:12px;padding:14px 6px}
.sheet-grid .nav-item svg{width:24px;height:24px}
.sheet-grid .badge-dot{position:absolute;top:8px;right:22px;margin:0}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(8,10,18,.55);z-index:70;display:none;align-items:center;justify-content:center;
  padding:18px;backdrop-filter:blur(3px)}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);width:100%;max-width:540px;
  max-height:88dvh;overflow:auto;box-shadow:var(--shadow-lg)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.modal-head h3{font-size:18px}
.modal-body{padding:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--text-2);margin-bottom:6px}
.input{width:100%;border:1px solid var(--border);background:var(--surface-2);border-radius:12px;padding:11px 13px;
  font-family:inherit;font-size:14px;color:var(--text);outline:none}
.input:focus{border-color:var(--accent)}
textarea.input{resize:vertical;min-height:110px}

/* avatar stack */
.stack{display:flex} .stack .avatar{border:2px solid var(--surface);margin-left:-8px} .stack .avatar:first-child{margin-left:0}

/* empty */
.empty{text-align:center;color:var(--text-3);padding:40px 10px;font-size:14px}

/* ============ RESPONSIVE ============ */
@media(min-width:760px){
  .sidebar{display:flex} .topbar .mbrand{display:none} .page-title{display:block}
  .bottomnav{display:none} .content{padding-bottom:40px}
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .cols-2{grid-template-columns:1fr 1fr} .cols-3{grid-template-columns:repeat(3,1fr)}
  .dash-2col{grid-template-columns:1.5fr 1fr}
  .search{max-width:340px}
}
@media(min-width:1120px){
  .kpi-grid{grid-template-columns:repeat(6,1fr)}
  .content{padding:26px 30px}
}
@media(max-width:759px){ .hide-mobile{display:none!important} .view-head h1{font-size:23px} }
@media(min-width:760px){ .only-mobile{display:none!important} }

/* ============ MODULE COMPONENTS ============ */
/* switch */
.switch{width:48px;height:28px;border-radius:20px;background:var(--surface-3);border:1px solid var(--border);
  position:relative;cursor:pointer;flex:0 0 auto;transition:.18s}
.switch i{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);transition:.18s}
.switch.on{background:var(--accent);border-color:var(--accent)}
.switch.on i{left:22px}
.pref{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border-2)}
.pref:last-child{border-bottom:none}
.pref .pt{font-weight:600;font-size:14.5px} .pref .ps{font-size:12.5px;color:var(--text-3);margin-top:2px}
.pref .pr{margin-left:auto}
.theme-card{flex:1;border:2px solid var(--border);border-radius:var(--r-md);padding:14px;cursor:pointer;background:var(--surface-2);transition:.15s}
.theme-card.on{border-color:var(--accent)}
.theme-card .prev{height:56px;border-radius:10px;margin-bottom:10px;display:flex;gap:5px;padding:8px;align-items:flex-end}
.theme-card b{font-size:14px}
.swatch{width:36px;height:36px;border-radius:12px;cursor:pointer;border:2px solid transparent;display:grid;place-items:center;transition:.15s}
.swatch.on{border-color:var(--text)}
.swatch svg{width:16px;height:16px;color:#fff}

/* kanban */
.kanban{display:grid;gap:14px;grid-template-columns:1fr}
@media(min-width:760px){.kanban{grid-template-columns:repeat(4,1fr);align-items:start}}
.kcol{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px}
.kcol-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-weight:700;font-size:14.5px}
.kcol-head .kdot{width:9px;height:9px;border-radius:50%}
.kcount{margin-left:auto;font-size:12px;color:var(--text-3);background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:2px 9px;font-weight:700}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;
  box-shadow:var(--shadow-sm);cursor:pointer;margin-bottom:10px;transition:.16s}
.tcard:last-child{margin-bottom:0}
.tcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--accent)}
.tcard .tt{font-weight:600;font-size:14px;margin-bottom:10px}
.tcard .tm{display:flex;align-items:center;gap:8px}

/* split panes (mail / chat) */
.split{display:grid;gap:16px;grid-template-columns:1fr}
@media(min-width:960px){.split{grid-template-columns:380px 1fr;align-items:start}}
.mail-row{display:flex;gap:11px;padding:13px;border-radius:14px;cursor:pointer;align-items:flex-start;border:1px solid transparent}
.mail-row:hover{background:var(--surface-2)}
.mail-row.on{background:var(--accent-soft);border-color:var(--accent)}
.mail-row .msubj{font-size:14px;font-weight:600;margin:2px 0}
.mail-row.unread .msubj{font-weight:800}
.mail-row .mprev{font-size:12.5px;color:var(--text-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.udot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:0 0 auto;margin-top:15px}
.folders{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
.folders::-webkit-scrollbar{display:none}

/* chat */
.conv{display:flex;gap:11px;padding:11px;border-radius:14px;cursor:pointer;align-items:center;border:1px solid transparent}
.conv:hover{background:var(--surface-2)} .conv.on{background:var(--accent-soft);border-color:var(--accent)}
.online{position:relative}
.online:after{content:'';position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;
  background:var(--pos);border:2px solid var(--surface)}
.thread{display:flex;flex-direction:column;gap:12px;max-height:52vh;overflow-y:auto;padding:4px}
.msg{max-width:80%;padding:11px 14px;border-radius:18px;font-size:14px;line-height:1.45}
.msg.them{background:var(--surface-3);border-bottom-left-radius:6px;align-self:flex-start}
.msg.me{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-bottom-right-radius:6px;align-self:flex-end}
.mrow{display:flex;flex-direction:column;max-width:100%}
.mrow.me{align-items:flex-end} .mrow.them{align-items:flex-start}
.mmeta{font-size:11px;color:var(--text-3);margin-top:4px;font-weight:600;display:flex;gap:5px;align-items:center}
.mmeta svg{width:13px;height:13px;color:var(--accent)}
.composer{display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface-2);
  border-radius:16px;padding:6px 6px 6px 14px;margin-top:14px}
.composer input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:14px;color:var(--text);min-width:0}
.docshare{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:11px;margin-top:6px;max-width:290px}

/* employees / docs */
.emp-grid{display:grid;gap:14px;grid-template-columns:1fr}
@media(min-width:620px){.emp-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1120px){.emp-grid{grid-template-columns:repeat(4,1fr)}}
.doc-row{display:flex;align-items:center;gap:13px;padding:12px;border-radius:14px;cursor:pointer}
.doc-row:hover{background:var(--surface-2)}
.ftype{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:9.5px;font-weight:800;
  font-family:var(--font-display);letter-spacing:.03em;flex:0 0 auto}

/* calendar */
.daybar{display:flex;gap:8px;margin-bottom:16px}
.daypill{flex:1;text-align:center;padding:11px 4px;border-radius:14px;cursor:pointer;border:1px solid var(--border);
  background:var(--surface);transition:.15s}
.daypill.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.daypill b{display:block;font-family:var(--font-display);font-size:17px;font-weight:800}
.daypill span{font-size:11px;opacity:.7;font-weight:700;letter-spacing:.04em}
.evt{display:flex;gap:12px;padding:13px;border-radius:16px;cursor:pointer;border:1px solid var(--border);
  background:var(--surface);margin-bottom:10px;align-items:center;transition:.15s}
.evt:hover{border-color:var(--accent)}
.evt.on{border-color:var(--accent);background:var(--accent-soft)}
.evt .bar{width:4px;align-self:stretch;border-radius:4px;flex:0 0 auto}
.backbtn{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:14px;color:var(--text-2);
  background:none;border:none;cursor:pointer;padding:4px 0;margin-bottom:10px}
.backbtn svg{width:18px;height:18px}

/* ============ PHASE 2 ============ */
.head-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.insight{display:flex;align-items:flex-start;gap:10px;margin-top:16px;padding:12px 14px;border-radius:14px;
  background:var(--accent-soft);border:1px solid transparent}
.insight .ii{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff}
.insight .ii svg{width:15px;height:15px}
.insight .it{font-size:13px;font-weight:600;color:var(--text-2);line-height:1.45}
.insight .it b{color:var(--accent);font-weight:800;display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.kpi[data-kpi]{cursor:pointer;transition:.16s}
.kpi[data-kpi]:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--accent)}

/* report workflow overlay */
.flow{position:fixed;inset:0;z-index:90;background:var(--bg);display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:28px;text-align:center}
.flow.show{display:flex}
.flow .orb{width:76px;height:76px;border-radius:24px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;margin-bottom:22px;box-shadow:0 18px 40px -14px var(--accent)}
.flow .orb svg{width:36px;height:36px;color:#fff;animation:spin 2.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.flow h2{font-size:22px;margin-bottom:6px}
.flow .sub{color:var(--text-3);font-size:14px;margin-bottom:26px}
.steps{width:100%;max-width:380px;text-align:left;display:flex;flex-direction:column;gap:12px}
.step{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:1px solid var(--border);
  background:var(--surface);opacity:.45;transition:.3s}
.step.on{opacity:1;border-color:var(--accent);box-shadow:var(--shadow-sm)}
.step.done{opacity:1}
.step .sc{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex:0 0 auto;display:grid;place-items:center}
.step.done .sc{background:var(--pos);border-color:var(--pos);color:#fff}
.step.on .sc{border-color:var(--accent);border-top-color:transparent;animation:spin .8s linear infinite}
.step .sc svg{width:14px;height:14px}
.step b{font-size:14px;font-weight:600}
.pbar{width:100%;max-width:380px;height:6px;background:var(--surface-3);border-radius:20px;margin-top:26px;overflow:hidden}
.pbar i{display:block;height:100%;width:0;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:.5s}

/* success */
.success{display:none;flex-direction:column;align-items:center;text-align:center}
.flow.done .steps,.flow.done .pbar,.flow.done .orb,.flow.done .flowhead{display:none}
.flow.done .success{display:flex}
.check-ring{width:132px;height:132px;border-radius:50%;background:var(--pos-soft);display:grid;place-items:center;margin-bottom:24px;
  animation:pop .5s cubic-bezier(.2,1.4,.4,1) both}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.check-ring svg{width:76px;height:76px;color:var(--pos)}
.check-ring path{stroke-dasharray:60;stroke-dashoffset:60;animation:draw .55s .18s ease-out forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.success h2{font-size:26px;margin-bottom:8px}
.success p{color:var(--text-2);font-size:15px;max-width:320px}

/* report page */
.rep-hero{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-radius:var(--r-xl);
  padding:26px;margin-bottom:16px;box-shadow:0 20px 40px -22px var(--accent)}
.rep-hero h2{font-size:24px;margin-bottom:6px}
.rep-hero p{opacity:.85;font-size:14px;margin:0}
.rep-stat{background:rgba(255,255,255,.16);border-radius:14px;padding:12px 14px}
.rep-stat span{font-size:12px;opacity:.85;font-weight:600}
.rep-stat b{display:block;font-family:var(--font-display);font-size:20px;font-weight:800;margin-top:2px}
.hl{display:flex;gap:12px;padding:14px;border-radius:16px;border:1px solid var(--border);background:var(--surface-2)}
.hl .hi{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto}
.hl b{font-size:14px;display:block;margin-bottom:2px}
.hl span{font-size:12.5px;color:var(--text-3)}

/* assistant */
.act-grid{display:grid;gap:10px;grid-template-columns:1fr}
@media(min-width:620px){.act-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1120px){.act-grid{grid-template-columns:repeat(3,1fr)}}
.act{display:flex;align-items:center;gap:11px;padding:14px;border-radius:16px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;text-align:left;transition:.15s;font-weight:600;font-size:14px;color:var(--text)}
.act:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.act .ai-i{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);flex:0 0 auto}
.act .ai-i svg{width:18px;height:18px}
.ai-msg{max-width:88%;padding:14px 16px;border-radius:18px;font-size:14px;line-height:1.55}
.ai-msg.bot{background:var(--surface-2);border:1px solid var(--border);border-bottom-left-radius:6px;align-self:flex-start}
.ai-msg.me{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-bottom-right-radius:6px;align-self:flex-end}
.ai-stat{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.ai-stat div{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 12px;font-size:12.5px;font-weight:700}
.ai-stat div span{display:block;color:var(--text-3);font-weight:600;font-size:11px}
.typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--text-3);margin-right:4px;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

/* org chart */
.org{display:flex;flex-direction:column;align-items:center;gap:0;overflow-x:auto;padding:6px 2px 14px}
.onode{border:1px solid var(--border);background:var(--surface);border-radius:16px;padding:11px 14px;display:flex;
  align-items:center;gap:10px;box-shadow:var(--shadow-sm);min-width:170px}
.onode.lead{border-color:var(--accent);background:var(--accent-soft)}
.onode b{font-size:13.5px;display:block} .onode span{font-size:11.5px;color:var(--text-3)}
.orow{display:flex;gap:14px;justify-content:center}
.oconn{width:2px;height:22px;background:var(--border)}
.obar{height:2px;background:var(--border)}

/* globe */
.globe-wrap{display:grid;place-items:center;padding:6px 0}
.reg{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--border-2)}
.reg:last-child{border-bottom:none}
.reg .rd{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
@keyframes pulse{0%{r:4;opacity:1}70%{r:11;opacity:0}100%{opacity:0}}
.pulse{animation:pulse 2.2s ease-out infinite}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============ PHASE 3 — MOTION & POLISH ============ */
@keyframes rise{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
@keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes rip{to{transform:scale(2.8);opacity:0}}
@keyframes shimmer{from{background-position:-460px 0}to{background-position:460px 0}}
@keyframes viewIn{from{opacity:0;transform:translateY(12px) scale(.996)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#view{animation:viewIn .4s cubic-bezier(.22,1,.36,1)}
.btn,.icon-btn,.chip,.act,.nav-item,.bn-item,.tcard,.kpi,.evt,.conv,.mail-row,.doc-row,.swatch,.daypill,.theme-card{position:relative;overflow:hidden}
.rip{position:absolute;border-radius:50%;background:currentColor;opacity:.16;transform:scale(0);
  animation:rip .62s ease-out forwards;pointer-events:none}
.btn,.icon-btn,.chip,.act,.swatch{transition:transform .13s cubic-bezier(.2,1,.4,1),background .16s,border-color .16s,color .16s,box-shadow .16s}
.btn:active,.icon-btn:active,.chip:active,.act:active,.tcard:active,.kpi[data-kpi]:active,.swatch:active{transform:scale(.965)}
.card{transition:box-shadow .22s,border-color .18s,transform .22s}
.kpi[data-kpi]:hover{transform:translateY(-3px)}
.row{transition:background .16s}
.rowlist .row:hover{background:var(--surface-2);border-radius:10px}

/* skeleton */
.sk{background:linear-gradient(90deg,var(--surface-3) 25%,var(--surface-2) 50%,var(--surface-3) 75%);
  background-size:460px 100%;animation:shimmer 1.15s infinite linear;border-radius:10px}
.sk-row{height:13px;margin-bottom:10px}

/* dashboard hero */
.hero{position:relative;overflow:hidden;border-radius:var(--r-xl);padding:24px;margin-bottom:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 24px 46px -28px var(--accent)}
.hero:before{content:'';position:absolute;right:-70px;top:-80px;width:230px;height:230px;border-radius:50%;background:rgba(255,255,255,.10)}
.hero:after{content:'';position:absolute;right:60px;bottom:-100px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero .hrow{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
.hero h1{font-size:24px;margin:0;color:#fff}
.hero .hsub{opacity:.86;font-size:13.5px;margin-top:3px}
.hero .hstats{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;position:relative;z-index:1}
.hero .hs{background:rgba(255,255,255,.17);border-radius:14px;padding:10px 14px;min-width:96px}
.hero .hs span{font-size:11.5px;opacity:.85;font-weight:600;display:block}
.hero .hs b{font-family:var(--font-display);font-size:18px;font-weight:800}
.hero .hbadge{margin-left:auto;background:rgba(255,255,255,.18);border-radius:20px;padding:7px 13px;
  font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:7px;position:relative;z-index:1}
.hero .hbadge svg{width:15px;height:15px}

/* spreadsheet-style reports */
.sheet-wrap{overflow-x:auto;margin:0 -20px;padding:0 20px}
.sheet-t{width:100%;border-collapse:collapse;font-size:13.5px;min-width:520px}
.sheet-t th{text-align:left;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);
  font-weight:800;padding:11px 12px;border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap}
.sheet-t td{padding:13px 12px;border-bottom:1px solid var(--border-2);font-weight:600;white-space:nowrap}
.sheet-t td.n,.sheet-t th.n{text-align:right;font-variant-numeric:tabular-nums}
.sheet-t tbody tr{transition:background .15s}
.sheet-t tbody tr:hover{background:var(--surface-2)}
.sheet-t tr.total td{background:var(--accent-soft);color:var(--accent);font-weight:800;border-bottom:none}
.tbar{height:7px;border-radius:20px;background:var(--surface-3);overflow:hidden;min-width:78px}
.tbar i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.pctc{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:20px}
.stg{font-weight:700;color:var(--text-2);margin-right:9px;width:auto!important;height:auto!important;border-radius:0!important;background:none!important;animation:none!important;font-size:13.5px}

/* ============ BOARD REPORT + MARKETS ============ */
.src{margin-top:14px;padding-top:11px;border-top:1px dashed var(--border);font-size:11.5px;color:var(--text-3);
  font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:7px}
.src svg{width:13px;height:13px;flex:0 0 auto}
.panel{cursor:pointer}
.panel-bar{display:flex;gap:5px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);
  background:var(--surface-2);margin:-20px -20px 16px;border-radius:21px 21px 0 0}
.panel-bar i{width:9px;height:9px;border-radius:50%;background:var(--border)}
.panel-bar b{margin-left:8px;font-size:11.5px;color:var(--text-3);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.panel-bar .ex{margin-left:auto;color:var(--text-3);display:grid;place-items:center}
.panel-bar .ex svg{width:15px;height:15px}
@keyframes expandIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal.expand{animation:expandIn 1s cubic-bezier(.22,1,.36,1) both;max-width:760px}
.modal.expand .exp-body{animation:fadeUp .55s .62s both}
.board-grid{display:grid;gap:16px;grid-template-columns:1fr}
@media(min-width:900px){.board-grid{grid-template-columns:1fr 1fr}.board-grid .wide{grid-column:span 2}}

/* markets */
.ticker{display:flex;gap:16px;overflow-x:auto;padding:12px 14px;border-radius:16px;background:var(--surface);
  border:1px solid var(--border);margin-bottom:16px;font-size:12.5px;font-weight:700;white-space:nowrap}
.ticker::-webkit-scrollbar{display:none}
.tk{display:inline-flex;gap:7px;align-items:center;flex:0 0 auto}
.tk .tkn{color:var(--text-2)}
.mk-grid{display:grid;gap:12px;grid-template-columns:1fr 1fr}
@media(min-width:760px){.mk-grid{grid-template-columns:repeat(3,1fr)}}
.mk-card{border:1px solid var(--border);background:var(--surface);border-radius:16px;padding:13px;cursor:pointer;
  position:relative;overflow:hidden;transition:.16s}
.mk-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--accent)}
.mk-card.on{border-color:var(--accent);box-shadow:var(--shadow)}
.mk-card .mkn{font-weight:700;font-size:13.5px}
.mk-card .mkc{font-size:10.5px;color:var(--text-3);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.mk-card .mkp{font-family:var(--font-display);font-weight:800;font-size:17px;margin-top:8px;letter-spacing:-.02em}
.mkchg{font-size:11.5px;font-weight:800;padding:3px 8px;border-radius:20px;white-space:nowrap}
.mk-spark{margin-top:8px;height:38px}
.mk-stage{background:var(--surface-2);border:1px solid var(--border);border-radius:18px;padding:12px}
html[data-theme="dark"] .mk-stage{background:linear-gradient(160deg,#141a2c,#0d1120)}
.mk-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
.mk-tabs::-webkit-scrollbar{display:none}
.ohlc{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}
.ohlc div{font-size:12px;font-weight:700;color:var(--text-2)}
.ohlc div span{display:block;font-size:10.5px;color:var(--text-3);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.live{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;color:var(--pos)}
.live i{width:7px;height:7px;border-radius:50%;background:var(--pos);animation:blink 1.4s infinite}

/* symbol chips */
.symchip{flex:0 0 auto;min-width:56px;padding:9px 12px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-2);font-family:var(--font-display);font-weight:800;font-size:12.5px;
  letter-spacing:.05em;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.symchip:hover{border-color:var(--accent);color:var(--text)}
.symchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.symtag{display:inline-block;font-family:var(--font-display);font-size:10px;font-weight:800;letter-spacing:.05em;
  background:var(--accent-soft);color:var(--accent);padding:2px 6px;border-radius:6px;margin-right:6px;vertical-align:1px}

/* AI voice assistant */
.voice-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:26px 18px 30px;border-radius:var(--r-xl);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
html[data-theme="dark"] .voice-stage{background:linear-gradient(170deg,#161c2e,#0d1120)}
.voice-title{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-.02em}
.voice-sub{color:var(--text-3);font-size:13px;margin-top:4px;font-weight:600}
.wave-box{width:100%;max-width:520px;height:170px;margin:18px 0 10px}
.voice-state{font-family:var(--font-display);font-weight:800;font-size:15px;letter-spacing:.06em;text-transform:uppercase;
  min-height:22px;transition:color .3s}
.voice-hint{color:var(--text-3);font-size:12.5px;margin-top:6px;font-weight:600;min-height:18px}
.mic-btn{width:96px;height:96px;border-radius:50%;border:none;margin-top:22px;cursor:pointer;position:relative;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;display:grid;place-items:center;
  box-shadow:0 18px 36px -14px var(--accent);transition:transform .18s cubic-bezier(.2,1,.4,1);touch-action:none;user-select:none}
.mic-btn svg{width:36px;height:36px}
.mic-btn:active,.mic-btn.rec{transform:scale(1.07)}
.mic-btn.rec:before,.mic-btn.rec:after{content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid var(--accent);animation:ring 1.6s ease-out infinite}
.mic-btn.rec:after{animation-delay:.8s}
@keyframes ring{from{transform:scale(1);opacity:.55}to{transform:scale(1.75);opacity:0}}
.voice-reply{max-width:480px;margin:20px auto 0;background:var(--surface-2);border:1px solid var(--border);
  border-radius:18px;padding:16px;text-align:left;font-size:14px;line-height:1.6;color:var(--text-2);
  animation:fadeUp .5s both}
.voice-reply b{color:var(--text);display:block;margin-bottom:6px;font-size:12px;letter-spacing:.07em;text-transform:uppercase}

/* compact stats + interactive cards */
.stat-grid{display:grid;gap:10px;grid-template-columns:repeat(2,1fr)}
@media(min-width:620px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow-sm)}
.stat .sl{font-size:11.5px;color:var(--text-3);font-weight:700;letter-spacing:.03em}
.stat .sv{font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:-.02em;margin-top:3px}
.stat .sd{font-size:11px;font-weight:700;margin-top:4px}
.click-list{display:grid;gap:10px;grid-template-columns:1fr}
@media(min-width:760px){.click-list{grid-template-columns:1fr 1fr}}
.crow{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--border);background:var(--surface);
  border-radius:14px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.crow:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.crow .cdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.crow .cn{font-weight:700;font-size:13.5px}
.crow .cs{font-size:11.5px;color:var(--text-3);font-weight:600}
.crow .cv{margin-left:auto;text-align:right}
.crow .cv b{font-family:var(--font-display);font-weight:800;font-size:14.5px;display:block}

/* market viewer */
.viewer{max-width:900px!important}
.per-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.per-tabs::-webkit-scrollbar{display:none}
.per{flex:0 0 auto;padding:7px 13px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
  font-weight:800;font-size:12px;color:var(--text-2);cursor:pointer;font-family:var(--font-display);letter-spacing:.04em}
.per.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.dragzone{cursor:grab;touch-action:pan-y}
.dragzone:active{cursor:grabbing}
.ohlc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
@media(min-width:620px){.ohlc-grid{grid-template-columns:repeat(4,1fr)}}
.ohlc-grid div{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:9px 11px;
  font-weight:800;font-size:13.5px;font-variant-numeric:tabular-nums}
.ohlc-grid div span{display:block;font-size:10px;color:var(--text-3);font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.hintbar{font-size:11.5px;color:var(--text-3);font-weight:600;margin-top:8px;display:flex;align-items:center;gap:6px}
.hintbar svg{width:14px;height:14px;flex:0 0 auto}

/* clickable stats + charts */
.stat{cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.stat:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.chart-wrap{cursor:zoom-in}
.kpi[data-metric]{cursor:pointer}
.kpi[data-metric]:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow)}

/* month calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cdow{font-size:10.5px;font-weight:800;color:var(--text-3);text-align:center;padding:4px 0;letter-spacing:.06em}
.cell{min-height:58px;border:1px solid var(--border);border-radius:12px;padding:6px;display:flex;flex-direction:column;gap:3px;
  cursor:pointer;background:var(--surface);transition:.15s;overflow:hidden}
.cell:hover{border-color:var(--accent)}
.cell.out{opacity:.32}
.cell.today{background:var(--accent-soft);border-color:var(--accent)}
.cell b{font-size:12px;font-weight:800;font-family:var(--font-display)}
.cell .ev{height:5px;border-radius:5px;flex:0 0 auto}
.cell .evt-mini{font-size:9.5px;font-weight:700;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* LED glow themes */
html[data-glow="1"] h1,html[data-glow="1"] .value,html[data-glow="1"] .voice-title,
html[data-glow="1"] .sv,html[data-glow="1"] .brand-name{text-shadow:0 0 16px var(--accent)}
html[data-glow="1"] .btn-primary{box-shadow:0 0 24px -6px var(--accent)}
html[data-glow="1"] .logo{box-shadow:0 0 26px -6px var(--accent)}
html[data-glow="1"] .badge,html[data-glow="1"] .symtag{text-shadow:0 0 10px currentColor}
html[data-glow="1"] .nav-item.active{box-shadow:inset 0 0 0 1px var(--accent)}

/* mail sent animation */
.sent-pop{display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 10px 10px}
.sent-pop .ring{width:92px;height:92px;border-radius:50%;background:var(--pos-soft);display:grid;place-items:center;
  animation:pop .5s cubic-bezier(.2,1.4,.4,1) both;margin-bottom:16px}
.sent-pop .ring svg{width:50px;height:50px;color:var(--pos)}
.sent-pop .ring path{stroke-dasharray:60;stroke-dashoffset:60;animation:draw .5s .18s ease-out forwards}
.sent-pop h3{font-size:19px}
.sent-pop p{color:var(--text-3);font-size:13.5px;margin:6px 0 0}

/* ===== news-style scrolling ticker ===== */
.tickwrap{overflow:hidden;border-radius:16px;background:var(--surface);border:1px solid var(--border);
  margin-bottom:16px;position:relative}
.tickwrap:before,.tickwrap:after{content:'';position:absolute;top:0;bottom:0;width:40px;z-index:2;pointer-events:none}
.tickwrap:before{left:0;background:linear-gradient(90deg,var(--surface),transparent)}
.tickwrap:after{right:0;background:linear-gradient(270deg,var(--surface),transparent)}
.ticktrack{display:flex;gap:28px;white-space:nowrap;padding:12px 0;animation:marq 46s linear infinite;width:max-content}
.tickwrap:hover .ticktrack{animation-play-state:paused}
@keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tkitem{display:inline-flex;gap:7px;align-items:center;font-size:12.5px;font-weight:700;flex:0 0 auto}
.tkitem .tkn{color:var(--text-3);font-family:var(--font-display);letter-spacing:.05em}

/* ===== meeting room ===== */
.meet-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mtile{background:var(--surface-2);border:1px solid var(--border);border-radius:18px;padding:16px 10px 12px;
  text-align:center;transition:.25s}
.mtile.speaking{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.mhead{display:grid;place-items:center;margin-bottom:8px}
.mhead svg{width:76px;height:76px}
.mname{font-weight:700;font-size:13px}
.mrole{font-size:11px;color:var(--text-3);font-weight:600}
.mbars{display:flex;gap:3px;justify-content:center;align-items:flex-end;height:22px;margin-top:9px}
.mbars i{width:4px;height:5px;border-radius:3px;background:var(--border);display:block}
.mtile.speaking .mbars i{background:var(--accent);animation:bar .55s ease-in-out infinite alternate}
.mtile.speaking .mbars i:nth-child(2){animation-delay:.08s}
.mtile.speaking .mbars i:nth-child(3){animation-delay:.16s}
.mtile.speaking .mbars i:nth-child(4){animation-delay:.24s}
.mtile.speaking .mbars i:nth-child(5){animation-delay:.32s}
.mtile.speaking .mbars i:nth-child(6){animation-delay:.4s}
.mtile.speaking .mbars i:nth-child(7){animation-delay:.48s}
@keyframes bar{from{height:4px}to{height:20px}}
.mtile .mstat{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;margin-top:6px;color:var(--text-3)}
.mtile.speaking .mstat{color:var(--accent)}
.meet-bar{display:flex;gap:10px;justify-content:center;margin-top:16px}
.meet-bar .icon-btn{width:46px;height:46px;border-radius:50%}
.meet-bar .leave{background:var(--neg);color:#fff;border-color:var(--neg)}

/* ===== AI app shell ===== */
.ai-app{border-radius:var(--r-xl);overflow:hidden;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow)}
.ai-top{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;padding:20px;display:flex;align-items:center;gap:13px}
.ai-top .orb2{width:46px;height:46px;border-radius:15px;background:rgba(255,255,255,.2);display:grid;place-items:center}
.ai-top .orb2 svg{width:100%;height:100%}
.ai-top .orb2{width:76px;height:76px;border-radius:20px}
.ai-top b{font-family:var(--font-display);font-size:17px;font-weight:800;display:block}
.ai-top span{font-size:12px;opacity:.85;font-weight:600}
.ai-top .stt{margin-left:auto;background:rgba(255,255,255,.2);border-radius:20px;padding:6px 12px;font-size:11.5px;font-weight:800;letter-spacing:.05em}
.sugg{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}

/* calendar nav */
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-nav b{font-family:var(--font-display);font-size:16px;font-weight:800;min-width:130px;text-align:center}
.evline{display:flex;align-items:center;gap:11px;padding:11px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface);margin-bottom:8px}
.evline .bar{width:4px;align-self:stretch;border-radius:4px;flex:0 0 auto}

/* FIX: primary buttons kept their gradient on hover */
.btn.btn-primary:hover{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;filter:brightness(1.07)}
.btn.btn-primary,.btn.btn-primary *{color:#fff}

/* ===== extra dark themes ===== */
html[data-theme="midnight"]{color-scheme:dark;
  --bg:#080D1F;--bg-2:#050917;--surface:#111935;--surface-2:#182144;--surface-3:#212C57;
  --text:#E9EDFB;--text-2:#98A3CC;--text-3:#6A75A4;--border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.05);
  --pos:#3DD68C;--pos-soft:rgba(61,214,140,.15);--neg:#FF6369;--neg-soft:rgba(255,99,105,.15);--warn:#F5B454;--warn-soft:rgba(245,180,84,.15);
  --shadow-sm:0 1px 2px rgba(0,0,0,.45);--shadow:0 1px 2px rgba(0,0,0,.45),0 14px 34px -16px rgba(0,0,0,.75);
  --shadow-lg:0 6px 16px rgba(0,0,0,.55),0 40px 70px -28px rgba(0,0,0,.85);
  --topbar-bg:rgba(14,20,45,.75);--grid:rgba(255,255,255,.07)}
html[data-theme="carbon"]{color-scheme:dark;
  --bg:#0A0A0C;--bg-2:#060607;--surface:#141416;--surface-2:#1B1B1F;--surface-3:#26262B;
  --text:#F0F0F2;--text-2:#9B9BA3;--text-3:#6C6C75;--border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.05);
  --pos:#3DD68C;--pos-soft:rgba(61,214,140,.14);--neg:#FF6369;--neg-soft:rgba(255,99,105,.14);--warn:#F5B454;--warn-soft:rgba(245,180,84,.14);
  --shadow-sm:0 1px 2px rgba(0,0,0,.5);--shadow:0 1px 2px rgba(0,0,0,.5),0 14px 34px -16px rgba(0,0,0,.8);
  --shadow-lg:0 6px 16px rgba(0,0,0,.6),0 40px 70px -28px rgba(0,0,0,.9);
  --topbar-bg:rgba(18,18,20,.75);--grid:rgba(255,255,255,.06)}
html[data-theme="nebula"]{color-scheme:dark;
  --bg:#100A22;--bg-2:#0A0618;--surface:#1A1136;--surface-2:#221645;--surface-3:#2D1E59;
  --text:#F1EBFF;--text-2:#A99CD1;--text-3:#7A6DA6;--border:rgba(255,255,255,.09);--border-2:rgba(255,255,255,.05);
  --pos:#4EE59B;--pos-soft:rgba(78,229,155,.15);--neg:#FF6EA0;--neg-soft:rgba(255,110,160,.15);--warn:#FFC46B;--warn-soft:rgba(255,196,107,.15);
  --shadow-sm:0 1px 2px rgba(0,0,0,.45);--shadow:0 1px 2px rgba(0,0,0,.45),0 14px 34px -16px rgba(20,0,50,.8);
  --shadow-lg:0 6px 16px rgba(0,0,0,.55),0 40px 70px -28px rgba(20,0,50,.9);
  --topbar-bg:rgba(26,17,54,.75);--grid:rgba(255,255,255,.08)}
html[data-theme="forest"]{color-scheme:dark;
  --bg:#06140F;--bg-2:#030D09;--surface:#0E2019;--surface-2:#142B22;--surface-3:#1D3A2E;
  --text:#E8F6EF;--text-2:#93B7A7;--text-3:#65897A;--border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.05);
  --pos:#4EE59B;--pos-soft:rgba(78,229,155,.15);--neg:#FF7A7F;--neg-soft:rgba(255,122,127,.15);--warn:#F3C267;--warn-soft:rgba(243,194,103,.15);
  --shadow-sm:0 1px 2px rgba(0,0,0,.45);--shadow:0 1px 2px rgba(0,0,0,.45),0 14px 34px -16px rgba(0,0,0,.8);
  --shadow-lg:0 6px 16px rgba(0,0,0,.55),0 40px 70px -28px rgba(0,0,0,.9);
  --topbar-bg:rgba(14,32,25,.75);--grid:rgba(255,255,255,.07)}

/* ===== animated chatbot ===== */
.bot .bot-hat{transform-box:fill-box;transform-origin:center bottom;animation:hatb 2s ease-in-out infinite}
@keyframes hatb{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-2.5px) rotate(-7deg)}}
.bot .leg{transform-box:fill-box;transform-origin:top center;animation:legw 1s ease-in-out infinite alternate}
.bot .leg2{animation-direction:alternate-reverse}
@keyframes legw{from{transform:rotate(-16deg)}to{transform:rotate(16deg)}}
.bot .eye{animation:eyeb 3.4s ease-in-out infinite}
@keyframes eyeb{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.15)}}
.bot .eye{transform-box:fill-box;transform-origin:center}

/* ===== meeting polish ===== */
.live.big{font-size:14px;gap:9px}
.live.big i{width:12px;height:12px;animation:blink 1.1s infinite}
.you-bar{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:16px;padding:14px;
  border-radius:16px;border:1px dashed var(--border);background:var(--surface-2)}
.you-bar.on{border-color:var(--accent);background:var(--accent-soft);border-style:solid}
.you-bar .mbars i{background:var(--border)}
.you-bar.on .mbars i{background:var(--accent);animation:bar .5s ease-in-out infinite alternate}
.you-bar.on .mbars i:nth-child(2){animation-delay:.07s}
.you-bar.on .mbars i:nth-child(3){animation-delay:.14s}
.you-bar.on .mbars i:nth-child(4){animation-delay:.21s}
.you-bar.on .mbars i:nth-child(5){animation-delay:.28s}
.you-bar.on .mbars i:nth-child(6){animation-delay:.35s}
.you-bar.on .mbars i:nth-child(7){animation-delay:.42s}
.icon-btn.mic-on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ===== news feed ===== */
.news{display:flex;flex-direction:column;gap:2px}
.nrow{display:flex;gap:12px;align-items:flex-start;padding:13px 12px;border-radius:12px;cursor:pointer;transition:.15s}
.nrow:hover{background:var(--surface-2)}
.nrow.fresh{animation:slideIn .5s both}
.nrow .ntag{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:6px;flex:0 0 auto;margin-top:2px}
.nrow .nt{font-weight:600;font-size:13.5px;line-height:1.4}
.nrow .nm{font-size:11.5px;color:var(--text-3);font-weight:600;margin-top:3px}
.nrow .nd{margin-left:auto;font-size:11px;color:var(--text-3);font-weight:700;white-space:nowrap}

/* ===== meeting extras ===== */
.hold-btn{flex:1;min-height:52px;border-radius:16px;border:none;cursor:pointer;user-select:none;touch-action:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;font-family:var(--font-display);
  font-weight:800;font-size:14px;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 12px 26px -12px var(--accent);transition:transform .14s}
.hold-btn svg{width:20px;height:20px}
.hold-btn.on{transform:scale(1.03);background:linear-gradient(135deg,var(--pos),var(--pos))}
.cap{background:var(--surface-3);border-radius:14px;padding:12px 14px;margin-top:14px;min-height:56px;
  display:flex;gap:10px;align-items:flex-start}
.cap .cwho{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);flex:0 0 auto}
.cap .ctxt{font-size:13.5px;color:var(--text-2);line-height:1.5;font-weight:500}
.meet-chat{margin-top:14px;border:1px solid var(--border);border-radius:16px;padding:12px;background:var(--surface-2);
  max-height:150px;overflow-y:auto}
.mc{display:flex;gap:8px;align-items:flex-start;padding:6px 0;font-size:12.5px;animation:slideIn .35s both}
.mc b{color:var(--accent);font-weight:800;flex:0 0 auto;font-size:12px}
.mc span{color:var(--text-2);line-height:1.45}
.net{display:flex;gap:2px;align-items:flex-end;height:12px}
.net i{width:3px;border-radius:2px;background:var(--pos)}
.net i:nth-child(1){height:4px}.net i:nth-child(2){height:7px}.net i:nth-child(3){height:10px}.net i:nth-child(4){height:12px;opacity:.3}
.agenda{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.agenda span{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:20px;background:var(--surface-3);color:var(--text-3)}
.agenda span.on{background:var(--accent-soft);color:var(--accent)}
.agenda span.done{background:var(--pos-soft);color:var(--pos)}
.join-hero{width:88px;height:88px;border-radius:26px;margin:0 auto 18px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 20px 44px -14px var(--accent);
  animation:float 2.6s ease-in-out infinite}
.join-hero svg{width:52px;height:52px}

/* ===== trading viewer ===== */
.press{height:10px;border-radius:20px;overflow:hidden;display:flex;background:var(--surface-3);margin-top:8px}
.press i{display:block;height:100%;transition:width .6s ease}
.trades{font-variant-numeric:tabular-nums}
.trow{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;font-size:12.5px;font-weight:700;
  animation:slideIn .3s both}
.trow:nth-child(odd){background:var(--surface-2)}
.trow .tsz{margin-left:auto;color:var(--text-3)}
.mini-stat{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:620px){.mini-stat{grid-template-columns:repeat(4,1fr)}}
.mini-stat div{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;
  font-weight:800;font-size:12.5px;font-variant-numeric:tabular-nums}
.mini-stat div span{display:block;font-size:9.5px;color:var(--text-3);font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}

/* ===== app drawer ===== */
.drawer-bg{position:fixed;inset:0;background:rgba(8,10,18,.5);z-index:78;opacity:0;pointer-events:none;transition:.22s;backdrop-filter:blur(2px)}
.drawer-bg.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;left:0;top:0;bottom:0;width:284px;max-width:86vw;background:var(--surface);z-index:79;
  border-right:1px solid var(--border);transform:translateX(-104%);transition:transform .3s cubic-bezier(.3,1,.4,1);
  overflow-y:auto;padding:18px 14px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;gap:4px}
.drawer.show{transform:none}
.drawer .brand{cursor:default}
.logo{cursor:pointer}

/* ===== AI as a full app ===== */
body.aiapp .content{padding:0 0 96px;max-width:none}
body.aiapp .ai-app{border-radius:0;border:none;box-shadow:none;min-height:calc(100dvh - 66px);display:flex;flex-direction:column}
body.aiapp .ai-app>div:last-child{flex:1;display:flex;flex-direction:column}
body.aiapp #aiThread{flex:1;max-height:none!important}
@media(min-width:760px){
  body.aiapp .content{padding:26px 30px 40px;max-width:1320px}
  body.aiapp .ai-app{border-radius:var(--r-xl);border:1px solid var(--border);box-shadow:var(--shadow);min-height:0}
}

/* ===== meeting transcript ===== */
.transcript{margin-top:14px;border:1px solid var(--border);border-radius:16px;padding:12px;background:var(--surface);
  max-height:170px;overflow-y:auto}
.tr{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border-2);animation:slideIn .35s both}
.tr:last-child{border-bottom:none}
.tr .trt{font-size:10.5px;color:var(--text-3);font-weight:800;flex:0 0 auto;padding-top:2px;font-variant-numeric:tabular-nums}
.tr .trw{font-size:12px;font-weight:800;color:var(--accent);flex:0 0 auto}
.tr .trx{font-size:12.5px;color:var(--text-2);line-height:1.45}

/* ================= VIRTUAL ASSISTANT — SEPARATE APP ================= */
#va-layer{position:fixed;inset:0;z-index:300;pointer-events:none}
.va{position:absolute;inset:0;pointer-events:auto;overflow:hidden;color:#EDF1FF;display:flex;flex-direction:column;
  background:radial-gradient(1200px 700px at 50% 6%,#26304F 0%,#151B31 44%,#0A0D18 100%);
  animation:vaIn .5s cubic-bezier(.22,1,.36,1);user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.va.out{animation:vaOut .32s forwards}
@keyframes vaIn{from{opacity:0;transform:scale(1.04)}}
@keyframes vaOut{to{opacity:0;transform:scale(.97)}}
.va-aura{position:absolute;border-radius:50%;filter:blur(70px);opacity:.42;pointer-events:none}
.va-aura.a{width:520px;height:520px;background:var(--accent);top:-160px;left:-120px;animation:drift 15s ease-in-out infinite}
.va-aura.b{width:460px;height:460px;background:var(--accent-2);bottom:-180px;right:-100px;animation:drift 18s ease-in-out infinite reverse}
.va-aura.c{width:360px;height:360px;background:#3E5BFF;top:34%;right:10%;animation:drift 22s ease-in-out infinite}
@keyframes drift{50%{transform:translate(60px,-40px) scale(1.14)}}
.va-grid{position:absolute;inset:0;pointer-events:none;opacity:.2;
  background-image:linear-gradient(rgba(255,255,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.07) 1px,transparent 1px);
  background-size:46px 46px;-webkit-mask-image:radial-gradient(circle at 50% 45%,#000 20%,transparent 78%);
  mask-image:radial-gradient(circle at 50% 45%,#000 20%,transparent 78%)}
.va-stars{position:absolute;inset:0;pointer-events:none}
.va-stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.5;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.85;transform:scale(1.6)}}

.va-top{position:relative;z-index:3;display:flex;align-items:center;gap:12px;padding:16px 18px;flex:none}
.va-brand{display:flex;align-items:center;gap:11px}
.va-bm{width:40px;height:40px;border-radius:13px;background:linear-gradient(140deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;box-shadow:0 8px 26px rgba(0,0,0,.45)}
.va-bm svg{width:58%;height:58%;color:#fff}
.va-brand h4{font-family:var(--font-display);font-size:21px;font-weight:800;letter-spacing:-.02em;margin:0;line-height:1.1}
.va-brand p{font-size:10px;color:#8FA0C7;letter-spacing:.1em;text-transform:uppercase;font-weight:800;margin:2px 0 0}
.va-status{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:800;padding:8px 13px;
  border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#C7D2F0;letter-spacing:.05em}
.va-status i{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:blink 2s infinite}
.va-btn{height:40px;padding:0 14px;border-radius:12px;display:flex;align-items:center;gap:8px;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#C7D2F0;font-weight:700;font-size:12.5px;transition:.18s}
.va-btn:hover{background:rgba(255,255,255,.16);color:#fff}
.va-btn.on{background:linear-gradient(140deg,var(--accent),var(--accent-2));color:#fff;border-color:transparent}
.va-btn svg{width:16px;height:16px}
.va-x{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#C7D2F0;transition:.2s}
.va-x:hover{background:rgba(255,255,255,.18);color:#fff;transform:rotate(90deg)}
.va-x svg{width:19px;height:19px}

.va-stage{flex:1;position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:4px 16px;min-height:0}
.bot-wrap{position:relative;display:grid;place-items:center;animation:hover 3.4s ease-in-out infinite}
@keyframes hover{50%{transform:translateY(-9px)}}
.vbot{width:min(270px,54vw);height:auto;overflow:visible;filter:drop-shadow(0 26px 40px rgba(5,10,30,.65))}
.bot-ring{position:absolute;width:min(350px,72vw);aspect-ratio:1;border-radius:50%;border:1px solid rgba(140,170,255,.18);pointer-events:none}
.bot-ring:after{content:"";position:absolute;inset:-22px;border-radius:50%;border:1px dashed rgba(140,170,255,.13);animation:rot 26s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.bot-shadow{position:absolute;bottom:-6px;width:120px;height:14px;border-radius:50%;background:rgba(0,0,0,.5);filter:blur(9px);animation:shad 3.4s ease-in-out infinite}
@keyframes shad{50%{transform:scale(.82);opacity:.6}}

#vEyeL,#vEyeR{transform-origin:center;animation:vblink 4.6s infinite}
@keyframes vblink{0%,94%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}
#vArmL{transform-origin:118px 152px;animation:armIdleL 3.6s ease-in-out infinite}
#vArmR{transform-origin:222px 152px;animation:armIdleR 3.6s ease-in-out infinite}
@keyframes armIdleL{50%{transform:rotate(7deg)}}
@keyframes armIdleR{50%{transform:rotate(-7deg)}}
#vLegL{transform-origin:145px 246px;animation:legIdle 3.4s ease-in-out infinite}
#vLegR{transform-origin:195px 246px;animation:legIdle 3.4s ease-in-out infinite reverse}
@keyframes legIdle{50%{transform:rotate(4deg) translateY(2px)}}
#vHat{transform-origin:170px 78px;animation:hatIdle 3.4s ease-in-out infinite}
@keyframes hatIdle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg) translateY(-3px)}}
#vAnt{transform-origin:170px 62px;animation:antIdle 2.2s ease-in-out infinite}
@keyframes antIdle{50%{transform:rotate(9deg)}}
#vDot{animation:glowDot 1.6s ease-in-out infinite}
@keyframes glowDot{50%{opacity:1;r:7}}
#vHead{transform-origin:170px 130px;animation:headIdle 5s ease-in-out infinite}
@keyframes headIdle{25%{transform:rotate(2.5deg)}75%{transform:rotate(-2.5deg)}}
#vMouth{transform-origin:170px 152px;transition:.2s}
#vTie{transform-origin:170px 178px;animation:tieIdle 3.4s ease-in-out infinite}
@keyframes tieIdle{50%{transform:rotate(2deg)}}

.va[data-state="listening"] .bot-wrap{animation:hover 1.6s ease-in-out infinite}
.va[data-state="listening"] #vDot{animation:glowDot .5s ease-in-out infinite}
.va[data-state="listening"] #vArmL{animation:armUpL .8s ease-in-out infinite alternate}
.va[data-state="listening"] #vArmR{animation:armUpR .8s ease-in-out infinite alternate}
@keyframes armUpL{to{transform:rotate(24deg)}}
@keyframes armUpR{to{transform:rotate(-24deg)}}
.va[data-state="thinking"] #vHead{animation:headThink 1.1s ease-in-out infinite}
@keyframes headThink{50%{transform:rotate(-7deg) translateY(-2px)}}
.va[data-state="speaking"] #vMouth{animation:talk .26s ease-in-out infinite alternate}
@keyframes talk{from{transform:scaleY(.35)}to{transform:scaleY(1.6)}}
.va[data-state="speaking"] #vLegL{animation:march .42s ease-in-out infinite}
.va[data-state="speaking"] #vLegR{animation:march .42s ease-in-out infinite reverse}
@keyframes march{50%{transform:rotate(-12deg) translateY(-4px)}}
.va[data-state="speaking"] .bot-wrap{animation:hover 1.1s ease-in-out infinite}
.va[data-state="speaking"] #vArmL{animation:armTalkL .6s ease-in-out infinite alternate}
.va[data-state="speaking"] #vArmR{animation:armTalkR .7s ease-in-out infinite alternate}
@keyframes armTalkL{to{transform:rotate(-14deg)}}
@keyframes armTalkR{to{transform:rotate(14deg)}}

.think-bubble{position:absolute;top:-4px;left:50%;transform:translateX(-50%);display:flex;gap:6px;padding:9px 13px;
  border-radius:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);opacity:0;transition:.3s;pointer-events:none}
.va[data-state="thinking"] .think-bubble{opacity:1;top:-16px}
.think-bubble i{width:7px;height:7px;border-radius:50%;background:#9DB4FF;animation:bounceDot 1.1s infinite}
.think-bubble i:nth-child(2){animation-delay:.15s}
.think-bubble i:nth-child(3){animation-delay:.3s}
@keyframes bounceDot{0%,60%,100%{transform:translateY(0);opacity:.45}30%{transform:translateY(-6px);opacity:1}}

.va-label{text-align:center;min-height:50px}
.va-label h2{font-family:var(--font-display);font-size:clamp(18px,4.4vw,25px);font-weight:800;letter-spacing:-.02em;margin:0;color:#fff}
.va-label p{font-size:12.5px;color:#8FA0C7;margin:5px 0 0;min-height:18px;font-weight:600}
.va-wave{display:flex;align-items:center;justify-content:center;gap:3px;height:70px;width:min(560px,92vw)}
.va-wave i{width:4px;border-radius:20px;height:5px;opacity:.3;background:linear-gradient(180deg,#8FB0FF,var(--accent));
  transition:height .09s linear,opacity .3s}
.va[data-state="listening"] .va-wave i{opacity:1;background:linear-gradient(180deg,var(--accent-2),var(--accent))}
.va[data-state="speaking"] .va-wave i{opacity:1;background:linear-gradient(180deg,#fff,var(--accent))}
.va[data-state="thinking"] .va-wave i{opacity:.5}
.va-freq{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:28px;opacity:.75}
.va-freq i{width:3px;border-radius:20px;background:var(--accent);height:4px;transition:height .1s linear}
.va-script{width:min(680px,94vw);max-height:20vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:0 4px}
.bub{max-width:82%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.55;animation:bubIn .35s cubic-bezier(.22,1.2,.36,1)}
@keyframes bubIn{from{opacity:0;transform:translateY(8px)}}
.bub.me{align-self:flex-end;background:linear-gradient(140deg,var(--accent),var(--accent-2));color:#fff;border-bottom-right-radius:5px}
.bub.bot{align-self:flex-start;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);border-bottom-left-radius:5px;color:#DCE4FA}

.va-bottom{position:relative;z-index:3;padding:6px 16px calc(20px + env(safe-area-inset-bottom));display:flex;
  flex-direction:column;align-items:center;gap:12px;flex:none}
.va-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:680px}
.va-chip{padding:8px 14px;border-radius:20px;font-size:12.5px;font-weight:700;color:#C7D2F0;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);transition:.18s}
.va-chip:hover{background:rgba(255,255,255,.16);color:#fff;transform:translateY(-2px)}
.ptt-wrap{position:relative;display:grid;place-items:center}
.ptt{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;position:relative;z-index:2;cursor:pointer;
  background:linear-gradient(150deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 12px 40px rgba(0,0,0,.5);
  border:3px solid rgba(255,255,255,.18);transition:transform .16s cubic-bezier(.22,1.3,.36,1);touch-action:none}
.ptt svg{width:32px;height:32px}
.ptt:hover{transform:scale(1.05)}
.ptt.held{transform:scale(.93);box-shadow:0 0 0 12px rgba(255,255,255,.08),0 12px 40px rgba(0,0,0,.55)}
.ptt.busy{opacity:.92;pointer-events:none}
.ptt-ring{position:absolute;width:84px;height:84px;border-radius:50%;border:2px solid var(--accent);opacity:0}
.va[data-state="listening"] .ptt-ring{animation:ripple 1.5s ease-out infinite}
.va[data-state="listening"] .ptt-ring:nth-child(2){animation-delay:.5s}
@keyframes ripple{0%{opacity:.85;transform:scale(1)}100%{opacity:0;transform:scale(2.2)}}
.ptt-hint{font-size:12px;color:#8FA0C7;font-weight:700;text-align:center}
.ptt-hint b{color:#C7D2F0}
.va-boot{position:absolute;inset:0;z-index:9;display:grid;place-items:center;background:#0A0D18}
.va-boot.out{animation:fadeOut .5s forwards}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
.va-boot-in{display:flex;flex-direction:column;align-items:center;gap:16px}
.va-boot .va-bm{width:64px;height:64px;border-radius:20px;animation:breathe 1.6s ease-in-out infinite}
.va-boot .va-bm svg{width:34px;height:34px}
@keyframes breathe{50%{transform:scale(1.1)}}
.va-boot p{font-size:12px;color:#8FA0C7;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin:0}
.va-boot .bar{width:180px;height:3px;background:rgba(255,255,255,.12);border-radius:20px;overflow:hidden}
.va-boot .bar i{display:block;height:100%;width:0;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent-2));
  animation:loadBar 1.5s cubic-bezier(.5,0,.2,1) forwards}
@keyframes loadBar{to{width:100%}}
@media(max-width:680px){
  .vbot{width:min(206px,52vw)} .va-wave{height:54px} .ptt,.ptt-ring{width:76px;height:76px}
  .va-script{max-height:16vh} .va-chips{max-height:40px;overflow:hidden}
}
@media(max-height:640px){.vbot{width:168px}.va-wave{height:42px}.va-script{display:none}}

/* ===== assistant settings panel ===== */
.va-set{position:absolute;top:0;right:0;bottom:0;width:340px;max-width:90vw;z-index:12;
  background:rgba(12,16,30,.94);backdrop-filter:blur(18px);border-left:1px solid rgba(255,255,255,.1);
  transform:translateX(104%);transition:transform .32s cubic-bezier(.3,1,.4,1);overflow-y:auto;padding:20px}
.va-set.show{transform:none}
.va-set h5{font-family:var(--font-display);font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:#8FA0C7;margin:22px 0 12px}
.va-set h5:first-child{margin-top:0}
.exp-card{display:flex;gap:12px;align-items:center;padding:13px;border-radius:14px;cursor:pointer;margin-bottom:9px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:.18s}
.exp-card:hover{background:rgba(255,255,255,.12)}
.exp-card.on{border-color:var(--accent);background:rgba(255,255,255,.12);box-shadow:0 0 0 1px var(--accent)}
.exp-card .ec{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
  background:linear-gradient(140deg,var(--accent),var(--accent-2));color:#fff}
.exp-card .ec svg{width:22px;height:22px}
.exp-card b{font-size:13.5px;color:#EDF1FF;display:block}
.exp-card span{font-size:11.5px;color:#8FA0C7;font-weight:600}
.acc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.acc{aspect-ratio:1;border-radius:12px;cursor:pointer;border:2px solid transparent;display:grid;place-items:center;transition:.16s}
.acc.on{border-color:#fff}
.acc svg{width:15px;height:15px;color:#fff}
.acc-name{font-size:11.5px;color:#C7D2F0;font-weight:700;margin-top:10px;text-align:center}
.va-sw{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid rgba(255,255,255,.08)}
.va-sw b{font-size:13.5px;color:#EDF1FF}
.va-sw span{font-size:11.5px;color:#8FA0C7;display:block;font-weight:600}
.va-sw .switch{margin-left:auto;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.15)}

/* ===== THEME 2 — NEURAL SPHERE ===== */
.va[data-exp="sphere"]{background:radial-gradient(900px 620px at 50% 42%,#1B2340 0%,#0D1123 46%,#05070F 100%)}
.sphere-wrap{position:relative;display:grid;place-items:center;width:min(320px,72vw);aspect-ratio:1}
.sphere{position:absolute;inset:14%;border-radius:50%;
  background:radial-gradient(circle at 34% 30%,rgba(255,255,255,.95) 0%,var(--accent-2) 22%,var(--accent) 55%,rgba(10,14,30,.9) 100%);
  box-shadow:0 0 70px -6px var(--accent),inset 0 -22px 50px rgba(0,0,0,.5);
  animation:breathe2 4.2s ease-in-out infinite;transition:transform .35s cubic-bezier(.2,1,.4,1)}
@keyframes breathe2{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
.sphere:after{content:'';position:absolute;inset:0;border-radius:50%;z-index:1;
  background:radial-gradient(circle at 68% 74%,rgba(255,255,255,.16),transparent 46%);mix-blend-mode:screen}
.sph-core{z-index:0}
.sph-core{position:absolute;inset:30%;border-radius:50%;background:radial-gradient(circle,#fff,transparent 62%);
  opacity:.5;filter:blur(10px);animation:breathe2 2.6s ease-in-out infinite}
.sph-ring{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.14);pointer-events:none}
.sph-ring.r1{inset:2%;animation:spin3 18s linear infinite;border-style:dashed;border-color:rgba(255,255,255,.12)}
.sph-ring.r2{inset:-6%;transform:rotateX(72deg);border-color:var(--accent);opacity:.35;animation:spin3 12s linear infinite reverse}
.sph-ring.r3{inset:-14%;border-color:rgba(255,255,255,.08);animation:spin3 26s linear infinite}
@keyframes spin3{to{transform:rotate(360deg)}}
.sph-ring.r2{animation-name:spin3b}
@keyframes spin3b{to{transform:rotateX(72deg) rotate(360deg)}}
.parts{position:absolute;inset:-18%;pointer-events:none}
.parts i{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;opacity:.45;
  animation:pfloat 6s ease-in-out infinite}
@keyframes pfloat{0%,100%{transform:translate(0,0) scale(1);opacity:.25}
  50%{transform:translate(var(--dx),var(--dy)) scale(1.6);opacity:.9}}
.va[data-exp="sphere"][data-state="listening"] .sphere{transform:scale(1.14);box-shadow:0 0 110px -4px var(--accent)}
.va[data-exp="sphere"][data-state="listening"] .parts i{animation-duration:2.2s}
.va[data-exp="sphere"][data-state="thinking"] .sphere{animation-duration:1.2s}
.va[data-exp="sphere"][data-state="speaking"] .sphere{animation-duration:.9s;box-shadow:0 0 90px -6px var(--accent-2)}
.va[data-exp="sphere"][data-state="speaking"] .parts i{animation-duration:3s}
.sph-pulse{position:absolute;inset:8%;border-radius:50%;border:2px solid var(--accent);opacity:0}
.va[data-exp="sphere"][data-state="listening"] .sph-pulse{animation:ripple 1.6s ease-out infinite}
.va[data-exp="sphere"][data-state="listening"] .sph-pulse:nth-child(2){animation-delay:.55s}

/* ===== THEME 3 — EXECUTIVE WORKSPACE ===== */
.va[data-exp="office"]{background:linear-gradient(180deg,#0E1526 0%,#121A2E 100%)}
.office{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.win{position:absolute;left:0;right:0;top:0;height:64%;
  background:linear-gradient(180deg,#1B2947 0%,#2C3B60 38%,#57496B 72%,#8A6A72 100%)}
.win:after{content:'';position:absolute;inset:0;background:
  repeating-linear-gradient(90deg,transparent 0 calc(25% - 3px),rgba(12,16,30,.85) calc(25% - 3px) 25%),
  repeating-linear-gradient(0deg,transparent 0 calc(50% - 3px),rgba(12,16,30,.85) calc(50% - 3px) 50%)}
.city{position:absolute;left:0;right:0;bottom:0;height:100%}
.city svg{position:absolute;bottom:0;width:100%;height:100%}
.city .lit{animation:twinkle 4s infinite}
.desk{position:absolute;left:0;right:0;bottom:0;height:38%;
  background:linear-gradient(180deg,rgba(8,11,20,.4) 0%,#0B1020 30%,#070A14 100%)}
.desk:before{content:'';position:absolute;left:0;right:0;top:32%;height:2px;background:rgba(255,255,255,.06)}
.glare{position:absolute;inset:0;background:radial-gradient(600px 320px at 78% 18%,rgba(255,220,180,.18),transparent 60%)}
.va[data-exp="office"] .va-stage{justify-content:flex-end;padding-bottom:6px}
.glass{position:relative;z-index:3;width:min(620px,94vw);border-radius:22px;padding:20px;
  background:rgba(16,22,40,.66);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.14);
  box-shadow:0 30px 70px -30px rgba(0,0,0,.85);animation:rise .6s cubic-bezier(.22,1,.36,1) both}
.glass-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.glass-head .gi{width:44px;height:44px;border-radius:14px;background:linear-gradient(140deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;box-shadow:0 10px 26px -8px var(--accent);animation:breathe2 3.4s ease-in-out infinite}
.glass-head .gi svg{width:24px;height:24px;color:#fff}
.glass-head b{font-family:var(--font-display);font-size:16px;color:#fff;display:block}
.glass-head span{font-size:11.5px;color:#8FA0C7;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.glass .gstat{margin-left:auto;font-size:11px;font-weight:800;letter-spacing:.07em;color:var(--accent-2);
  background:rgba(255,255,255,.08);border-radius:20px;padding:6px 12px}

/* ===== digital signature ===== */
.sigpad{width:100%;height:170px;border-radius:14px;border:1px dashed var(--border);background:var(--surface-2);touch-action:none;display:block}
.sig-card{display:flex;gap:14px;align-items:center;padding:14px;border-radius:16px;border:1px solid var(--pos);
  background:var(--pos-soft);margin-top:14px}
.sig-card img{height:52px;filter:contrast(1.2)}
.sig-line{font-family:var(--font-display);font-size:13px;font-weight:800}
.sig-sub{font-size:11.5px;color:var(--text-3);font-weight:700}

/* ===== MY WORKSPACE ===== */
.ws-hero{display:flex;align-items:center;gap:16px;padding:20px;border-radius:var(--r-xl);margin-bottom:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;position:relative;overflow:hidden;
  box-shadow:0 24px 46px -28px var(--accent)}
.ws-hero:before{content:'';position:absolute;right:-70px;top:-80px;width:230px;height:230px;border-radius:50%;background:rgba(255,255,255,.10)}
.ws-hero:after{content:'';position:absolute;right:70px;bottom:-110px;width:190px;height:190px;border-radius:50%;background:rgba(255,255,255,.07)}
.ws-hero>*{position:relative;z-index:1}
.ws-hero .whname{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.15}
.ws-hero .whrole{font-size:13.5px;opacity:.9;font-weight:600;margin-top:3px}
.ws-hero .whdep{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:rgba(255,255,255,.18);
  border-radius:20px;padding:5px 11px;font-size:11.5px;font-weight:800;letter-spacing:.04em}
.ws-switch{margin-left:auto;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);color:#fff;
